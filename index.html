ooms \u00b7 labs \u00b7 hot-fire test"}]}]},"government":{"label":"Government","title":"Government","titleEm":"& policy.","desc":"Air-independent energy as foundational strategic infrastructure for defense, space, and allied operations. ECAPS engages with policy makers, defense planners, public financiers, and allied institutions on sovereignty, supply-chain resilience, and infrastructure governance.","overview":{"href":"government","label":"Strategic Framework \u2197"},"cols":[{"heading":"Strategic Engagement","links":[{"href":"government","title":"Strategic Framework","desc":"Air-independent energy as defense infrastructure"},{"href":"international-cooperation","title":"International Cooperation","desc":"Sovereign capability development with allied partners"}]}]},"corporate":{"label":"Corporate","title":"Corporate","titleEm":"& heritage.","desc":"ECAPS is the global provider of high-performance ADN-based propulsion and power systems for space, air, and underwater operations.","cols":[{"heading":"Heritage & Leadership","links":[{"href":"about","title":"About ECAPS","desc":"25+ years of HPGP innovation"},{"href":"management","title":"Management Team","desc":"HPGP inventors and operating leadership"},{"href":"history","title":"History","desc":"25 years of HPGP innovation"},{"href":"missions","title":"Missions","desc":"Heritage + forward pipeline"}]},{"heading":"Operations","links":[{"href":"careers","title":"Careers","desc":"Opportunities at ECAPS"},{"href":"news","title":"News","desc":"Latest updates"},{"href":"contact-us","title":"Contact us","desc":"Get in touch"}]}]}};
const PAGES = {"about":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <span><b>ABOUT</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>FOUNDED <b>2000</b> \u00b7 25+ YEARS</span>\n </div>\n\n <h1 class=\"hero-title reveal\">About <em>ECAPS.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Operational HPGP propulsion solutions since 1997. ECAPS made history with the first HPGP flight in 2010 \u2014 and remains the owner and global supplier of HPGP technology solutions.</p>\n <div class=\"hero-coords reveal\">\n <div>HQ \u2014 <b>GLOBAL</b></div>\n <div>FOUNDED \u2014 <b>2000</b></div>\n <div>OWNERSHIP \u2014 <b>OAK UNIVERSE</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543898064-Q1HMEK6D4B2K6SGJNFYL/ECAPS+AC11\" alt=\"ECAPS engineering operations\" />\n <div class=\"telemetry\">\n FOUNDED <b>2000</b><br>\n HERITAGE <b>25+ YEARS</b><br>\n SCOPE <b>GLOBAL DELIVERY</b>\n </div>\n <div class=\"caption\">ECAPS \u00b7 PROPULSION FOR ALLIED PROGRAMS SINCE 2000</div>\n</div>\n\n<!-- MISSION -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Our Mission</div>\n <h2>Enabling critical mobility for <em>space and defense.</em></h2>\n <p class=\"lede\">ECAPS is a global provider of propulsion technologies that serve critical mobility needs in space and defense. We deliver advanced solutions to meet our customers' mission-specific objectives.</p>\n <p class=\"lede\" style=\"margin-top:24px\">ECAPS is the owner and global supplier of HPGP technology solutions. We develop ADN-based propellant blends, design and manufacture high-performance thrusters and systems, conduct fueling campaigns, and offer complete R&amp;D and engineering services.</p>\n <a href=\"#/management\" class=\"btn-primary\">Meet the team \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;overflow:hidden;border:1px solid var(--border)\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543907192-U1LS7TAZYBL6P4PNXDVM/ECAPS+team.png\" alt=\"ECAPS team\" style=\"width:100%;height:100%;object-fit:cover;filter:brightness(.85)\" />\n </div>\n</div>\n\n<!-- VALUES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Our Values \u00b7 01</div>\n <h2 class=\"section-title\">Innovation. Excellence.<br><em>Collaboration.</em></h2>\n </div>\n <p>Technological leadership through innovation, excellence and collaboration.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <div class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 INNOVATION</div>\n <h3>Pushing boundaries.</h3>\n <p>We foster a culture of innovation, continuously pushing the boundaries of technology to develop groundbreaking propulsion solutions.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 EXCELLENCE</div>\n <h3>Highest standards.</h3>\n <p>We are committed to excellence in everything we do, from product development to customer service, ensuring the highest standards of quality and performance.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 03 \u2014 COLLABORATION</div>\n <h3>Mutual success.</h3>\n <p>We believe in the power of collaboration and partnerships, working closely with our customers, suppliers, and industry partners to achieve mutual success.</p>\n </div>\n </div>\n</section>\n\n<!-- LINKED PAGES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Explore \u00b7 02</div>\n <h2 class=\"section-title\">Continue <em>exploring.</em></h2>\n </div>\n <p>Discover the history, facilities, and people behind ECAPS.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <a href=\"#/history\" class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 HISTORY</div>\n <div class=\"cap-visual\">\n <span class=\"tag\">25+ YEARS</span>\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/8fffaa8c-7b9b-425b-9119-f246f9ef3608/2000-2010.jpg\" alt=\"History\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>History</h3>\n <p>Powering critical mobility for 25+ years.</p>\n <span class=\"cap-link\">View History</span>\n </a>\n\n <a href=\"#/quality\" class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 FACILITIES</div>\n <div class=\"cap-visual\">\n <span class=\"tag\">ISO CERTIFIED</span>\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543907221-D7063HXRKWRU1LV0YVXE/image031.png\" alt=\"Facilities\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>Facilities</h3>\n <p>Production, assembly, integration and testing facilities.</p>\n <span class=\"cap-link\">View Facilities</span>\n </a>\n\n <a href=\"#/careers\" class=\"cap\">\n <div class=\"cap-num\">/ 03 \u2014 CAREERS</div>\n <div class=\"cap-visual\">\n <span class=\"tag\">JOIN US</span>\n <img src=\"https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=800&q=80&auto=format&fit=crop\" alt=\"Careers\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>Careers</h3>\n <p>Dedicated engineers, scientists and professionals.</p>\n <span class=\"cap-link\">View Careers</span>\n </a>\n </div>\n</section>\n\n<!-- QUALITY -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Quality Assurance</div>\n <h2>ISO-certified <em>operations.</em></h2>\n <p class=\"lede\">ECAPS' operations are certified under ISO standards. Our technology and innovations undergo rigorous testing and quality assurance processes, ensuring enhanced reliability and performance.</p>\n <a href=\"#/quality\" class=\"btn-primary\">View Quality \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--border);background:var(--surface-2)\">\n <div style=\"text-align:center;padding:40px\">\n <div style=\"font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;font-size:11px;letter-spacing:.2em;color:var(--ice);text-transform:uppercase;margin-bottom:24px\">Certifications</div>\n <div style=\"font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:42px;font-weight:300;letter-spacing:-.02em;line-height:1.2\">\n ISO 9001<br><em style=\"color:var(--accent);font-style:italic\">AS9100</em>\n </div>\n <div style=\"font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;font-size:10px;letter-spacing:.16em;color:var(--muted);margin-top:24px\">QUALIFIED BY ESA \u00b7 NASA \u00b7 NRO \u00b7 SNSA</div>\n </div>\n </div>\n</div>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Work with the team <em>powering critical mobility.</em></h2>\n <div class=\"cta-row\">\n <a href=\"#/contact-us\" class=\"btn-primary\">Contact ECAPS \u2192</a>\n <a href=\"#/management\" class=\"btn-ghost\">Management Team</a>\n </div>\n</div>","auxiliary-systems":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/defense\">Defense</a>\n <span>/</span>\n <span><b>AUXILIARY SYSTEMS</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Auxiliary <em>Systems.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Power supply for resilient operations underwater, in the air, and in space. ECAPS is advancing the development of Auxiliary Power Units (APUs), Emergency Power Units (EPUs), and Gas Generators (GGAs), engineered around the LMP-103S 1100\u00b0C blend.</p>\n <div class=\"hero-coords reveal\">\n <div>BLEND \u2014 <b>LMP-103S 1100\u00b0C</b></div>\n <div>SYSTEMS \u2014 <b>APU \u00b7 EPU \u00b7 GGA</b></div>\n <div>DOMAIN \u2014 <b>NAVAL \u00b7 AIR \u00b7 SPACE</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765890369747-H3WIFBUX6PYI34LASC17/unsplash-image-vhSz50AaFAs.jpg?format=2500w\" alt=\"Auxiliary power systems for resilient operations\" />\n <div class=\"telemetry\">\n DOMAIN <b>NAVAL \u00b7 AIR \u00b7 SPACE</b><br>\n OPERATION <b>O\u2082-INDEPENDENT</b><br>\n BLEND <b>LMP-103S 1100\u00b0C</b>\n </div>\n <div class=\"caption\">AUXILIARY POWER \u2014 RESILIENT OPERATIONS ACROSS DOMAINS</div>\n</div>\n\n<!-- SYSTEM TYPES \u2014 clean institutional grid (no HUD) -->\n<section style=\"padding-top:48px\">\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);border-top:2px solid var(--accent-bright);padding:28px;display:flex;flex-direction:column;gap:12px;min-height:200px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 01 \u2014 APU</div>\n   <h3 style=\"font-size:22px;margin:0;font-weight:600;letter-spacing:-.01em\">Auxiliary Power Units</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.65;margin:0\">Sustained on-board power generation for continuous operations across air, sea, and orbit.</p>\n  </div>\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);border-top:2px solid var(--accent-bright);padding:28px;display:flex;flex-direction:column;gap:12px;min-height:200px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 02 \u2014 EPU</div>\n   <h3 style=\"font-size:22px;margin:0;font-weight:600;letter-spacing:-.01em\">Emergency Power Units</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.65;margin:0\">Rapid-start power for critical mission phases and contingency operations.</p>\n  </div>\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);border-top:2px solid var(--accent-bright);padding:28px;display:flex;flex-direction:column;gap:12px;min-height:200px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 03 \u2014 GGA</div>\n   <h3 style=\"font-size:22px;margin:0;font-weight:600;letter-spacing:-.01em\">Gas Generators</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.65;margin:0\">High-energy gas output for actuation, propellant pressurization, and thermal control.</p>\n  </div>\n </div>\n</section>\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Overview \u00b7 01</div>\n <h2 class=\"section-title\">Endurance, resilience<br><em>&amp; scalability.</em></h2>\n </div>\n <p>Designed for non-oxygen and anaerobic environments, these systems provide endurance, resilience, and scalability for naval, air and space platforms for defense.</p>\n </div>\n</section>\n\n<!-- MISSION CAPABILITIES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Mission Capabilities \u00b7 02</div>\n <h2 class=\"section-title\">Power for <em>extreme environments.</em></h2>\n </div>\n <p>Reliable power and energy generation for extreme operational environments.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n <div class=\"spec-row\"><dt>Oxygen Independent</dt><dd>Power generation <b>without reliance on ambient oxygen</b></dd></div>\n <div class=\"spec-row\"><dt>Rapid Start</dt><dd>Rapid start &amp; emergency power \u2014 <b>immediate power availability</b> for critical mission phases</dd></div>\n <div class=\"spec-row\"><dt>Energy Density</dt><dd>High energy density \u2014 <b>maximum power output</b> in compact, lightweight systems</dd></div>\n <div class=\"spec-row\"><dt>Scalable Architecture</dt><dd>Scalable &amp; modular architecture \u2014 <b>configurable</b> to platform and mission needs</dd></div>\n </dl>\n</section>\n\n<!-- APPLICATIONS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Critical Mobility Applications \u00b7 03</div>\n <h2 class=\"section-title\">Air. Sea. <em>Orbit.</em></h2>\n </div>\n <p>Designed for deployment across air, sea, and space domains.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr)\">\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 01 \u2014 SPACE</div>\n <h3 style=\"font-size:22px\">Space shuttles</h3>\n <p>Power for orbit transfers and on-orbit operations.</p>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 02 \u2014 UNDERWATER</div>\n <h3 style=\"font-size:22px\">Submarines</h3>\n <p>Submarine power generation in anaerobic environments.</p>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 03 \u2014 AIR</div>\n <h3 style=\"font-size:22px\">Aircraft &amp; UAVs</h3>\n <p>Advanced aircraft and UAV mobility platforms.</p>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 04 \u2014 UUV</div>\n <h3 style=\"font-size:22px\">UUVs</h3>\n <p>High-performance UUV mobility for long endurance.</p>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Discuss <em>auxiliary systems</em><br>for your platform.</h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Engage program team \u2192</a><a href=\"#/defense\" class=\"btn-ghost\">Defense Capabilities</a></div>\n</div>","bipropellant-thrusters":"<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     HERO\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <a href=\"#/hardware-portfolio\">Hardware Portfolio</a>\n  <span>/</span>\n  <span><b>BIPROPELLANT ENGINES</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Bipropellant <em>Engines.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">Higher-thrust authority through dual-feed architecture. ADN-based fuel paired with configurable oxidizer delivers 220 N to 26.6 kN across the full operational envelope \u2014 including atmospheric and underwater regimes that monopropellant cannot reach.</p>\n  <div class=\"hero-coords reveal\">\n   <div>CLASSES \u2014 <b>5 (220 N \u2192 26.6 kN)</b></div>\n   <div>DOMAINS \u2014 <b>ALL FOUR</b></div>\n   <div>ARCHITECTURE \u2014 <b>DUAL-FEED \u00b7 ADN-BASED</b></div>\n  </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg\" alt=\"220N bipropellant engine hot-fire test\" />\n <div class=\"telemetry\">\n  TEST <b>220 N CLASS</b><br>\n  FACILITY <b>QUALIFIED</b><br>\n  STATUS <b>HOT-FIRE</b>\n </div>\n <div class=\"caption\">220 N BIPROPELLANT ENGINE HOT-FIRE TEST</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     01 \u2014 OVERVIEW + CLEAN DUAL-FEED CUTAWAY\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Overview \u00b7 01</div>\n   <h2 class=\"section-title\">Beyond monopropellant <em>architectures.</em></h2>\n  </div>\n  <p>Built on ECAPS' ADN-based propulsion heritage, bipropellant systems combine advanced fuels \u2014 including LMP-103S \u2014 with selected oxidizers in a dual-feed architecture. Higher specific impulse and cross-domain capability, including underwater applications where atmospheric oxygen is unavailable.</p>\n </div>\n\n <div style=\"margin:60px auto;max-width:1100px\" class=\"reveal\">\n  <div style=\"aspect-ratio:9/4;background:linear-gradient(180deg,rgba(245,158,11,.03) 0%,#06080B 100%);border:1px solid var(--border-soft);position:relative;overflow:hidden\">\n   <svg viewBox=\"0 0 900 380\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block;width:100%;height:100%\">\n\n    <!-- \u2500\u2500\u2500 FUEL INLET (upper) \u2500\u2500\u2500 -->\n    <g>\n     <line x1=\"0\" y1=\"130\" x2=\"100\" y2=\"130\" stroke=\"#8B8F99\" stroke-width=\"1.4\"/>\n     <line x1=\"100\" y1=\"130\" x2=\"180\" y2=\"130\" stroke=\"#22D3EE\" stroke-width=\"1.6\"/>\n     <!-- Fuel latch valve -->\n     <rect x=\"180\" y=\"115\" width=\"35\" height=\"30\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"1.4\"/>\n     <line x1=\"188\" y1=\"120\" x2=\"207\" y2=\"140\" stroke=\"#22D3EE\" stroke-width=\"1.2\"/>\n     <line x1=\"207\" y1=\"120\" x2=\"188\" y2=\"140\" stroke=\"#22D3EE\" stroke-width=\"1.2\"/>\n     <!-- Pipe to injector -->\n     <line x1=\"215\" y1=\"130\" x2=\"295\" y2=\"130\" stroke=\"#22D3EE\" stroke-width=\"1.6\"/>\n     <line x1=\"295\" y1=\"130\" x2=\"320\" y2=\"170\" stroke=\"#22D3EE\" stroke-width=\"1.6\"/>\n    </g>\n\n    <!-- \u2500\u2500\u2500 OXIDIZER INLET (lower) \u2500\u2500\u2500 -->\n    <g>\n     <line x1=\"0\" y1=\"250\" x2=\"100\" y2=\"250\" stroke=\"#8B8F99\" stroke-width=\"1.4\"/>\n     <line x1=\"100\" y1=\"250\" x2=\"180\" y2=\"250\" stroke=\"#F59E0B\" stroke-width=\"1.6\"/>\n     <!-- Oxidizer latch valve -->\n     <rect x=\"180\" y=\"235\" width=\"35\" height=\"30\" fill=\"none\" stroke=\"#F59E0B\" stroke-width=\"1.4\"/>\n     <line x1=\"188\" y1=\"240\" x2=\"207\" y2=\"260\" stroke=\"#F59E0B\" stroke-width=\"1.2\"/>\n     <line x1=\"207\" y1=\"240\" x2=\"188\" y2=\"260\" stroke=\"#F59E0B\" stroke-width=\"1.2\"/>\n     <!-- Pipe to injector -->\n     <line x1=\"215\" y1=\"250\" x2=\"295\" y2=\"250\" stroke=\"#F59E0B\" stroke-width=\"1.6\"/>\n     <line x1=\"295\" y1=\"250\" x2=\"320\" y2=\"210\" stroke=\"#F59E0B\" stroke-width=\"1.6\"/>\n    </g>\n\n    <!-- \u2500\u2500\u2500 INJECTOR / MIXING HEAD \u2500\u2500\u2500 -->\n    <g>\n     <rect x=\"320\" y=\"160\" width=\"50\" height=\"60\" fill=\"rgba(255,255,255,.04)\" stroke=\"#FFFFFF\" stroke-width=\"1.4\"/>\n     <line x1=\"345\" y1=\"160\" x2=\"345\" y2=\"220\" stroke=\"#FFFFFF\" stroke-width=\"1\"/>\n     <!-- Injector orifices indicated as small circles -->\n     <g fill=\"#FFFFFF\">\n      <circle cx=\"368\" cy=\"175\" r=\"1.5\"/>\n      <circle cx=\"368\" cy=\"185\" r=\"1.5\"/>\n      <circle cx=\"368\" cy=\"195\" r=\"1.5\"/>\n      <circle cx=\"368\" cy=\"205\" r=\"1.5\"/>\n     </g>\n    </g>\n\n    <!-- \u2500\u2500\u2500 COMBUSTION CHAMBER \u2500\u2500\u2500 -->\n    <g>\n     <rect x=\"370\" y=\"145\" width=\"180\" height=\"90\" fill=\"rgba(245,158,11,.1)\" stroke=\"#F59E0B\" stroke-width=\"1.4\"/>\n     <!-- Flame indication: subtle inner lines suggesting combustion -->\n     <g stroke=\"#F59E0B\" stroke-width=\".8\" opacity=\".5\">\n      <path d=\"M 380 190 Q 420 175, 450 195 Q 480 210, 520 188 Q 540 200, 545 192\" fill=\"none\"/>\n      <path d=\"M 385 195 Q 425 180, 455 198 Q 485 215, 525 193 Q 545 203, 548 197\" fill=\"none\"/>\n     </g>\n     <!-- Chamber pressure label -->\n     <text x=\"460\" y=\"200\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"#F59E0B\" letter-spacing=\"1\">Pc \u00b7 15-25 bar</text>\n    </g>\n\n    <!-- \u2500\u2500\u2500 NOZZLE \u2014 convergent-divergent \u2500\u2500\u2500 -->\n    <g>\n     <!-- Convergent (throat) -->\n     <path d=\"M 550 155 L 590 180 L 590 200 L 550 225 Z\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.4\"/>\n     <!-- Divergent expansion -->\n     <path d=\"M 590 180 L 820 90 L 820 290 L 590 200 Z\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.4\"/>\n    </g>\n\n    <!-- \u2500\u2500\u2500 EXHAUST INDICATION \u2500\u2500\u2500 -->\n    <g>\n     <line x1=\"824\" y1=\"190\" x2=\"888\" y2=\"190\" stroke=\"#22D3EE\" stroke-width=\"1.2\" stroke-dasharray=\"4 4\"/>\n     <polygon points=\"888,190 877,184 877,196\" fill=\"#22D3EE\"/>\n    </g>\n\n    <!-- \u2500\u2500\u2500 LABELS \u2500\u2500\u2500 -->\n    <g font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"#8B8F99\" letter-spacing=\"2\" text-anchor=\"middle\">\n     <text x=\"100\" y=\"110\" fill=\"#22D3EE\">FUEL \u00b7 LMP-103S</text>\n     <text x=\"100\" y=\"275\" fill=\"#F59E0B\">OXIDIZER</text>\n\n     <text x=\"345\" y=\"312\">INJECTOR /</text>\n     <text x=\"345\" y=\"325\">MIXING HEAD</text>\n\n     <text x=\"460\" y=\"312\">COMBUSTION CHAMBER</text>\n     <text x=\"460\" y=\"325\" fill=\"#F59E0B\">ISP HIGHER THAN MONOPROP</text>\n\n     <text x=\"700\" y=\"312\">CONVERGENT-DIVERGENT</text>\n     <text x=\"700\" y=\"325\">NOZZLE \u00b7 EXPANSION RATIO</text>\n    </g>\n\n    <!-- dimension ticks -->\n    <g stroke=\"#3A3F49\" stroke-width=\".8\">\n     <line x1=\"345\" y1=\"285\" x2=\"345\" y2=\"298\"/>\n     <line x1=\"460\" y1=\"285\" x2=\"460\" y2=\"298\"/>\n     <line x1=\"700\" y1=\"285\" x2=\"700\" y2=\"298\"/>\n    </g>\n\n    <!-- \u2500\u2500\u2500 TITLE \u2500\u2500\u2500 -->\n    <text x=\"450\" y=\"38\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"10\" fill=\"#F59E0B\" letter-spacing=\"4\">HPGP BIPROPELLANT ENGINE \u00b7 CUTAWAY</text>\n    <text x=\"450\" y=\"56\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"#8B8F99\" letter-spacing=\"2\">DUAL-FEED ARCHITECTURE \u00b7 220 N \u2192 26.6 kN</text>\n\n   </svg>\n  </div>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     02 \u2014 MISSION CAPABILITIES\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Mission Capabilities \u00b7 02</div>\n   <h2 class=\"section-title\">Higher thrust.<br><em>Time-critical performance.</em></h2>\n  </div>\n  <p>Tailored for high-demand mission requirements where monopropellant cannot deliver the specific impulse or environmental coverage needed.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n  <div class=\"spec-row\"><dt>Thrust Levels</dt><dd><b>Higher thrust</b> within compact propulsion systems \u2014 up to 26.6 kN</dd></div>\n  <div class=\"spec-row\"><dt>Burn Durations</dt><dd>Short-to-intermediate and <b>long burn durations</b> with steady-state stability</dd></div>\n  <div class=\"spec-row\"><dt>Response Time</dt><dd><b>Rapid-response</b> ignition for time-critical maneuvers</dd></div>\n  <div class=\"spec-row\"><dt>Performance</dt><dd>Performance optimization through <b>fuel\u2013oxidizer pairing</b></dd></div>\n  <div class=\"spec-row\"><dt>Cross-Domain</dt><dd>Operates in <b>all four domains</b> \u2014 including underwater where oxidizer self-containment is essential</dd></div>\n </dl>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     03 \u2014 THRUST CLASS PORTFOLIO (centerpiece, brochure-aligned)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"background:linear-gradient(180deg,rgba(245,158,11,.04) 0%,transparent 100%);border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Thrust Class Portfolio \u00b7 03</div>\n   <h2 class=\"section-title\">Five thrust classes.<br><em>Full envelope authority.</em></h2>\n  </div>\n  <p>Five qualified bipropellant classes from 220 N high-performance satellite operations through 26.6 kN of launch-vehicle authority. Domain compatibility extends across all four operational regimes \u2014 bipropellant configuration is required for atmospheric and underwater applications.</p>\n </div>\n\n <div class=\"reveal\" style=\"border:1px solid var(--border);background:var(--surface);overflow:hidden\">\n\n  <!-- Header -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;background:var(--bg-2);padding:18px 24px;border-bottom:1px solid var(--border);font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--warn);text-transform:uppercase;font-weight:700\">\n   <div>Class</div>\n   <div>Domains</div>\n   <div>Thrust Range</div>\n   <div>Architecture</div>\n   <div>Burn Profile</div>\n   <div>Primary Function</div>\n  </div>\n\n  <!-- ROW 1: 220 N -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;padding:20px 24px;border-bottom:1px solid var(--border-soft);align-items:center\">\n   <div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1\">220 N</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase\">Cross-domain entry</div>\n   </div>\n   <div style=\"display:flex;gap:6px;align-items:center\">\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\" title=\"In-space\"></div>\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\" title=\"High-altitude\"></div>\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\" title=\"Atmospheric\"></div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink)\">55 \u2013 220 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Dual-feed</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Mid-duration</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">\u0394V \u00b7 Aircraft</div>\n  </div>\n\n  <!-- ROW 2: 445 N -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;padding:20px 24px;border-bottom:1px solid var(--border-soft);align-items:center;background:rgba(245,158,11,.02)\">\n   <div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1\">445 N</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase\">High-thrust satellite</div>\n   </div>\n   <div style=\"display:flex;gap:6px;align-items:center\">\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink)\">110 \u2013 445 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Dual-feed</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Long-duration</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">\u0394V (sat)</div>\n  </div>\n\n  <!-- ROW 3: 890 N -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;padding:20px 24px;border-bottom:1px solid var(--border-soft);align-items:center\">\n   <div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1\">890 N</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase\">Heavy satellite \u0394V</div>\n   </div>\n   <div style=\"display:flex;gap:6px;align-items:center\">\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink)\">220 \u2013 890 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Dual-feed</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Sustained burn</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">Heavy \u0394V</div>\n  </div>\n\n  <!-- ROW 4: 4 kN -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;padding:20px 24px;border-bottom:1px solid var(--border-soft);align-items:center;background:rgba(245,158,11,.02)\">\n   <div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1\">4 kN</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase\">Launch upper-stage</div>\n   </div>\n   <div style=\"display:flex;gap:6px;align-items:center\">\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink)\">1 \u2013 4 kN</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Dual-feed</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Stage-class burn</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">Upper-stage</div>\n  </div>\n\n  <!-- ROW 5: 26.6 kN -->\n  <div style=\"display:grid;grid-template-columns:200px 180px 1fr 1fr 1fr 1fr;gap:0;padding:20px 24px;align-items:center\">\n   <div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1\">26.6 kN</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);margin-top:6px;text-transform:uppercase\">Launch authority</div>\n   </div>\n   <div style=\"display:flex;gap:6px;align-items:center\">\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n    <div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\"></div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink)\">6.6 \u2013 26.6 kN</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Dual-feed</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:13px;color:var(--ink-2)\">Full-duration</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em\">Heavy launch</div>\n  </div>\n\n </div>\n\n <!-- Legend -->\n <div class=\"reveal\" style=\"margin-top:24px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)\">\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>IN-SPACE</div>\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>HIGH-ALTITUDE</div>\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\"></div>ATMOSPHERIC</div>\n  <div style=\"display:flex;align-items:center;gap:8px;opacity:.5\"><div style=\"width:10px;height:10px;border-radius:50%;background:#60A5FA\"></div>UNDERWATER (RESERVED FOR DEDICATED VARIANTS)</div>\n </div>\n\n <div class=\"reveal\" style=\"margin-top:24px;padding:20px;background:var(--bg-2);border-left:3px solid var(--warn);max-width:900px;margin-left:auto;margin-right:auto\">\n  <p style=\"font-family:ui-monospace,monospace;font-size:12px;line-height:1.7;color:var(--ink-2);letter-spacing:.02em\">\n   <b style=\"color:var(--warn);font-family:'Inter',sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:.14em;display:block;margin-bottom:8px\">Why Bipropellant?</b>\n   Bipropellant operates where monopropellant cannot \u2014 in atmospheric and underwater regimes \u2014 because the oxidizer is carried onboard rather than drawn from ambient air. ISP is higher than monoprop equivalents through optimized fuel\u2013oxidizer combustion. Dual-feed configuration adds mass and complexity but unlocks the full operational envelope across all four ECAPS domains.\n  </p>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     04 \u2014 APPLICATIONS (brochure 7 use cases)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Applications \u00b7 04</div>\n   <h2 class=\"section-title\">Cross-domain use cases.<br><em>Where monopropellant can't go.</em></h2>\n  </div>\n  <p>Bipropellant covers the full seven brochure use cases \u2014 including the two underwater categories that require self-contained oxidizer.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)\">\n\n  <!-- Satellites -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889974-9YKWTR54CGA54OG9UUYF/SkySat3.png\" alt=\"Satellite\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ SATELLITES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">High-thrust \u0394V</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">When monoprop's pulse count or thrust ceiling isn't enough: heavy \u0394V burns, orbit-raise from GTO, large-satellite manoeuvres.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;font-weight:700\">CLASSES: 220 N \u2192 890 N</div>\n   </div>\n  </div>\n\n  <!-- Launch Vehicles \u2014 primary for biprop -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889936-6FPOD5B0MCT72KPGNI3Q/Falcon9+2020.png\" alt=\"Launch vehicle\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ LAUNCH VEHICLES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Primary application</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Upper-stage propulsion, full-duration burns, and heavy \u0394V for orbital insertion. The 4 kN and 26.6 kN classes are designed for this role.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;font-weight:700\">CLASSES: 4 kN \u00b7 26.6 kN</div>\n   </div>\n  </div>\n\n  <!-- Interceptors -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889905-U8K2NQ86PDAMFTO03YLR/NROL111.png\" alt=\"Defense mission\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ INTERCEPTORS</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Responsive defense</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">High-thrust kinetic operations for defense applications. Rapid ignition + high ISP for time-critical missions.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;font-weight:700\">CLASSES: 220 N \u2192 4 kN</div>\n   </div>\n  </div>\n\n  <!-- Aircraft -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg\" alt=\"High-altitude aerospace\" style=\"width:100%;height:100%;object-fit:cover;opacity:.85\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ AIRCRAFT</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Atmospheric capable</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Self-contained oxidizer enables atmospheric flight propulsion where conventional engines lose efficiency.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;font-weight:700\">CLASSES: 220 N \u00b7 26.6 kN</div>\n   </div>\n  </div>\n\n  <!-- UAVs -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/f025a0a8-8a96-4a34-a334-486f1b894526/AdobeStock_831914296.jpeg\" alt=\"UAV aerospace\" style=\"width:100%;height:100%;object-fit:cover;opacity:.85\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#10B981\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ UAVs</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">High-altitude UAV</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Auxiliary propulsion for long-endurance, high-altitude unmanned platforms. Light-weight high-ISP option.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;font-weight:700\">CLASSES: 220 N \u00b7 4 kN</div>\n   </div>\n  </div>\n\n  <!-- Submarines -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:linear-gradient(180deg,#0a1a2e 0%,#000 100%);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%,rgba(96,165,250,.18) 0%,transparent 60%)\"></div>\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 70% 40%,rgba(96,165,250,.1) 0%,transparent 70%)\"></div>\n    <!-- subtle wave lines -->\n    <svg viewBox=\"0 0 400 240\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:.2\">\n     <path d=\"M 0 80 Q 100 70, 200 80 T 400 80\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n     <path d=\"M 0 120 Q 100 110, 200 120 T 400 120\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n     <path d=\"M 0 160 Q 100 150, 200 160 T 400 160\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n    </svg>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px;z-index:2\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#60A5FA\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ SUBMARINES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Underwater capable</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Self-contained oxidizer means no atmospheric oxygen required. Bipropellant is the propulsion route for underwater applications.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#60A5FA;text-transform:uppercase;font-weight:700\">PROGRAMME-SPECIFIC</div>\n   </div>\n  </div>\n\n  <!-- AUVs -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:linear-gradient(180deg,#0a1a2e 0%,#000 100%);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(96,165,250,.15) 0%,transparent 65%)\"></div>\n    <svg viewBox=\"0 0 400 240\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:.2\">\n     <path d=\"M 0 60 Q 100 50, 200 60 T 400 60\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n     <path d=\"M 0 100 Q 100 90, 200 100 T 400 100\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n     <path d=\"M 0 140 Q 100 130, 200 140 T 400 140\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n     <path d=\"M 0 180 Q 100 170, 200 180 T 400 180\" fill=\"none\" stroke=\"#60A5FA\" stroke-width=\"1\"/>\n    </svg>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px;z-index:2\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#60A5FA\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ AUVs</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Autonomous undersea</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Powered AUV propulsion for autonomous undersea operations. Sealed-oxidizer architecture enables long-duration submerged operations.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#60A5FA;text-transform:uppercase;font-weight:700\">PROGRAMME-SPECIFIC</div>\n   </div>\n  </div>\n\n  <!-- Full Coverage Summary -->\n  <div style=\"background:var(--bg-2);min-height:auto;padding:24px;border-left:3px solid var(--warn);display:flex;flex-direction:column;justify-content:center\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--warn);text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ FULL COVERAGE</div>\n   <h3 style=\"font-size:20px\">All 7 use cases</h3>\n   <p style=\"font-size:13px;margin-top:14px;line-height:1.6\">Bipropellant is the only ECAPS engine architecture covering all seven brochure use cases. The trade-off vs monopropellant: higher complexity for higher performance + cross-domain reach.</p>\n  </div>\n\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     05 \u2014 SYSTEM CUSTOMIZABILITY (preserved from prior)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">System Customizability \u00b7 05</div>\n   <h2 class=\"section-title\">Tuned for <em>each mission.</em></h2>\n  </div>\n  <p>Bipropellant configuration is mission-driven: fuel, oxidizer, duty cycle, and integration interfaces are tailored per programme requirements.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n  <div class=\"spec-row\"><dt>Propellant Tuning</dt><dd>Mission-Driven Fuel &amp; Oxidizer Pairing \u2014 <b>performance optimization</b> aligned to mission requirement</dd></div>\n  <div class=\"spec-row\"><dt>Duty Cycles</dt><dd>Configurable Thrust &amp; Duty Cycles \u2014 adaptation to <b>mission duration and response</b> needs</dd></div>\n  <div class=\"spec-row\"><dt>Modular Architecture</dt><dd>Modular Thruster &amp; Feed-System Architecture \u2014 system <b>scalability and integration flexibility</b></dd></div>\n  <div class=\"spec-row\"><dt>Thermal Management</dt><dd>Ignition &amp; Thermal Management Optimization \u2014 <b>reliable performance</b> across operational environments</dd></div>\n  <div class=\"spec-row\"><dt>Integration</dt><dd>Adaptable Interfaces &amp; Integration Support \u2014 alignment with <b>diverse spacecraft and platforms</b></dd></div>\n </dl>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     CTA\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"background:var(--bg-2)\">\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr;gap:24px;align-items:center\">\n  <div>\n   <div class=\"eyebrow\" style=\"color:var(--warn)\">Engage with Bipropellant</div>\n   <h2 class=\"section-title\" style=\"margin-top:14px\">Specify <em>bipropellant</em><br>for your mission.</h2>\n   <p style=\"margin-top:18px\">Bipropellant configurations are programme-specific. ECAPS engineering pairs fuel and oxidizer choices to your mission profile, then qualifies the resulting configuration to flight standards.</p>\n  </div>\n  <div style=\"display:flex;flex-direction:column;gap:12px;align-items:flex-start\">\n   <a href=\"#/commercial-packages\" style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;text-decoration:none;font-weight:700;padding:14px 24px;border:1px solid var(--warn);display:inline-block\">Commercial Packages \u2192</a>\n   <a href=\"#/monopropellant-thrusters\" style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;color:var(--ink);text-transform:uppercase;text-decoration:none;font-weight:700;padding:14px 24px;border:1px solid var(--border);display:inline-block\">View Monopropellant \u2192</a>\n   <a href=\"#/contact-us\" style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;color:var(--ink);text-transform:uppercase;text-decoration:none;font-weight:700;padding:14px 24px;border:1px solid var(--border);display:inline-block\">Talk to Engineering \u2192</a>\n  </div>\n </div>\n</section>","careers":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>CAREERS</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Careers at <em>ECAPS.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Opportunities at ECAPS. Join a team of dedicated engineers, scientists and professionals operational HPGP propulsion solutions for space and defense \u2014 at the core of a category we invented.</p>\n <div class=\"hero-coords reveal\">\n <div>LOCATION \u2014 <b>GLOBAL</b></div>\n <div>FOUNDED \u2014 <b>2000</b></div>\n <div>DOMAIN \u2014 <b>SPACE &amp; DEFENSE</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543907192-U1LS7TAZYBL6P4PNXDVM/ECAPS+team.png\" alt=\"ECAPS team\" />\n <div class=\"caption\">DEDICATED ENGINEERS \u00b7 SCIENTISTS \u00b7 PROFESSIONALS</div>\n</div>\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Why ECAPS \u00b7 01</div>\n <h2 class=\"section-title\">Build the future of <em>non-toxic propulsion.</em></h2>\n </div>\n <p>From propellant chemistry to flight hardware integration \u2014 work at the operational edge of a category we invented in 1997.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <div class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 ENGINEERING</div>\n <h3>Propulsion Engineering</h3>\n <p>Design, analysis, testing, and qualification of HPGP thrusters and integrated propulsion systems across thrust classes from 100mN to 220N.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 CHEMISTRY</div>\n <h3>Propellant Chemistry</h3>\n <p>ADN synthesis, LMP-103S blend development, catalyst research, and combustion analysis at our production facility.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 03 \u2014 OPERATIONS</div>\n <h3>Operations &amp; Production</h3>\n <p>Production engineering, integration, quality assurance, and global fueling campaign operations across launch sites worldwide.</p>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Apply</div>\n <h2>Send us your <em>application.</em></h2>\n <div class=\"cta-row\">\n <a href=\"mailto:info@ecaps.se?subject=Career%20Application\" class=\"btn-primary\">Email careers \u2192</a>\n <a href=\"#/about\" class=\"btn-ghost\">About ECAPS</a>\n </div>\n</div>","commercial-packages":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <a href=\"#/about\">Engage</a>\n  <span>/</span>\n  <span><b>COMMERCIAL PACKAGES</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>5 PACKAGES \u00b7 <b>END-TO-END</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Commercial <em>Packages.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">From qualified off-the-shelf propulsion to bespoke co-development and licensing. ECAPS delivers five purpose-specific commercial packages for partners and allies \u2014 supporting hardware delivery, technology adoption, and capability industrialization across allied jurisdictions.</p>\n  <div class=\"hero-coords reveal\">\n   <div>PACKAGES \u2014 <b>P1 / P2 / P3 / P4</b></div>\n   <div>UNDERPINNED BY \u2014 <b>LMP-103S SUPPLY</b></div>\n   <div>QUALITY \u2014 <b>AS9100 \u00b7 ISO 9001</b></div>\n  </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1517976547714-720226b864c1?w=2400&q=90&auto=format&fit=crop\" alt=\"ECAPS commercial engagement\" />\n <div class=\"telemetry\">\n PACKAGES <b>5 OFFERINGS</b><br>\n DELIVERY <b>OFF-THE-SHELF TO LICENSING</b><br>\n PROPELLANT <b>LMP-103S SUPPLY</b>\n </div>\n <div class=\"caption\">PURPOSE-SPECIFIC PACKAGES FOR CUSTOMIZED MISSION SUPPORT</div>\n</div>\n\n<!-- ENVELOPE \u2014 5 commercial offerings at a glance -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Commercial Envelope \u00b7 01</div>\n   <h2 class=\"section-title\">Five offerings, <em>one ecosystem.</em></h2>\n  </div>\n  <p>From ADN-powered, high-performance hardware to comprehensive capability development and localized industrialization. ECAPS supports partners and allies with end-to-end services, mission execution, and technological adoption.</p>\n </div>\n\n <div class=\"pkg-envelope reveal\">\n  <a href=\"#/commercial-packages/package-1\" class=\"pkg-env\">\n   <div class=\"pkg-env-num\">/ P1</div>\n   <div class=\"pkg-env-name\">Qualified Propulsion Systems</div>\n   <div class=\"pkg-env-desc\">Operational rocket engines and satellite modules. Off-the-shelf delivery on a 6-month cycle.</div>\n   <div class=\"pkg-env-link\">View P1 \u2192</div>\n  </a>\n  <a href=\"#/commercial-packages/package-2\" class=\"pkg-env\">\n   <di ".14em\" font-weight=\"600\">AIRCRAFT \u00b7 UAV \u00b7 MISSILE</text>\n     <text x=\"382\" y=\"22\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"rgba(96,165,250,.5)\" letter-spacing=\".1em\" text-anchor=\"end\">&lt; 100 KM</text>\n    </svg>\n   </div>\n   <h3 style=\"font-size:22px\">High-Altitude / Air</h3>\n   <p style=\"font-size:13px;line-height:1.5\">&lt; 100 km altitude. Endo-atmospheric operations in oxygen-limited regimes \u2014 high-altitude flight, missile defense, atmospheric reentry.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">USE CASES</div>\n    \u00b7 UAVs<br>\n    \u00b7 Aircraft<br>\n    \u00b7 Missile defense systems\n   </div>\n  </div>\n\n  <!-- UNDERWATER -->\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 03 \u2014 UNDERWATER</div>\n   <div class=\"spectrum-illust\">\n    <svg viewBox=\"0 0 400 140\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid slice\">\n     <defs>\n      <linearGradient id=\"water-uw\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n       <stop offset=\"0%\" stop-color=\"rgba(34,211,238,.12)\"/>\n       <stop offset=\"50%\" stop-color=\"rgba(59,130,246,.18)\"/>\n       <stop offset=\"100%\" stop-color=\"rgba(15,23,42,.5)\"/>\n      </linearGradient>\n     </defs>\n     <rect width=\"400\" height=\"140\" fill=\"url(#water-uw)\"/>\n     <!-- Surface waves at top -->\n     <path d=\"M 0 18 Q 80 12 160 16 Q 240 20 320 14 Q 380 18 400 14\" stroke=\"rgba(34,211,238,.4)\" stroke-width=\".8\" fill=\"none\"/>\n     <path d=\"M 0 26 Q 80 20 160 24 Q 240 28 320 22 Q 380 26 400 22\" stroke=\"rgba(34,211,238,.2)\" stroke-width=\".5\" fill=\"none\"/>\n     <!-- Bubble trail -->\n     <g fill=\"rgba(34,211,2 l=\"rgba(255,255,255,.5)\"/>\n     </g>\n     <text x=\"18\" y=\"22\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"rgba(96,165,250,.7)\" letter-spacing=\".14em\" font-weight=\"600\">SUB \u00b7 TORPEDO \u00b7 AUV</text>\n     <text x=\"382\" y=\"22\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"rgba(96,165,250,.5)\" letter-spacing=\".1em\" text-anchor=\"end\">SUBSURFACE</text>\n    </svg>\n   </div>\n   <h3 style=\"font-size:22px\">Underwater / Maritime</h3>\n   <p style=\"font-size:13px;line-height:1.5\">Subsurface operations. Anaerobic propulsion and power for naval platforms operating in zero-oxygen environments.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">USE CASES</div>\n    \u00b7 Submarines<br>\n    \u00b7 Underwater drones<br>\n    \u00b7 Torpedoes\n   </div>\n  </div>\n\n </div>\n\n <!-- Heritage stats bar (matches brochure p.12 footer) -->\n <div class=\"reveal\" style=\"margin-top:40px;display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n  <div style=\"border:1px solid var(--border);background:var(--surface);padding:32px;display:flex;align-items:center;gap:24px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:52px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-.02em\">15+</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--ink-2);text-transform:uppercase;line-height:1.6\">YEARS OF<br><b style=\"color:var(--ink);font-size:14px\">FLIGHT HERITAGE</b></div>\n  </div>\n  <div style=\"border:1px solid var(--border);background:var(--surface);padding:32px;display:flex;align-items:center;gap:24px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:52px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-.02em\">200+</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--ink-2);text-transform:uppercase;line-height:1.6\">CUMULATIVE<br><b style=\"color:var(--ink);font-size:14px\">YEARS IN ORBIT</b></div>\n  </div>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     02 \u2014 CRITICAL MISSIONS ENABLED  (mirrors brochure p.13)\n     4-pillar header + cross-domain mission map\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"background:linear-gradient(180deg,rgba(59,130,246,.04) 0%,transparent 100%);border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Critical Missions Enabled \u00b7 02</div>\n   <h2 class=\"section-title\">Cross-domain <em>defense capabilities.</em></h2>\n  </div>\n  <p>Powering high-energy defense operations for optimal mobility across domains. From orbital ISR and military satellites to underwater AUV propulsion \u2014 ten mission categories across three operational regimes.</p>\n </div>\n\n <!-- 4-pillar capability header strip -->\n <div class=\"reveal\" style=\"margin-bottom:48px;border:1px solid var(--border);background:var(--surface);padding:22px 28px;display:grid;grid-template-columns:170px repeat(4,1fr);gap:24px;align-items:center\">\n  <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:600;line-height:1.5;font-style:italic\">\n   ECAPS-Powered<br>Satellites &amp; Spacecraft\n  </div>\n  <div style=\"border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column;gap:8px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3\">Rapid-Response Capability</div>\n   <div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent)\"></div>\n  </div>\n  <div style=\"border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column;gap:8px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3\">Long-Term Operational Planning</div>\n   <div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent)\"></div>\n  </div>\n  <div style=\"border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column;gap:8px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3\">Mission-Specific Performance</div>\n   <div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent)\"></div>\n  </div>\n  <div style=\"border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column;gap:8px\">\n   <div style=\"font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3\">Multi-Domain Support</div>\n   <div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent)\"></div>\n  </div>\n </div>\n\n <!-- CROSS-DOMAIN MISSION MAP -->\n <div class=\"reveal\" style=\"border:1px solid var(--border);background:linear-gradient(180deg,#06080B 0%,#0a1828 50%,#06080B 100%);padding:36px 24px;position:relative;overflow:hidden\">\n  <div style=\"text-align:center;margin-bottom:16px;font-family:'Inter',sans-serif;font-size:22px;font-weight:500;letter-spacing:-.01em;color:var(--ink)\">Critical missions enabled by <em style=\"color:var(--accent);font-style:italic\">ECAPS</em>.</div>\n\n  <svg viewBox=\"0 0 1200 800\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:auto;max-height:780px;display:block\">\n   <defs>\n    <radialGradient id=\"earth-def\" cx=\"38%\" cy=\"35%\">\n     <stop offset=\"0%\" stop-color=\"#3B82F6\"/>\n     <stop offset=\"40%\" stop-color=\"#1e40af\"/>\n     <stop offset=\"100%\" stop-color=\"#0a1828\"/>\n    </radialGradient>\n    <radialGradient id=\"dom-glow\" cx=\"50%\" cy=\"50%\">\n     <stop offset=\"0%\" stop-color=\"rgba(59,130,246,.10)\"/>\n     <stop offset=\"100%\" stop-color=\"rgba(59,130,246,0)\"/>\n    </radialGradient>\n   </defs>\n\n   <!-- Background glow centered on Earth -->\n   <circle cx=\"380\" cy=\"400\" r=\"380\" fill=\"url(#dom-glow)\"/>\n\n   <!-- Header annotations -->\n   <text x=\"40\" y=\"38\" font-family=\"ui-monospace,'SF Mono',monospace\" font-size=\"11\" fill=\"rgba(96,165,250,.65)\" letter-spacing=\".18em\" font-weight=\"600\">CRITICAL MISSIONS \u00b7 CROSS-DOMAIN MAP</text>\n   <text x=\"1160\" y=\"38\" font-family=\"ui-monospace,'SF Mono',monospace\" font-size=\"11\" fill=\"rgba(96,165,250,.65)\" letter-spacing=\".18em\" font-weight=\"600\" text-anchor=\"end\">SPACE \u00b7 AIR \u00b7 UNDERWATER</text>\n\n   <!-- Atmospheric region rings around Earth -->\n   <g fill=\"none\" stroke-width=\"1\">\n    <!-- Space (outer, > 100km) -->\n    <circle cx=\"380\" cy=\"400\" r=\"250\" stroke=\"rgba(34,211,238,.22)\" stroke-dasharray=\"3 6\"/>\n    <!-- Endo-atmosphere (close to Earth, < 100km) -->\n    <circle cx=\"380\" cy=\"400\" r=\"210\" stroke=\"rgba(245,158,11,.28)\" stroke-dasharray=\"2 4\"/>\n   </g>\n\n   <!-- EARTH (large) -->\n   <circle cx=\"380\" cy=\"400\" r=\"190\" fill=\"url(#earth-def)\" stroke=\"rgba(96,165,250,.5)\" stroke-width=\"1.5\"/>\n   <!-- Stylized continent  defense platforms. ADN-powered with non-toxic, storable propellant \u2014 high power density in the most demanding environments.</p>\n    <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Explore power systems \u2192</span>\n   </div>\n  </a>\n\n  <!-- DUAL-USE ORBITAL VEHICLE (TYR-1) -->\n  <a href=\"#/propulsion-orbital-vehicles\" class=\"cap\" style=\"min-height:auto;padding:0;overflow:hidden\">\n   <div style=\"aspect-ratio:16/10;background:linear-gradient(135deg,#0f1419 0%,#06080B 70%);border-bottom:1px solid var(--border);position:relative;overflow:hidden\">\n    <svg viewBox=\"0 0 480 300\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%;display:block\">\n     <defs>\n      <radialGradient id=\"tyr-def-glow\" cx=\"50%\" cy=\"50%\"><stop offset=\"0%\" stop-color=\"rgba(59,130,246,.1)\"/><stop offset=\"100%\" stop-color=\"rgba(59,130,246,0)\"/></radialGradient>\n      <linearGradient id=\"tyr-def-body\" x1=\"0\" x2=\"1\" y1=\"0\" y2=\"0\"><stop offset=\"0%\" stop-color=\"#0a0d12\"/><stop offset=\"50%\" stop-color=\"#1e3a5f\"/><stop offset=\"100%\" stop-color=\"#0a0d12\"/></linearGradient>\n     </defs>\n     <rect width=\"480\" height=\"300\" fill=\"url(#tyr-def-glow)\"/>\n     <!-- Orbital trace arc -->\n     <path d=\"M 60 240 Q 240 180 420 240\" stroke=\"rgba(34,211,238,.15)\" stroke-width=\"1\" fill=\"none\" stroke-dasharray=\"4 6\"/>\n     <!-- TYR-1 OTV (defense config \u2014 agile, rendezvous-capable) -->\n     <g transform=\"translate(240 165)\">\n      <rect x=\"-66\" y=\"-30\" width=\"20\" height=\"60\" fill=\"rgba(34,211,238,.3)\" stroke=\"#22D3EE\" stroke-width=\"1\"/>\n      <line x1=\"-56\" y1=\"-30\" x2=\"-56\" y2=\"30\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <rect x=\"46\" y=\"-30\" width=\"20\" height=\"60\" fill=\"rgba(34,211,238,.3)\" stroke=\"#22D3EE\" stroke-width=\"1\"/>\n      <line x1=\"56\" y1=\"-30\" x2=\"56\" y2=\"30\" stroke=\"rgba(15,
