apid.</h3>\n   <p style=\"margin-bottom:24px\">Rapid combustion. Configurable blends across 1100\u2013&gt;1800\u00b0C. In-space, endo-atmospheric and underwater performance from one chemistry family.</p>\n   <ul style=\"list-style:none;padding:0;color:var(--muted);font-size:14px;line-height:2\">\n    <li>\u25c6 Rapid combustion</li>\n    <li>\u25c6 Four blend variants</li>\n    <li>\u25c6 Cross-domain performance</li>\n   </ul>\n  </div>\n  <div class=\"cap\">\n   <div class=\"cap-num\">/ 02 \u2014 REDUCED RISK</div>\n   <h3>Safer to handle.</h3>\n   <p style=\"margin-bottom:24px\">Low sensitivity. Low toxicity. Non-carcinogenic \u2014 eliminating the operational overhead of legacy propellants.</p>\n   <ul style=\"list-style:none;padding:0;color:var(--muted);font-size:14px;line-height:2\">\n    <li>\u25c6 Low sensitivity</li>\n    <li>\u25c6 Low toxicity</li>\n    <li>\u25c6 Non-carcinogenic</li>\n   </ul>\n  </div>\n  <div class=\"cap\">\n   <div class=\"cap-num\">/ 03 \u2014 LOWER COSTS</div>\n   <h3>Streamlined logistics.</h3>\n   <p style=\"margin-bottom:24px\">SCAPE suits not required. Approved for passenger aircraft transport (UN 1.4S, UN0481). Enables \"fuel at the factory\" \u2014 up to 72% lower costs in typical loading scenarios.</p>\n   <ul style=\"list-style:none;padding:0;color:var(--muted);font-size:14px;line-height:2\">\n    <li>\u25c6 No SCAPE suits required</li>\n    <li>\u25c6 Passenger aircraft transport</li>\n    <li>\u25c6 Up to 72% cost reduction</li>\n   </ul>\n  </div>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     06 \u2014 END-TO-END SUPPLY (mirrors brochure p.16 bottom)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">End-to-End Supply \u00b7 05</div>\n   <h2 class=\"section-title\">Production to <em>fueling.</em></h2>\n  </div>\n  <p>Full mission propellant supply chain. ECAPS produces, qualifies, and distributes LMP-103S \u2014 and supports fueling campaigns on-site at launch facilities.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(3,1fr)\">\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 01 \u2014 PRODUCTION</div>\n   <h3 style=\"font-size:22px\">LMP-103S\u2122 Production</h3>\n   <p style=\"margin-top:14px\">ADN synthesis and propellant blending in ECAPS facilities. Four qualified blends produced to ISO 9001 and AS9100 standards.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">QUALIFICATIONS</div>\n    \u00b7 ESA \u00b7 NASA \u00b7 NRO \u00b7 SNSA<br>\n    \u00b7 UN 1.4S \u00b7 UN0481\n   </div>\n  </div>\n\n  <a href=\"#/propellant-logistics\" class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 02 \u2014 LOGISTICS</div>\n   <h3 style=\"font-size:22px\">Propellant Logistics</h3>\n   <p style=\"margin-top:14px\">End-to-end propellant supply chain with full handling, transport, and storage compliance. Containers from 1L laboratory volumes to 1,000L mission tankage.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">SCALES</div>\n    \u00b7 1L \u00b7 10L \u00b7 100L \u00b7 1,000L<br>\n    \u00b7 Global supply chain\n   </div>\n   <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Explore logistics \u2192</span>\n  </a>\n\n  <a href=\"#/fuelling-campaigns\" class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 03 \u2014 FUELING</div>\n   <h3 style=\"font-size:22px\">Fueling Campaigns</h3>\n   <p style=\"margin-top:14px\">Expert fueling operations with LMP-103S propellant at launch sites worldwide. \"Fuel at the factory\" capabilities for streamlined campaigns.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">SUPPORT</div>\n    \u00b7 Launch site fueling<br>\n    \u00b7 Factory pre-fueling\n   </div>\n   <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Explore fueling \u2192</span>\n  </a>\n\n </div>\n</section>\n\n<!-- QUALITY -->\n<div class=\"product reveal\">\n <div>\n  <div class=\"product-tag\">\u25c7 Quality Assurance</div>\n  <h2>ISO-certified <em>operations.</em></h2>\n  <p class=\"lede\">ECAPS' operations are certified under ISO standards. Technology and innovations undergo rigorous testing and quality assurance, ensuring enhanced reliability and performance.</p>\n  <a href=\"#/quality\" class=\"btn-primary\">View Facilities &amp; Quality \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--border);background:var(--surface-2)\">\n  <div style=\"text-align:center;padding:40px\">\n   <div style=\"font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;font-size:11px;letter-spacing:.2em;color:var(--ice);text-transform:uppercase;margin-bottom:24px\">Certifications</div>\n   <div style=\"font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:42px;font-weight:300;letter-spacing:-.02em;line-height:1.2\">\n    ISO 9001<br><em style=\"color:var(--accent);font-style:italic\">AS9100</em>\n   </div>\n   <div style=\"font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;font-size:10px;letter-spacing:.16em;color:var(--muted);margin-top:24px\">QUALIFIED BY ESA \u00b7 NASA \u00b7 NRO \u00b7 SNSA</div>\n  </div>\n </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Specify LMP-103S<br>for your <em>next mission.</em></h2>\n <p style=\"max-width:620px;margin:18px auto 0;color:var(--muted);font-size:15px;line-height:1.6\">Available through Full-Mission Support (FMS) packages \u2014 propellant supply across all four blends, with logistics and fueling campaign support.</p>\n <div class=\"cta-row\">\n  <a href=\"#/commercial-packages\" class=\"btn-primary\">Commercial Packages \u2192</a>\n  <a href=\"https://www.ecaps.se/s/Gren-proellant-A4-sheets-V4.pdf\" target=\"_blank\" class=\"btn-ghost\">Download Report</a>\n </div>\n</div>","management":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>MANAGEMENT</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>INSTITUTIONAL KNOWLEDGE \u00b7 <b>SINCE 2000</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Management <em>Team.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">At the core of ECAPS' success is a dedicated team of engineers and scientists, including key members who have driven HPGP innovation since ECAPS's inception in 2000. This continuity brings unparalleled institutional knowledge and industry insights.</p>\n <div class=\"hero-coords reveal\">\n <div>FOUNDED \u2014 <b>2000</b></div>\n <div>HQ \u2014 <b>GLOBAL</b></div>\n <div>HERITAGE \u2014 <b>HPGP INVENTORS</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1497366216548-37526070297c?w=2400&q=90&auto=format&fit=crop\" alt=\"ECAPS management team\" />\n <div class=\"telemetry\">\n LEADERSHIP <b>HPGP INVENTORS</b><br>\n CONTINUITY <b>SINCE 2000</b><br>\n OWNERSHIP <b>OAK UNIVERSE</b>\n </div>\n <div class=\"caption\">INSTITUTIONAL KNOWLEDGE \u00b7 25 YEARS OF HPGP LEADERSHIP</div>\n</div>\n\n<section>\n <div class=\"team-grid reveal\">\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913031-YJ17FJSLJGFXATJ8IU79/Odysseas+re.png\" alt=\"Odysseas Christofi\" /></div>\n <h4>Odysseas Christofi</h4>\n <div class=\"role\">Chief Executive Officer</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/a2a1cb89-fe1d-4aec-9590-2ee35b82de0c/Stefan+Re.png\" alt=\"Stefan Gustafsson\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Stefan Gustafsson</h4>\n <div class=\"role\">Chairman</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/e37670a9-fae7-43d3-8875-401797f372de/2.png\" alt=\"John Franklin\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>John Franklin</h4>\n <div class=\"role\">Chief Business Officer</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913058-N216DR2ZK5DROTRS8Y64/Eva+re.png\" alt=\"Eva Sallander\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Eva Sallander</h4>\n <div class=\"role\">Chief Operating Officer</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913066-ZXIVKXBGQTOJTKUSGPJ6/Kjell+re.png\" alt=\"Kjell Anflo\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Kjell Anflo</h4>\n <div class=\"role\">Chief Designer</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913076-JOHBNLBFBELBUML7QNVA/Peter+re.png\" alt=\"Peter Thorm\u00e4hlen\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Peter Thorm\u00e4hlen</h4>\n <div class=\"role\">Chief Chemist</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913086-5BLNG2XXIM7JKVWDP0NA/Per+Olov+re.png\" alt=\"Per-Olov Carlsson\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Per-Olov Carlsson</h4>\n <div class=\"role\">Chief Financial Officer</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/db4eb205-2d2f-435a-8ad4-1e64d0a3b8a8/Wil.png\" alt=\"Wilhelm Dingertz\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Wilhelm Dingertz</h4>\n <div class=\"role\">Product Development &amp; Commercialization</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913103-2SJ3732U0KY0IDBBUVHR/Annie+Re.png\" alt=\"Ann-Sofie Krig\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Ann-Sofie Krig</h4>\n <div class=\"role\">Catalyst Lead</div>\n </div>\n <div class=\"team-card\">\n <div class=\"team-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543913112-0IYYRMZUPE8PMAO8ONVY/Erik+re.png\" alt=\"Erik Fors\" loading=\"lazy\" decoding=\"async\" /></div>\n <h4>Erik Fors</h4>\n <div class=\"role\">Production Manager</div>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Join the team <em>shaping propulsion.</em></h2>\n <div class=\"cta-row\">\n <a href=\"#/careers\" class=\"btn-primary\">View Careers \u2192</a>\n <a href=\"#/about\" class=\"btn-ghost\">About ECAPS</a>\n </div>\n</div>","mission-design":"<section class=\"page-hero\" style=\"position:relative;overflow:hidden\">\n <div aria-hidden=\"true\" style=\"position:absolute;inset:0;background-image:linear-gradient(180deg,rgba(6,8,11,.4) 0%,rgba(6,8,11,.85) 60%,rgba(6,8,11,1) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg');background-size:cover;background-position:center 30%;z-index:0;opacity:.55\"></div>\n <div style=\"position:relative;z-index:1\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <a href=\"#/lmp-103s-propellant\">Technology</a>\n  <span>/</span>\n  <span><b>MISSION DESIGN</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>PLATFORM \u00b7 <b>FOR BUS PROVIDERS + PRIMES</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Mission <em>Design.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">ECAPS works with satellite bus providers and prime integrators to design and deliver critical missions. This workspace combines a live operational simulator with reference data, orbital mechanics, and propellant sizing \u2014 for collaborative concept-through-flight engagement.</p>\n  <div class=\"hero-coords reveal\">\n   <div>ENGINES \u2014 <b>11 CLASSES (100 mN \u2192 26.6 kN)</b></div>\n   <div>PROPELLANT \u2014 <b>LMP-103S \u00b7 4 BLENDS</b></div>\n   <div>PLATFORM \u2014 <b>SIMULATOR \u00b7 HOHMANN \u00b7 SIZING \u00b7 MULTI-BURN</b></div>\n  </div>\n </div>\n </div>\n</section>\n\n<!-- 01 \u2014 MISSION SIMULATOR (operational demonstration) -->\n<section id=\"simulator\" style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.04) 0%,transparent 100%)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Operational Demonstration \u00b7 01</div>\n   <h2 class=\"section-title\">Mission <em>simulator.</em></h2>\n  </div>\n  <p>Run a representative ECAPS-powered mission. These scenarios mirror real customer deliveries \u2014 smallsat deployment, commercial GEO insertion, cislunar transfer, end-of-life disposal. Watch propulsion phases execute, telemetry update, and orbit transitions visualise.</p>\n </div>\n\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);overflow:hidden\">\n\n  <!-- Mission scenario cards (replaces dropdown) -->\n  <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border-soft);border-bottom:1px solid var(--border)\">\n   <div class=\"sim-mission-card\" data-mission=\"cubesat-drag\" onclick=\"window.simChangeMission && window.simChangeMission('cubesat-drag')\" style=\"background:var(--surface);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid transparent;transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889889-QG8DY7W3IR76B4T7DE5W/Argomoon.jpeg');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">CubeSat Drag Compensation</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">12 KG \u00b7 100 MN</div>\n    </div>\n   </div>\n   <div class=\"sim-mission-card\" data-mission=\"smallsat-sk\" onclick=\"window.simChangeMission && window.simChangeMission('smallsat-sk')\" style=\"background:var(--surface);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid transparent;transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889974-9YKWTR54CGA54OG9UUYF/SkySat3.png');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">Smallsat Station-Keeping</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">75 KG \u00b7 1 N</div>\n    </div>\n   </div>\n   <div class=\"sim-mission-card\" data-mission=\"midclass-phasing\" onclick=\"window.simChangeMission && window.simChangeMission('midclass-phasing')\" style=\"background:var(--surface);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid transparent;transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889983-JRNHHV88ZKS0O6RWJ6TL/Prisma.jpeg');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">Mid-Class Orbit Phasing</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">200 KG \u00b7 5 N</div>\n    </div>\n   </div>\n   <div class=\"sim-mission-card active\" data-mission=\"leo-deploy\" onclick=\"window.simChangeMission && window.simChangeMission('leo-deploy')\" style=\"background:rgba(34,211,238,0.05);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid var(--accent-bright);transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889963-HGFUOE36ZAR711HG9E19/Skysat+4-7.png');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">LEO Constellation Deployment</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--accent-bright);margin-top:4px;letter-spacing:.06em\">200 KG \u00b7 22 N</div>\n    </div>\n   </div>\n   <div class=\"sim-mission-card\" data-mission=\"high-impulse\" onclick=\"window.simChangeMission && window.simChangeMission('high-impulse')\" style=\"background:var(--surface);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid transparent;transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889905-U8K2NQ86PDAMFTO03YLR/NROL111.png');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">High-Impulse Repositioning</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">600 KG \u00b7 220 N</div>\n    </div>\n   </div>\n   <div class=\"sim-mission-card\" data-mission=\"eol-disposal\" onclick=\"window.simChangeMission && window.simChangeMission('eol-disposal')\" style=\"background:var(--surface);cursor:pointer;display:flex;flex-direction:column;border-top:3px solid transparent;transition:all .2s\">\n    <div style=\"aspect-ratio:16/9;background-image:linear-gradient(180deg,transparent 35%,rgba(6,8,11,.95) 100%),url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889876-CAXJRXA9R82HTU9Q90DO/Adras-j.jpg');background-size:cover;background-position:center\"></div>\n    <div style=\"padding:10px 12px\">\n     <div style=\"font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3\">End-of-Life Disposal</div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">350 KG \u00b7 22 N</div>\n    </div>\n   </div>\n  </div>\n\n  <!-- Controls bar (simplified - just playback controls) -->\n  <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--bg-2);border-bottom:1px solid var(--border)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ MISSION CONTROL \u00b7 SELECT SCENARIO ABOVE</div>\n   <div style=\"display:flex;gap:8px;align-items:center\">\n    <button id=\"sim-play\" onclick=\"window.simPlay && window.simPlay()\" style=\"background:var(--accent);color:#FFF;border:none;padding:11px 22px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:.04em;cursor:pointer;text-transform:uppercase\">\u25b6 Run Mission</button>\n    <button id=\"sim-pause\" onclick=\"window.simPauseFn && window.simPauseFn()\" style=\"background:transparent;color:var(--ink-2);border:1px solid var(--border);padding:11px 16px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer\">\u23f8 Pause</button>\n    <button id=\"sim-reset\" onclick=\"window.simReset && window.simReset()\" style=\"background:transparent;color:var(--ink-2);border:1px solid var(--border);padding:11px 16px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer\">\u23ee Reset</button>\n    <select id=\"sim-speed\" onchange=\"window.simChangeSpeed && window.simChangeSpeed(this.value)\" style=\"padding:11px 12px;font-size:12px;font-family:ui-monospace,monospace;letter-spacing:.04em;background:var(--bg);color:var(--ink);border:1px solid var(--border);cursor:pointer\">\n     <option value=\"25\">0.5\u00d7</option>\n     <option value=\"50\" selected>1\u00d7</option>\n     <option value=\"100\">2\u00d7</option>\n     <option value=\"250\">5\u00d7</option>\n    </select>\n   </div>\n  </div>\n\n    <!-- Main display: SVG + telemetry -->\n  <div style=\"display:grid;grid-template-columns:1fr 380px;height:440px\">\n\n   <!-- LEFT: SVG orbital view -->\n   <div style=\"position:relative;background:#050810;overflow:hidden;height:100%\">\n    <svg id=\"sim-svg\" viewBox=\"-200 -200 400 400\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%;display:block\">\n     <defs>\n      <radialGradient id=\"earth-grad\" cx=\"38%\" cy=\"38%\" r=\"62%\">\n       <stop offset=\"0%\" stop-color=\"#60A5FA\" stop-opacity=\"0.95\" />\n       <stop offset=\"50%\" stop-color=\"#1E40AF\" stop-opacity=\"0.9\" />\n       <stop offset=\"100%\" stop-color=\"#0a1226\" stop-opacity=\"1\" />\n      </radialGradient>\n      <radialGradient id=\"earth-atm\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n       <stop offset=\"0%\" stop-color=\"transparent\" />\n       <stop offset=\"78%\" stop-color=\"transparent\" />\n       <stop offset=\"100%\" stop-color=\"#22D3EE\" stop-opacity=\"0.4\" />\n      </radialGradient>\n     </defs>\n\n     <!-- Stars (JS-generated) -->\n     <g id=\"sim-stars\" opacity=\"0.5\"></g>\n\n     <!-- Earth atmosphere glow -->\n     <circle cx=\"0\" cy=\"0\" r=\"32\" fill=\"url(#earth-atm)\" />\n\n     <!-- Earth -->\n     <circle cx=\"0\" cy=\"0\" r=\"25\" fill=\"url(#earth-grad)\" />\n     <circle cx=\"0\" cy=\"0\" r=\"25\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.4\" opacity=\"0.4\" />\n\n     <!-- Orbits (dynamic sizing) -->\n     <circle id=\"sim-orbit-init\" cx=\"0\" cy=\"0\" r=\"55\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"1\" stroke-dasharray=\"3,2\" opacity=\"0.55\" />\n     <circle id=\"sim-orbit-target\" cx=\"0\" cy=\"0\" r=\"150\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1\" stroke-dasharray=\"3,2\" opacity=\"0.45\" />\n     <ellipse id=\"sim-orbit-transfer\" cx=\"-47.5\" cy=\"0\" rx=\"102.5\" ry=\"91\" fill=\"none\" stroke=\"#FFF\" stroke-width=\"1.5\" opacity=\"0\" />\n\n     <!-- Trail (JS-rendered) -->\n     <g id=\"sim-trail\"></g>\n\n     <!-- Spacecraft -->\n     <g id=\"sim-spacecraft\" transform=\"translate(55, 0) rotate(0)\">\n      <!-- Plume -->\n      <g id=\"sim-plume\" opacity=\"0\">\n       <path d=\"M 0,0 L -18,-3.5 L -26,0 L -18,3.5 Z\" fill=\"#22D3EE\" opacity=\"0.9\" />\n       <path d=\"M 0,0 L -11,-2 L -17,0 L -11,2 Z\" fill=\"#FBBF24\" opacity=\"0.95\" />\n       <path d=\"M 0,0 L -6,-1 L -9,0 L -6,1 Z\" fill=\"#FEF3C7\" opacity=\"1\" />\n      </g>\n      <!-- Spacecraft body -->\n      <circle cx=\"0\" cy=\"0\" r=\"4.5\" fill=\"#FFF\" stroke=\"#22D3EE\" stroke-width=\"0.8\" />\n      <circle cx=\"0\" cy=\"0\" r=\"2\" fill=\"#22D3EE\" />\n     </g>\n    </svg>\n\n    <!-- Top-left: mission name + description -->\n    <div style=\"position:absolute;top:16px;left:18px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:rgba(255,255,255,.85)\">\n     <div id=\"sim-mission-name\" style=\"font-weight:700;color:#FFF;font-size:11px;text-transform:uppercase\">LEO Constellation Deployment</div>\n     <div id=\"sim-mission-desc\" style=\"margin-top:4px;color:rgba(255,255,255,.55);letter-spacing:.04em;font-size:10px\">200 kg smallsat \u00b7 22 N monoprop \u00b7 400 \u2192 800 km</div>\n    </div>\n\n    <!-- Bottom-right: phase indicator -->\n    <div style=\"position:absolute;bottom:16px;right:18px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-align:right;background:rgba(0,0,0,.55);padding:8px 14px;border:1px solid rgba(255,255,255,.12);min-width:180px\">\n     <div style=\"color:rgba(255,255,255,.55);font-size:9px\">CURRENT PHASE</div>\n     <div id=\"sim-phase-name\" style=\"color:#FFF;font-weight:700;margin-top:4px;font-size:11px;letter-spacing:.12em\">\u2014 READY \u2014</div>\n    </div>\n\n    <!-- Bottom-left: legend -->\n    <div style=\"position:absolute;bottom:16px;left:18px;display:flex;gap:14px;font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.55);text-transform:uppercase\">\n     <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:14px;height:1px;background:#22D3EE\"></div>INITIAL</div>\n     <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:14px;height:1px;background:#FFFFFF;opacity:0.6\"></div>TARGET</div>\n     <div style=\"display:flex;align-items:center;gap:6px\"><div style=\"width:14px;height:1px;background:#FFF\"></div>TRANSFER</div>\n    </div>\n   </div>\n\n   <!-- RIGHT: Enhanced Telemetry panel -->\n   <div style=\"background:var(--bg-2);border-left:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto\">\n\n    <!-- LIVE status header -->\n    <div style=\"padding:11px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center\">\n     <span style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ MISSION TELEMETRY</span>\n     <span id=\"tlm-status\" style=\"font-family:ui-monospace,monospace;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em\">\u25cf STANDBY</span>\n    </div>\n\n    <!-- MET + Phase row -->\n    <div style=\"padding:11px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">MET</div>\n      <div id=\"tlm-met\" style=\"font-family:ui-monospace,monospace;font-size:15px;font-weight:600;color:var(--ink);margin-top:3px;letter-spacing:.04em\">T+ 00:00:00</div>\n     </div>\n     <div style=\"border-left:1px solid var(--border-soft);padding-left:18px\">\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">PHASE</div>\n      <div id=\"tlm-phase\" style=\"font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--accent-bright);margin-top:6px;line-height:1.3\">\u2014 ready \u2014</div>\n     </div>\n    </div>\n\n    <!-- Propellant Tank Visualization (the showpiece) -->\n    <div style=\"padding:12px 20px;border-bottom:1px solid var(--border)\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px\">\n      <span style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">PROPELLANT</span>\n      <span id=\"tlm-prop-pct\" style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.06em;color:var(--accent-bright);font-weight:700\">100%</span>\n     </div>\n     <div style=\"display:flex;gap:16px;align-items:stretch\">\n      <!-- Vertical tank -->\n      <div style=\"width:42px;height:100px;background:var(--bg);border:1px solid var(--border-soft);position:relative;overflow:hidden;border-radius:2px 2px 0 0;flex-shrink:0\">\n       <div id=\"tlm-prop-fill\" style=\"position:absolute;left:0;right:0;bottom:0;height:100%;background:linear-gradient(180deg,var(--accent-bright) 0%,rgba(34,211,238,0.55) 100%);transition:height .2s ease-out\"></div>\n       <!-- Tick marks at 25/50/75 -->\n       <div style=\"position:absolute;top:25%;left:0;right:0;height:1px;background:rgba(255,255,255,0.1);pointer-events:none\"></div>\n       <div style=\"position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.12);pointer-events:none\"></div>\n       <div style=\"position:absolute;top:75%;left:0;right:0;height:1px;background:rgba(255,255,255,0.1);pointer-events:none\"></div>\n       <!-- LMP-103S label -->\n       <div style=\"position:absolute;bottom:6px;left:0;right:0;font-family:ui-monospace,monospace;font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,0.7);text-align:center;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg);height:36px;margin:0 auto\">LMP-103S</div>\n      </div>\n      <!-- Tank readouts -->\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:space-between\">\n       <div>\n        <div style=\"font-family:'Inter',sans-serif;font-size:20px;font-weight:400;color:var(--ink);letter-spacing:-.02em;line-height:1\"><span id=\"tlm-prop\">18.0</span><span style=\"font-size:12px;color:var(--muted);font-weight:500\"> kg remaining</span></div>\n        <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">of <span id=\"tlm-prop-total\">18.0</span> kg load</div>\n       </div>\n       <div style=\"padding-top:10px;border-top:1px solid var(--border-soft)\">\n        <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase\">Mass Flow</div>\n        <div id=\"tlm-flow\" style=\"font-family:ui-monospace,monospace;font-size:13px;font-weight:600;color:var(--ink);margin-top:2px\">0.00 g/s</div>\n       </div>\n      </div>\n     </div>\n    </div>\n\n    <!-- \u0394V Burndown Bar -->\n    <div style=\"padding:11px 20px;border-bottom:1px solid var(--border)\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px\">\n      <span style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">\u0394V BUDGET</span>\n      <span id=\"tlm-dv-pct\" style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.06em;color:var(--accent-bright);font-weight:700\">0%</span>\n     </div>\n     <div style=\"height:10px;background:var(--bg);border:1px solid var(--border-soft);position:relative;overflow:hidden\">\n      <div id=\"tlm-dv-fill\" style=\"position:absolute;left:0;top:0;bottom:0;width:0%;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-bright) 100%);transition:width .2s ease-out\"></div>\n     </div>\n     <div style=\"display:flex;justify-content:space-between;margin-top:6px;font-family:ui-monospace,monospace;font-size:11px;color:var(--ink)\">\n      <span><b id=\"tlm-dv\">0 / 340 m/s</b></span>\n     </div>\n    </div>\n\n    <!-- Mass + Engine -->\n    <div style=\"padding:11px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Spacecraft Mass</div>\n      <div id=\"tlm-mass\" style=\"font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--ink);margin-top:3px;letter-spacing:-.01em\">218 kg</div>\n     </div>\n     <div style=\"border-left:1px solid var(--border-soft);padding-left:18px\">\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">ECAPS Hardware</div>\n      <div id=\"tlm-engine\" style=\"font-family:ui-monospace,monospace;font-size:12px;font-weight:600;color:var(--ink);margin-top:6px;letter-spacing:.04em\">22 N MONOPROP</div>\n     </div>\n    </div>\n\n    <!-- Hydrazine Comparison -->\n    <div style=\"padding:11px 20px;background:linear-gradient(180deg,rgba(148,163,184,.04) 0%,transparent 100%)\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\">\n      <span style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#94A3B8;text-transform:uppercase;font-weight:700\">/ HYDRAZINE EQUIVALENT</span>\n     </div>\n     <div style=\"font-family:'Inter',sans-serif;font-size:13px;color:var(--ink-2);line-height:1.5\">\n      Same mission with hydrazine would burn<br/>\n      <span style=\"font-family:'Inter',sans-serif;font-size:18px;font-weight:400;color:#94A3B8;letter-spacing:-.02em\"><span id=\"tlm-hyd-prop\">19.7</span><span style=\"font-size:12px;color:var(--muted)\"> kg</span></span>\n     </div>\n     <div id=\"tlm-hyd-saving\" style=\"margin-top:8px;padding:6px 10px;background:rgba(34,211,238,0.06);border-left:2px solid var(--accent-bright);font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.04em;font-weight:600\">\u2014 kg SAVED with LMP-103S</div>\n    </div>\n\n   </div>\n  </div>\n\n  <!-- Phase timeline -->\n  <div style=\"padding:18px 24px;background:var(--bg-2);border-top:1px solid var(--border)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ MISSION TIMELINE</div>\n   <div id=\"sim-timeline-bar\" style=\"display:flex;gap:2px;height:52px;background:var(--bg);border:1px solid var(--border-soft)\"></div>\n  </div>\n </div>\n</section>\n\n<!-- 02 \u2014 PROPULSION METHOD COMPARISON -->\n<section id=\"method-comparison\" style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.02) 0%,transparent 100%)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Method Comparison \u00b7 02</div>\n   <h2 class=\"section-title\">LMP-103S vs <em>alternatives.</em></h2>\n  </div>\n  <p>Live comparison across four propulsion methods for the same mission. LMP-103S delivers higher specific impulse than legacy hydrazine without the toxicity overhead \u2014 while preserving the thrust authority electric propulsion can't match for time-critical operations.</p>\n </div>\n\n<!-- Live comparison calculator -->\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);overflow:hidden\">\n\n  <!-- Inputs bar -->\n  <div style=\"padding:20px 28px;background:var(--bg-2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(2,1fr);gap:20px;align-items:end\">\n   <div>\n    <label class=\"mc-label\">Spacecraft dry mass</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"cmp-dry\" value=\"500\" min=\"0\" step=\"10\" />\n     <span class=\"unit\">kg</span>\n    </div>\n    <div class=\"mc-help\">Bus + payload + structure (no propellant)</div>\n   </div>\n   <div>\n    <label class=\"mc-label\">Required \u0394V</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"cmp-dv\" value=\"340\" min=\"0\" step=\"10\" />\n     <span class=\"unit\">m/s</span>\n    </div>\n    <div class=\"mc-help\">Total impulse for the manoeuvre</div>\n   </div>\n  </div>\n\n  <!-- 4 method cards -->\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)\">\n   <!-- LMP-103S -->\n   <div style=\"background:var(--surface);padding:22px;border-top:3px solid var(--accent-bright);position:relative;min-height:300px\">\n    <div style=\"position:absolute;top:8px;right:8px;font-family:ui-monospace,monospace;font-size:8px;letter-spacing:.12em;color:var(--accent-bright);background:rgba(34,211,238,.12);padding:3px 7px;text-transform:uppercase;font-weight:700;border:1px solid rgba(34,211,238,.4)\">RECOMMENDED</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ LMP-103S</div>\n    <div style=\"font-size:13px;color:var(--ink-2);margin-bottom:18px\">Storable monoprop \u00b7 245 s \u00b7 22 N</div>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Propellant</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-top:4px\"><span id=\"cmp-lmp-103s-prop\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Maneuver Time</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--accent-bright);margin-top:4px\"><span id=\"cmp-lmp-103s-time\">\u2014</span></div>\n     </div>\n    </div>\n    <div style=\"margin-top:18px;font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6\">Drop-in replacement for hydrazine systems. Higher ISP, no SCAPE handling, faster ground ops.</div>\n   </div>\n\n   <!-- Hydrazine -->\n   <div style=\"background:var(--surface);padding:22px;border-top:3px solid #94A3B8;min-height:300px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#94A3B8;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ HYDRAZINE</div>\n    <div style=\"font-size:13px;color:var(--ink-2);margin-bottom:18px\">Legacy monoprop \u00b7 225 s \u00b7 22 N</div>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Propellant</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-top:4px\"><span id=\"cmp-hydrazine-prop\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Maneuver Time</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#94A3B8;margin-top:4px\"><span id=\"cmp-hydrazine-time\">\u2014</span></div>\n     </div>\n    </div>\n    <div style=\"margin-top:18px;font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6\">Industry standard but toxic. SCAPE suits, certified fuelling facilities, regulatory overhead at every step.</div>\n   </div>\n\n   <!-- Hall Effect -->\n   <div style=\"background:var(--surface);padding:22px;border-top:3px solid #3B82F6;min-height:300px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#3B82F6;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ HALL EFFECT</div>\n    <div style=\"font-size:13px;color:var(--ink-2);margin-bottom:18px\">Electric \u00b7 Xenon \u00b7 1,700 s \u00b7 150 mN</div>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Propellant</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-top:4px\"><span id=\"cmp-hall-prop\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Maneuver Time</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#3B82F6;margin-top:4px\"><span id=\"cmp-hall-time\">\u2014</span></div>\n     </div>\n    </div>\n    <div style=\"margin-top:18px;font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6\">High ISP but very low thrust. Days-to-weeks of continuous firing \u2014 disqualifies it for prompt manoeuvres.</div>\n   </div>\n\n   <!-- Ion -->\n   <div style=\"background:var(--surface);padding:22px;border-top:3px solid #8B5CF6;min-height:300px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:#8B5CF6;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ ION (GRIDDED)</div>\n    <div style=\"font-size:13px;color:var(--ink-2);margin-bottom:18px\">Electric \u00b7 Xenon \u00b7 3,100 s \u00b7 92 mN</div>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Propellant</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-top:4px\"><span id=\"cmp-ion-prop\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Maneuver Time</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#8B5CF6;margin-top:4px\"><span id=\"cmp-ion-time\">\u2014</span></div>\n     </div>\n    </div>\n    <div style=\"margin-top:18px;font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6\">Highest ISP, ultra-low thrust. Best for deep-space cruise \u2014 multi-month continuous burns acceptable there.</div>\n   </div>\n  </div>\n\n  <!-- Visual bar chart: maneuver duration -->\n  <div style=\"padding:24px 28px;background:var(--bg-2);border-top:1px solid var(--border)\">\n   <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700\">/ MANEUVER DURATION (Linear scale)</div>\n    <div id=\"cmp-summary\" style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.06em\">\u2014</div>\n   </div>\n   <div id=\"cmp-bars\" style=\"display:flex;flex-direction:column;gap:8px\"></div>\n  </div>\n\n  <!-- Verdict -->\n  <div style=\"padding:20px 28px;background:rgba(34,211,238,.04);border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2);line-height:1.75\">\n   <b style=\"color:var(--accent-bright);text-transform:uppercase;letter-spacing:.14em\">/ WHY LMP-103S</b><br>\n   For time-critical operations \u2014 orbit raise, intercept, deployment \u2014 LMP-103S delivers prompt manoeuvres at the same thrust authority as hydrazine but with ~30% better specific impulse and zero handling toxicity. Electric propulsion remains the right answer for low-thrust, long-duration cruise \u2014 but its multi-day to multi-month burn times disqualify it for missions where speed matters.\n  </div>\n </div>\n</section>\n\n<!-- 03 \u2014 ENGINE EXPLORER (interactive) -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Engine Portfolio \u00b7 03</div>\n   <h2 class=\"section-title\">Pick an <em>engine.</em></h2>\n  </div>\n  <p>The ECAPS monopropellant range \u2014 five qualified thrust classes spanning CubeSat AOCS to high-impulse manoeuvres. Click any class to explore performance, heritage, and integration data.</p>\n </div>\n\n <!-- Engine cards grid (5 cards across) -->\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border-soft);border:1px solid var(--border);border-bottom:none\">\n\n  <div class=\"engine-card\" data-engine=\"100mN\" style=\"background:var(--surface);padding:28px 18px 24px;text-align:center;border-top:3px solid transparent;position:relative\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;font-weight:700\">PRECISION</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:36px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-top:10px;line-height:1\">100 mN</div>\n   <div style=\"width:36px;height:1px;background:var(--border-soft);margin:16px auto\"></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2)\">ISP 220 s</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:3px\">&lt; 0.5 kg</div>\n  </div>\n\n  <div class=\"engine-card\" data-engine=\"1N\" style=\"background:var(--surface);padding:28px 18px 24px;text-align:center;border-top:3px solid transparent;position:relative\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;font-weight:700\">SMALLSAT</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:36px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-top:10px;line-height:1\">1 N</div>\n   <div style=\"width:36px;height:1px;background:var(--border-soft);margin:16px auto\"></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2)\">ISP 225 s</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:3px\">~1 kg</div>\n  </div>\n\n  <div class=\"engine-card\" data-engine=\"5N\" style=\"background:var(--surface);padding:28px 18px 24px;text-align:center;border-top:3px solid transparent;position:relative\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;font-weight:700\">MID-CLASS</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:36px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-top:10px;line-height:1\">5 N</div>\n   <div style=\"width:36px;height:1px;background:var(--border-soft);margin:16px auto\"></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2)\">ISP 230 s</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:3px\">~2 kg</div>\n  </div>\n\n  <div class=\"engine-card selected\" data-engine=\"22N\" style=\"background:rgba(34,211,238,0.05);padding:28px 18px 24px;text-align:center;border-top:3px solid var(--accent-bright);position:relative\">\n   <div style=\"position:absolute;top:8px;right:8px;font-family:ui-monospace,monospace;font-size:7px;letter-spacing:.14em;color:var(--accent-bright);background:rgba(34,211,238,.12);padding:3px 6px;text-transform:uppercase;font-weight:700;border:1px solid rgba(34,211,238,.4)\">MOST FLOWN</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">STANDARD</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:36px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-top:10px;line-height:1\">22 N</div>\n   <div style=\"width:36px;height:1px;background:var(--border-soft);margin:16px auto\"></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2)\">ISP 245 s</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:3px\">~3 kg</div>\n  </div>\n\n  <div class=\"engine-card\" data-engine=\"220N\" style=\"background:var(--surface);padding:28px 18px 24px;text-align:center;border-top:3px solid transparent;position:relative\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;font-weight:700\">HIGH-IMPULSE</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:36px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-top:10px;line-height:1\">220 N</div>\n   <div style=\"width:36px;height:1px;background:var(--border-soft);margin:16px auto\"></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-2)\">ISP 250 s</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);margin-top:3px\">~10 kg</div>\n  </div>\n </div>\n\n <!-- Detail panel (dynamic via JS) -->\n <div id=\"engine-detail\" class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);padding:32px;min-height:280px\"></div>\n</section>\n\n<!-- 04 \u2014 LMP-103S BLEND REFERENCE -->\n<section style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.02) 0%,transparent 100%)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">LMP-103S Blends \u00b7 04</div>\n   <h2 class=\"section-title\">Propellant <em>blend reference.</em></h2>\n  </div>\n  <p>Four LMP-103S blends tuned to operating envelope. Density is ~1,240 kg/m\u00b3 across all blends \u2014 used for tank-volume sizing in the calculator below.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)\">\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto;border-top:3px solid var(--accent)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ BIPROP &gt;1800\u00b0C</div>\n   <h3 style=\"font-size:18px\">Bipropellant Blend</h3>\n   <div style=\"margin-top:14px;padding:12px;background:var(--bg-2);border-left:3px solid var(--accent);font-family:ui-monospace,monospace;font-size:11px\">\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">FLAME TEMP</span><b style=\"color:var(--ink)\">&gt;1,800 \u00b0C</b></div>\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">DENSITY</span><b style=\"color:var(--ink)\">~1,240 kg/m\u00b3</b></div>\n    <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--muted)\">ISP RANGE</span><b style=\"color:var(--ink)\">315\u2013345 s</b></div>\n   </div>\n   <p style=\"font-size:12px;margin-top:14px;color:var(--ink-2);line-height:1.6\">For bipropellant engines requiring oxidiser-paired combustion. Highest specific impulse in the portfolio.</p>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto;border-top:3px solid var(--accent)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ HIGH ENERGY \u00b7 1600\u00b0C</div>\n   <h3 style=\"font-size:18px\">High-Energy Monoprop</h3>\n   <div style=\"margin-top:14px;padding:12px;background:var(--bg-2);border-left:3px solid var(--accent);font-family:ui-monospace,monospace;font-size:11px\">\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">FLAME TEMP</span><b style=\"color:var(--ink)\">1,600 \u00b0C</b></div>\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">DENSITY</span><b style=\"color:var(--ink)\">~1,240 kg/m\u00b3</b></div>\n    <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--muted)\">ISP RANGE</span><b style=\"color:var(--ink)\">240\u2013250 s</b></div>\n   </div>\n   <p style=\"font-size:12px;margin-top:14px;color:var(--ink-2);line-height:1.6\">Highest-performance monopropellant blend. For \u0394V-heavy missions where ISP matters more than thermal margin.</p>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto;border-top:3px solid var(--accent-bright)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ NOMINAL \u00b7 1470\u00b0C</div>\n   <h3 style=\"font-size:18px\">Standard Monoprop</h3>\n   <div style=\"margin-top:14px;padding:12px;background:var(--bg-2);border-left:3px solid var(--accent-bright);font-family:ui-monospace,monospace;font-size:11px\">\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">FLAME TEMP</span><b style=\"color:var(--ink)\">1,470 \u00b0C</b></div>\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">DENSITY</span><b style=\"color:var(--ink)\">~1,240 kg/m\u00b3</b></div>\n    <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--muted)\">ISP RANGE</span><b style=\"color:var(--ink)\">225\u2013245 s</b></div>\n   </div>\n   <p style=\"font-size:12px;margin-top:14px;color:var(--ink-2);line-height:1.6\">Workhorse blend used across the qualified monopropellant portfolio. Flight heritage on 40+ spacecraft since 2010.</p>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto;border-top:3px solid #10B981\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:#10B981;text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ MODERATED \u00b7 1100\u00b0C</div>\n   <h3 style=\"font-size:18px\">Thermally Moderated</h3>\n   <div style=\"margin-top:14px;padding:12px;background:var(--bg-2);border-left:3px solid #10B981;font-family:ui-monospace,monospace;font-size:11px\">\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">FLAME TEMP</span><b style=\"color:var(--ink)\">1,100 \u00b0C</b></div>\n    <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\"><span style=\"color:var(--muted)\">DENSITY</span><b style=\"color:var(--ink)\">~1,240 kg/m\u00b3</b></div>\n    <div style=\"display:flex;justify-content:space-between\"><span style=\"color:var(--muted)\">ISP RANGE</span><b style=\"color:var(--ink)\">215\u2013230 s</b></div>\n   </div>\n   <p style=\"font-size:12px;margin-top:14px;color:var(--ink-2);line-height:1.6\">Lower flame temperature for thermal-margin-critical applications \u2014 atmospheric flight, underwater platforms, payload protection.</p>\n  </div>\n\n </div>\n</section>\n\n<!-- 05 \u2014 MISSION PROFILE \u0394V REFERENCE (clickable) -->\n<section style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(59,130,246,.02) 0%,transparent 100%)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Mission Profiles \u00b7 05</div>\n   <h2 class=\"section-title\">Mission profile <em>\u0394V budgets.</em></h2>\n  </div>\n  <p>Standard \u0394V reference values for common mission profiles. <b style=\"color:var(--accent-bright)\">Click any row to load it into the sizing calculator below.</b></p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border-soft)\">\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ LEO MANOEUVRES</div>\n   <div style=\"display:flex;flex-direction:column\">\n    <div class=\"profile-row\" data-profile=\"leo-raise\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Orbit raise 200\u2192800 km</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Single Hohmann transfer</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~340</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-station\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Station-keeping (yr)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Drag compensation, altitude-dependent</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">10\u201350</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-deorbit\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Deorbit (controlled)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Active re-entry from LEO</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">100\u2013150</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-disposal\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Disposal (25-yr rule)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Drag-induced re-entry, EOL</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~10</div>\n     </div>\n    </div>\n   </div>\n   <div style=\"margin-top:20px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">UNITS: M/S</div>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ TRANSFER ORBITS</div>\n   <div style=\"display:flex;flex-direction:column\">\n    <div class=\"profile-row\" data-profile=\"gto-geo\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">GTO \u2192 GEO insertion</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Final circularisation</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~1,500</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-geo\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">LEO \u2192 GEO (Hohmann)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Combined transfer + insertion</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~3,900</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-moon\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">LEO \u2192 Earth-Moon L1</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Lunar gateway insertion</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~3,200</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"leo-mars\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">LEO \u2192 Mars transfer</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Hohmann to Mars-encounter</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:var(--accent-bright)\">~3,800</div>\n     </div>\n    </div>\n   </div>\n   <div style=\"margin-top:20px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">UNITS: M/S</div>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:#10B981;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ GEO + OPERATIONAL</div>\n   <div style=\"display:flex;flex-direction:column\">\n    <div class=\"profile-row\" data-profile=\"geo-station\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">GEO station-keeping (yr)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">N-S inclination + E-W drift</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:#10B981\">~52</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"geo-eol\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">GEO end-of-life</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Graveyard orbit raise (+300 km)</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:#10B981\">~11</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"prox-ops\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Proximity ops (per)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Rendezvous &amp; docking</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:#10B981\">50\u2013200</div>\n     </div>\n    </div>\n    <div class=\"profile-row\" data-profile=\"plane-change\">\n     <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n      <div><div class=\"profile-name\" style=\"font-size:14px;font-weight:600;transition:color .15s\">Plane change (per \u00b0)</div><div style=\"font-size:12px;color:var(--muted);margin-top:2px\">Inclination, LEO @ 7.8 km/s</div></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:18px;font-weight:700;color:#10B981\">~136</div>\n     </div>\n    </div>\n   </div>\n   <div style=\"margin-top:20px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">UNITS: M/S</div>\n  </div>\n\n </div>\n</section>\n\n<!-- 06 \u2014 HOHMANN TRANSFER CALCULATOR (NEW) -->\n<section style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.02) 0%,transparent 100%)\" id=\"hohmann\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Orbit Transfer \u00b7 06</div>\n   <h2 class=\"section-title\">Hohmann <em>transfer calculator.</em></h2>\n  </div>\n  <p>Compute \u0394V between two circular orbits with optional plane change. Two-impulse Hohmann transfer using real Earth gravitational parameter (\u03bc = 398,600.44 km\u00b3/s\u00b2). Load the result directly into the sizing calculator below.</p>\n </div>\n\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);overflow:hidden\">\n  <div style=\"display:grid;grid-template-columns:400px 1fr;min-height:440px\">\n\n   <!-- LEFT: Inputs + SVG visual -->\n   <div style=\"padding:32px;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:18px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ TRANSFER PARAMETERS</div>\n\n    <div>\n     <label class=\"mc-label\">Initial orbit altitude</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"hoh-alt1\" value=\"400\" min=\"0\" step=\"50\" oninput=\"window.renderHohmann && window.renderHohmann()\" />\n      <span class=\"unit\">km</span>\n     </div>\n     <div class=\"mc-help\">Circular orbit, altitude above Earth surface</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Final orbit altitude</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"hoh-alt2\" value=\"35786\" min=\"0\" step=\"100\" oninput=\"window.renderHohmann && window.renderHohmann()\" />\n      <span class=\"unit\">km</span>\n     </div>\n     <div class=\"mc-help\">Target circular orbit (35,786 km = GEO)</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Plane change angle</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"hoh-incl\" value=\"0\" min=\"0\" max=\"180\" step=\"1\" oninput=\"window.renderHohmann && window.renderHohmann()\" />\n      <span class=\"unit\">deg</span>\n     </div>\n     <div class=\"mc-help\">Inclination change, applied at apogee (optimal)</div>\n    </div>\n\n    <!-- SVG orbit diagram -->\n    <div style=\"display:flex;justify-content:center;margin-top:8px\">\n     <svg id=\"hoh-svg\" viewBox=\"-100 -100 200 200\" width=\"240\" height=\"240\" style=\"background:rgba(0,0,0,.25);border:1px solid var(--border-soft)\">\n      <defs>\n       <radialGradient id=\"earth-gradient\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n        <stop offset=\"0%\" stop-color=\"#22D3EE\" stop-opacity=\"0.6\" />\n        <stop offset=\"100%\" stop-color=\"#22D3EE\" stop-opacity=\"0.1\" />\n       </radialGradient>\n      </defs>\n      <!-- Earth -->\n      <circle cx=\"0\" cy=\"0\" r=\"6\" fill=\"url(#earth-gradient)\" />\n      <circle cx=\"0\" cy=\"0\" r=\"6\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"0.5\" />\n      <!-- Inner orbit (initial) -->\n      <circle id=\"hoh-orbit1\" cx=\"0\" cy=\"0\" r=\"18\" fill=\"none\" stroke=\"#22D3EE\" stroke-width=\"1\" stroke-dasharray=\"2,2\" opacity=\"0.7\" />\n      <!-- Outer orbit (final) -->\n      <circle id=\"hoh-orbit2\" cx=\"0\" cy=\"0\" r=\"80\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1\" stroke-dasharray=\"2,2\" opacity=\"0.55\" />\n      <!-- Transfer ellipse -->\n      <ellipse id=\"hoh-transfer\" cx=\"-31\" cy=\"0\" rx=\"49\" ry=\"38\" fill=\"none\" stroke=\"#FFF\" stroke-width=\"1.5\" opacity=\"0.85\" />\n      <!-- Burn points -->\n      <circle id=\"hoh-burn1\" cx=\"18\" cy=\"0\" r=\"2.5\" fill=\"#22D3EE\" stroke=\"#FFF\" stroke-width=\"0.8\" />\n      <circle id=\"hoh-burn2\" cx=\"-80\" cy=\"0\" r=\"2.5\" fill=\"#3B82F6\" stroke=\"#FFF\" stroke-width=\"0.8\" />\n      <!-- Labels -->\n      <text x=\"22\" y=\"-4\" fill=\"#22D3EE\" font-size=\"6\" font-family=\"ui-monospace,monospace\" letter-spacing=\"0.5\">\u0394v\u2081</text>\n      <text x=\"-92\" y=\"-4\" fill=\"#3B82F6\" font-size=\"6\" font-family=\"ui-monospace,monospace\" letter-spacing=\"0.5\">\u0394v\u2082</text>\n     </svg>\n    </div>\n   </div>\n\n   <!-- RIGHT: Outputs -->\n   <div style=\"padding:32px;display:flex;flex-direction:column;gap:18px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ TRANSFER RESULTS</div>\n\n    <!-- Primary: Total \u0394V -->\n    <div class=\"mc-output-card primary\" style=\"text-align:center;padding:22px\">\n     <div class=\"mc-output-label\">Total \u0394V</div>\n     <div class=\"mc-output-value\" style=\"font-size:42px;margin-top:8px\"><span id=\"hoh-total\">\u2014</span></div>\n     <div class=\"mc-output-sub\">\u0394v\u2081 + \u0394v\u2082 + plane change</div>\n    </div>\n\n    <!-- \u0394V breakdown -->\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n     <div class=\"mc-output-card\">\n      <div class=\"mc-output-label\">\u0394v\u2081 (Perigee)</div>\n      <div class=\"mc-output-value med\"><span id=\"hoh-dv1\">\u2014</span></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">DEPART INITIAL</div>\n     </div>\n     <div class=\"mc-output-card\">\n      <div class=\"mc-output-label\">\u0394v\u2082 (Apogee)</div>\n      <div class=\"mc-output-value med\"><span id=\"hoh-dv2\">\u2014</span></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">CIRCULARISE</div>\n     </div>\n     <div class=\"mc-output-card\">\n      <div class=\"mc-output-label\">Plane Change</div>\n      <div class=\"mc-output-value med\"><span id=\"hoh-incl-dv\">\u2014</span></div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em\">AT APOGEE</div>\n     </div>\n    </div>\n\n    <!-- Transfer details -->\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px\">\n     <div class=\"mc-output-card secondary\">\n      <div class=\"mc-output-label\">Transfer Time</div>\n      <div class=\"mc-output-value med\"><span id=\"hoh-time\">\u2014</span></div>\n     </div>\n     <div class=\"mc-output-card secondary\">\n      <div class=\"mc-output-label\">Transfer Semi-major Axis</div>\n      <div class=\"mc-output-value med\"><span id=\"hoh-sma\">\u2014</span></div>\n     </div>\n    </div>\n\n    <!-- Orbital details -->\n    <div style=\"display:flex;gap:24px;padding:14px 16px;background:var(--bg-2);border:1px solid var(--border-soft);flex-wrap:wrap;font-family:ui-monospace,monospace;font-size:11px\">\n     <div><span style=\"color:var(--muted)\">v(initial):</span> <b id=\"hoh-v1\" style=\"color:var(--ink);margin-left:6px\">\u2014</b></div>\n     <div><span style=\"color:var(--muted)\">v(final):</span> <b id=\"hoh-v2\" style=\"color:var(--ink);margin-left:6px\">\u2014</b></div>\n     <div><span style=\"color:var(--muted)\">Period(initial):</span> <b id=\"hoh-p1\" style=\"color:var(--ink);margin-left:6px\">\u2014</b></div>\n     <div><span style=\"color:var(--muted)\">Period(final):</span> <b id=\"hoh-p2\" style=\"color:var(--ink);margin-left:6px\">\u2014</b></div>\n    </div>\n\n    <!-- Load into sizing button -->\n    <button id=\"hoh-load-btn\" onclick=\"window.loadHohmannIntoSizing && window.loadHohmannIntoSizing()\" style=\"margin-top:6px;background:var(--accent);color:#FFF;border:none;padding:14px 24px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:opacity .15s\">Load total \u0394V into sizing calculator \u2193</button>\n\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6;letter-spacing:.04em\">\n     <b style=\"color:var(--accent-bright);text-transform:uppercase;letter-spacing:.14em\">/ NOTES</b><br>\n     Assumes circular initial and final orbits with two-impulse coplanar burns. Plane change cost computed at apogee where orbital velocity is lowest (optimal for combined manoeuvres). For r\u2082/r\u2081 &gt; 11.94, bi-elliptic transfers may be more efficient.\n    </div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- 07 \u2014 ADVANCED SIZING CALCULATOR -->\n<section style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.03) 0%,transparent 100%)\" id=\"calculator\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Advanced Sizing \u00b7 07</div>\n   <h2 class=\"section-title\">Propellant <em>sizing &amp; tank volume.</em></h2>\n  </div>\n  <p>Live propellant-mass calculation using the Tsiolkovsky rocket equation, with operational margin, residuals, pressurisation gas, and LMP-103S tank-volume sizing. Updates as you type.</p>\n </div>\n\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);overflow:hidden\">\n  <div style=\"display:grid;grid-template-columns:420px 1fr;min-height:560px\">\n\n   <div style=\"padding:32px;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:18px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:8px\">/ MISSION INPUTS</div>\n\n    <div>\n     <label class=\"mc-label\">Mission Profile <span style=\"color:var(--accent-bright);font-weight:400\">(quick-select)</span></label>\n     <div class=\"mc-input\">\n      <select id=\"mc-profile\">\n       <option value=\"\">\u2014 Custom (manual inputs) \u2014</option>\n       <optgroup label=\"LEO\">\n        <option value=\"leo-raise\">LEO orbit raise 200\u2192800 km \u00b7 340 m/s</option>\n        <option value=\"leo-station\">LEO station-keeping (yr) \u00b7 30 m/s</option>\n        <option value=\"leo-deorbit\">LEO deorbit (controlled) \u00b7 125 m/s</option>\n        <option value=\"leo-disposal\">LEO disposal (25-yr rule) \u00b7 10 m/s</option>\n       </optgroup>\n       <optgroup label=\"Transfer Orbits\">\n        <option value=\"gto-geo\">GTO \u2192 GEO insertion \u00b7 1,500 m/s</option>\n        <option value=\"leo-geo\">LEO \u2192 GEO (Hohmann) \u00b7 3,900 m/s</option>\n        <option value=\"leo-moon\">LEO \u2192 Earth-Moon L1 \u00b7 3,200 m/s</option>\n        <option value=\"leo-mars\">LEO \u2192 Mars transfer \u00b7 3,800 m/s</option>\n       </optgroup>\n       <optgroup label=\"GEO + Operational\">\n        <option value=\"geo-station\">GEO station-keeping (yr) \u00b7 52 m/s</option>\n        <option value=\"geo-eol\">GEO end-of-life \u00b7 11 m/s</option>\n        <option value=\"prox-ops\">Proximity ops \u00b7 150 m/s</option>\n        <option value=\"plane-change\">Plane change (per \u00b0) \u00b7 136 m/s</option>\n       </optgroup>\n      </select>\n     </div>\n     <div class=\"mc-help\">Loads \u0394V and recommended engine; you can then adjust either</div>\n    </div>\n\n    <div style=\"height:1px;background:var(--border-soft);margin:4px 0\"></div>\n\n    <div>\n     <label class=\"mc-label\">Spacecraft dry mass</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"mc-dry\" value=\"500\" min=\"0\" step=\"10\" />\n      <span class=\"unit\">kg</span>\n     </div>\n     <div class=\"mc-help\">Bus + payload + structure (no propellant)</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Required \u0394V</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"mc-dv\" value=\"500\" min=\"0\" step=\"50\" />\n      <span class=\"unit\">m/s</span>\n     </div>\n     <div class=\"mc-help\">Total impulse across mission</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Engine class</label>\n     <div class=\"mc-input\">\n      <select id=\"mc-engine\">\n       <optgroup label=\"Monopropellant\">\n        <option value=\"100mN\">100 mN \u00b7 ISP 220 s</option>\n        <option value=\"1N\">1 N \u00b7 ISP 225 s</option>\n        <option value=\"5N\">5 N \u00b7 ISP 230 s</option>\n        <option value=\"22N\" selected>22 N \u00b7 ISP 245 s</option>\n        <option value=\"220N\">220 N \u00b7 ISP 250 s</option>\n       </optgroup>\n       <optgroup label=\"Bipropellant\">\n        <option value=\"220Nbi\">220 N \u00b7 ISP 315 s</option>\n        <option value=\"445N\">445 N \u00b7 ISP 325 s</option>\n        <option value=\"890N\">890 N \u00b7 ISP 330 s</option>\n        <option value=\"4kN\">4 kN \u00b7 ISP 335 s</option>\n        <option value=\"26.6kN\">26.6 kN \u00b7 ISP 345 s</option>\n       </optgroup>\n      </select>\n     </div>\n     <div class=\"mc-help\">Biprop trades higher ISP for system complexity</div>\n    </div>\n\n    <div style=\"height:1px;background:var(--border-soft);margin:4px 0\"></div>\n\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ ADVANCED \u2014 Margin &amp; Residuals</div>\n\n    <div>\n     <label class=\"mc-label\">Operational margin</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"mc-margin\" value=\"15\" min=\"0\" max=\"50\" step=\"1\" />\n      <span class=\"unit\">%</span>\n     </div>\n     <div class=\"mc-help\">Standard programme margin: 10\u201325%</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Propellant residuals</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"mc-residuals\" value=\"3\" min=\"0\" max=\"10\" step=\"0.5\" />\n      <span class=\"unit\">%</span>\n     </div>\n     <div class=\"mc-help\">Trapped/unburned propellant: 2\u20135%</div>\n    </div>\n\n    <div>\n     <label class=\"mc-label\">Pressurisation gas</label>\n     <div class=\"mc-input\">\n      <input type=\"number\" id=\"mc-press\" value=\"2\" min=\"0\" max=\"10\" step=\"0.5\" />\n      <span class=\"unit\">%</span>\n     </div>\n     <div class=\"mc-help\">High-pressure gas fraction (regulated systems)</div>\n    </div>\n   </div>\n\n   <div style=\"padding:32px;display:flex;flex-direction:column;gap:18px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ SIZING OUTPUTS</div>\n\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px\">\n     <div class=\"mc-output-card primary\">\n      <div class=\"mc-output-label\">Total Propellant Loaded</div>\n      <div class=\"mc-output-value big\"><span id=\"mc-out-total\">\u2014</span></div>\n      <div class=\"mc-output-sub\">Usable + residuals + margin</div>\n     </div>\n     <div class=\"mc-output-card primary\">\n      <div class=\"mc-output-label\">Wet Mass</div>\n      <div class=\"mc-output-value big
