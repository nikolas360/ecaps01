onospace;font-size:10px;color:var(--accent-bright);margin-top:10px;letter-spacing:.10em\">COMMERCIAL &amp; DEFENSE</div>\n  </div>\n </div>\n</section>\n\n<!-- MISSION CAPABILITIES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Mission Capabilities \u00b7 02</div>\n <h2 class=\"section-title\">Rapid-response<br><em>modular platforms.</em></h2>\n </div>\n <p>Rapid-response modular platforms to execute high-delta-V dual-use operations.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n <div class=\"spec-row\"><dt>High-Energy Maneuvers</dt><dd><b>High-energy maneuvers</b> for orbit raising and tactical mobility</dd></div>\n <div class=\"spec-row\"><dt>Precision Tug</dt><dd><b>Precision tug operations</b> for advanced logistics and refueling missions</dd></div>\n <div class=\"spec-row\"><dt>Upper Stage</dt><dd><b>Upper launch stage mobilization</b> for rapid satellite deployment</dd></div>\n <div class=\"spec-row\"><dt>Tactical</dt><dd><b>Defensive configurability</b> for time-critical, tactical applications</dd></div>\n </dl>\n</section>\n\n<!-- TYR-1 -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Flagship Vehicle</div>\n <h2>ECAPS <em>TYR-1.</em></h2>\n <p class=\"lede\">The world's first HPGP orbital vehicle. Designed to serve dual-use objectives through high-precision, rapid-response, advanced orbital mobility.</p>\n <div class=\"spec-grid\">\n <div class=\"spec\"><b>FIRST</b><span>HPGP OTV worldwide</span></div>\n <div class=\"spec\"><b>450 N</b><span>Thrust class</span></div>\n <div class=\"spec\"><b>ALLIED</b><span>Sovereign origin</span></div>\n <div class=\"spec\"><b>DUAL-USE</b><span>Commercial &amp; Defense</span></div>\n </div>\n <a href=\"https://www.ecaps.se/news/ecaps-announces-tyr-1-a-swedisheuropean-orbital-transfer-vehicle-demonstrator-for-advanced-space-mobility\" target=\"_blank\" class=\"btn-primary\">Read TYR-1 Announcement \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--border);background:var(--bg-2);overflow:hidden;padding:40px\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/628f4231-addf-40eb-beec-a88d3ac28282/TYR-1+Schematic.png\" alt=\"TYR-1 schematic\" style=\"width:100%;height:100%;object-fit:contain;filter:brightness(.95)\" loading=\"lazy\" decoding=\"async\" />\n </div>\n</div>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Talk to ECAPS about <em>TYR-1.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Engage program team \u2192</a><a href=\"#/defense\" class=\"btn-ghost\">Defense Capabilities</a></div>\n</div>","quality":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>FACILITIES &amp; QUALITY</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Facilities &amp; <em>Quality.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">ECAPS holds certifications in both AS9100 Aerospace and Defense, as well as ISO 9001 Quality Management \u2014 showcasing commitment to excellence in aerospace and defense industries.</p>\n <div class=\"hero-coords reveal\">\n <div>AEROSPACE \u2014 <b>AS9100 REV. D</b></div>\n <div>QUALITY \u2014 <b>ISO 9001</b></div>\n <div>SITES \u2014 <b>INTERNATIONAL</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543907192-U1LS7TAZYBL6P4PNXDVM/ECAPS+team.png\" alt=\"ECAPS manufacturing operations\" />\n <div class=\"telemetry\">\n AEROSPACE <b>AS9100 REV. D</b><br>\n QUALITY <b>ISO 9001</b><br>\n STANDARDS <b>ECSS \u00b7 MIL-STD</b>\n </div>\n <div class=\"caption\">QUALIFIED MANUFACTURING \u00b7 AEROSPACE STANDARDS</div>\n</div>\n\n<!-- CERTIFICATIONS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Quality Assurance \u00b7 01</div>\n <h2 class=\"section-title\">Certified to <em>aerospace standards.</em></h2>\n </div>\n <p>ECAPS' operations are certified under ISO standards and the AS9100 Aerospace Management Standard.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr\">\n <div class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 AS9100</div>\n <h3>AS9100 Aerospace Standard</h3>\n <p>AS9100 is the quality management standard specific to the aerospace industry \u2014 it also includes the ISO 9001 standard verbatim. The standard has evolved to AS9100 Rev. D and is recognised by all major Aerospace OEMs.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 ISO 9001</div>\n <h3>ISO 9001 Quality Management</h3>\n <p>ISO 9001 is the internationally recognised standard for Quality Management Systems. The most widely used QMS standard in the world, with over 1.1 million certificates issued across 178 countries.</p>\n </div>\n </div>\n\n <div style=\"text-align:center;margin-top:40px\" class=\"reveal\">\n <a href=\"https://www.ecaps.se/s/22844NQA2025-07-11-ECAPSABISO90012015andAS91002016Certificate.pdf\" target=\"_blank\" class=\"btn-ghost\">Download Certificate \u2193</a>\n </div>\n</section>\n\n<!-- OPERATIONS \u2014 Capabilities across the three sites -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Operations \u00b7 02</div>\n   <h2 class=\"section-title\">Inside the <em>operation.</em></h2>\n  </div>\n  <p>Three operational pillars span ECAPS facilities \u2014 cleanroom assembly, propellant chemistry, and hot-fire qualification. Each is run to the same AS9100 / ISO 9001 framework that underpins every customer delivery.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(3,1fr)\">\n  <div class=\"facility-card\">\n   <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/b111c2b7-d66c-4c69-a58c-49faafda5e71/MPC2_faceA.png\" alt=\"Propulsion module assembly\" loading=\"lazy\" style=\"object-fit:contain;background:#0a1018;padding:18px\" /></div>\n   <div class=\"fc-body\">\n    <div class=\"fc-tag\">ASSEMBLY \u00b7 INTEGRATION \u00b7 TEST</div>\n    <h4>Clean Rooms &amp; AIT</h4>\n    <p>Controlled-environment assembly of propulsion modules and engine systems. ISO-classified cleanrooms house component-level integration through full propulsion-module final acceptance test \u2014 particulate control, contamination monitoring, and tractable build records throughout.</p>\n    <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Modules \u00b7 50 kg \u2192 500+ kg platforms</div>\n   </div>\n  </div>\n\n  <div class=\"facility-card\">\n   <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg\" alt=\"Chemical laboratory\" loading=\"lazy\" /></div>\n   <div class=\"fc-body\">\n    <div class=\"fc-tag\">PROPELLANT \u00b7 CHARACTERIZATION \u00b7 QC</div>\n    <h4>Chemical Laboratories</h4>\n    <p>LMP-103S propellant characterization, batch quality control, and custom-blend development. Labs handle raw-material analysis, in-process verification of propellant batches, and material-compatibility studies that support bespoke Research &amp; Engineering engagements (P3).</p>\n    <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Four LMP-103S blends \u00b7 custom development</div>\n   </div>\n  </div>\n\n  <div class=\"facility-card\">\n   <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg\" alt=\"Hot fire engine test\" loading=\"lazy\" /></div>\n   <div class=\"fc-body\">\n    <div class=\"fc-tag\">QUALIFICATION \u00b7 ACCEPTANCE FIRING</div>\n    <h4>Hot Firing Test Facility</h4>\n    <p>Vacuum and ambient test stands for monopropellant and bipropellant engines across the qualified portfolio. Operated in partnership with the Swedish Defense Research Agency (FOI) at the Grindsj\u00f6n Space Test Centre \u2014 supporting development, qualification, and customer acceptance firings under flight-representative conditions.</p>\n    <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">100 mN \u2192 26.6 kN \u00b7 mono &amp; biprop</div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- LOCATIONS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Locations \u00b7 03</div>\n <h2 class=\"section-title\">Three sites.<br>One <em>integrated operation.</em></h2>\n </div>\n <p>Production, R&amp;D, testing, and propellant manufacturing across Sweden.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <div class=\"facility-card\">\n <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/ba940a6e-df2a-4d39-a9cb-0230a1d52136/Screenshot+2025-12-04+at+11.17.58%E2%80%AFAM.png\" alt=\" \" /></div>\n <div class=\"fc-body\">\n <div class=\"fc-tag\">HQ \u00b7 R&amp;D \u00b7 CLEAN ROOMS</div>\n <h4> </h4>\n <p>ECAPS is headquartered in, where we operate facilities for production, research and development and testing, as well as advanced laboratories and clean rooms. Here, our multidisciplinary teams collaborate to design, prototype, and validate next-program propulsion systems.</p>\n </div>\n </div>\n <div class=\"facility-card\">\n <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/3e23f44f-7533-4590-8943-b871fd2bf35e/Screenshot+2025-12-04+at+11.23.13%E2%80%AFAM.png\" alt=\"Grindsj\u00f6n\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"fc-body\">\n <div class=\"fc-tag\">SPACE TEST CENTRE \u00b7 FOI</div>\n <h4>Grindsj\u00f6n</h4>\n <p>Located at the Defense Research Agency (FOI), our Space Test Centre in Grindsj\u00f6n is dedicated to rigorous testing and validation of our propulsion systems. Equipped with advanced testing facilities and operated by experienced engineers, this center ensures the reliability and performance of our products in simulated space environments.</p>\n </div>\n </div>\n <div class=\"facility-card\">\n <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/ed71f5e4-8ae3-4d9d-8044-4df9b0c7f493/Screenshot+2025-12-04+at+11.24.12%E2%80%AFAM.png\" alt=\"\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"fc-body\">\n <div class=\"fc-tag\">PROPELLANT PRODUCTION \u00b7 EURENCO BOFORS</div>\n <h4></h4>\n <p>In collaboration with EURENCO Bofors, our facility specializes in propellant production, leveraging our expertise to manufacture environmentally friendly propellants. With a focus on sustainability and precision, we uphold the highest quality standards in propellant production.</p>\n </div>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Visit ECAPS <em>operations.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Arrange a visit \u2192</a><a href=\"#/about\" class=\"btn-ghost\">About ECAPS</a></div>\n</div>","rd-engineering-services":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <span><b>R&amp;D &amp; ENGINEERING</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Research &amp; <em>Engineering.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Catered services to support mission requirements. ECAPS's dedicated team of engineers and scientists pushes the boundaries of propulsion technology through rigorous research, continuous development, and engineering excellence.</p>\n <div class=\"hero-coords reveal\">\n <div>SCOPE \u2014 <b>R&amp;D \u00b7 ENGINEERING</b></div>\n <div>FACILITIES \u2014 <b>PRODUCTION</b></div>\n <div>PARTNERS \u2014 <b>ESA \u00b7 NASA \u00b7 DLR</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543898064-Q1HMEK6D4B2K6SGJNFYL/ECAPS+AC11\" alt=\"ECAPS engineering team\" />\n <div class=\"telemetry\">\n DOMAIN <b>HPGP</b><br>\n SCOPE <b>FULL STACK</b><br>\n PARTNERS <b>GLOBAL</b>\n </div>\n <div class=\"caption\">DRIVING TECHNOLOGICAL GROWTH</div>\n</div>\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Overview \u00b7 01</div>\n <h2 class=\"section-title\">Driving <em>technological growth.</em></h2>\n </div>\n <p>Supporting the fulfillment of mission demands through HPGP innovation \u2014 systematic support around the research, development and production of HPGP innovations.</p>\n </div>\n</section>\n\n<!-- SERVICES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">R&amp;D Services \u00b7 02</div>\n <h2 class=\"section-title\">Six <em>engineering disciplines.</em></h2>\n </div>\n <p>Systematic support across thruster development, propellant formulation, custom systems, simulation, and collaborative research.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <div class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 THRUSTERS</div>\n <h3>Thruster Development</h3>\n <p>ECAPS specializes in the research and development of advanced thruster technologies tailored to meet mission-specific needs. From small thrusters to large satellite propulsion systems, we design and manufacture solutions that deliver optimal performance and efficiency.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 PROPELLANTS</div>\n <h3>Propellant Formulation</h3>\n <p>We are dedicated to optimizing propellant formulations for maximum performance, reliability, and environmental sustainability. Through extensive testing and analysis, we refine propellant compositions to enhance combustion characteristics, reduce toxicity, and minimize environmental impact.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 03 \u2014 CUSTOM</div>\n <h3>Custom Propulsion Solutions</h3>\n <p>ECAPS offers custom propulsion solutions tailored to the unique requirements of each client and mission. We develop specialized thrusters and propulsion systems for specific spacecraft configurations.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 04 \u2014 SIMULATION</div>\n <h3>Simulation &amp; Modeling</h3>\n <p>Using advanced simulation and modeling tools, we conduct in-depth analysis and prediction of thruster performance, propellant behavior, and system dynamics. By simulating various operating conditions, we optimize designs, assess risks, and ensure reliability.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 05 \u2014 COLLABORATIVE</div>\n <h3>Collaborative Research</h3>\n <p>ECAPS actively collaborates with leading space agencies, academic institutions, and industry partners to drive innovation and technological advancement in space propulsion \u2014 supporting next-program propulsion technologies.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 06 \u2014 INTEGRATION</div>\n <h3>Integration &amp; Training</h3>\n <p>Full integration support, training programs, and knowledge transfer workshops for partners deploying HPGP technologies in their platforms.</p>\n </div>\n </div>\n</section>\n\n<!-- FACILITIES PREVIEW -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Where We Work \u00b7 03</div>\n <h2 class=\"section-title\"> &amp; <em>Grindsj\u00f6n.</em></h2>\n </div>\n <p>R&amp;D and engineering services conducted across ECAPS facilities and the Defence Research Agency (FOI) Space Test Centre.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr\">\n <div class=\"facility-card\">\n <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/c2d60265-f243-4089-9aec-829b49d31647/.jpeg\" alt=\" campus\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"fc-body\">\n <div class=\"fc-tag\">HQ &amp; R&amp;D</div>\n <h4> </h4>\n <p>Production, research and development, testing, advanced laboratories and clean rooms. Multidisciplinary teams design, prototype, and validate next-program propulsion systems.</p>\n </div>\n </div>\n <div class=\"facility-card\">\n <div class=\"fc-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/6da7f162-652d-4192-8274-34ce67b5d3bb/Grindsjon.png\" alt=\"Grindsj\u00f6n test centre\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"fc-body\">\n <div class=\"fc-tag\">SPACE TEST CENTRE</div>\n <h4>Grindsj\u00f6n (FOI)</h4>\n <p>Located at the Defense Research Agency (FOI). Dedicated to rigorous testing and validation of propulsion systems in simulated space environments.</p>\n </div>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Engage <em>ECAPS engineering.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Talk to engineering \u2192</a><a href=\"#/quality\" class=\"btn-ghost\">View Facilities</a></div>\n</div>","space-capabilities":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <span><b>SPACE CAPABILITIES</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>15+ YEARS \u00b7 <b>200+ ORBIT-YEARS</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Mobility for <em>space platforms.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">End-to-end propulsion for satellite deployment and operations across mission domains \u2014 from CubeSats and Earth-observation constellations to GEO communications and special operations. Operational since 2010 with 40+ spacecraft powered.</p>\n  <div class=\"hero-coords reveal\">\n   <div>SPECTRUM \u2014 <b>CUBESAT \u2192 GEO+</b></div>\n   <div>REGIMES \u2014 <b>LEO \u00b7 MEO \u00b7 GEO \u00b7 CISLUNAR</b></div>\n   <div>HERITAGE \u2014 <b>40+ SPACECRAFT</b></div>\n  </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765885268459-M3O1J4UZB95KUU4917CR/unsplash-image--p-KCm6xB9I.jpg?format=2500w\" alt=\"Spacecraft in orbit\" />\n <div class=\"telemetry\">\n PLATFORMS <b>4 TIERS</b><br>\n MISSIONS <b>7 CATEGORIES</b><br>\n REGIMES <b>LEO \u2192 CISLUNAR</b>\n </div>\n <div class=\"caption\">SPACE PROPULSION \u00b7 CUBESATS TO GEO \u00b7 OPERATIONAL SINCE 2010</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     01 \u2014 SPECTRUM OF SOLUTIONS  (mirrors brochure p.8)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Spectrum of Solutions \u00b7 01</div>\n   <h2 class=\"section-title\">From Earth observation to <em>tactical response.</em></h2>\n  </div>\n  <p>End-to-end propulsion solutions enabling satellite deployment and operations across four platform tiers.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr)\">\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 01 \u2014 CUBESATS</div>\n   <div class=\"spectrum-illust\">\n    <svg viewBox=\"0 0 400 140\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid slice\">\n     <!-- Earth limb at bottom -->\n     <path d=\"M -50 145 Q 200 108 450 145 L 450 165 L -50 165 Z\" fill=\"rgba(96,165,250,.16)\"/>\n     <path d=\"M -50 132 Q 200 100 450 132\" stroke=\"rgba(96,165,250,.32)\" stroke-width=\"1\" fill=\"none\"/>\n     <!-- Orbital arc -->\n     <path d=\"M 50 95 Q 200 55 350 95\" stroke=\"rgba(34,211,238,.18)\" stroke-width=\"1\" fill=\"none\" stroke-dasharray=\"3 5\"/>\n     <!-- 3U CubeSat -->\n     <g transform=\"translate(200 65)\">\n      <!-- Solar panel left -->\n      <rect x=\"-32\" y=\"-18\" width=\"22\" height=\"40\" fill=\"rgba(34,211,238,.4)\" stroke=\"#22D3EE\" stroke-width=\"1\"/>\n      <line x1=\"-21\" y1=\"-18\" x2=\"-21\" y2=\"22\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <line x1=\"-32\" y1=\"-5\" x2=\"-10\" y2=\"-5\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <line x1=\"-32\" y1=\"9\" x2=\"-10\" y2=\"9\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <!-- 3U body -->\n      <rect x=\"-10\" y=\"-22\" width=\"20\" height=\"48\" fill=\"#1e3a5f\" stroke=\"#22D3EE\" stroke-width=\"1.5\"/>\n      <line x1=\"-10\" y1=\"-6\" x2=\"10\" y2=\"-6\" stroke=\"rgba(34,211,238,.45)\" stroke-width=\".5\"/>\n      <line x1=\"-10\" y1=\"10\" x2=\"10\" y2=\"10\" stroke=\"rgba(34,211,238,.45)\" stroke-width=\".5\"/>\n      <!-- Sensor lens -->\n      <circle cx=\"0\" cy=\"-14\" r=\"3.5\" fill=\"#22D3EE\" opacity=\".85\"/>\n      <!-- Solar panel right -->\n      <rect x=\"10\" y=\"-18\" width=\"22\" height=\"40\" fill=\"rgba(34,211,238,.4)\" stroke=\"#22D3EE\" stroke-width=\"1\"/>\n      <line x1=\"21\" y1=\"-18\" x2=\"21\" y2=\"22\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <line x1=\"10\" y1=\"-5\" x2=\"32\" y2=\"-5\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <line x1=\"10\" y1=\"9\" x2=\"32\" y2=\"9\" stroke=\"rgba(15,23,42,.6)\" stroke-width=\".5\"/>\n      <!-- Antenna -->\n      <line x1=\"0\" y1=\"-22\" x2=\"0\" y2=\"-34\" stroke=\"#22D3EE\" stroke-width=\"1\"/>\n      <circle cx=\"0\" cy=\"-34\" r=\"2\" fill=\"#22D3EE\"/>\n     </g>\n     <!-- Annotations -->\n     <text x=\"18\" y=\"22\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"rgba(96,165,250,.7)\" letter-spacing=\".14em\" font-weight=\"600\">3U CUBESAT</text>\n     <text x=\"382\" y=\"22\" font-family=\"ui-monospace,monospace\" font-size=\"9\" fill=\"rgba(96,165,250,.5)\" letter-spacing=\".1em\" text-anchor=\"end\">8\u201324 KG \u00b7 LEO</text>\n    </svg>\n   </div>\n   <h3 style=\"font-size:22px\">CubeSats &amp; Microsats</h3>\n   <p style=\"font-size:13px;line-height:1.5\">8\u201324 kg platforms. Compact propulsion within the qualified monopropellant envelope.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;line-height:1.8\">\n    <div style=\"color:var(--accent-bright);font-weight:600;letter-spacing:.14em;font-size:10px;margin-bottom:6px\">USE CASES</div>\n    \u00b7 Telecommunications<br>\n    \u00b7 Weather monitoring\n   </div>\n  </div>\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 02 \u2014 SMALL/MID SATS</div>\n   <div class=\"spectrum-illust\">\n    <svg viewBox=\"0 50\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Systems \u00b7 03</div>\n   <h2 class=\"section-title\">Integrated <em>propulsion systems.</em></h2>\n  </div>\n  <p>Full propulsion systems engineered around the spacecraft, not the thruster. Whether you need a plug-in module for a small/medium platform or a dedicated orbital vehicle, ECAPS delivers integrated mobility.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr\">\n\n  <a href=\"#/propulsion-modules\" class=\"cap\" style=\"min-height:auto;padding:0;overflow:hidden\">\n   <div style=\"aspect-ratio:16/10;background:linear-gradient(135deg,#0f1419 0%,#06080B 70%);border-bottom:1px solid var(--border);position:relative;overflow:hidden\">\n    <svg viewBox=\"0 0 480 300\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\" style=\"width:100%;height:100%;display:block\">\n     <defs>\n      <radialGradient id=\"pm-glow\" cx=\"50%\" cy=\"50%\"><stop offset=\"0%\" stop-color=\"rgba(34,211,238,.05)\"/><stop offset=\"100%\" stop-color=\"rgba(34,211,238,0)\"/></radialGradient>\n     </defs>\n     <rect width=\"480\" height=\"300\" fill=\"url(#pm-glow)\"/>\n     <!-- Propulsion Module schematic -->\n     <g transform=\"translate(240 155)\" stroke=\"#22D3EE\" fill=\"none\" stroke-width=\"1.2\">\n      <!-- Top mounting frame -->\n      <rect x=\"-75\" y=\"-95\" width=\"10\" height=\"14\" fill=\"rgba(34,211,238,.15)\"/>\n      <rect x=\"65\" y=\"-95\" width=\"10\" height=\"14\" fill=\"rgba(34,211,238,.15)\"/>\n      <line x1=\"-70\" y1=\"-88\" x2=\"70\" y2=\"-88\" stroke-width=\"1.5\"/>\n      <!-- Pressure tank (octagonal vessel) -->\n      <polygon points=\"-50,-80 50,-80 65,-50 65,30 50,55 -50,55 -65,30 -65,-50\" fill=\"rgba(15,2 p:10px\">Orbital Transfer Vehicles</h3>\n    <p style=\"margin-top:12px\">ECAPS-developed TYR-1 OTV programme. Last-mile orbital delivery, multi-orbit deployment, and rendezvous operations. Demonstrator scheduled 2027.</p>\n    <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Explore TYR-1 \u2192</span>\n   </div>\n  </a>\n\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     04 \u2014 ENGINES & COMPONENTS (renumbered from 05)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Engines &amp; Components \u00b7 04</div>\n   <h2 class=\"section-title\">The thrust <em>portfolio.</em></h2>\n  </div>\n  <p>The qualified thruster classes that power the systems above. Available individually for primes integrating their own propulsion architecture, or bundled inside ECAPS modules and orbital vehicles.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr\">\n\n  <a href=\"#/monopropellant-thrusters\" class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ E1 \u2014 MONOPROPELLANT</div>\n   <h3 style=\"font-size:26px;margin-top:8px\">Monopropellant Engines</h3>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">100mN \ function renderTopbar(activeKey){
  const navItems = Object.entries(NAV).map(([key, data]) => { const isActive = key === activeKey ? ' active' : ''; return `<div class="nav-item" data-key="${key}"><button class="${isActive}" aria-expanded="false">${data.label}</button></div>`; }).join('');
  const megaPanels = Object.entries(NAV).map(([key, data]) => {
    const overviewLink = data.overview ? `<a href="#/${data.overview.href}" class="cap-link" style="margin-top:18px;">${data.overview.label}</a>` : '';
    const colsHtml = data.cols.map(col => `<div class="mega-col"><h5>${col.heading}</h5>${col.links.map(l => `<a href="#/${l.href}"><b>${l.title}</b><span>${l.desc}</span></a>`).join('')}</div>`).join('');
    return `<div class="mega-panel" data-panel="${key}"><div class="mega-inner"><div><div class="mega-tag">${data.label} · directory</div><h3 class="mega-title">${data.title} <em>${data.titleEm}</em></h3><p class="mega-desc">${data.desc}</p>${overviewLink}</div><div class="mega-cols">${colsHtml}</div></div></div>`;
  }).join('');
  const mobileNav = Object.entries(NAV).map(([key, data]) => `<div class="mob-section"><h5>${data.label}</h5>${data.overview ? `<a href="#/${data.overview.href}">${data.overview.label.replace(' ↗','')}</a>` : ''}${data.cols.map(col => col.links.map(l => `<a href="#/${l.href}">${l.title}</a>`).join('')).join('')}</div>`).join('') + `<div class="mob-section"><a href="#/contact-us">Contact us</a></div>`;
  const topbar = document.getElementById('topbar-mount'); if (!topbar) return;
  topbar.outerHTML = `<header class="topbar"><div class="topbar-inner"><a href="#/index" class="brand"><span class="brand-mark"></span>ECAPS</a><nav class="primary">${navItems}</nav><button class="menu-toggle" aria-label="Open menu">☰</button><a href="#/contact-us" class="cta">Contact</a></div></header>${megaPanels}<div class="mobile-nav">${mobileNav}</div>`;
  const items = document.querySelectorAll('nav.primary .nav-item'); const panels = document.querySelectorAll('.mega-panel');
  function closeAll(){ items.forEach(i => i.classList.remove('open')); panels.forEach(p => p.classList.remove('open')); }
  items.forEach(item => { const key = item.dataset.key; const panel = document.querySelector(`.mega-panel[data-panel="${key}"]`); const btn = item.querySelector('button');
    item.addEventListener('mouseenter', () => { closeAll(); item.classList.add('open'); panel.classList.add('open'); });
    btn.addEventListener('click', (e) => { e.stopPropagation(); const isOpen = item.classList.contains('open'); closeAll(); if (!isOpen) { item.classList.add('open'); panel.classList.add('open'); } }); });
  document.querySelector('.topbar').addEventListener('mouseleave', () => { setTimeout(() => { const anyPanelHovered = Array.from(panels).some(p => p.matches(':hover')); if (!anyPanelHovered) closeAll(); }, 50); });
  panels.forEach(p => p.addEventListener('mouseleave', () => closeAll()));
  document.addEventListener('click', (e) => { if (!e.target.closest('.topbar') && !e.target.closest('.mega-panel')) closeAll(); });
  const toggle = document.querySelector('.menu-toggle'); const mobNav = document.querySelector('.mobile-nav');
  toggle.addEventListener('click', () => { mobNav.classList.toggle('open'); toggle.textContent = mobNav.classList.contains('open') ? '✕' : '☰'; });
  mobNav.addEventListener('click', (e) => { if (e.target.tagName === 'A') { mobNav.classList.remove('open'); toggle.textContent = '☰'; } });
}

function route() {
  const hashParts = location.hash.replace(/^#\//, '').split('/');
  const pageKey = (hashParts[0] && PAGES[hashParts[0]]) ? hashParts[0] : 'index';
  const anchor = hashParts[1] || null;
  const root = document.getElementById('page-root') || document.querySelector('main');
  const samePage = root && root.dataset.currentPage === pageKey;
  if (root && !samePage) { root.innerHTML = PAGES[pageKey]; root.dataset.currentPage = pageKey; }
  const oldTopbar = document.querySelector('.topbar');
  const oldPanels = document.querySelectorAll('.mega-panel');
  const oldMobile = document.querySelector('.mobile-nav');
  if (oldTopbar) { const placeholder = document.createElement('div'); placeholder.id = 'topbar-mount'; oldTopbar.parentNode.insertBefore(placeholder, oldTopbar); oldTopbar.remove(); oldPanels.forEach(p => p.remove()); if (oldMobile) oldMobile.remove(); renderTopbar(getActiveSection(pageKey)); }
  if (!samePage) document.querySelectorAll('#page-root .reveal').forEach(el => el.classList.remove('in'));
  setTimeout(() => {
    if (!samePage) {
      const io = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }); }, { threshold: 0.12 });
      document.querySelectorAll('#page-root .reveal').forEach(el => io.observe(el));
      if (typeof window.initSchematics === 'function') { document.querySelectorAll('[data-schem]').forEach(el => { delete el.dataset.inited; }); window.initSchematics(document.getElementById('page-root')); }
      if (typeof window.initTelemetry === 'function') window.initTelemetry();
      if (typeof window.initAudienceTabs === 'function') window.initAudienceTabs();
      if (typeof window.initMissionCalc === 'function') window.initMissionCalc();
    }
    if (anchor) { const target = document.getElementById(anchor); if (target) target.scrollIntoView({behavior:'smooth', block:'start'}); }
  }, 50);
  if (!anchor && !samePage) window.scrollTo({ top: 0, behavior: 'instant' });

        <text class="label-text" x="60" y="560" id="class-fn">${THRUSTER_DATA[current].fn}</text>

        <!-- Dimension callouts -->

  // Part hover → callout

      callout.classList.add('show');
    });
    part.addEventListener('mouseleave', () => callout.classList.remove('show'));

  // Class selector
  tabs.forEach(tab => {

      root.querySelector('#class-fn').textContent = d.fn;

  });

  fireBtn.addEventListener('click', () => {
    firing = !firing;

      flowPaths.style.opacity = '.4';
      chamberGlow.classList.remove('firing-chamber');
      plume.style.display = 'none';
    }
  });
};

    const isp = ispPeak - Math.abs(ofr - peak) * 8;

    const temp = tempPeak - Math.abs(ofr - peak) * 60;
    root.querySelector('#bp-temp').textContent = Math.round(temp) + ' K';

      oxLine.classList.remove('flow-active');
      chamberGlow.classList.remove('firing-chamber');
      plume.style.display = 'none';
    }
  });
};

            <rect id="aux-catbed" class="heat-fill" x="280" y="260" width="160" height="80" rx="3"/>

              <circle cx="370" cy="312" r="3"/><circle cx="395" cy="325" r="3"/><circle cx="415" cy="315" r="3"/>
            </g>
            <path class="heat" d="M 280 250 Q 290 240 300 250 T 320 250 T 340 250 T 360 250 T 380 250 T 400 250 T 420 250 T 440 250" stroke-width=".8" opacity=".7"/>

        <button class="schem-action" data-fire>▶ Start</button>
      </div>
    `;
    wireUp();
  }

  function wireUp(){
    const stage = root.querySelector('.schem-stage');
    const callout = root.querySelector('.schem-callout');
    root.querySelectorAll('.part').forEach(part => {
      part.addEventListener('mouseenter', () => {
        const bb = part.getBoundingClientRect();
        const stageBB = stage.getBoundingClientRect();
        callout.innerHTML = `<b>${part.dataset.label}</b><span>${part.dataset.desc}</span>`;
        callout.style.left = (bb.left + bb.width/2 - stageBB.left) + 'px';
        callout.style.top = (bb.top - stageBB.top) + 'px';
        callout.classList.add('show');
      });
      part.addEventListener('mouseleave', () => callout.classList.remove('show'));
    });
    root.querySelectorAll('.schem-tab').forEach(tab => {
      tab.addEventListener('click', () => { current = tab.dataset.mode; render(); });
    });
    const fireBtn = root.querySelector('[data-fire]');
    fireBtn.addEventListener('click', () => {
      running = !running;
      const pipes = root.querySelectorAll('#pipe-1, #pipe-2, #pipe-3');
      const catbed = root.querySelector('#aux-catbed');
      const blades = root.querySelector('#turbine-blades');
      const tempEl = root.querySelector('#aux-temp');
      const powerEl = root.querySelector('#aux-power-num');
      if (running) {
        fireBtn.classList.add('firing');
        fireBtn.textContent = '■ Stop';
        pipes.forEach(p => p.classList.add('flow-active'));
        catbed.classList.add('firing-chamber');
        blades.style.animation = 'spin 0.4s linear infinite';
        const targetPow = MODES[current].power.split('-')[1] || MODES[current].power.split(' ')[0];
        tempEl.textContent = MODES[current].temp;
        powerEl.textContent = MODES[current].power.split(' ')[0].split('-')[1] || MODES[current].power.split(' ')[0];
        powerEl.textContent += ' kW';
      } else {
        fireBtn.classList.remove('firing');
        fireBtn.textContent = '▶ Start';
        pipes.forEach(p => p.classList.remove('flow-active'));
        catbed.classList.remove('firing-chamber');
        blades.style.animation = '';
        tempEl.textContent = '25°C';
        powerEl.textContent = '0 kW';
      }
    });
  }

  // Add CSS keyframe for spin
  if (!document.querySelector('#schem-spin-anim')) {
    const style = document.createElement('style');
    style.id = 'schem-spin-anim';
    style.textContent = '@keyframes spin{from{transform:translate(620px,300px) rotate(0)}to{transform:translate(620px,300px) rotate(360deg)}}';
    document.head.appendChild(style);
  }

  render();
};

SCHEMATICS.propellant = function(root){
  const COMPONENTS = {

  // Distinct shades for layered composition (all blues)

  const BLENDS = {

      di: '+30%',
      isp_vs: '+6%',
      density_vs: '+24%',

      products: ['N₂', 'H₂O', 'CO₂', 'CO', 'H₂'],
      note: 'Adiabatic combustion through catalyst bed'
    },
    'apu': {
      label: 'LMP-103S · 1100°C Blend',
      use: 'APU · EPU · GGA',
      temp: 1100, tempK: 1373,
      isp: 'Power-tuned',
      density: '1.24 g/cm³',

    }

  let current = 'standard';
  let running = false;

  function tempColor(temp){
    // Map temperature 800-2000°C to a brightness scale 0.2 - 1.0
    const t = Math.max(0, Math.min(1, (temp - 800) / 1200));
    return t;
  }

  function tempPosition(temp){
    // Position on a 200-900 px scale (range 800°C to 2000°C)
    return 200 + ((temp - 800) / 1200) * 700;

  function render(){

    // Build layers — proportional heights inside a 320px-tall tank (y: 60→380)
    const TANK_TOP = 60, TANK_BOT = 380, TANK_H = TANK_BOT - TANK_TOP;
    let yCursor = TANK_TOP;
    const layers = blend.components.map(name => {
      const c = COMPONENTS[name];
      const h = (c.pct / 100) * TANK_H;
      const layer = { name, ...c, y: yCursor, h };
      yCursor += h;
      return layer;

    const blendTempIntensity = tempColor(blend.temp);

    root.innerHTML = `

    const stage = root.querySelector('.schem-stage');

        const stageBB = stage.getBoundingClientRect();
        callout.innerHTML = `<b>${part.dataset.label}</b><span>${part.dataset.desc}</span>`;
        callout.style.left = (bb.left + bb.width/2 - stageBB.left) + 'px';
        callout.style.top = (bb.top - stageBB.top) + 'px';
        callout.classList.add('show');
      });
      part.addEventListener('mouseleave', () => callout.classList.remove('show'));
    });
    root.querySelectorAll('.schem-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        current = tab.dataset.blend;
        running = false;
        render();

    });
    const fireBtn = root.querySelector('[data-fire]');
    fireBtn.addEventListener('click', () => {
      running = !running;
      const pipes = root.querySelectorAll('#lp-pipe-in, #lp-pipe-out');

        fireBtn.classList.add('firing');

        catbed.classList.add('firing-chamber');
      } else {
        fireBtn.classList.remove('firing');
        fireBtn.textContent = '▶ Decompose';
        pipes.forEach(p => p.classList.remove('flow-active'));
        catbed.classList.remove('firing-chamber');
      }
    });
  }

  render();
};

<script>/* ============================================================
   ECAPS hero telemetry — drives the HUD numbers in sync with
   the SVG satellite animation. 20-second mission cycle.
   ============================================================ */
(function(){
  const CYCLE_MS = 20000;
  const ALT_HIGH = 482;   // km — cruise altitude
  const ALT_LOW  = 312;   // km — observation altitude
  const FUEL_START = 87.4;
  const FUEL_PER_BURN = 0.6; // % consumed per delta-V burn
  const FUEL_PER_ATTITUDE = 0.1; // % per station-keeping pass

  function init(){
    const el = {
      phase:    document.getElementById('tlm-phase'),
      engine:   document.getElementById('tlm-engine'),
      altitude: document.getElementById('tlm-altitude'),
      dv:       document.getElementById('tlm-dv'),
      fuel:     document.getElementById('tlm-fuel'),
      mode:     document.getElementById('tlm-mode'),
    };
    if (!el.phase) return; // not on this page

    let fuel = FUEL_START;
    let dvTotal = 0;
    let lastCycle = -1;
    const startTime = performance.now();

    function tick(){
      const elapsed = performance.now() - startTime;
      const cycleNum = Math.floor(elapsed / CYCLE_MS);
      const t = (elapsed % CYCLE_MS) / CYCLE_MS; // 0..1

      // Cycle boundary — consume fuel for the cycle that just finished
      if (cycleNum !== lastCycle){
        if (lastCycle >= 0){
          // each cycle: 2 main burns + station-keeping
          fuel = Math.max(50, fuel - (FUEL_PER_BURN * 2 + FUEL_PER_ATTITUDE));
          dvTotal += 86; // m/s per cycle (descent + ascent burns)
        }
        lastCycle = cycleNum;
      }

      let phase, engine, altitude, mode, valueClass;

      // Mission phases — matched to SVG animation keyTimes
      if (t < 0.18){
        phase = 'CRUISING';
        engine = '— STANDBY';
        altitude = ALT_HIGH;
        mode = 'LIVE';
        valueClass = '';
      } else if (t < 0.40){
        // Δ-V burn 1: descent. linearly drop altitude from HIGH to LOW
        phase = 'Δ-V BURN';
        engine = '22N HPGP';
        const local = (t - 0.18) / (0.40 - 0.18);
        altitude = Math.round(ALT_HIGH - (ALT_HIGH - ALT_LOW) * local);
        mode = 'BURN';
        valueClass = 'burn';
      } else if (t < 0.45){
        phase = 'STATION-KEEP';
        engine = '1N HPGP';
        altitude = ALT_LOW;
        mode = 'OBS';
        valueClass = 'observe';
      } else if (t < 0.55){
        phase = 'OBSERVING';
        engine = '1N HPGP';
        altitude = ALT_LOW;
        mode = 'IMAGING';
        valueClass = 'observe';
      } else if (t < 0.60){
        phase = 'STATION-KEEP';
        engine = '1N HPGP';
        altitude = ALT_LOW;
        mode = 'OBS';
        valueClass = 'observe';
      } else if (t < 0.78){
        // Δ-V burn 2: ascent back up
        phase = 'Δ-V BURN';
        engine = '22N HPGP';
        const local = (t - 0.60) / (0.78 - 0.60);
        altitude = Math.round(ALT_LOW + (ALT_HIGH - ALT_LOW) * local);
        mode = 'BURN';
        valueClass = 'burn';
      } else {
        phase = 'CRUISING';
        engine = '— STANDBY';
        altitude = ALT_HIGH;
        mode = 'LIVE';
        valueClass = '';
      }

      // Live Δ-V counter that increments smoothly during burns
      let dvDisplay = dvTotal;
      if (t > 0.18 && t < 0.40){
        const local = (t - 0.18) / (0.40 - 0.18);
        dvDisplay = dvTotal + 43 * local;
      } else if (t >= 0.40 && t < 0.60){
        dvDisplay = dvTotal + 43;
      } else if (t >= 0.60 && t < 0.78){
        const local = (t - 0.60) / (0.78 - 0.60);
        dvDisplay = dvTotal + 43 + 43 * local;
      } else if (t >= 0.78){
        dvDisplay = dvTotal + 86;
      }

      // Live fuel decrement during burns
      let fuelDisplay = fuel;
      if (t > 0.18 && t < 0.40){
        const local = (t - 0.18) / (0.40 - 0.18);
        fuelDisplay = fuel - FUEL_PER_BURN * local;
      } else if (t >= 0.40 && t < 0.60){
        fuelDisplay = fuel - FUEL_PER_BURN - FUEL_PER_ATTITUDE * ((t - 0.45) / 0.10);
      } else if (t >= 0.60 && t < 0.78){
        const local = (t - 0.60) / (0.78 - 0.60);
        fuelDisplay = fuel - FUEL_PER_BURN - FUEL_PER_ATTITUDE - FUEL_PER_BURN * local;
      } else if (t >= 0.78){
        fuelDisplay = fuel - FUEL_PER_BURN * 2 - FUEL_PER_ATTITUDE;
      }
      fuelDisplay = Math.max(50, fuelDisplay);

      // Update DOM
      el.phase.textContent = phase;
      el.engine.textContent = engine;
      el.altitude.textContent = altitude + ' KM';
      el.dv.textContent = dvDisplay.toFixed(1) + ' M/S';
      el.fuel.textContent = fuelDisplay.toFixed(1) + '%';
      el.mode.textContent = mode;

      // Apply visual class for emphasis
      [el.phase, el.engine, el.altitude].forEach(e => {
        e.classList.remove('burn','observe');
        if (valueClass) e.classList.add(valueClass);
      });

      requestAnimationFrame(tick);
    }
    tick();
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  // Also expose for re-init after route changes in preview
  window.initTelemetry = init;
})();

  'plane-change': { dv: 136,  engine: '22N'    }
 };
 const G0 = 9.80665;
 const LMP_DENSITY = 1240;
 const MU_EARTH = 398600.4418; // Earth gravitational parameter, km³/s²
 const R_EARTH = 6378.137;     // Earth equatorial radius, km

 function fmtMass(kg) {
  if (!isFinite(kg) || kg < 0) return '—';
  if (kg >= 1000) return (kg/1000).toFixed(2) + ' t';
  if (kg >= 1)    return kg.toFixed(1) + ' kg';
  return (kg*1000).toFixed(0) + ' g';
 }
 function fmtBurn(s) {
  if (!isFinite(s) || s < 0) return '—';
  if (s < 60)    return s.toFixed(1) + ' s';
  if (s < 3600)  return (s/60).toFixed(1) + ' min';
  if (s < 86400) return (s/3600).toFixed(1) + ' hr';
  return (s/86400).toFixed(1) + ' d';
 }
 function fmtThrust(n) {
  return n >= 1000 ? (n/1000).toFixed(1) + ' kN' : n + ' N';
 }
 function fmtFlow(kgs) {
  if (!isFinite(kgs)) return '—';
  if (kgs >= 1) return kgs.toFixed(2) + ' kg/s';
  return (kgs*1000).toFixed(1) + ' g/s';
 }
 function fmtVol(litres) {
  if (!isFinite(litres) || litres < 0) return '—';
  if (litres >= 1000) return (litres/1000).toFixed(2) + ' m³';
  if (litres >= 1)    return litres.toFixed(1) + ' L';
  return (litres*1000).toFixed(0) + ' mL';
 }
 function fmtSeconds(s) {
  if (!isFinite(s) || s < 0) return '—';
  if (s < 60)    return s.toFixed(0) + ' s';
  if (s < 3600)  return (s/60).toFixed(1) + ' min';
  if (s < 86400) return (s/3600).toFixed(2) + ' hr';
  return (s/86400).toFixed(1) + ' d';
 }
 function fmtVelocity(ms) {
  if (!isFinite(ms)) return '—';
  if (ms >= 1000) return (ms/1000).toFixed(2) + ' km/s';
  return ms.toFixed(0) + ' m/s';
 }
 function fmtDistance(km) {
  if (!isFinite(km)) return '—';
  return Math.round(km).toLocaleString() + ' km';
 }
 function fmtDv(ms) {
  if (!isFinite(ms) || ms < 0) return '—';
  return Math.round(ms).toLocaleString() + ' m/s';
 }

 function calc(engKey, dryMass, deltaV, marginPct, residualsPct, pressPct) {
  const eng = ENGINES[engKey];
  if (!eng) return null;
  const ve = eng.isp * G0;
  const massRatio = Math.exp(deltaV / ve);
  const usable = dryMass * (massRatio - 1);
  const residuals = usable * (residualsPct / 100);
  const margin = usable * (marginPct / 100);
  const totalProp = usable + residuals + margin;
  const pressurant = totalProp * (pressPct / 100);
  const wetMass = dryMass + totalProp + pressurant;
  const massFraction = wetMass > 0 ? (totalProp / wetMass) * 100 : 0;
  const massFlow = eng.thrust / ve;
  const burnTime = massFlow > 0 ? usable / massFlow : 0;
  const tankVol = (totalProp / LMP_DENSITY) * 1000;
  return { eng, engKey, ve, massRatio, usable, residuals, margin, totalProp, pressurant, wetMass, massFraction, massFlow, burnTime, tankVol };
 }

 function readInputs() {
  return {
   dry: parseFloat(document.getElementById('mc-dry')?.value) || 0,
   dv:  parseFloat(document.getElementById('mc-dv')?.value)  || 0,

   margin: parseFloat(document.getElementById('mc-margin')?.value) || 0,

  };
 }

  set('mc-out-wet',       fmtMass(r.wetMass));
  set('mc-out-usable',    fmtMass(r.usable));
  set('mc-out-residuals', fmtMass(r.residuals));
  set('mc-out-margin',    fmtMass(r.margin));
  set('mc-out-press',     fmtMass(r.pressurant));
  set('mc-out-mf',        isFinite(r.massFraction) ? r.massFraction.toFixed(1) + ' %' : '—');
  set('mc-out-burn',      fmtBurn(r.burnTime));
  set('mc-out-tank',      fmtVol(r.tankVol));
  set('mc-out-isp',       r.eng.isp + ' s');
  set('mc-out-thrust',    fmtThrust(r.eng.thrust));
  set('mc-out-flow',      fmtFlow(r.massFlow));
  set('mc-out-ratio',     isFinite(r.massRatio) ? r.massRatio.toFixed(2) + ' : 1' : '—');
 }

 function renderChart() {
  const i = readInputs();
  const chart = document.getElementById('mc-chart');
  if (!chart) return;
  if (i.dry <= 0 || i.dv <= 0) {
   chart.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.06em">Enter dry mass and ΔV to compare engines</div>';
   return;
  }
  const results = Object.keys(ENGINES).map(key => {
   const r = calc(key, i.dry, i.dv, i.margin, i.res, i.press);
   return { key, eng: ENGINES[key], totalProp: r?.totalProp || 0 };
  });
  const validResults = results.filter(r => isFinite(r.totalProp) && r.totalProp > 0);
  const maxProp = validResults.length > 0 ? Math.max(...validResults.map(r => r.totalProp)) : 0;
  const PRACTICAL_LIMIT = i.dry * 10;

  chart.innerHTML = results.map(r => {
   const isActive = r.key === i.eng;
   const colour = r.eng.type === 'bi' ? 'bi' : 'mono';
   const isOver = r.totalProp > PRACTICAL_LIMIT;
   let displayValue = fmtMass(r.totalProp);
   let displayClass = '';
   if (!isFinite(r.totalProp) || r.totalProp <= 0) {
    displayValue = '— invalid';
    displayClass = 'dim';
   }
   const widthBase = isOver ? PRACTICAL_LIMIT : r.totalProp;
   const scaleMax = Math.min(maxProp, PRACTICAL_LIMIT);
   const widthPct = scaleMax > 0 ? Math.min((widthBase / scaleMax) * 100, 100) : 0;
   return '<div class="chart-row' + (isActive ? ' active' : '') + '">' +
    '<div class="chart-label">' + r.eng.label + ' <span class="meta">' + (r.eng.type === 'bi' ? 'BI' : 'MONO') + ' · ' + r.eng.isp + 's</span></div>' +
    '<div class="chart-bar-wrap"><div class="chart-bar ' + colour + (isOver ? ' over' : '') + '" style="width:' + widthPct + '%"></div></div>' +
    '<div class="chart-value ' + displayClass + '">' + displayValue + '</div>' +
   '</div>';
  }).join('');

  set('mc-chart-mission', i.dry + ' kg · ΔV ' + i.dv + ' m/s · ' + i.margin + '% margin');
 }

 /* ============================================================
    HOHMANN TRANSFER CALCULATOR
    ============================================================ */
 function hohmannCalc(alt1, alt2, planeChangeDeg) {
  const r1 = R_EARTH + Math.max(0, alt1);
  const r2 = R_EARTH + Math.max(0, alt2);
  const a_t = (r1 + r2) / 2;
  // Velocities in km/s
  const v_circ1   = Math.sqrt(MU_EARTH / r1);
  const v_circ2   = Math.sqrt(MU_EARTH / r2);
  const v_t_peri  = Math.sqrt(MU_EARTH * (2/r1 - 1/a_t));
  const v_t_apo   = Math.sqrt(MU_EARTH * (2/r2 - 1/a_t));
  // ΔVs in m/s
  const dv1 = Math.abs(v_t_peri - v_circ1) * 1000;
  const dv2 = Math.abs(v_circ2 - v_t_apo)  * 1000;
  // Plane change at apogee (lowest velocity point)
  const planeRad = (planeChangeDeg || 0) * Math.PI / 180;
  const dv_plane = 2 * v_circ2 * Math.sin(planeRad / 2) * 1000;
  const totalDv = dv1 + dv2 + dv_plane;
  const transferTime = Math.PI * Math.sqrt(Math.pow(a_t, 3) / MU_EARTH);
  const period1 = 2 * Math.PI * Math.sqrt(Math.pow(r1, 3) / MU_EARTH);
  const period2 = 2 * Math.PI * Math.sqrt(Math.pow(r2, 3) / MU_EARTH);
  return {
   r1, r2, a_t,
   v_circ1: v_circ1 * 1000,
   v_circ2: v_circ2 * 1000,
   dv1, dv2, dv_plane, totalDv,
   transferTime, period1, period2
  };
 }

 function updateHohmannSVG(r) {
  // Scale orbits to fit the SVG viewBox (-100..100)
  const maxR = Math.max(r.r1, r.r2);
  if (maxR <= 0) return;
  const scale = 85 / maxR;
  const r1_svg = r.r1 * scale;
  const r2_svg = r.r2 * scale;
  const a_svg = (r1_svg + r2_svg) / 2;
  const c_svg = (r2_svg - r1_svg) / 2;
  const b_svg = Math.sqrt(r1_svg * r2_svg);

  const orbit1 = document.getElementById('hoh-orbit1');
  const orbit2 = document.getElementById('hoh-orbit2');
  const transfer = document.getElementById('hoh-transfer');
  const burn1 = document.getElementById('hoh-burn1');
  const burn2 = document.getElementById('hoh-burn2');
  if (orbit1) orbit1.setAttribute('r', r1_svg);
  if (orbit2) orbit2.setAttribute('r', r2_svg);
  if (transfer) {
   transfer.setAttribute('cx', -c_svg);
   transfer.setAttribute('rx', a_svg);
   transfer.setAttribute('ry', b_svg);
  }
  if (burn1) burn1.setAttribute('cx', r1_svg);
  if (burn2) burn2.setAttribute('cx', -r2_svg);
 }

 function renderHohmann() {
  const alt1 = parseFloat(document.getElementById('hoh-alt1')?.value) || 0;
  const alt2 = parseFloat(document.getElementById('hoh-alt2')?.value) || 0;
  const incl = parseFloat(document.getElementById('hoh-incl')?.value) || 0;
  const r = hohmannCalc(alt1, alt2, incl);

  set('hoh-total', fmtDv(r.totalDv));
  set('hoh-dv1', fmtDv(r.dv1));
  set('hoh-dv2', fmtDv(r.dv2));
  set('hoh-incl-dv', fmtDv(r.dv_plane));
  set('hoh-time', fmtSeconds(r.transferTime));
  set('hoh-sma', fmtDistance(r.a_t));
  set('hoh-v1', fmtVelocity(r.v_circ1));
  set('hoh-v2', fmtVelocity(r.v_circ2));
  set('hoh-p1', fmtSeconds(r.period1));
  set('hoh-p2', fmtSeconds(r.period2));
  updateHohmannSVG(r);
  return r;
 }

 function loadHohmannIntoSizing() {
  const r = renderHohmann();
  if (!r || r.totalDv <= 0) return;
  const dvEl = document.getElementById('mc-dv');

 /* ============================================================
    MULTI-BURN MISSION BUILDER
    ============================================================ */
 let burns = [
  { id: 1, name: 'Orbit raise',      dv: 340, engine: '22N' },
  { id: 2, name: 'Station-keeping',  dv: 50,  engine: '1N'  },
  { id: 3, name: 'Deorbit',          dv: 125, engine: '22N' }
 ];

 function calcMultiBurn() {
  const dry    = parseFloat(document.getElementById('mb-dry')?.value)    || 0;
  const margin = parseFloat(document.getElementById('mb-margin')?.value) || 0;
  const res    = parseFloat(document.getElementById('mb-res')?.value)    || 0;
  const press  = parseFloat(document.getElementById('mb-press')?.value)  || 0;

  // Work BACKWARDS from final dry mass
  let m_after = dry;
  const results = [];
  for (let i = burns.length - 1; i >= 0; i--) {
   const b = burns[i];
   const eng = ENGINES[b.engine];
   if (!eng) {
    results.unshift({ ...b, eng: null, propellant: 0, burnTime: 0, massBefore: m_after, massAfter: m_after });
    continue;
   }
   const ve = eng.isp * G0;
   const mr = Math.exp(b.dv / ve);
   const m_p = m_after * (mr - 1);
   const m_before = m_after + m_p;
   const massFlow = eng.thrust / ve;
   const burnTime = (massFlow > 0 && isFinite(m_p)) ? m_p / massFlow : 0;
   results.unshift({ ...b, eng, propellant: m_p, burnTime, massBefore: m_before, massAfter: m_after });
   m_after = m_before;
  }

  const totalUsable = results.reduce((s, r) => s + (isFinite(r.propellant) ? r.propellant : 0), 0);
  const totalDv = burns.reduce((s, b) => s + (b.dv || 0), 0);
  const resMass = totalUsable * (res / 100);
  const marMass = totalUsable * (margin / 100);
  const totalProp = totalUsable + resMass + marMass;
  const pressMass = totalProp * (press / 100);
  const initialWetMass = dry + totalProp + pressMass;
  const massFraction = initialWetMass > 0 ? (totalProp / initialWetMass) * 100 : 0;
  return { results, totalUsable, totalDv, resMass, marMass, totalProp, pressMass, initialWetMass, massFraction };
 }

 function renderBurns() {

  } else {

    ).join('');
    return '<div style="display:grid;grid-template-columns:36px 1.4fr 110px 1.5fr 110px 90px 36px;gap:10px;padding:10px 12px;align-items:center;border-bottom:1px solid var(--border-soft)" data-burn-id="' + b.id + '">' +
     '<div style="font-family:ui-monospace,monospace;font-size:13px;color:var(--accent-bright);font-weight:700">' + (i + 1) + '</div>' +
     '<div class="mc-input" style="margin:0"><input type="text" data-field="name" value="' + (b.name || '').replace(/"/g, '&quot;') + '" style="font-size:13px;padding:8px 10px" /></div>' +
     '<div class="mc-input" style="margin:0"><input type="number" data-field="dv" value="' + (b.dv || 0) + '" min="0" step="10" style="font-size:13px;padding:8px 10px" /></div>' +
     '<div class="mc-input" style="margin:0"><select data-field="engine" style="font-size:12px;padding:8px 10px">' + engineOptions + '</select></div>' +
     '<div style="font-family:ui-monospace,monospace;font-size:13px;color:var(--ink);font-weight:600">' + fmtMass(b.propellant) + '</div>' +
     '<div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--muted)">' + fmtBurn(b.burnTime) + '</div>' +
     '<button class="mb-remove" style="background:transparent;color:var(--muted);border:1px solid var(--border-soft);width:28px;height:28px;cursor:pointer;font-size:14px;line-height:1;padding:0" title="Remove burn">×</button>' +
     '</div>';
   }).join('');

   // Wire row inputs
   container.querySelectorAll('[data-burn-id]').forEach(row => {
    const id = parseInt(row.dataset.burnId);
    row.querySelectorAll('input, select').forEach(el => {
     const field = el.dataset.field;
     if (!field) return;
     const handler = () => {
      const burn = burns.find(b => b.id === id);
      if (!burn) return;
      if (field === 'dv') burn[field] = parseFloat(el.value) || 0;
      else burn[field] = el.value;
      renderBurns();
     };
     el.addEventListener('input', handler);
     el.addEventListener('change', handler);
    });
    const removeBtn = row.querySelector('.mb-remove');
    if (removeBtn) removeBtn.addEventListener('click', () => {
     burns = burns.filter(b => b.id !== id);
     renderBurns();
    });
   });
  }

  set('mb-tot-dv',   fmtDv(r.totalDv));
  set('mb-tot-prop', fmtMass(r.totalProp));
  set('mb-tot-wet',  fmtMass(r.initialWetMass));
  set('mb-tot-mf',   isFinite(r.massFraction) ? r.massFraction.toFixed(1) + ' %' : '—');
 }

 function addBurn() {
  burns.push({ id: nextBurnId++, name: 'New burn', dv: 100, engine: '22N' });
  renderBurns();
 }

 let simState = {
  missionKey: 'leo-deploy',
  phaseIdx: 0,
  phaseTime: 0,
  missionTime: 0,
  angle: -Math.PI / 2,
  running: false,
  speed: 50,
  rafId: null,
  lastFrame: 0,
  trail: []
 };

 function simMission() { return MISSIONS[simState.missionKey]; }
 function simPhase() { return simMission()?.phases[simState.phaseIdx]; }

 function simReset() {
  if (simState.rafId) cancelAnimationFrame(simState.rafId);
  simState.phaseIdx = 0;
  simState.phaseTime = 0;
  simState.missionTime = 0;
  simState.angle = -Math.PI / 2;
  simState.running = false;
  simState.trail = [];
  simRender();
  const statusEl = document.getElementById('tlm-status');
  if (statusEl) { statusEl.textContent = '● STANDBY'; statusEl.style.color = 'var(--muted)'; }
 }

 function simPlay() {
  if (simState.running) return;
  // If mission complete, reset first
  const m = simMission();
  if (m && simState.phaseIdx >= m.phases.length - 1 && simState.phaseTime >= m.phases[m.phases.length-1].duration) {
   simReset();
  }
  simState.running = true;
  simState.lastFrame = performance.now();
  const statusEl = document.getElementById('tlm-status');
  if (statusEl) { statusEl.textContent = '● LIVE'; statusEl.style.color = '#10B981'; }
  simState.rafId = requestAnimationFrame(simFrame);
 }

 function simPauseFn() {
  simState.running = false;
  if (simState.rafId) cancelAnimationFrame(simState.rafId);
  const statusEl = document.getElementById('tlm-status');
  if (statusEl) { statusEl.textContent = '● PAUSED'; statusEl.style.color = '#94A3B8'; }
 }

 function simFrame(now) {
  if (!simState.running) return;
  const realDt = Math.min(0.1, (now - simState.lastFrame) / 1000);
  simState.lastFrame = now;
  const dt = realDt * simState.speed;
  simTick(dt);
  simRender();
  if (simState.running) simState.rafId = requestAnimationFrame(simFrame);
 }

 function simTick(dt) {
  const m = simMission();
  if (!m) return;
  const phase = simPhase();
  if (!phase) return;

  simState.phaseTime += dt;
  simState.missionTime += dt;

  // Angular motion
  let r;
  if (phase.type === 'coast' || phase.type === 'operational') {
   r = phase.orbit === 'target' ? m.visRadii.target : m.visRadii.initial;
   const angularRate = 0.7 / Math.max(20, r);
   simState.angle += dt * angularRate;
  } else if (phase.type === 'transfer') {
   const angularRate = Math.PI / phase.duration;
   simState.angle += dt * angularRate;
  }
  // During burn: angle frozen (impulsive)

  // Trail
  if (Math.random() < 0.18) {
   const pos = simSpacecraftPos();
   simState.trail.push(pos);
   if (simState.trail.length > 60) simState.trail.shift();
  }

  // Phase advance
  if (simState.phaseTime >= phase.duration) {
   simState.phaseTime = 0;
   simState.phaseIdx++;
   if (simState.phaseIdx >= m.phases.length) {
    simState.phaseIdx = m.phases.length - 1;
    simState.phaseTime = phase.duration;
    simState.running = false;
    const statusEl = document.getElementById('tlm-status');
    if (statusEl) { statusEl.textContent = '● COMPLETE'; statusEl.style.color = '#10B981'; }
   } else {
    const newPhase = simPhase();
    if (newPhase.type === 'transfer') simState.angle = -Math.PI / 2;
   }
  }
 }

 function simSpacecraftPos() {
  const m = simMission();
  const phase = simPhase();
  if (!m || !phase) return { x: 0, y: 0 };
  if (phase.type === 'transfer') {
   const a = (m.visRadii.initial + m.visRadii.target) / 2;
   const c = (m.visRadii.target - m.visRadii.initial) / 2;
   const b = Math.sqrt(m.visRadii.initial * m.visRadii.target);
   const x = a * Math.cos(simState.angle) - c;
   const y = b * Math.sin(simState.angle);
   return { x, y };
  }
  const r = phase.orbit === 'target' ? m.visRadii.target : m.visRadii.initial;
  return { x: r * Math.cos(simState.angle), y: r * Math.sin(simState.angle) };
 }

 function simFormatMET(s) {
  s = Math.max(0, Math.floor(s));
  const h = Math.floor(s / 3600);
  const min = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return 'T+ ' + String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
 }

 function simRender() {
  const m = simMission();
  if (!m) return;
  const phase = simPhase();

  // Mission name overlay
  set('sim-mission-name', m.name.toUpperCase());
  set('sim-mission-desc', m.desc);

  // Orbits
  const orbitInit = document.getElementById('sim-orbit-init');
  const orbitTarget = document.getElementById('sim-orbit-target');
  const orbitTransfer = document.getElementById('sim-orbit-transfer');
  if (orbitInit) orbitInit.setAttribute('r', m.visRadii.initial);
  if (orbitTarget) orbitTarget.setAttribute('r', m.visRadii.target);
  if (orbitTransfer) {
   const a = (m.visRadii.initial + m.visRadii.target) / 2;
   const c = (m.visRadii.target - m.visRadii.initial) / 2;
   const b = Math.sqrt(m.visRadii.initial * m.visRadii.target);
   orbitTransfer.setAttribute('cx', -c);
   orbitTransfer.setAttribute('rx', a);
   orbitTransfer.setAttribute('ry', b);
   orbitTransfer.setAttribute('opacity', phase?.type === 'transfer' ? '0.85' : '0.15');
  }

  // Spacecraft position + rotation (tangent to motion)
  const pos = simSpacecraftPos();
  const sc = document.getElementById('sim-spacecraft');
  if (sc) {
   const rotDeg = (simState.angle * 180 / Math.PI) + 90;
   sc.setAttribute('transform', 'translate(' + pos.x.toFixed(2) + ',' + pos.y.toFixed(2) + ') rotate(' + rotDeg.toFixed(1) + ')');
  }

  // Plume during burn
  const plume = document.getElementById('sim-plume');
  if (plume) plume.setAttribute('opacity', phase?.type === 'burn' ? '1' : '0');

  // Trail
  const trailEl = document.getElementById('sim-trail');
  if (trailEl) {
   trailEl.innerHTML = simState.trail.map((p, i) => {
    const op = (i / Math.max(1, simState.trail.length)) * 0.5;
    return '<circle cx="' + p.x.toFixed(2) + '" cy="' + p.y.toFixed(2) + '" r="0.8" fill="#FFF" opacity="' + op.toFixed(2) + '"/>';
   }).join('');
  }

  // Phase name (overlay + telemetry)
  const phaseName = phase?.name || '— ready —';
  set('sim-phase-name', phaseName.toUpperCase());
  set('tlm-phase', phaseName);

  // MET
  set('tlm-met', simFormatMET(simState.missionTime));

  // ΔV consumed
  let dvCons = 0;
  for (let i = 0; i < simState.phaseIdx; i++) {
   if (m.phases[i].type === 'burn') dvCons += m.phases[i].dv || 0;
  }
  if (phase?.type === 'burn') {
   const f = Math.min(1, simState.phaseTime / phase.duration);
   dvCons += (phase.dv || 0) * f;
  }
  set('tlm-dv', Math.round(dvCons) + ' / ' + m.totalDv + ' m/s');

  // Propellant
  let propUsed = 0;
  for (let i = 0; i < simState.phaseIdx; i++) {
   if (m.phases[i].type === 'burn') propUsed += m.phases[i].propUsed || 0;
  }
  if (phase?.type === 'burn') {
   const f = Math.min(1, simState.phaseTime / phase.duration);
   propUsed += (phase.propUsed || 0) * f;
  }
  const propRemaining = Math.max(0, m.propellantLoad - propUsed);
  set('tlm-prop', propRemaining.toFixed(1));
  set('tlm-prop-total', m.propellantLoad.toFixed(1));
  set('tlm-mass', Math.round(m.initialMass + propRemaining) + ' kg');
  set('tlm-engine', m.engine);

  // Mass flow rate (only meaningful during burns)
  let flowRate = 0;
  if (phase?.type === 'burn' && phase.duration > 0) {
   flowRate = (phase.propUsed || 0) / phase.duration;
  }
  set('tlm-flow', flowRate > 0 ? (flowRate * 1000).toFixed(2) + ' g/s' : '0.00 g/s');

  // Hydrazine equivalent (real Tsiolkovsky comparison)
  const G0_local = 9.80665;
  const ISP_LMP = 245, ISP_HYD = 225;
  const hydFactor = m.totalDv > 0 ? (Math.exp(m.totalDv / (ISP_HYD * G0_local)) - 1) / (Math.exp(m.totalDv / (ISP_LMP * G0_local)) - 1) : 1;
  const propHyd = propUsed * hydFactor;
  const savedKg = propHyd - propUsed;
  set('tlm-hyd-prop', propHyd.toFixed(1));
  const savingEl = document.getElementById('tlm-hyd-saving');
  if (savingEl) {
   if (savedKg > 0.01) savingEl.textContent = '+ ' + savedKg.toFixed(2) + ' kg SAVED with LMP-103S';
   else savingEl.textContent = '— SAME MANEUVER, NO PROPELLANT CONSUMED YET';
  }

  // Bars
  const propPct = m.propellantLoad > 0 ? (propRemaining / m.propellantLoad) * 100 : 0;
  const propFill = document.getElementById('tlm-prop-fill');
  if (propFill) propFill.style.height = propPct.toFixed(1) + '%';
  set('tlm-prop-pct', Math.round(propPct) + '%');

  const dvPct = m.totalDv > 0 ? (dvCons / m.totalDv) * 100 : 0;
  const dvFill = document.getElementById('tlm-dv-fill');
  if (dvFill) dvFill.style.width = dvPct.toFixed(1) + '%';
  set('tlm-dv-pct', Math.round(dvPct) + '%');

  simRenderTimeline();
 }

 function simRenderTimeline() {
  const m = simMission();
  if (!m) return;
  const bar = document.getElementById('sim-timeline-bar');
  if (!bar) return;
  const totalDur = m.phases.reduce((s, p) => s + p.duration, 0);
  bar.innerHTML = m.phases.map((p, i) => {
   const widthPct = (p.duration / totalDur) * 100;
   const isCurrent = i === simState.phaseIdx;
   const isPast = i < simState.phaseIdx;
   let progressPct = 0;
   if (isCurrent) progressPct = (simState.phaseTime / p.duration) * 100;
   if (isPast) progressPct = 100;
   const colour = p.type === 'burn' ? '#FFFFFF' : (p.type === 'operational' ? '#10B981' : '#22D3EE');
   return '<div style="flex:' + widthPct.toFixed(2) + ';position:relative;border-right:1px solid var(--border-soft);overflow:hidden;background:rgba(255,255,255,' + (isCurrent ? '0.03' : '0.01') + ')">' +
    '<div style="position:absolute;left:0;top:0;height:100%;width:' + progressPct.toFixed(1) + '%;background:' + colour + ';opacity:' + (isCurrent ? '0.35' : '0.2') + ';transition:width .2s"></div>' +
    '<div style="position:absolute;left:8px;top:8px;font-family:ui-monospace,monospace;font-size:9px;color:' + (isCurrent ? '#FFF' : 'rgba(255,255,255,.7)') + ';font-weight:' + (isCurrent ? '700' : '500') + ';letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;right:8px">' + p.name + '</div>' +
    '<div style="position:absolute;left:8px;bottom:6px;font-family:ui-monospace,monospace;font-size:8px;color:' + colour + ';letter-spacing:.06em;font-weight:700;text-transform:uppercase">' + p.type + '</div>' +
    '</div>';
  }).join('');
 }

 function simGenStars() {
  const stars = document.getElementById('sim-stars');
  if (!stars || stars.dataset.gen) return;
  stars.dataset.gen = '1';
  let h = '';
  for (let i = 0; i < 90; i++) {
   const x = (Math.random() - 0.5) * 380;
   const y = (Math.random() - 0.5) * 380;
   const dist = Math.sqrt(x*x + y*y);
   if (dist < 40) continue; // skip stars overlapping Earth
   const r = Math.random() * 0.7 + 0.2;
   const op = Math.random() * 0.6 + 0.3;
   h += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="' + r.toFixed(1) + '" fill="#FFF" opacity="' + op.toFixed(2) + '"/>';
  }
  stars.innerHTML = h;
 }

 function initSim() {
  document.getElementById('sim-play')?.addEventListener('click', simPlay);
  document.getElementById('sim-pause')?.addEventListener('click', simPauseFn);
  document.getElementById('sim-reset')?.addEventListener('click', simReset);
  document.getElementById('sim-mission')?.addEventListener('change', (e) => {
   simState.missionKey = e.target.value;
   simReset();
  });
  document.getElementById('sim-speed')?.addEventListener('change', (e) => {
   simState.speed = parseFloat(e.target.value) || 50;
  });
  simGenStars();
  simReset();
 }

 /* ============================================================
    PROPULSION METHOD COMPARISON (vs hydrazine + electric)
    ============================================================ */
 const METHODS = {
  'lmp-103s':  { name: 'LMP-103S',       isp: 245,  thrust: 22,    color: '#22D3EE' },
  'hydrazine': { name: 'Hydrazine',      isp: 225,  thrust: 22,    color: '#94A3B8' },
  'hall':      { name: 'Hall Effect',    isp: 1700, thrust: 0.150, color: '#3B82F6' },
  'ion':       { name: 'Ion (Gridded)',  isp: 3100, thrust: 0.092, color: '#8B5CF6' }
 };

 function calcMethod(method, dryMass, dv) {
  const ve = method.isp * G0;
  const mr = Math.exp(dv / ve);
  const propMass = dryMass * (mr - 1);
  const massFlow = method.thrust / ve;
  const burnTime = massFlow > 0 ? propMass / massFlow : 0;
  return { propMass, burnTime };
 }

 function renderComparison() {
  const dry = parseFloat(document.getElementById('cmp-dry')?.value) || 0;
  const dv  = parseFloat(document.getElementById('cmp-dv')?.value)  || 0;

  const results = Object.entries(METHODS).map(([key, m]) => {
   const r = calcMethod(m, dry, dv);
   return { key, method: m, propMass: r.propMass, burnTime: r.burnTime };
  });

  // Per-card outputs
  results.forEach(r => {
   const propEl = document.getElementById('cmp-' + r.key + '-prop');
   if (propEl) propEl.textContent = fmtMass(r.propMass);
   const timeEl = document.getElementById('cmp-' + r.key + '-time');
   if (timeEl) timeEl.textContent = fmtBurn(r.burnTime);
  });

  // Comparison summary
  const lmp = results.find(r => r.key === 'lmp-103s');
  const ion = results.find(r => r.key === 'ion');
  if (lmp && ion && lmp.burnTime > 0) {
   const ratio = ion.burnTime / lmp.burnTime;
   const sumEl = document.getElementById('cmp-summary');
   if (sumEl) sumEl.textContent = 'LMP-103S is ~' + Math.round(ratio) + '× faster than ion';
  }

  // Bar chart
  const barsEl = document.getElementById('cmp-bars');
  if (barsEl) {
   const validTimes = results.filter(r => isFinite(r.burnTime) && r.burnTime > 0).map(r => r.burnTime);
   const maxTime = validTimes.length > 0 ? Math.max(...validTimes) : 1;
   barsEl.innerHTML = results.map(r => {
    const widthPct = maxTime > 0 ? Math.max(0.6, (r.burnTime / maxTime) * 100) : 0;
    const color = r.method.color;
    return '<div style="display:grid;grid-template-columns:180px 1fr 110px;gap:14px;align-items:center">' +
     '<div style="font-family:\'Inter\',sans-serif;font-size:13px;font-weight:600;color:var(--ink)">' + r.method.name + '</div>' +
     '<div style="height:20px;background:var(--bg);border:1px solid var(--border-soft);position:relative;overflow:hidden">' +
      '<div style="height:100%;width:' + widthPct.toFixed(2) + '%;background:linear-gradient(90deg,' + color + ',' + color + '88);transition:width .3s ease-out"></div>' +
     '</div>' +
     '<div style="font-family:ui-monospace,monospace;font-size:12px;color:var(--ink);font-weight:600;text-align:right">' + fmtBurn(r.burnTime) + '</div>' +
    '</div>';
   }).join('');
  }
 }

 function initComparison() {
  ['cmp-dry', 'cmp-dv'].forEach(id => {
   const el = document.getElementById(id);
   if (!el) return;
   el.addEventListener('input', renderComparison);
   el.addEventListener('change', renderComparison);
  });
  renderComparison();
 }

 window.renderComparison = renderComparison;

       '<div style="font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase">Operating Domains</div>' +
       '<div style="font-family:\'Inter\',sans-serif;font-size:13px;font-weight:600;color:var(--ink);margin-top:6px">' + d.domains + '</div>' +
      '</div>' +
     '</div>' +
     '<div style="font-size:14px;color:var(--ink-2);line-height:1.7;margin-bottom:18px">' + d.description + '</div>' +
     '<div style="padding:14px 16px;background:rgba(34,211,238,.04);border-left:2px solid var(--accent-bright);margin-bottom:10px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.7">' +
      '<span style="color:var(--accent-bright);text-transform:uppercase;letter-spacing:.14em;font-weight:700">/ TYPICAL MISSION</span> &nbsp; <span style="color:var(--ink-2)">' + d.typicalMission + '</span>' +
     '</div>' +
     '<div style="padding:14px 16px;background:rgba(148,163,184,.05);border-left:2px solid #94A3B8;font-family:ui-monospace,monospace;font-size:11px;line-height:1.7">' +
      '<span style="color:#94A3B8;text-transform:uppercase;letter-spacing:.14em;font-weight:700">/ HERITAGE</span> &nbsp; <span style="color:var(--ink-2)">' + d.heritage + '</span>' +
     '</div>' +
    '</div>' +
   '</div>';
 }

 function selectEngine(key) {
  document.querySelectorAll('.engine-card').forEach(card => {
   const isMatch = card.dataset.engine === key;
   if (isMatch) {
    card.classList.add('selected');
    card.style.background = 'rgba(34,211,238,0.05)';
    card.style.borderTopColor = 'var(--accent-bright)';
   } else {
    card.classList.remove('selected');
    card.style.background = 'var(--surface)';
    card.style.borderTopColor = 'transparent';
   }
  });
  renderEngineDetail(key);
 }

 function initEngineExplorer() {
  document.querySelectorAll('.engine-card').forEach(card => {
   card.addEventListener('click', () => selectEngine(card.dataset.engine));
   card.style.cursor = 'pointer';
  });
  selectEngine('22N');
 }

 window.selectEngine = selectEngine;

 function init() {
  const root = document.getElementById('mc-dry');
  if (!root) return;

  ['mc-dry','mc-dv','mc-engine','mc-margin','mc-residuals','mc-press'].forEach(id => {
   const el = document.getElementById(id);
   if (!el) return;
   el.addEventListener('input', update);
   el.addEventListener('change', update);
  });

  const profEl = document.getElementById('mc-profile');
  if (profEl) profEl.addEventListener('change', () => loadProfile(profEl.value));

  document.querySelectorAll('.profile-row[data-profile]').forEach(row => {
   row.addEventListener('click', () => {
    const key = row.dataset.profile;
    loadProfile(key);
    if (profEl) profEl.value = key;
    const target = document.getElementById('calculator');
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
   });
  });

  // Hohmann transfer calculator
  ['hoh-alt1','hoh-alt2','hoh-incl'].forEach(id => {
   const el = document.getElementById(id);
   if (!el) return;
   el.addEventListener('input', renderHohmann);
   el.addEventListener('change', renderHohmann);
  });
  document.getElementById('hoh-load-btn')?.addEventListener('click', loadHohmannIntoSizing);

  // Multi-burn mission builder
  ['mb-dry','mb-margin','mb-res','mb-press'].forEach(id => {
   const el = document.getElementById(id);
   if (!el) return;
   el.addEventListener('input', renderBurns);
   el.addEventListener('change', renderBurns);
  });
  document.getElementById('mb-add')?.addEventListener('click', addBurn);

  update();
  renderHohmann();
  renderBurns();
  initSim();
  initComparison();
  initEngineExplorer();
 }

 window.initMissionCalc = init;
 window.simPlay = simPlay;
 window.simPauseFn = simPauseFn;
 window.simReset = simReset;
 window.simChangeMission = (val) => {
  simState.missionKey = val;
  document.querySelectorAll('.sim-mission-card').forEach(c => {
   const isActive = c.dataset.mission === val;
   c.classList.toggle('active', isActive);
   if (isActive) {
    c.style.background = 'rgba(34,211,238,0.05)';
    c.style.borderTopColor = 'var(--accent-bright)';
    const sub = c.querySelector('div[style*="margin-top:4px"]');
    if (sub) sub.style.color = 'var(--accent-bright)';
   } else {
    c.style.background = 'var(--surface)';
    c.style.borderTopColor = 'transparent';
    const sub = c.querySelector('div[style*="margin-top:4px"]');
    if (sub) sub.style.color = 'var(--muted)';
   }
  });
  simReset();
 };
 window.simChangeSpeed = (val) => { simState.speed = parseFloat(val) || 50; };
 window.renderHohmann = renderHohmann;
 window.loadHohmannIntoSizing = loadHohmannIntoSizing;
 if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
 } else {
  init();
 }
})();</script>
<script>(function(){function initAudienceTabs(){const btns=document.querySelectorAll('.audience-tabs .at-btn');const panes=document.querySelectorAll('.at-pane');if(!btns.length)return;btns.forEach(btn=>{if(btn.dataset.bound)return;btn.dataset.bound='1';btn.addEventListener('click',()=>{const tab=btn.dataset.tab;btns.forEach(b=>b.classList.toggle('active',b===btn));panes.forEach(p=>p.classList.toggle('hidden',p.dataset.pane!==tab));if(typeof window.initSchematics==='function'){window.initSchematics(document.querySelector('.at-pane[data-pane="'+tab+'"]'));}document.querySelector('.audience-tabs').scrollIntoView({behavior:'smooth',block:'start'});});});}window.initAudienceTabs=initAudienceTabs;if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initAudienceTabs);else initAudienceTabs();})();</script>
