n<h4>Mission Timeline</h4>\n<ul>\n <li><b>2027</b> \u2014 Suborbital flight demonstration</li>\n <li><b>2028 / 2029</b> \u2014 Full orbital demonstration mission</li>\n</ul>\n<p>This progressive build-up ensures a robust qualification path toward full OTV operational capability.</p>\n<p>On 12 December, ECAPS will launch the world's first <b>Industrial Sovereign Propulsion Framework (ISPF)</b> designed to empower Sweden and its security partners and allies with critical mobility capabilities for space and defense.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"25-years\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">OCTOBER 8, 2025</span>\n   <span class=\"article-cat\">MILESTONE</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Marks 25 Years of Swedish Propulsion Innovation</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2013 October 2025</b> \u2014 ECAPS AB, Sweden's leading propulsion technology provider, celebrates its <b>25th anniversary</b>, marking a quarter-century of innovation in spacecraft and defense mobility.</p>\n<p>Since 2000, ECAPS has been advancing high-performance propulsion systems based on Swedish-invented <b>Ammonium Dinitramide (ADN)</b> technology with its LMP-103S propellant. With a complete HPGP portfolio encompassing various thrust classes and propulsion modules, ECAPS technology has powered missions across the globe, establishing a proven legacy of reliability, safety, and high performance.</p>\n<p>Over the past two years, ECAPS has entered a new phase of expansion, scaling production capabilities, introducing new propulsion platforms, and forming long-term collaborations with international partners. The company's focus is now on supporting capability development through local partnerships.</p>\n<p>As part of this vision, ECAPS is launching a <b>Capability Localization Program</b>, providing structured access to propulsion technology, training, and integration support.</p>\n<blockquote>\"For 25 years, ECAPS has represented the best of Global engineering \u2014 performance, reliability, and innovation. As we look ahead, our mission is to empower nations through cooperation and technology, building local capabilities while ensuring global access to advanced propulsion.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS AB</cite></blockquote>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"snsa-fast\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">SEPTEMBER 25, 2025</span>\n   <span class=\"article-cat\">FUNDING</span>\n  </div>\n  <h2 class=\"article-title\">SNSA Awards ECAPS Contract for Fast Start-up Thrusters in Sweden's First Dual-use Program</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2013 September 2025</b></p>\n<p>The <b>Swedish National Space Agency (SNSA)</b> has awarded ECAPS with funding under the <b>Dual-Use Space Technology Program</b>, established by the Government's Research &amp; Innovation Bill (2024).</p>\n<p>The grant will support ECAPS's <b>Fast Start-up Thruster (FAST) program</b>, which has already demonstrated the capability to reach operational temperatures for its experimental 22 N thruster in <b>under 48 seconds</b>. ECAPS R&amp;D will continue to expedite start-up durations to as low as <b>10 seconds</b>, fully integrating the technology into engines by next year.</p>\n<h4>Broadening Sweden's Mission Capabilities</h4>\n<p>ECAPS's FAST innovation constitutes a critical technological breakthrough, as traditional thrusters typically require more than 20 minutes to preheat before being activated.</p>\n<p>FAST is built for quick deployment and adaptability in diverse system types, including monopropellant and bipropellant, as well as systems like gas generators, Auxiliary Power Units (APUs) and Emergency Power Units (EPUs). This ultimately enables mission flexibility, creating new possibilities for spacecraft maneuvering and orbital capabilities, while facilitating defensive applications, including Unmanned Underwater and Aerial Vehicles (UUVs, UAVs).</p>\n<blockquote>\"FAST adds to ECAPS's 15+ year heritage of delivering mission-proven HPGP solutions. By making activation times almost instant, Sweden opens new commercial possibilities, while drastically enhancing its military preparedness.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"osaka-nordic-space-day\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">SEPTEMBER 18, 2025</span>\n   <span class=\"article-cat\">PARTNERSHIPS</span>\n  </div>\n  <h2 class=\"article-title\">Strengthening Nordic\u2013Japan Space Cooperation: ECAPS at Osaka Nordic Space Day</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Osaka, Japan \u2013 September 2025</b></p>\n<p>ECAPS participated in the panel discussion <b>\"Building Commercial Partnerships in Space\"</b> at Nordic Space Day in Osaka, an event bringing together Swedish and Japanese leaders to strengthen cooperation in space.</p>\n<p>ECAPS highlighted Sweden's role in propulsion, with its propulsion systems already deployed on important international missions supporting both defense and space applications. The discussion also emphasized how infrastructure, launch services, and on-orbit technologies, alongside propulsion, are strengthened through international partnerships and localisation.</p>\n<p><b>Odysseas Christofi, CEO of ECAPS</b>, was joined on stage by leadership from SSC, Astroscale, and Kongsberg Satellite Services (KSAT). The panel focused on unlocking opportunities for cross-border collaboration and commercial partnerships in the evolving space economy.</p>\n<p>The agenda brought together leaders from government and industry, including <b>Dr. Ella Carlsson</b>, Director General at SNSA, and Sweden's astronaut <b>Marcus Wandt</b>, now Chief Innovation Officer at Saab, alongside JAXA astronaut <b>Dr. Satoshi Furukawa</b>. Contributions also came from Dr. Olle Norberg, Director General of the Swedish Institute of Space Physics (IRF), and Christian H\u00e5nberg, Head of Industrial Policy and Telecommunications at SNSA.</p>\n<p>ECAPS thanks Business Sweden and the Swedish National Space Agency (SNSA) for their support in making Nordic Space Day possible, and for advancing Swedish\u2013Japanese dialogue in space and defense.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"ecaps-ise-apu\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">JULY 29, 2025</span>\n   <span class=\"article-cat\">PARTNERSHIPS</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS and ISE Collaborate to Demonstrate Auxiliary Power Unit (APU) Powered by LMP-103S</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Location:</b> Stockholm, Sweden / Port Coquitlam, Canada<br><b>Date:</b> 29.07.2025</p>\n<p>ECAPS AB, a Swedish propulsion company, and <b>International Submarine Engineering Ltd. (ISE)</b>, a Canadian leader in unmanned underwater systems, are pleased to announce a collaborative demonstration of a high-performance <b>Auxiliary Power Unit (APU)</b> based on ECAPS' LMP-103S liquid propellant.</p>\n<div class=\"article-image\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892862-AW3NY2ZR37I7GYCGTLFQ/ISE+AUV+during+sea%E2%80%90trial+operations+in+British+Columbia+.png\" alt=\"ISE AUV during sea-trial operations in British Columbia\" loading=\"lazy\" /><div class=\"article-image-caption\">ISE AUV during sea-trial operations in British Columbia. Photo \u00a9 International Submarine Engineering Ltd.</div></div>\n<p>The APU is an evolution of ECAPS' proven space propulsion technology, where LMP-103S has been successfully flown on multiple satellite missions. Now, ECAPS is extending the application of this propellant to deliver <b>thermal energy up to 1100\u00b0C</b> for auxiliary and onboard power. The formulation has been validated through <b>five successful ground tests</b> and is designed to support extended-duration, high-energy missions in challenging operational environments.</p>\n<p>LMP-103S is a storable monopropellant formulation that <b>includes its own oxidizing agent</b>, enabling combustion in the absence of atmospheric oxygen. This property makes it highly suitable for operation in vacuum, underwater, or other oxygen-deprived environments.</p>\n<blockquote>\"We're taking our flight-proven LMP-103S propellant from orbit to ocean. This demonstration shows how the same chemistry can recharge batteries, extend range and deliver burst power \u2014 all in one compact package.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n<p>The demonstration, scheduled for <b>Q3\u2013Q4 2026 in British Columbia, Canada</b>, will be led by ECAPS and conducted in collaboration with ISE. ECAPS' APU will be integrated into an existing underwater drone platform provided by ISE. The goal is to validate system performance in a real-world setting, demonstrating onboard battery recharging, extended operational endurance, and increased energy availability.</p>\n<blockquote>\"ISE has always been focused on mission driven performance and innovation. We are excited to collaborate with ECAPS to validate this APU technology, recognizing its tremendous potential to enhance the mission capabilities of autonomous underwater platforms.\"\n<cite>\u2014 Lara Smith, CEO, International Submarine Engineering Ltd.</cite></blockquote>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"fast-22n-test\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">MAY 5, 2025</span>\n   <span class=\"article-cat\">R&D</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Demonstrates Breakthrough in Rapid Start-Up with 22 N FAST Experimental Thruster</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2013 May 5, 2025</b> \u2014 ECAPS has successfully completed another hot-firing test of its <b>22 N FAST experimental thruster</b>, achieving full start-up from ambient temperature to steady-state operation in <b>under 48 seconds</b>. This performance marks a significant advancement in the development of propulsion systems designed for rapid response and flexible mission readiness.</p>\n<p>The test used ECAPS's <b>LMP-103S/LT formulation</b>, with the catalyst bed starting at approximately 20\u00b0C. It was heated to its operational temperature of 350\u00b0C using ECAPS' <b>proprietary FAST start-up sequence</b>, eliminating the need for prolonged electrical preheating.</p>\n<p>Earlier ECAPS systems\u2014such as those used on the PRISMA mission\u2014required up to <b>30 minutes</b> of electrical heating prior to thruster activation. The FAST architecture now achieves full readiness in well under a minute. Development work is ongoing to reduce this time further, targeting <b>start-up durations as low as 10 seconds</b> for reusable systems.</p>\n<blockquote>\"This milestone reinforces our focus on pushing the boundaries of propulsion readiness. By drastically reducing activation time, we're enabling new mission profiles across both space and defense sectors that require rapid, on-demand performance.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n<h4>Versatile Architecture for Modern Missions</h4>\n<p>The FAST start-up technology is designed to be adaptable across a range of propulsion system types, including <b>monopropellant, bipropellant, and gas generator configurations</b> \u2014 giving mission designers more flexibility in choosing high-performance, fast-response propulsion solutions.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"bipropellant-test\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">NOVEMBER 18, 2024</span>\n   <span class=\"article-cat\">R&D</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Conducts Successful Test Unlocking New Applications for Bipropellant Thrusters and Gas Generators</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2013 18.11.2024</b> \u2014 ECAPS has successfully completed a critical hot-firing test campaign of its <b>LMP-103S derivative propellant</b> at its testing facility. This campaign marks a major step in ECAPS's expansion beyond monopropellant systems, demonstrating the application of its technology in <b>bipropellant thrusters and gas generators</b>, enabled by fast start-up technology.</p>\n<p>The LMP-103S derivative, a well-established green propellant, was tested with the FAST test thruster in a series of <b>49 firings</b>, including single pulses and pulse trains. This test validated the integration of the propellant with advanced propulsion systems requiring rapid response, precision control, and high reliability.</p>\n<blockquote>\"This test campaign is a key milestone as we move beyond monopropellant systems into the realm of bipropellant thrusters and gas generators. The integration of fast start-up technology with our proven propellant opens new applications for space and defense missions that demand enhanced flexibility and efficiency.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n<p>The campaign demonstrated the system's ability to achieve reliable and rapid ignition cycles, making it suitable for high-performance applications. The durability of the hardware and the comprehensive performance data collected affirm the readiness of these systems for complex mission scenarios.</p>\n<blockquote>\"This achievement showcases the innovative spirit and dedication of our team. Their commitment to advancing propulsion technology is central to ECAPS's ability to explore new frontiers in propulsion applications.\"\n<cite>\u2014 Kjell Anflo, Chief Designer, ECAPS</cite></blockquote>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"gustafsson-chairman\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">NOVEMBER 7, 2024</span>\n   <span class=\"article-cat\">LEADERSHIP</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Welcomes Stefan Gustafsson as Chairman of the Board</h2>\n </div>\n <div class=\"article-body\">\n<p>We are pleased to welcome <b>Stefan Gustafsson</b> as the new Chairman of the Board at ECAPS. Stefan brings extensive leadership and strategic expertise in the space and defense sectors, developed through his work across international markets.</p>\n<p>Most recently, he served as <b>Senior Vice President at the Swedish Space Corporation</b>, where he led Corporate Strategy and Strategic Security, focusing particularly on the U.S. market while also overseeing projects in Europe, Asia, South America, and beyond. From 2021 to 2023, Stefan chaired the <b>European Commercial Spaceport Forum</b>, underscoring his commitment to advancing innovation in the European and global commercial space industries.</p>\n<p>Stefan's distinguished career includes a notable tenure in the <b>Swedish Armed Forces</b>, where he held pivotal roles that contributed to national defense and security advancements. His professional influence is recognized through his membership in prestigious institutions, including:</p>\n<ul>\n <li>Royal Swedish Academy of War Sciences</li>\n <li>Royal Swedish Society of Naval Sciences</li>\n <li>French Aerospace Academy</li>\n</ul>\n<p>He is also an alumnus of the <b>U.S. Naval Command College</b>.</p>\n<p>With Stefan's insight, strategic expertise, and international experience, we look forward to advancing ECAPS' mission and strengthening our presence in the global space and defense sectors.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"as9100-certification\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">APRIL 16, 2024</span>\n   <span class=\"article-cat\">QUALITY</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Attains NQA AS9100 and ISO 9001 Certifications</h2>\n </div>\n <div class=\"article-body\">\n<p>We are delighted to announce that ECAPS has successfully achieved the prestigious <b>NQA AS9100</b> and <b>ISO 9001</b> certifications, underscoring our unwavering commitment to excellence and quality in aerospace manufacturing and management.</p>\n<p>This significant milestone underscores our dedication to upholding the highest industry standards and ensuring the utmost quality, reliability, and performance across all our products and services. By implementing robust quality management systems, ECAPS continues to set the benchmark for excellence in the space propulsion sector.</p>\n<p>These certifications validate our steadfast focus on <b>quality management, continual improvement, and customer satisfaction</b>. Customers can have complete confidence in our processes, products, and services, knowing that they meet or exceed the stringent requirements of the aerospace industry.</p>\n<p>At ECAPS, we remain steadfast in our mission to deliver cutting-edge, sustainable propulsion solutions that redefine the future of space exploration.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"oak-universe-acquisition\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">APRIL 16, 2024</span>\n   <span class=\"article-cat\">CORPORATE</span>\n  </div>\n  <h2 class=\"article-title\">Oak Universe Completes Acquisition of ECAPS AB</h2>\n </div>\n <div class=\"article-body\">\n<p>Oak Universe AB is pleased to announce the successful completion of its acquisition of ECAPS AB on <b>July 27, 2023</b>. This strategic move marks a significant milestone in Oak Universe's expansion into the aerospace industry.</p>\n<p>ECAPS AB is a renowned company specializing in the production of rocket engines and propellant for satellites and spacecraft. Recognized as a global leader in the development of non-toxic, \"green\" mono-propellant, ECAPS has positioned itself at the forefront of sustainable propulsion solutions.</p>\n<blockquote>\"We are excited to announce the completion of the acquisition of ECAPS AB. By leveraging ECAPS's technical excellence in sustainable propulsion systems, we aim to drive innovation and accelerate advancements in sustainable propulsion technology. Together, we are committed to contributing to the growth and success of the space industry.\"\n<cite>\u2014 Odysseas Christofi and John Franklin, Founding Partners, Oak Universe AB</cite></blockquote>\n<p>Under the new ownership of Oak Universe, ECAPS is poised for accelerated growth. <b>Robert de Try</b> was appointed as <b>Managing Director of ECAPS</b>, bringing extensive experience in the space industry, having previously served as the site director at ECAPS.</p>\n<blockquote>\"I am truly excited to continue the development of ECAPS with its world-class team and the world's leading sustainable propulsion technologies, invented in Sweden. With access to Oak Universe's expertise and network, ECAPS will be able to further build upon the company's past successes.\"\n<cite>\u2014 Robert de Try, Managing Director, ECAPS</cite></blockquote>\n<h4>Strategic Initiatives Ahead</h4>\n<ul>\n <li><b>Market Expansion:</b> ECAPS will capitalize on its established U.S. presence while exploring untapped opportunities in the European market.</li>\n <li><b>Product Development:</b> Diversify product offerings by developing new generation larger thrusters to meet demand from larger spacecraft.</li>\n <li><b>Production Scaling:</b> Strategic investments to optimize manufacturing processes, streamline operations, and increase production capacity.</li>\n</ul>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"300th-thruster-tested\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">JUNE 29, 2022</span>\n   <span class=\"article-cat\">MILESTONE</span>\n  </div>\n  <h2 class=\"article-title\">300th Thruster Tested</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Solna, Sweden \u2014 June 29, 2022</b></p>\n<p>Today, Wednesday 29th of June, ECAPS test team completed hot-fire testing of our <b>300th thruster</b> at our Space Test Centre at <b>Swedish Defence Research Agency (FOI)</b> in Grindsj\u00f6n, Sweden.</p>\n<p>The 300th thruster was a <b>1 N thruster</b> which will be delivered to one of our many customers of our world-class high-performance green propulsion for satellite applications.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"ecaps-is-20\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">NOVEMBER 28, 2020</span>\n   <span class=\"article-cat\">HERITAGE</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS is 20</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Solna, Sweden \u2014 November 28, 2020</b></p>\n<p>ECAPS is celebrating <b>20 years in High Performance Green Propulsion</b>. What began as a collaboration with SSC, Volvo Aero and the Swedish Government back in the mid 1990's, was inaugurated as ECAPS company on <b>28th November 2000</b>.</p>\n<p>Since then we have been developing and testing Green propellants, engines, systems and technology. Now, 20 years later, we continue to deliver products to our worldwide customers with a class-topping range of high-performance thrusters, and expertise. Now part of <b>Bradford Space group</b>, the company is still based in Solna, Sweden where we started.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"10-years-in-orbit\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">JUNE 15, 2020</span>\n   <span class=\"article-cat\">HERITAGE</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Celebrates 10 Years in Orbit</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2014 June 15, 2020</b></p>\n<p>On the sunny afternoon of June 15th 2010, a Dnepr rocket sat quietly in a Yasny missile silo. On board was the <b>PRISMA spacecraft</b>, a Swedish technology demonstrator mission. PRISMA was a 190 kg combined satellite and target drone designed to investigate techniques for formation flying and rendezvous in low Earth orbit. The launch went ahead as scheduled at 14:42, releasing PRISMA into orbit 16 minutes later.</p>\n<p>This launch was significant for Bradford ECAPS as it included the <b>first HPGP rocket engines on a spacecraft</b>. Two 1 N HPGP thrusters were fitted to the satellite to provide orbit maintenance throughout the mission.</p>\n<p>When PRISMA was launched, the <b>1 N HPGP thruster was the highest performance monopropellant thruster in the world</b>. Today, 10 years later, it still is. The technology demonstrated on PRISMA continues, as further variants of the original 1 N HPGP design are in continuous production and supplied to customers around the world.</p>\n<h4>SkySat Systems Ready for Launch</h4>\n<p>The Bradford ECAPS propulsion systems for SkySats 16\u201318 are fueled and ready for lift-off at Cape Canaveral Air Force Station, USA, onboard the SpaceX Falcon 9 Starlink 8 mission. Three other systems, for SkySats 19\u201321, will be launched later this summer on another SpaceX Falcon 9.</p>\n<p>To date, <b>19 propulsion systems have been delivered to Planet</b> of which 13 have been successfully deployed and are operating in orbit.</p>\n<h4>1 N HPGP Thrusters \u2014 Ongoing Programs</h4>\n<ul>\n <li>Moog's first SL-OMV mission out of the United Kingdom \u2014 6 units scheduled Q3 2020</li>\n <li>Eight 1 N HPGP High Throughput systems for the first <b>Astranis</b> micro-GEO mission</li>\n <li>Twelve thrusters delivered to <b>VACCO</b> for Millennium Space Systems ALTAIR spacecraft</li>\n <li>Four thrusters delivered to <b>NanoAvionics</b> in early May 2020</li>\n <li>Double-capacity SkySat-like system for <b>York Space Systems</b>, US \u2014 Q2 2021</li>\n <li><b>Astroscale ELSA-d</b> \u2014 eight 1 N HPGP thrusters, launching October 2020 (TBC)</li>\n <li><b>ArgoMoon</b> CubeSat subsystem powered by one ECAPS 100 mN thruster</li>\n <li>Tailored SkySat system on Blue Canyon <b>Tetra-3</b> mission \u2014 Q1 2021</li>\n</ul>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"skysat-commissioning\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">NOVEMBER 21, 2017</span>\n   <span class=\"article-cat\">MILESTONE</span>\n  </div>\n  <h2 class=\"article-title\">Six ECAPS Propulsion Systems Commissioned Into Service</h2>\n </div>\n <div class=\"article-body\">\n<p><b>November 21, 2017</b></p>\n<p>Following the launch of six Planet SkySats on a <b>Minotaur-C rocket from Vandenberg Air Force Base</b> on October 31st, 2017, Bradford ECAPS announces the successful commissioning of all six propulsion systems from ECAPS, including firings of the 1 Newton maneuvering thrusters.</p>\n<p>This was confirmed through a series of tests and maneuvers conducted by Planet from November 7 to November 16. The successful launch, deployment and commissioning takes the number of successful spacecraft with ECAPS thrusters to <b>12</b> and the number of <b>ECAPS thrusters on orbit to 48</b>.</p>\n<blockquote>\"We are very pleased to see the successful commissioning of our subsystems. It is fantastic to see the fruits of all the hard work between our employees and our suppliers and, of course, our partner Planet.\"\n<cite>\u2014 Mathias Persson, Business Director, Bradford ECAPS</cite></blockquote>\n<blockquote>\"We've successfully completed commissioning of the newest six ECAPS systems on SkySat-8 through SkySat-13. The propulsion modules are healthy and performing nominally. I'm extremely pleased with the operational performance of the 11 ECAPS systems across Planet's SkySat fleet.\"\n<cite>\u2014 Pete Friedhoff, Propulsion Lead, Planet</cite></blockquote>\n<p>ECAPS' High Performance Green Propulsion technology is an emerging choice by spacecraft manufacturers as an enhanced alternative to existing hydrazine-based solutions. The system provides a unique high-density storage, is high-performant and, due to the low-toxicity and low sensitivity of the propellant, easy to transport and handle.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"minotaur-c-launch\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">OCTOBER 11, 2017</span>\n   <span class=\"article-cat\">PROGRAM</span>\n  </div>\n  <h2 class=\"article-title\">Upcoming Launch Represents a Major Milestone for Clean and Non-Toxic Spacecraft Propulsion</h2>\n </div>\n <div class=\"article-body\">\n<p><b>October 11, 2017</b></p>\n<p>An upcoming launch of an <b>Orbital ATK Minotaur-C rocket</b> will be carrying six Planet SkySat earth observation satellites, each equipped with ECAPS-built propulsion systems. This will be the most significant launch to date for ECAPS' \"green\" high performance propulsion systems.</p>\n<p>Most spacecraft to date have typically employed maneuvering thrusters which use <b>hydrazine</b>, a simple and effective but highly toxic and dangerous fuel. ECAPS, however, uses a propellant blend (<b>LMP-103S</b>) that is so safe that it can be transported on commercial aircraft and be handled with only simple safety measures. In addition, the blend is higher density than hydrazine \u2014 a fact that helps ECAPS be more efficient than hydrazine while being cleaner and lower cost.</p>\n<p>The ECAPS system was developed in Sweden by the company of the same name over the course of most of the last two decades. After incubating within the Swedish government-owned <b>Swedish Space Corporation</b>, ECAPS was acquired earlier this year and merged with <b>Bradford</b>, a Netherlands-based builder of propulsion subsystems and attitude control systems.</p>\n<blockquote>\"This is truly an international collaboration of European and American companies and technologies coming together to make going to space an ecologically friendly endeavor. We are very happy to be involved in this ground-breaking technology.\"\n<cite>\u2014 Ian Fichtenbaum, Director, Bradford and AIAC</cite></blockquote>\n<p>The Minotaur launch is scheduled for <b>October 31st, 2017</b> out of Vandenberg Air Force Base, California.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"green-propellant-loading\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">SEPTEMBER 26, 2017</span>\n   <span class=\"article-cat\">OPERATIONS</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Performs 'Green' Propellant Loading</h2>\n </div>\n <div class=\"article-body\">\n<p><b>September 26, 2017</b></p>\n<p>Bradford ECAPS has now performed the <b>first US \"green\" propellant satellite fuelling campaign</b> within the Orbital ATK facilities at <b>Vandenberg Air Force Base (VAFB)</b> in California. During this campaign, six SkySats (Planet Labs Inc.) were fuelled with LMP-103S propellant.</p>\n<p>The propellant handling, including the loading of the satellites, was regarded as <b>non-hazardous operations</b> by the range safety. Only the dynamic gas pressurisation operations of the propulsion systems were judged as hazardous.</p>\n<p>The fuelling operations were completed by a <b>four-man crew within a seven-day week</b> from arrival to pressurisation of the last satellite. The crew was a team of personnel from Bradford ECAPS, MOOG and NASA. Only simple personal protective equipment (PPE) for handling of regular chemicals was used during the operations, while traditional propellants require so-called SCAPE operations.</p>\n<p>The propellant was transported by a <b>passenger aircraft</b> from Stockholm Arlanda Airport, Sweden, to Los Angeles International Airport \u2014 which would be impossible for a Hydrazine propellant.</p>\n<p>The HPGP technology is space proven by the PRISMA mission launched in 2010, followed by the launches of one SkySat from India and four SkySats from French Guyana during 2016.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Press</div>\n <h2>Press &amp; media <em>inquiries.</em></h2>\n <div class=\"cta-row\">\n  <a href=\"mailto:info@ecaps.se?subject=Press\" class=\"btn-primary\">Press contact \u2192</a>\n  <a href=\"#/news\" class=\"btn-ghost\">Back to all news \u2197</a>\n </div>\n</div>","news":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <a href=\"#/about\">Corporate</a>\n  <span>/</span>\n  <span><b>NEWS</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>ARCHIVE \u00b7 <b>2017 \u2014 2026</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">News &amp; <em>updates.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">Press releases, partnership announcements, and operational milestones from ECAPS \u2014 covering programs, partnerships, capital, leadership, R&amp;D, and heritage spanning nearly a decade.</p>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1581090700227-1e37b190418e?w=2400&q=90&auto=format&fit=crop\" alt=\"ECAPS announcements and program developments\" />\n <div class=\"telemetry\">\n  ANNOUNCEMENTS <b>19 ITEMS</b><br>\n  RANGE <b>2017 \u2014 2026</b><br>\n  CATEGORIES <b>PROGRAMS \u00b7 PARTNERSHIPS \u00b7 CAPITAL \u00b7 LEADERSHIP \u00b7 R&amp;D</b>\n </div>\n <div class=\"caption\">PROGRAM ANNOUNCEMENTS \u00b7 PARTNERSHIPS \u00b7 CAPITAL \u00b7 OPERATIONAL MILESTONES \u00b7 HERITAGE</div>\n</div>\n\n<section>\n <div class=\"news-grid reveal\">\n\n  <a href=\"#/news-article/ecaps-japan\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>24</b><span>APR \u00b7 2026</span></div>\n    <span>EXPANSION</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/7cfd93f8-24d7-44cb-a59b-96129be02557/ECAPS+Japan_No+Background.png\" alt=\"ECAPS Initiates Establishment of ECAPS Japan\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Initiates Establishment of ECAPS Japan</h3>\n   <p>ECAPS announces the initiation of ECAPS Japan to support local industrial activity and expand engagement in the Japanese space market \u2014 initial capacity of ~30 systems per year.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/helmrich-board\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>22</b><span>APR \u00b7 2026</span></div>\n    <span>LEADERSHIP</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/03babd8e-eda3-4683-bb23-18e5f8bf6a4e/Lars+Helmrich.jpg\" alt=\"ECAPS Appoints Brigadier General (Ret) Lars Helmrich to Board of Directors\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Appoints Brigadier General (Ret) Lars Helmrich to Board of Directors</h3>\n   <p>Brig. Gen. (Ret) Lars Helmrich joins the Board, bringing extensive experience across military aviation, defense procurement, and program leadership within Sweden's defense establishment.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/eib-financing\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>10</b><span>DEC \u00b7 2025</span></div>\n    <span>CAPITAL</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/01fca8e6-aa51-4e88-a330-83ac4460c700/1.jpeg\" alt=\"ECAPS Receives EIB Financing to Develop Cutting-Edge Technologies for Space and Defence\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Receives EIB Financing to Develop Cutting-Edge Technologies for Space and Defence</h3>\n   <p>The European Investment Bank lends ECAPS \u20ac20 million to accelerate development of high-performance rocket engines and dual-use propulsion capabilities \u2014 the EIB's first loan to the Swedish space industry.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/tyr-1-otv\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>19</b><span>NOV \u00b7 2025</span></div>\n    <span>PROGRAM</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/be3c4517-082f-4508-b677-8e2f63f3de9b/Adobe+Express+-+file.png\" alt=\"ECAPS Announces TYR-1: A Swedish\u2013European Orbital Transfer Vehicle Demonstrator\" loading=\"lazy\" decoding=\"async\" style=\"object-fit:contain;background:#0a1018\" />\n   </div>\n   <h3>ECAPS Announces TYR-1: A Swedish\u2013European Orbital Transfer Vehicle Demonstrator</h3>\n   <p>TYR-1, a Swedish-built Orbital Transfer Vehicle demonstration mission, will showcase ECAPS' FAST propulsion architecture as foundation for sovereign European orbital mobility \u2014 powered by 450 N-class modules.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/25-years\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>08</b><span>OCT \u00b7 2025</span></div>\n    <span>MILESTONE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892954-W2B6Z18Q6X6IOFMOQOTO/ECAPS+25_1.png\" alt=\"ECAPS Marks 25 Years of Swedish Propulsion Innovation\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Marks 25 Years of Swedish Propulsion Innovation</h3>\n   <p>ECAPS celebrates its 25th anniversary \u2014 a quarter-century of innovation in spacecraft and defense mobility, advancing high-performance ADN-based LMP-103S propulsion.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/snsa-fast\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>25</b><span>SEP \u00b7 2025</span></div>\n    <span>FUNDING</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543893144-RKJC9RGK184LIUTPSBM1/Thruster+Fast+Start-up\" alt=\"SNSA Awards ECAPS Contract for Fast Start-up Thrusters in Sweden's First Dual-use Program\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>SNSA Awards ECAPS Contract for Fast Start-up Thrusters in Sweden's First Dual-use Program</h3>\n   <p>The Swedish National Space Agency awards ECAPS funding under the Dual-Use Space Technology Program, supporting development of FAST thrusters with sub-48-second start-up targeting 10 seconds.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/osaka-nordic-space-day\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>18</b><span>SEP \u00b7 2025</span></div>\n    <span>PARTNERSHIPS</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892986-3M78AQFXF657ZEC4AQHQ/Flags+Osaka.png\" alt=\"Strengthening Nordic\u2013Japan Space Cooperation: ECAPS at Osaka Nordic Space Day\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>Strengthening Nordic\u2013Japan Space Cooperation: ECAPS at Osaka Nordic Space Day</h3>\n   <p>ECAPS participates in 'Building Commercial Partnerships in Space' panel at Nordic Space Day in Osaka, strengthening Swedish\u2013Japanese cooperation in space.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/ecaps-ise-apu\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>29</b><span>JUL \u00b7 2025</span></div>\n    <span>PARTNERSHIPS</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892852-0JU9HZ422E4ZQ7ZMY8BK/Ecaps+and+ISE.png\" alt=\"ECAPS and ISE Collaborate to Demonstrate Auxiliary Power Unit (APU) Powered by LMP-103S\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS and ISE Collaborate to Demonstrate Auxiliary Power Unit (APU) Powered by LMP-103S</h3>\n   <p>ECAPS AB and International Submarine Engineering Ltd. (Canada) announce collaborative demonstration of a high-performance APU based on LMP-103S \u2014 extending propellant to deliver thermal energy up to 1100\u00b0C.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/fast-22n-test\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>05</b><span>MAY \u00b7 2025</span></div>\n    <span>R&D</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892934-4V04XC5OJLHB1DZBFJGL/IMG_0251.JPEG\" alt=\"ECAPS Demonstrates Breakthrough in Rapid Start-Up with 22 N FAST Experimental Thruster\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Demonstrates Breakthrough in Rapid Start-Up with 22 N FAST Experimental Thruster</h3>\n   <p>ECAPS completes hot-firing test of 22 N FAST thruster, achieving full start-up from ambient to steady-state in under 48 seconds \u2014 a major advance in rapid-response propulsion.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/bipropellant-test\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>18</b><span>NOV \u00b7 2024</span></div>\n    <span>R&D</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543892904-6PANXJCO8DV5XT4DWQ4Y/image.png\" alt=\"ECAPS Conducts Successful Test Unlocking New Applications for Bipropellant Thrusters and Gas Generators\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Conducts Successful Test Unlocking New Applications for Bipropellant Thrusters and Gas Generators</h3>\n   <p>ECAPS completes a critical hot-firing test campaign of its LMP-103S derivative \u2014 49 firings validating integration with bipropellant thrusters and gas generators enabled by fast start-up technology.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/gustafsson-chairman\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>07</b><span>NOV \u00b7 2024</span></div>\n    <span>LEADERSHIP</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543893053-UFJTPWTASZTF1NSCCBYK/B+Bild+Stefan+2.jpg\" alt=\"ECAPS Welcomes Stefan Gustafsson as Chairman of the Board\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Welcomes Stefan Gustafsson as Chairman of the Board</h3>\n   <p>Stefan Gustafsson, with extensive leadership in space and defense sectors and former Senior VP at Swedish Space Corporation, joins ECAPS as new Chairman of the Board.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/as9100-certification\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>16</b><span>APR \u00b7 2024</span></div>\n    <span>QUALITY</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg\" alt=\"ECAPS Attains NQA AS9100 and ISO 9001 Certifications\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Attains NQA AS9100 and ISO 9001 Certifications</h3>\n   <p>ECAPS achieves the prestigious NQA AS9100 and ISO 9001 certifications, underscoring its commitment to excellence and quality in aerospace manufacturing and management.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/oak-universe-acquisition\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>16</b><span>APR \u00b7 2024</span></div>\n    <span>CORPORATE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889927-UAOF4D8VPHS7IVHK7JZ3/AdobeStock_430740424.jpeg\" alt=\"Oak Universe Completes Acquisition of ECAPS AB\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>Oak Universe Completes Acquisition of ECAPS AB</h3>\n   <p>Oak Universe AB completes its acquisition of ECAPS AB (July 27, 2023), marking strategic expansion into aerospace. Robert de Try appointed as Managing Director.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/300th-thruster-tested\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>29</b><span>JUN \u00b7 2022</span></div>\n    <span>MILESTONE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg\" alt=\"300th Thruster Tested\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>300th Thruster Tested</h3>\n   <p>ECAPS completes hot-fire testing of its 300th thruster at the Space Test Centre at Swedish Defence Research Agency (FOI) in Grindsj\u00f6n, Sweden.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/ecaps-is-20\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>28</b><span>NOV \u00b7 2020</span></div>\n    <span>HERITAGE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg\" alt=\"ECAPS is 20\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS is 20</h3>\n   <p>ECAPS celebrates 20 years in High Performance Green Propulsion. Inaugurated November 28, 2000 from collaboration with SSC, Volvo Aero and the Swedish Government.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/10-years-in-orbit\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>15</b><span>JUN \u00b7 2020</span></div>\n    <span>HERITAGE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=1200&q=85&auto=format&fit=crop\" alt=\"ECAPS Celebrates 10 Years in Orbit\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Celebrates 10 Years in Orbit</h3>\n   <p>Ten years after the PRISMA launch (June 15, 2010) with the first HPGP rocket engines in space \u2014 1 N thrusters that remain the highest-performance monopropellant thrusters in the world.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/skysat-commissioning\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>21</b><span>NOV \u00b7 2017</span></div>\n    <span>MILESTONE</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=1200&q=85&auto=format&fit=crop\" alt=\"Six ECAPS Propulsion Systems Commissioned Into Service\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>Six ECAPS Propulsion Systems Commissioned Into Service</h3>\n   <p>Following the Minotaur-C launch from Vandenberg AFB on October 31, all six propulsion systems on Planet SkySats 8\u201313 successfully commissioned, taking the count of ECAPS thrusters on orbit to 48.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/minotaur-c-launch\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>11</b><span>OCT \u00b7 2017</span></div>\n    <span>PROGRAM</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=1200&q=85&auto=format&fit=crop\" alt=\"Upcoming Launch Represents a Major Milestone for Clean and Non-Toxic Spacecraft Propulsion\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>Upcoming Launch Represents a Major Milestone for Clean and Non-Toxic Spacecraft Propulsion</h3>\n   <p>An Orbital ATK Minotaur-C rocket will carry six Planet SkySat earth observation satellites equipped with ECAPS propulsion \u2014 the largest deployment to date of 'green' non-toxic spacecraft propulsion.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n  <a href=\"#/news-article/green-propellant-loading\" class=\"news-card\">\n   <div class=\"news-meta\">\n    <div class=\"news-date\"><b>26</b><span>SEP \u00b7 2017</span></div>\n    <span>OPERATIONS</span>\n   </div>\n   <div class=\"news-img\">\n    <img src=\"https://images.unsplash.com/photo-1517976547714-720226b864c1?w=1200&q=85&auto=format&fit=crop\" alt=\"ECAPS Performs 'Green' Propellant Loading\" loading=\"lazy\" decoding=\"async\" />\n   </div>\n   <h3>ECAPS Performs 'Green' Propellant Loading</h3>\n   <p>Bradford ECAPS performs the first US 'green' propellant satellite fuelling campaign at Vandenberg AFB \u2014 six SkySats fueled with LMP-103S, propellant transported by passenger aircraft.</p>\n   <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n  </a>\n\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Press</div>\n <h2>Press &amp; media <em>inquiries.</em></h2>\n <div class=\"cta-row\">\n  <a href=\"mailto:info@ecaps.se?subject=Press\" class=\"btn-primary\">Press contact \u2192</a>\n  <a href=\"https://www.linkedin.com/company/ecaps-ab\" target=\"_blank\" class=\"btn-ghost\">LinkedIn \u2197</a>\n </div>\n</div>","propellant-logistics":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/lmp-103s-propellant\">Propellant</a>\n <span>/</span>\n <span><b>LOGISTICS</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">LMP-103S <em>Propellant Logistics.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Secure, scaleable, and mission-ready propellant supply and handling solutions. End-to-end propellant logistics supporting space and defense propulsion programs.</p>\n <div class=\"hero-coords reveal\">\n <div>SCOPE \u2014 <b>PRODUCTION \u2192 PAD</b></div>\n <div>CLASSES \u2014 <b>UN 1.4S \u00b7 1.D</b></div>\n <div>SCALE \u2014 <b>1L \u2192 1000L</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765798589126-L5ON5WMTOSDVYR50EMD9/unsplash-image-Q1p7bh3SHj8.jpg\" alt=\"Logistics operations\" />\n <div class=\"caption\">END-TO-END PROPELLANT LOGISTICS</div>\n</div>\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Overview \u00b7 01</div>\n <h2 class=\"section-title\">End-to-end <em>propellant logistics.</em></h2>\n </div>\n <p>ECAPS provides integrated propellant logistics solutions, supporting space and defense propulsion programs. Our capabilities cover propellant production, coordination, storage, transport, handling, and on-site support, ensuring safety, compliance, and operational readiness throughout the mission lifecycle.</p>\n </div>\n\n <!-- Stat strip \u2014 track record + certifications -->\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:32px\">\n  <div style=\"background:var(--bg);padding:24px 26px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Operational Since</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:34px;font-weight:700;color:var(--ink);margin-top:10px;letter-spacing:-.02em;line-height:1\">2010</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:8px;letter-spacing:.10em\">15+ YEARS HERITAGE</div>\n  </div>\n  <div style=\"background:var(--bg);padding:24px 26px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Hazard Certification</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--ink);margin-top:10px;letter-spacing:-.02em;line-height:1\">UN 1.4S \u00b7 1.D</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:8px;letter-spacing:.10em\">PASSENGER-AIRCRAFT CLEARED</div>\n  </div>\n  <div style=\"background:var(--bg);padding:24px 26px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Quality Framework</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin-top:10px;letter-spacing:-.02em;line-height:1\">AS9100 \u00b7 ISO 9001</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:8px;letter-spacing:.10em\">AUDITED &amp; RECERTIFIED</div>\n  </div>\n  <div style=\"background:var(--bg);padding:24px 26px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">Delivery Scale</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:26px;font-weight:700;color:var(--ink);margin-top:10px;letter-spacing:-.02em;line-height:1\">1L \u2192 1,000L</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:8px;letter-spacing:.10em\">LAB TO LAUNCH-PAD</div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a702 GLOBAL REACH \u2014 Map + delivery modes -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Global Reach \u00b7 02</div>\n <h2 class=\"section-title\">Worldwide <em>delivery network.</em></h2>\n </div>\n <p>UN-certified propellant logistics across air, sea, ground, and on-site operations. International coverage matched to program needs \u2014 from laboratory R&amp;D shipments to operational fueling campaigns.</p>\n </div>\n\n <!-- Map -->\n <div class=\"reveal\" style=\"position:relative;background:#0a1018;border:1px solid var(--border);overflow:hidden;margin-bottom:32px\">\n  <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/0f92ed34-678d-4f67-9944-85875e6d52a4/Map+3.png\" alt=\"Global propellant logistics network\" style=\"display:block;width:100%;height:auto;opacity:.92\" loading=\"lazy\" />\n  <div style=\"position:absolute;top:24px;left:28px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;background:rgba(6,8,11,.55);padding:7px 12px;border:1px solid rgba(34,211,238,.25)\">\n   Propellant Logistics \u00b7 International Delivery Network\n  </div>\n  <div style=\"position:absolute;bottom:20px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;font-family:ui-monospace,monospace;font-size:10px;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase\">\n   <div>HQ \u2014 Sweden</div>\n   <div>Fueling Campaigns \u2014 International</div>\n   <div>UN 1.4S \u00b7 UN 1.D \u00b7 UN0481</div>\n  </div>\n </div>\n\n <!-- Delivery Modes -->\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;border-top:1px solid var(--border);padding-top:32px\">\n  <div style=\"padding:20px 22px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ Air</div>\n   <div style=\"font-size:17px;font-weight:600;color:var(--ink);margin-top:8px\">Air Freight</div>\n   <div style=\"font-size:12px;color:var(--ink-2);margin-top:8px;line-height:1.6\">Passenger-aircraft cleared. Fast international shipping of laboratory-scale batches (1L \u2192 20L) under UN 1.4S certification.</div>\n  </div>\n  <div style=\"padding:20px 22px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ Sea</div>\n   <div style=\"font-size:17px;font-weight:600;color:var(--ink);margin-top:8px\">Sea Freight</div>\n   <div style=\"font-size:12px;color:var(--ink-2);margin-top:8px;line-height:1.6\">Bulk container shipping for mid- to large-scale programs (200L \u2192 1,000L). Cost-effective transport for non-urgent campaign supply.</div>\n  </div>\n  <div style=\"padding:20px 22px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ Ground</div>\n   <div style=\"font-size:17px;font-weight:600;color:var(--ink);margin-top:8px\">Ground Transport</div>\n   <div style=\"font-size:12px;color:var(--ink-2);margin-top:8px;line-height:1.6\">Regional and intra-EU surface delivery via certified hazmat carriers. Direct site-to-site movement at any scale.</div>\n  </div>\n  <div style=\"padding:20px 22px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ On-site</div>\n   <div style=\"font-size:17px;font-weight:600;color:var(--ink);margin-top:8px\">On-Site Campaign</div>\n   <div style=\"font-size:12px;color:var(--ink-2);margin-top:8px;line-height:1.6\">ECAPS engineers travel to customer facilities for fueling operations. Equipment, protocols, and qualified operators delivered with the propellant.</div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a703 LOGISTICS CAPABILITY \u2014 4 functions of the support framework -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Logistics Capability \u00b7 03</div>\n <h2 class=\"section-title\">Managed under <em>rigorous compliance.</em></h2>\n </div>\n <p>Production coordination, storage, transport compliance, and on-site operations \u2014 all delivered under the AS9100 / ISO 9001 quality framework.</p>\n </div>\n\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:var(--bg-2);border:1px solid var(--border)\">\n  <div style=\"padding:26px 26px;border-right:1px solid var(--border)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 01 \u2014 Production</div>\n   <h3 style=\"font-size:17px;margin:14px 0 12px;font-weight:600;letter-spacing:-.01em\">Production Coordination</h3>\n   <p style=\"font-size:12px;color:var(--ink-2);line-height:1.6;margin:0\">Synchronized supply across production sites. Batch tracking from ADN synthesis through final blending and qualification release.</p>\n  </div>\n  <div style=\"padding:26px 26px;border-right:1px solid var(--border)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 02 \u2014 Storage</div>\n   <h3 style=\"font-size:17px;margin:14px 0 12px;font-weight:600;letter-spacing:-.01em\">Storage &amp; Shelf Life</h3>\n   <p style=\"font-size:12px;color:var(--ink-2);line-height:1.6;margin:0\">Climate-controlled storage with batch traceability. Inventory aligned to program schedules with shelf-life monitoring throughout.</p>\n  </div>\n  <div style=\"padding:26px 26px;border-right:1px solid var(--border)\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 03 \u2014 Transport</div>\n   <h3 style=\"font-size:17px;margin:14px 0 12px;font-weight:600;letter-spacing:-.01em\">Transport Compliance</h3>\n   <p style=\"font-size:12px;color:var(--ink-2);line-height:1.6;margin:0\">UN classification, hazmat documentation, and multi-modal logistics. Approved for passenger air, sea, and ground transport.</p>\n  </div>\n  <div style=\"padding:26px 26px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 04 \u2014 Operations</div>\n   <h3 style=\"font-size:17px;margin:14px 0 12px;font-weight:600;letter-spacing:-.01em\">Ground Operations</h3>\n   <p style=\"font-size:12px;color:var(--ink-2);line-height:1.6;margin:0\">On-site handling support during fueling campaigns. Trained operators, safety protocols, and equipment for fielded operations.</p>\n  </div>\n </div>\n</section>\n\n<!-- ARCHITECTURE -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Supply Architecture \u00b7 04</div>\n <h2 class=\"section-title\">Supply &amp; <em>delivery pathways.</em></h2>\n </div>\n <p>Four-stage propellant logistics \u2014 from synthesis to qualified containers, delivered worldwide under full regulatory compliance.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr)\">\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 01 \u2014 PRODUCTION</div>\n   <h3 style=\"font-size:18px\">ADN Synthesis</h3>\n   <p style=\"margin-top:12px;font-size:13px\">High-purity ammonium-dinitramide produced under controlled industrial conditions for downstream propellant blending.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">CONTROLLED INDUSTRIAL FACILITY</div>\n  </div>\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 02 \u2014 BLENDING</div>\n   <h3 style=\"font-size:18px\">LMP-103S\u2122 Blending</h3>\n   <p style=\"margin-top:12px;font-size:13px\">ADN, methanol, ammonia and water blended in qualified cleanrooms. Four blend variants produced to mission specification.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">AS9100 \u00b7 ISO 9001 CLEANROOMS</div>\n  </div>\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 03 \u2014 QUALIFICATION</div>\n   <h3 style=\"font-size:18px\">Hot-Fire Testing</h3>\n   <p style=\"margin-top:12px;font-size:13px\">Each batch hot-fire qualified at accredited test centres before release. Performance validated against ISP, density and thermal specifications.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">QUALIFIED \u00b7 ESA \u00b7 NASA \u00b7 NRO \u00b7 SNSA</div>\n  </div>\n\n  <div class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ 04 \u2014 DELIVERY</div>\n   <h3 style=\"font-size:18px\">Global Distribution</h3>\n   <p style=\"margin-top:12px;font-size:13px\">UN 1.4S certified containers from 1L laboratory scale to 1,000L mission tankage. Approved for passenger aircraft transport.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">UN 1.4S \u00b7 UN0481 \u00b7 WORLDWIDE</div>\n  </div>\n\n </div>\n</section>\n\n<!-- CONTAINERS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Shipping Containers \u00b7 05</div>\n <h2 class=\"section-title\">Certified across <em>every scale.</em></h2>\n </div>\n <p>Certified packaging solutions supporting safe, compliant transport and handling across program scales.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"gap:24px\">\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/5802ee5b-9f2e-4b2c-98ca-6424bf1bfe5d/2noback.png\" alt=\"Small batch container\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ SMALL BATCH</div>\n <div class=\"pc-name\">1L \u00b7 5L \u00b7 20L</div>\n <div class=\"pc-desc\">Plastic \u00b7 UN 1.4S certified \u00b7 passenger-aircraft cleared</div>\n </div>\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/d7962bf0-3661-453c-854c-1b0835c1a71e/3nobackg.png\" alt=\"Mid-scale container\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ MID-SCALE</div>\n <div class=\"pc-name\">200L</div>\n <div class=\"pc-desc\">Plastic or stainless \u00b7 Fast-track 1.D certification</div>\n </div>\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/a6057f72-dae8-4b8e-8c98-0e34f08f2866/1_nobackg.png\" alt=\"Bulk industrial container\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ BULK INDUSTRIAL</div>\n <div class=\"pc-name\">1000L</div>\n <div class=\"pc-desc\">Plastic or stainless \u00b7 Fast-track 1.D certification</div>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Plan your <em>logistics campaign.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Contact ECAPS \u2192</a><a href=\"#/fuelling-campaigns\" class=\"btn-ghost\">View Fueling Campaigns</a></div>\n</div>","propulsion-modules":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/space-capabilities\">Space</a>\n <span>/</span>\n <span><b>PROPULSION MODULES</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Satellite Propulsion <em>Systems.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">High-performance propulsion modules for satellite and spacecraft mobilization. ECAPS provides standardized solutions tailored for different satellite classes \u2014 from small satellites to larger platforms.</p>\n <div class=\"hero-coords reveal\">\n <div>CLASSES \u2014 <b>MPC1 \u00b7 MPC2 \u00b7 MPC3</b></div>\n <div>PLATFORMS \u2014 <b>50 \u2192 450+ KG</b></div>\n <div>SKYSAT \u2014 <b>19 SYSTEMS DEPLOYED</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/80a0be8a-581b-4774-b505-f199fcbf7ae4/MPC3_faceA.png\" alt=\"MPC3 propulsion module\" style=\"object-fit:contain;background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);filter:none\" />\n <div class=\"telemetry\">\n PRODUCT <b>MPC3</b><br>\n CLASS <b>LARGESAT</b><br>\n RANGE <b>200-450+ KG</b>\n </div>\n <div class=\"caption\">MPC3 \u2014 INTEGRATED PROPULSION MODULE</div>\n</div>\n\n<!-- INTERACTIVE MODULE SCHEMATIC -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Interactive Schematic</div>\n <h2 class=\"section-title\">Configure your <em>module.</em></h2>\n </div>\n <p>Switch between module classes to see thruster placement, propellant mass, and capability envelope. Hover any component for detail.</p>\n </div>\n <div class=\"reveal\" style=\"margin:0 auto;max-width:1200px\">\n <div data-schem=\"module\"></div>\n </div>\n</section>\n\n<!-- MISSION CAPABILITIES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Mission Capabilities \u00b7 01</div>\n <h2 class=\"section-title\">Complete system <em>integration.</em></h2>\n </div>\n <p>Complete system integration supporting satellites and spacecraft with diverse thrust classes and mission objectives.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n <div class=\"spec-row\"><dt>High Delta-V Maneuvers</dt><dd>High Delta-V spacecraft maneuvering and <b>orbit raisers</b></dd></div>\n <div class=\"spec-row\"><dt>Rapid Deployment</dt><dd>Rapid satellite deployment and <b>upper (kick) stage propulsion</b></dd></div>\n <div class=\"spec-row\"><dt>Constellation Management</dt><dd>Constellation management for <b>optimal coordination</b></dd></div>\n <div class=\"spec-row\"><dt>End-of-Life</dt><dd>De-orbiting &amp; station-keeping for <b>positional optimization</b></dd></div>\n </dl>\n</section>\n\n<!-- PRODUCT FAMILY -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Product Family \u00b7 02</div>\n <h2 class=\"section-title\">Three classes.<br>One <em>scalable architecture.</em></h2>\n </div>\n <p>Each system is designed for efficiency, operational safety, and adaptability to mission requirements.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"gap:24px\">\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2c213060-5f36-4845-8c37-65a2c6e56180/MPC1_faceB.png\" alt=\"MPC1\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ MPC1</div>\n <div class=\"pc-name\">SmallSat (50-150 kg)</div>\n <div class=\"pc-desc\">Constellation phasing, station-keeping, mid-orbit inclination changes, collision avoidance.</div>\n </div>\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/b111c2b7-d66c-4c69-a58c-49faafda5e71/MPC2_faceA.png\" alt=\"MPC2\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ MPC2</div>\n <div class=\"pc-name\">SmallSat (140-260 kg)</div>\n <div class=\"pc-desc\">Extended capability for medium-class small satellites and dual-mission profiles.</div>\n </div>\n <div class=\"product-card\">\n <div class=\"pc-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/17c8328b-86d7-4442-8893-32f89fc89928/MPC3_faceA.png\" alt=\"MPC3\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <div class=\"pc-label\">/ MPC3</div>\n <div class=\"pc-name\">LargeSat (200-450+ kg)</div>\n <div class=\"pc-desc\">MEO/GEO transfer, station-keeping, orbit changes, inclination changes, end-of-life disposal.</div>\n </div>\n </div>\n</section>\n\n<!-- SPEC TABLES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Specifications \u00b7 03</div>\n <h2 class=\"section-title\">Hardware <em>verified.</em></h2>\n </div>\n <p>Comparison of standardized propulsion module configurations.</p>\n </div>\n\n <div class=\"thruster-table reveal\">\n <table>\n <thead>\n <tr>\n <th>Specification</th>\n <th>MPC1 \u00b7 SmallSat 50-150kg</th>\n <th>MPC2 \u00b7 SmallSat 140-260kg</th>\n <th>MPC3 \u00b7 LargeSat 200-450+kg</th>\n </tr>\n </thead>\n <tbody>\n <tr><td>CPS Functions</td><td>Constellation phasing/management, station-keeping, mid-orbit inclination changes, collision avoidance</td><td>Constellation phasing/management, station-keeping, mid-orbit inclination changes, collision avoidance</td><td>MEO/GEO transfer, station-keeping, orbit changes, inclination changes, end-of-life disposal</td></tr>\n <tr><td>Propellant Mass</td><td>8 kg</td><td>8 kg</td><td>200 kg</td></tr>\n <tr><td>Thruster Configuration</td><td>AOCS: 4\u00d7 100 mN \u00b7 \u0394V: 1\u00d7 1N</td><td>AOCS: 4\u00d7 100 mN \u00b7 \u0394V: 1\u00d7 1N</td><td>\u0394V: 4\u00d7 22N \u00b7 AOCS: 4-8\u00d7 5N</td></tr>\n <tr><td>Total Impulse</td><td>&gt; 16,000 N\u00b7s</td><td>&gt; 16,000 N\u00b7s</td><td>&gt; 450,000 N\u00b7s</td></tr>\n <tr><td>Specific Impulse</td><td>2000-2270 Ns/kg (204-231 s)</td><td>2000-2270 Ns/kg (204-231 s)</td><td>2300-2450 Ns/kg (235-250 s)</td></tr>\n <tr><td>\u0394V Capability</td><td>100-300 m/s</td><td>100-300 m/s</td><td>200-450 m/s</td></tr>\n <tr><td>Total Thrust</td><td>1.4 N</td><td>1.4 N</td><td>&gt; 100 N</td></tr>\n <tr><td>Power Consumption</td><td>10-50 W</td><td>10-50 W</td><td>200-480 W</td></tr>\n <tr><td>Lifetime</td><td>3-10 years</td><td>3-10 years</td><td>8-15 years</td></tr>\n </tbody>\n </table>\n </div>\n</section>\n\n<!-- PROVEN -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Proven in Constellation</div>\n <h2>19 modules.<br><em>Planet's SkySat constellation.</em></h2>\n <p class=\"lede\">ECAPS has deployed <b style=\"color:var(--ink)\">19 constellation module systems in collaboration with Planet</b> supporting the management of the dual-use SkySat constellation for Earth observation. SkySat provides high-resolution imaging and serves a wide range of sectors, including security and defense, agriculture, forestry, energy and maritime.</p>\n <a href=\"#/missions\" class=\"btn-primary\">View Mission History \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--border);background:var(--bg-2);overflow:hidden\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543909331-J3ID6TTW2U05FYUCQOT8/Screenshot+2024-04-13+at+14.44.06.png\" alt=\"SkySat constellation\" style=\"width:100%;height:100%;object-fit:cover\" loading=\"lazy\" decoding=\"async\" />\n </div>\n</div>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Discuss your <em>module integration.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Talk to engineering \u2192</a><a href=\"#/propulsion-orbital-vehicles\" class=\"btn-ghost\">View OTVs</a></div>\n</div>","propulsion-orbital-vehicles":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/space-capabilities\">Space</a>\n <span>/</span>\n <span><b>ORBITAL VEHICLES</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>TYR-1 \u00b7 <b>WORLD'S FIRST HPGP OTV</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Propulsion for <em>Orbital Transfer Vehicles.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Scaling HPGP innovation to power complete orbital platforms and kick stages for space and defense. ECAPS's ADN-based orbit raiser propulsion technology supports kick stages and orbital transfer vehicles.</p>\n <div class=\"hero-coords reveal\">\n <div>THRUST \u2014 <b>450 N</b></div>\n <div>FLAGSHIP \u2014 <b>TYR-1</b></div>\n <div>HERITAGE \u2014 <b>FIRST HPGP OTV</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/be3c4517-082f-4508-b677-8e2f63f3de9b/Adobe+Express+-+file.png\" alt=\"TYR-1 orbital transfer vehicle\" style=\"object-fit:contain;background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);filter:none\" />\n <div class=\"telemetry\">\n PLATFORM <b>TYR-1</b><br>\n ARCHITECTURE <b>OPEN STANDARD</b><br>\n STATUS <b>DEMONSTRATOR</b>\n </div>\n <div class=\"caption\">TYR-1 \u2014 EUROPEAN ORBITAL TRANSFER VEHICLE</div>\n</div>\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Overview \u00b7 01</div>\n <h2 class=\"section-title\">Configurable platforms for <em>advanced orbital mobility.</em></h2>\n </div>\n <p>Designed around propulsion modules of 450 N class, this technology enables orbit insertion, transfer, and maneuvering for commercial and defense missions, while ensuring safe handling and secure supply.</p>\n </div>\n\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-top:32px\">\n  <div style=\"background:var(--bg);padding:26px 28px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">/ Industry First</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin-top:12px;letter-spacing:-.02em;line-height:1.05\">WORLDWIDE FIRST</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:10px;letter-spacing:.10em\">HPGP-POWERED OTV</div>\n  </div>\n  <div style=\"background:var(--bg);padding:26px 28px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">/ Thrust Class</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin-top:12px;letter-spacing:-.02em;line-height:1.05\">450 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:10px;letter-spacing:.10em\">SCALABLE PLATFORM</div>\n  </div>\n  <div style=\"background:var(--bg);padding:26px 28px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">/ Architecture</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin-top:12px;letter-spacing:-.02em;line-height:1.05\">OPEN STANDARD</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);margin-top:10px;letter-spacing:.10em\">MODULAR \u00b7 CONFIGURABLE</div>\n  </div>\n  <div style=\"background:var(--bg);padding:26px 28px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700\">/ Use</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin-top:12px;letter-spacing:-.02em;line-height:1.05\">DUAL-USE</div>\n   <div style=\"font-family:ui-monospace,m
