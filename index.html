<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>ECAPS — Interactive Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Inter:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet" />
<style>/* ============================================================
   ECAPS · DESIGN SYSTEM
   Editorial-aerospace. Dark precision. Flame accent.
   ============================================================ */

:root{
  --bg:#06080B;
  --bg-2:#0A0E14;
  --surface:#11161E;
  --surface-2:#171D27;
  --border:#1F2937;
  --border-soft:#151B24;
  --ink:#FFFFFF;
  --ink-2:#D1D5DB;
  --muted:#6B7280;
  --muted-2:#4B5563;
  --flame:#3B82F6;
  --flame-soft:#60A5FA;
  --ice:#60A5FA;
  --accent:#3B82F6;
  --accent-deep:#1E40AF;
  --accent-bright:#22D3EE;
  --warn:#F59E0B;
  --line:rgba(255,255,255,.06);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* ----------  ATMOSPHERE  ---------- */
body::before{
  content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(77,168,255,.08), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(124,196,255,.05), transparent 60%);
}
body::after{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.4;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
}

/* ============================================================
   TOPBAR + MEGA MENU
   ============================================================ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  backdrop-filter:saturate(140%) blur(14px);
  background:rgba(10,12,16,.82);
  border-bottom:1px solid var(--border-soft);
}
.topbar-inner{
  max-width:1440px;margin:0 auto;padding:18px 40px;
  display:flex;align-items:center;justify-content:space-between;gap:40px;
}
.brand{display:flex;align-items:center;gap:14px;font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:22px;letter-spacing:.04em}
.brand-mark{
  width:30px;height:30px;border:1px solid var(--ink);border-radius:50%;
  position:relative;display:grid;place-items:center;
}
.brand-mark::before{content:"";width:6px;height:6px;background:var(--flame);border-radius:50%;box-shadow:0 0 14px var(--flame)}

/* nav root */
nav.primary{display:flex;align-items:center}
nav.primary > .nav-item{position:relative}
nav.primary > .nav-item > a,
nav.primary > .nav-item > button{
  display:inline-block;padding:18px 22px;font-size:13px;letter-spacing:.02em;color:var(--ink-2);
  background:none;border:none;cursor:pointer;font-family:inherit;line-height:1;
  transition:color .2s;position:relative;
}
nav.primary > .nav-item > a:hover,
nav.primary > .nav-item > button:hover,
nav.primary > .nav-item.open > button,
nav.primary > .nav-item > a.active,
nav.primary > .nav-item > button.active{color:var(--ink)}
nav.primary > .nav-item > a.active::after,
nav.primary > .nav-item > button.active::after{
  content:"";position:absolute;left:22px;right:22px;bottom:6px;height:1px;background:var(--accent);
}
nav.primary > .nav-item > button::after{
  content:" ▾";font-size:9px;color:var(--muted);margin-left:6px;
}
nav.primary > .nav-item.open > button::after{color:var(--ice)}

/* mega panel */
.mega-panel{
  position:fixed;left:0;right:0;top:74px;z-index:99;
  background:rgba(10,12,16,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:60px 40px;
  opacity:0;visibility:hidden;transform:translateY(-8px);
  transition:opacity .25s, transform .25s, visibility .25s;
}
.mega-panel.open{opacity:1;visibility:visible;transform:translateY(0)}
.mega-inner{
  max-width:1440px;margin:0 auto;
  display:grid;grid-template-columns:1.4fr 2fr;gap:80px;
}
.mega-tag{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.22em;
  color:var(--ice);text-transform:uppercase;margin-bottom:18px;
  display:flex;align-items:center;gap:12px;
}
.mega-tag::before{content:"";width:24px;height:1px;background:var(--ice)}
.mega-title{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:44px;line-height:1;letter-spacing:-.02em;margin-bottom:20px;
}
.mega-title em{font-style:italic;color:var(--accent)}
.mega-desc{font-size:14px;color:var(--muted);max-width:36ch;line-height:1.6}
.mega-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:48px}
.mega-col h5{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);
}
.mega-col a{
  display:block;padding:10px 0;border-bottom:1px solid var(--border-soft);
  transition:padding-left .25s, color .25s;
}
.mega-col a:last-child{border-bottom:none}
.mega-col a:hover{padding-left:6px;color:var(--ice)}
.mega-col a b{
  display:block;font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:18px;letter-spacing:-.005em;color:var(--ink);margin-bottom:3px;
}
.mega-col a:hover b{color:var(--ice)}
.mega-col a span{font-size:12px;color:var(--muted);line-height:1.45;display:block}

.cta{
  border:1px solid var(--ink);padding:10px 18px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  transition:all .25s;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;flex-shrink:0;
}
.cta:hover{background:var(--ink);color:var(--bg)}

/* mobile toggle */
.menu-toggle{display:none;background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer}

/* ============================================================
   PAGE HERO
   ============================================================ */
.page-hero{
  padding:160px 40px 80px;max-width:1440px;margin:0 auto;position:relative;
}
.hero-meta{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;margin-bottom:48px;
}
.hero-meta .dot{width:6px;height:6px;background:var(--flame);border-radius:50%;box-shadow:0 0 10px var(--flame);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hero-meta span{color:var(--muted-2)}
.hero-meta b{color:var(--ink);font-weight:500}
.hero-meta a{color:var(--muted)}
.hero-meta a:hover{color:var(--ink)}

h1.hero-title{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;
  font-size:clamp(44px, 6vw, 88px);
  line-height:.95;letter-spacing:-.025em;margin-bottom:40px;max-width:14ch;
}
h1.hero-title em{
  font-style:italic;font-weight:600;
  color:var(--accent);
}
.page-hero-body{
  display:grid;grid-template-columns:1.4fr 1fr;gap:80px;align-items:end;margin-top:40px;
}
.hero-lede{font-size:18px;color:var(--ink-2);max-width:46ch;line-height:1.55}
.hero-coords{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;color:var(--muted);
  border-left:1px solid var(--border);padding:0 0 0 20px;line-height:1.9;
}
.hero-coords b{color:var(--ink);font-weight:500}

/* ----------  TICKER  ---------- */
.ticker{
  margin-top:80px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:22px 0;overflow:hidden;position:relative;
}
.ticker-track{
  display:flex;gap:60px;white-space:nowrap;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:13px;letter-spacing:.08em;color:var(--muted);
  animation:scroll 60s linear infinite;
}
.ticker-track span b{color:var(--ink);font-weight:500}
.ticker-track span i{color:var(--ice);font-style:normal;margin-right:8px}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ----------  HERO IMAGERY  ---------- */
.hero-image{
  margin:60px 40px 0;max-width:1440px;height:60vh;min-height:480px;
  position:relative;overflow:hidden;border:1px solid var(--border);
}
@media (min-width:1520px){.hero-image{margin-left:auto;margin-right:auto}}
.hero-image img{width:100%;height:100%;object-fit:cover;filter:brightness(.7) contrast(1.05)}
.hero-image::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 0%,transparent 50%,rgba(10,12,16,.6) 100%),
             linear-gradient(90deg,rgba(10,12,16,.3) 0%,transparent 40%);
  pointer-events:none;
}
.hero-image .caption{
  position:absolute;left:32px;bottom:32px;z-index:2;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-2);
  display:flex;align-items:center;gap:14px;
}
.hero-image .caption::before{content:"";width:30px;height:1px;background:var(--ice)}
.hero-image .telemetry{
  position:absolute;top:32px;right:32px;z-index:2;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--ink-2);
  text-transform:uppercase;text-align:right;line-height:1.8;
}
.hero-image .telemetry b{color:var(--ice)}

/* ============================================================
   SECTION SHELL
   ============================================================ */
section{padding:140px 40px;max-width:1440px;margin:0 auto;position:relative}
.eyebrow{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.22em;
  color:var(--ice);text-transform:uppercase;margin-bottom:24px;
  display:flex;align-items:center;gap:14px;
}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--ice)}
h2.section-title{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;font-size:clamp(32px,4.5vw,60px);
  line-height:1.02;letter-spacing:-.022em;max-width:18ch;
}
h2.section-title em{font-style:italic;color:var(--accent)}
.section-head{display:grid;grid-template-columns:1.6fr 1fr;gap:48px;align-items:end;margin-bottom:32px}
.section-head p{color:var(--muted);font-size:15px;max-width:42ch}

/* ----------  NEWS CARD  ---------- */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.news-card{
  background:var(--bg);padding:32px;display:flex;flex-direction:column;gap:24px;
  transition:background .35s;cursor:pointer;min-height:520px;
}
.news-card:hover{background:var(--bg-2)}
.news-card:hover .news-arrow{transform:translate(4px,-4px);color:var(--ice)}
.news-meta{display:flex;align-items:center;justify-content:space-between;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.news-date{color:var(--ink)}
.news-date b{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:34px;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
.news-date span{display:block;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);margin-top:4px}
.news-img{width:100%;aspect-ratio:4/3;background:var(--surface);border:1px solid var(--border-soft);position:relative;overflow:hidden}
.news-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.85)}
.news-card h3{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:22px;line-height:1.25;letter-spacing:-.01em}
.news-card p{font-size:14px;color:var(--muted);flex:1}
.news-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--border)}
.news-footer span{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-2)}
.news-arrow{font-size:18px;transition:transform .3s,color .3s;color:var(--ink-2)}

/* ----------  PRODUCT FEATURE  ---------- */
.product{
  margin:0 40px;max-width:1440px;
  background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);
  border:1px solid var(--border);
  padding:80px;display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:center;
  position:relative;overflow:hidden;
}
@media (min-width:1520px){.product{margin-left:auto;margin-right:auto}}
.product::before{
  content:"";position:absolute;top:-200px;right:-200px;width:600px;height:600px;
  background:radial-gradient(circle, rgba(77,168,255,.15), transparent 70%);
  pointer-events:none;
}
.product-tag{
  display:inline-flex;align-items:center;gap:10px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.2em;
  color:var(--ice);text-transform:uppercase;border:1px solid var(--ice);
  padding:6px 14px;margin-bottom:32px;
}
.product h2{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:clamp(40px,5.5vw,84px);
  line-height:.98;letter-spacing:-.02em;margin-bottom:24px;
}
.product h2 em{font-style:italic;color:var(--accent)}
.product .lede{font-size:16px;color:var(--ink-2);max-width:48ch;line-height:1.6;margin-bottom:40px}
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:40px}
.spec{background:var(--surface-2);padding:24px}
.spec b{display:block;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:34px;font-weight:300;color:var(--ink);letter-spacing:-.02em;margin-bottom:6px}
.spec span{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}

.schematic{aspect-ratio:1;position:relative;display:grid;place-items:center}
.schematic svg{width:100%;height:100%;overflow:visible}

/* ----------  CAPABILITIES GRID  ---------- */
.cap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.cap{
  border:1px solid var(--border);padding:36px;background:var(--bg-2);
  position:relative;overflow:hidden;min-height:560px;
  display:flex;flex-direction:column;transition:border-color .3s;
}
.cap:hover{border-color:var(--accent)}
.cap-num{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.16em;
  color:var(--muted);margin-bottom:32px;
}
.cap-visual{
  aspect-ratio:4/3;background:var(--surface);margin-bottom:32px;
  border:1px solid var(--border-soft);position:relative;overflow:hidden;
}
.cap-visual img{width:100%;height:100%;object-fit:cover;filter:brightness(.85) contrast(1.05);transition:transform .8s}
.cap:hover .cap-visual img{transform:scale(1.04)}
.cap-visual::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(10,12,16,.7) 100%);
  pointer-events:none;
}
.cap-visual .tag{
  position:absolute;top:14px;left:14px;z-index:2;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink);
  background:rgba(10,12,16,.7);backdrop-filter:blur(6px);
  padding:6px 10px;border:1px solid var(--border);
}
.cap h3{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;font-size:32px;letter-spacing:-.01em;margin-bottom:16px}
.cap p{font-size:14px;color:var(--muted);flex:1;margin-bottom:24px;line-height:1.6}
.cap-link{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink);display:inline-flex;align-items:center;gap:10px;
}
.cap-link::after{content:"→";transition:transform .2s}
.cap:hover .cap-link::after{transform:translateX(4px);color:var(--ice)}

/* ----------  STATS  ---------- */
.stats{
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:120px 40px;margin:80px 0;
}
.stats-inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:80px;align-items:center}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:60px}
.stat b{display:block;font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:clamp(56px,6vw,96px);line-height:1;letter-spacing:-.04em;margin-bottom:16px}
.stat span{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.stat b sup{font-size:.4em;color:var(--accent);vertical-align:top;margin-left:4px;font-style:normal}

/* ----------  SERVICES BAND  ---------- */
.services{padding:40px;max-width:1440px;margin:0 auto}
.services-list{border-top:1px solid var(--border)}
.service-row{
  display:grid;grid-template-columns:80px 1.5fr 2fr auto;gap:60px;align-items:center;
  padding:36px 0;border-bottom:1px solid var(--border);transition:padding-left .3s;cursor:pointer;
}
.service-row:hover{padding-left:24px}
.service-row:hover h4{color:var(--ice)}
.service-row .idx{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.14em}
.service-row h4{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;font-size:32px;letter-spacing:-.01em;transition:color .3s}
.service-row p{font-size:14px;color:var(--muted)}
.service-row .arrow{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:14px;color:var(--ink-2)}

/* ----------  CTA BAND  ---------- */
.cta-band{
  margin:96px 40px;max-width:1280px;
  border:1px solid var(--border);padding:72px 60px;
  background:
    radial-gradient(circle at 80% 50%, rgba(77,168,255,.12), transparent 60%),
    linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);
  position:relative;overflow:hidden;
}
@media (min-width:1520px){.cta-band{margin-left:auto;margin-right:auto}}
.cta-band h2{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;font-size:clamp(28px,3.5vw,52px);
  line-height:1.05;letter-spacing:-.02em;max-width:20ch;margin-bottom:24px;
}
.cta-band h2 em{font-style:italic;color:var(--accent)}
.cta-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.btn-primary{
  background:var(--flame);color:var(--bg);padding:18px 32px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  transition:transform .2s,background .2s;display:inline-block;
}
.btn-primary:hover{background:var(--flame-soft);transform:translateY(-2px)}
.btn-ghost{
  border:1px solid var(--border);color:var(--ink);padding:18px 32px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  transition:border-color .2s;display:inline-block;
}
.btn-ghost:hover{border-color:var(--ink)}

/* ----------  FOOTER  ---------- */
footer{border-top:1px solid var(--border);padding:80px 40px 40px}
.foot-inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;padding-bottom:60px;border-bottom:1px solid var(--border)}
.foot-brand{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:32px;font-weight:600;letter-spacing:-.01em;margin-bottom:24px}
.foot-addr{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:12px;color:var(--muted);line-height:1.9}
.foot-col h5{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.foot-col a{display:block;font-size:14px;color:var(--ink-2);padding:6px 0;transition:color .2s}
.foot-col a:hover{color:var(--ice)}
.foot-bottom{max-width:1440px;margin:0 auto;padding-top:30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.foot-bottom a{color:var(--muted)}
.foot-bottom a:hover{color:var(--ink)}

/* ----------  ARTICLE / TEXT PAGES  ---------- */
.article{max-width:760px;margin:0 auto;padding:0 40px 120px}
.article .breadcrumb{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;margin-bottom:40px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.article .breadcrumb a{color:var(--muted)}
.article .breadcrumb a:hover{color:var(--ink)}
.article .breadcrumb span{color:var(--muted-2)}
.article h1{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:300;font-size:clamp(36px,5vw,68px);
  line-height:1.02;letter-spacing:-.02em;margin-bottom:32px;
}
.article h1 em{font-style:italic;color:var(--accent)}
.article .article-meta{
  display:flex;gap:32px;padding:24px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  margin-bottom:60px;flex-wrap:wrap;
}
.article .article-meta b{color:var(--ink);font-weight:500}
.article .featured-img{aspect-ratio:16/9;width:100%;margin:0 0 60px;overflow:hidden;border:1px solid var(--border)}
.article .featured-img img{width:100%;height:100%;object-fit:cover}
.article p{font-size:17px;line-height:1.75;color:var(--ink-2);margin-bottom:24px}
.article p.lede{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:24px;font-weight:300;line-height:1.45;color:var(--ink);margin-bottom:32px;letter-spacing:-.01em}
.article h2{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:400;font-size:32px;line-height:1.2;letter-spacing:-.01em;
  margin:60px 0 24px;color:var(--ink);
}
.article blockquote{
  border-left:2px solid var(--accent);padding-left:32px;margin:48px 0;
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-style:italic;font-size:24px;line-height:1.4;color:var(--ink);
}
.article blockquote cite{
  display:block;margin-top:16px;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-style:normal;font-size:11px;
  letter-spacing:.16em;color:var(--muted);text-transform:uppercase;
}
.article ul{margin:24px 0;padding-left:24px}
.article li{font-size:17px;line-height:1.75;color:var(--ink-2);margin-bottom:12px}

/* ----------  REVEAL  ---------- */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .9s ease, transform .9s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:translateY(0)}

/* ----------  TIMELINE / HERITAGE  ---------- */
.timeline{max-width:1000px;margin:0 auto;padding:0 40px;position:relative}
.timeline::before{
  content:"";position:absolute;left:60px;top:0;bottom:0;width:1px;background:var(--border);
}
.tl-item{display:grid;grid-template-columns:120px 1fr;gap:40px;padding:36px 0;align-items:start;position:relative}
.tl-year{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:36px;font-weight:600;color:var(--accent);letter-spacing:-.01em}
.tl-item::before{
  content:"";position:absolute;left:55px;top:48px;width:11px;height:11px;
  background:var(--bg);border:1px solid var(--flame);border-radius:50%;
}
.tl-body h4{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:22px;margin-bottom:8px;letter-spacing:-.01em}
.tl-body p{color:var(--muted);font-size:14px;line-height:1.6}

/* ----------  LEADERSHIP GRID  ---------- */
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.team-card{border:1px solid var(--border);padding:24px;background:var(--bg-2)}
.team-img{aspect-ratio:1;background:var(--surface);margin-bottom:20px;overflow:hidden;display:grid;place-items:center}
.team-img img{width:100%;height:100%;object-fit:cover;filter:grayscale(.3) brightness(.95)}
.team-img-placeholder{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:48px;font-weight:300;color:var(--muted-2);font-style:italic;
}
.team-card h4{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:500;font-size:22px;margin-bottom:6px;letter-spacing:-.01em}
.team-card .role{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--ice);text-transform:uppercase}

/* ----------  TECH SPEC TABLE  ---------- */
.spec-table{border:1px solid var(--border);margin:60px 0}
.spec-row{display:grid;grid-template-columns:1fr 2fr;border-bottom:1px solid var(--border);padding:20px 32px;align-items:center;gap:32px}
.spec-row:last-child{border-bottom:none}
.spec-row dt{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.spec-row dd{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:20px;font-weight:300;color:var(--ink);letter-spacing:-.01em}
.spec-row dd b{color:var(--accent);font-weight:300}

/* ----------  THRUSTER SPECS TABLE  ---------- */
.thruster-table{
  border:1px solid var(--border);margin:60px 0;overflow-x:auto;
}
.thruster-table table{
  width:100%;border-collapse:collapse;min-width:760px;
}
.thruster-table th,.thruster-table td{
  padding:16px 18px;text-align:left;border-bottom:1px solid var(--border);
  font-size:14px;color:var(--ink-2);
}
.thruster-table th{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ice);background:var(--surface);font-weight:500;
}
.thruster-table th:first-child,.thruster-table td:first-child{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
}
.thruster-table tr:hover td{background:var(--bg-2);color:var(--ink)}

/* ============================================================
   INTERACTIVE SCHEMATICS
   ============================================================ */
.schem{
  position:relative;width:100%;background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);
  border:1px solid var(--border);overflow:hidden;
}
.schem-stage{position:relative;width:100%;aspect-ratio:16/10;display:block}
.schem-stage svg{width:100%;height:100%;display:block;font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace}

.schem-stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
  background-image:
    linear-gradient(rgba(245,242,236,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,242,236,.04) 1px, transparent 1px);
  background-size:40px 40px;
}

.schem-stage .body{stroke:var(--ink);fill:none;stroke-width:1.2}
.schem-stage .body-fill{fill:var(--surface-2);stroke:var(--ink);stroke-width:1.2}
.schem-stage .ghost{stroke:var(--border);stroke-width:1;fill:none}
.schem-stage .heat{stroke:var(--flame);stroke-width:1.2;fill:none}
.schem-stage .heat-fill{fill:rgba(77,168,255,.15);stroke:var(--flame);stroke-width:1.2}
.schem-stage .pipe{stroke:var(--muted);stroke-width:1.2;fill:none}
.schem-stage .label-text{fill:var(--muted);font-size:9px;letter-spacing:.18em;text-transform:uppercase}
.schem-stage .dim-text{fill:var(--muted-2);font-size:8px;letter-spacing:.14em}
.schem-stage .value-text{fill:var(--accent);font-size:10px;letter-spacing:.16em;text-transform:uppercase}
.schem-stage .accent-text{fill:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-style:italic;font-size:18px}

.schem-stage .part{cursor:pointer;transition:opacity .2s}
.schem-stage:hover .part:not(:hover):not(.active){opacity:.45}
.schem-stage .part.active .body,.schem-stage .part:hover .body{stroke:var(--flame)}
.schem-stage .part.active .body-fill,.schem-stage .part:hover .body-fill{stroke:var(--flame);fill:rgba(77,168,255,.08)}

.schem-callout{
  position:absolute;pointer-events:none;
  background:rgba(20,23,29,.95);backdrop-filter:blur(8px);
  border:1px solid var(--accent);padding:12px 16px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;color:var(--ink);
  letter-spacing:.06em;line-height:1.6;
  transform:translate(-50%,calc(-100% - 12px));
  opacity:0;transition:opacity .2s;max-width:240px;z-index:5;
}
.schem-callout::after{
  content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid var(--accent);
}
.schem-callout.show{opacity:1}
.schem-callout b{display:block;color:var(--accent);font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.schem-callout span{color:var(--muted);font-size:10px}

.schem-controls{
  display:flex;align-items:center;gap:0;padding:0;
  border-top:1px solid var(--border);background:var(--bg);
}
.schem-tab{
  flex:1;padding:14px 16px;background:none;border:none;cursor:pointer;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);
  border-right:1px solid var(--border);transition:color .2s,background .2s;
}
.schem-tab:last-child{border-right:none}
.schem-tab:hover{color:var(--ink);background:var(--bg-2)}
.schem-tab.active{color:var(--accent);background:var(--bg-2)}
.schem-tab.active::before{content:"◆ "}

.schem-action{
  border:none;cursor:pointer;padding:14px 24px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;background:var(--flame);color:var(--bg);
  border-left:1px solid var(--border);transition:background .2s;
}
.schem-action:hover{background:var(--flame-soft)}
.schem-action.firing{animation:fire-pulse 1s ease infinite}
@keyframes fire-pulse{0%,100%{background:var(--flame)}50%{background:var(--flame-soft)}}

.schem-readout{
  position:absolute;top:16px;right:16px;z-index:3;
  background:rgba(10,12,16,.75);backdrop-filter:blur(8px);
  border:1px solid var(--border);padding:12px 16px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:.12em;line-height:1.8;
}
.schem-readout b{color:var(--accent);font-weight:500}
.schem-readout .ro-row{display:flex;justify-content:space-between;gap:24px;text-transform:uppercase}

.schem-tag{
  position:absolute;top:16px;left:16px;z-index:3;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;color:var(--ice);
  letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;gap:10px;
}
.schem-tag::before{content:"";width:20px;height:1px;background:var(--ice)}

@keyframes flow{from{stroke-dashoffset:0}to{stroke-dashoffset:-40}}
.schem-stage .flow-active{
  stroke:var(--flame);stroke-width:1.5;
  stroke-dasharray:4 4;
  animation:flow 1s linear infinite;
}

@keyframes plume{
  0%,100%{opacity:.4;transform:scaleX(1)}
  50%{opacity:.8;transform:scaleX(1.08)}
}
.schem-stage .plume{transform-origin:left center;animation:plume 1.2s ease-in-out infinite}

@keyframes chamber-glow{
  0%,100%{fill:rgba(77,168,255,.15)}
  50%{fill:rgba(77,168,255,.55)}
}
.schem-stage .firing-chamber{animation:chamber-glow .6s ease-in-out infinite}

/* ----------  PARTNER LOGOS GRID  ---------- */
.partners-grid{
  display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);
  border:1px solid var(--border);
}
.partner{
  background:var(--bg-2);aspect-ratio:1;display:grid;place-items:center;padding:24px;
  transition:background .25s;
}
.partner:hover{background:var(--surface)}
.partner img{
  max-width:100%;max-height:60%;object-fit:contain;
  filter:brightness(0) invert(.8);opacity:.7;transition:opacity .25s;
}
.partner:hover img{opacity:1}
@media (max-width:1100px){.partners-grid{grid-template-columns:repeat(3,1fr)}}

/* ----------  PRODUCT CARD (thrusters / modules / containers)  ---------- */
.product-card{
  border:1px solid var(--border);background:var(--bg-2);padding:32px;
  display:flex;flex-direction:column;gap:20px;transition:border-color .25s;
}
.product-card:hover{border-color:var(--accent)}
.product-card .pc-img{
  aspect-ratio:1;
  background:
    radial-gradient(circle at 50% 45%, rgba(220,235,255,0.32) 0%, rgba(220,235,255,0.10) 35%, transparent 70%),
    var(--surface);
  display:grid;place-items:center;
  border:1px solid var(--border-soft);overflow:hidden;
}
.product-card .pc-img img{
  width:80%;height:80%;object-fit:contain;
  transition:transform .4s;
}
.product-card:hover .pc-img img{transform:scale(1.04)}
.product-card .pc-label{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;
}
.product-card .pc-name{
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:600;font-size:28px;letter-spacing:-.01em;
}
.product-card .pc-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* ----------  GALLERY (operations photos)  ---------- */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
.gallery .ph{aspect-ratio:4/3;overflow:hidden;background:var(--surface)}
.gallery .ph img{width:100%;height:100%;object-fit:cover;filter:brightness(.85) contrast(1.05);transition:transform .8s,filter .25s}
.gallery .ph:hover img{transform:scale(1.04);filter:brightness(1) contrast(1.05)}
@media (max-width:1100px){.gallery{grid-template-columns:1fr 1fr}}

/* ----------  FACILITY CARD (locations)  ---------- */
.facility-card{
  border:1px solid var(--border);background:var(--bg-2);overflow:hidden;
}
.facility-card .fc-img{aspect-ratio:16/9;overflow:hidden}
.facility-card .fc-img img{width:100%;height:100%;object-fit:cover}
.facility-card .fc-body{padding:32px}
.facility-card .fc-tag{font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--ice);text-transform:uppercase;margin-bottom:14px}
.facility-card h4{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:400;font-size:28px;margin-bottom:14px;letter-spacing:-.01em}
.facility-card p{font-size:14px;color:var(--muted);line-height:1.6}

/* ----------  MISSIONS GRID  ---------- */
.mission-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.mission{
  border:1px solid var(--border);background:var(--bg-2);padding:0;
  display:flex;flex-direction:column;transition:border-color .25s;
}
.mission:hover{border-color:var(--accent)}
.mission-img{aspect-ratio:16/10;overflow:hidden;border-bottom:1px solid var(--border)}
.mission-img img{width:100%;height:100%;object-fit:cover}
.mission-body{padding:24px;display:flex;flex-direction:column;gap:14px;flex:1}
.mission-name{font-family:'Inter',system-ui,-apple-system,sans-serif;font-weight:400;font-size:24px;letter-spacing:-.01em}
.mission-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:14px;border-top:1px solid var(--border);font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.mission-meta b{display:block;color:var(--ink);font-weight:500;font-size:12px;margin-bottom:2px}
.mission-year{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:36px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-.02em}

/* Spectrum tier illustration — small SVG between eyebrow and title on space-capabilities */
.spectrum-illust{
  margin:14px 0 18px;
  aspect-ratio:400/140;
  background:linear-gradient(180deg,rgba(34,211,238,.04) 0%,#06080B 100%);
  border:1px solid var(--border-soft);
  overflow:hidden;
  position:relative;
}
.spectrum-illust svg{display:block;width:100%;height:100%}

/* Mission tag — domain/country eyebrow on each card */
.mission-tag{font-family:ui-monospace,'SF Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:600;padding-bottom:6px;border-bottom:1px solid var(--border-soft)}

/* ----------  FORWARD PIPELINE — Upcoming Missions  ---------- */
.upcoming-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.upcoming{
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(59,130,246,.04) 0%,var(--surface) 100%);
  border:1px solid var(--border);
  transition:border-color .3s ease,transform .3s ease;
  min-height:280px;
  position:relative;overflow:hidden;
}
.upcoming::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent-bright) 100%);opacity:.5}
.upcoming:hover{border-color:var(--accent);transform:translateY(-2px)}
.upcoming-stat{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.upc-year{font-family:'Inter',sans-serif;font-size:32px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-.02em}
.upc-tag{font-family:ui-monospace,'SF Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:600}
.upcoming-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:12px;flex:1}
.upc-name{font-family:'Inter',sans-serif;font-size:18px;font-weight:500;letter-spacing:-.01em;line-height:1.3;color:var(--ink)}
.upc-desc{font-size:13px;color:var(--muted);line-height:1.5;flex:1}
.upc-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:14px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.upc-meta b{display:block;color:var(--ink);font-weight:500;font-size:11px;margin-bottom:2px;letter-spacing:.06em}

/* ----------  COMMERCIAL PACKAGES PAGE  ---------- */
/* Package comparison matrix table */
.package-matrix{margin:0;border:1px solid var(--border);overflow-x:auto}
.package-matrix table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
.package-matrix thead th{
  background:var(--surface);padding:18px 20px;text-align:left;
  font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;
  font-weight:600;color:var(--ink-2);text-transform:uppercase;
  border-bottom:1px solid var(--border)
}
.package-matrix thead th.pkg-num{text-align:center;width:60px;color:var(--accent-bright)}
.package-matrix thead th.pkg-notes{color:var(--muted);min-width:200px}
.package-matrix tbody td{padding:16px 20px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
.package-matrix tbody tr:last-child td{border-bottom:0}
.package-matrix tbody tr:hover{background:rgba(59,130,246,.03)}
.package-matrix .feat{font-weight:500;color:var(--ink);font-size:14px}
.package-matrix .feat-note{display:block;font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}
.package-matrix .pkg-dot{text-align:center;font-size:18px;color:var(--accent-bright);line-height:1}
.package-matrix .pkg-dot.partial{color:var(--muted);font-size:14px}
.package-matrix .pkg-dot.partial2{color:var(--muted);font-size:14px}
.package-matrix .pkg-empty{text-align:center;color:var(--border)}
.package-matrix .pkg-note{font-size:11px;color:var(--muted);font-style:italic;line-height:1.4}

/* Package detail card — large block per package */
.pkg-block{margin-top:32px;border:1px solid var(--border);background:var(--surface);position:relative;overflow:hidden}
.pkg-block::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--accent);opacity:.8}
.pkg-block-head{padding:40px 48px 28px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center}
.pkg-num-big{font-family:'Inter',sans-serif;font-size:64px;font-weight:600;color:var(--accent);line-height:1;letter-spacing:-.03em}
.pkg-title-block{display:flex;flex-direction:column;gap:8px}
.pkg-eyebrow{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.18em;color:var(--accent-bright);text-transform:uppercase;font-weight:600}
.pkg-title{font-family:'Inter',sans-serif;font-size:32px;font-weight:500;letter-spacing:-.02em;line-height:1.15;color:var(--ink)}
.pkg-title em{font-style:italic;color:var(--accent);font-weight:600}
.pkg-tagline{font-size:15px;color:var(--muted);line-height:1.5;max-width:560px;margin-top:8px}
.pkg-status{display:flex;flex-direction:column;gap:4px;text-align:right;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.1em;color:var(--muted)}
.pkg-status b{display:block;color:var(--ink);font-size:14px;font-weight:500}

/* Package timeline — Gantt-style horizontal */
.pkg-timeline{padding:36px 48px;background:rgba(0,0,0,.15)}
.pkg-timeline-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.pkg-timeline-title{font-family:'Inter',sans-serif;font-size:18px;font-weight:500;color:var(--ink);letter-spacing:-.01em}
.pkg-timeline-meta{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
.pkg-steps{display:grid;gap:14px}
.pkg-step{display:grid;grid-template-columns:140px 24px 1fr;gap:24px;align-items:start;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.pkg-step:last-child{border-bottom:0}
.pkg-step-time{font-family:ui-monospace,monospace;font-size:12px;color:var(--accent-bright);letter-spacing:.06em;font-weight:600;padding-top:2px}
.pkg-step-time small{display:block;font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:500;margin-top:2px}
.pkg-step-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);margin-top:4px;justify-self:center;position:relative}
.pkg-step-dot::after{content:'';position:absolute;top:14px;left:50%;transform:translateX(-50%);width:1px;height:32px;background:var(--border);display:block}
.pkg-step:last-child .pkg-step-dot::after{display:none}
.pkg-step-body{display:flex;flex-direction:column;gap:4px}
.pkg-step-name{font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-.005em}
.pkg-step-desc{font-size:13px;color:var(--muted);line-height:1.45}

/* Package principles row — bottom of each pkg-block */
.pkg-principles{padding:32px 48px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px;border-top:1px solid var(--border);background:var(--surface)}
.pkg-princ{display:flex;flex-direction:column;gap:6px}
.pkg-princ-label{font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.18em;color:var(--accent-bright);text-transform:uppercase;font-weight:600}
.pkg-princ-name{font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:var(--ink);letter-spacing:-.005em}
.pkg-princ-desc{font-size:12px;color:var(--muted);line-height:1.5}

/* Full Mission Support — featured/highlighted variant */
.pkg-block.featured::before{background:linear-gradient(180deg,var(--accent-bright) 0%,var(--accent) 100%);width:4px}
.pkg-block.featured{background:linear-gradient(180deg,rgba(34,211,238,.04) 0%,var(--surface) 50%)}
.pkg-num-big.featured{color:var(--accent-bright)}

/* Package envelope — top overview row */
.pkg-envelope{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:32px}
.pkg-env{padding:24px 20px;background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px;transition:border-color .3s,transform .3s;position:relative;min-height:200px}
.pkg-env::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.6}
.pkg-env.feat::before{background:var(--accent-bright)}
.pkg-env:hover{border-color:var(--accent);transform:translateY(-2px)}
.pkg-env-num{font-family:ui-monospace,monospace;font-size:11px;color:var(--accent);letter-spacing:.12em;font-weight:600}
.pkg-env-num.feat{color:var(--accent-bright)}
.pkg-env-name{font-family:'Inter',sans-serif;font-size:17px;font-weight:500;color:var(--ink);letter-spacing:-.01em;line-height:1.25}
.pkg-env-desc{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.pkg-env-link{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;text-decoration:none;font-weight:600;padding-top:8px;border-top:1px solid var(--border-soft)}

/* Responsive — packages page */
@media (max-width:1100px){
  .pkg-envelope{grid-template-columns:1fr 1fr}
  .pkg-block-head{grid-template-columns:1fr;padding:32px 28px 24px;gap:18px}
  .pkg-num-big{font-size:48px}
  .pkg-status{text-align:left}
  .pkg-timeline{padding:28px}
  .pkg-step{grid-template-columns:100px 20px 1fr;gap:16px}
  .pkg-principles{grid-template-columns:1fr;padding:24px 28px;gap:20px}
  .upcoming-grid{grid-template-columns:1fr}
}
@media (max-width:720px){
  .pkg-envelope{grid-template-columns:1fr}
}

/* ----------  RESPONSIVE  ---------- */
@media (max-width:1100px){
  nav.primary{display:none}
  .menu-toggle{display:block}
  .topbar-inner{padding:18px 24px}
  .mega-panel{display:none}
  .page-hero-body,.section-head,.product,.stats-inner,.foot-inner{grid-template-columns:1fr;gap:40px}
  .news-grid,.cap-grid,.team-grid,.mission-grid{grid-template-columns:1fr}
  .product{padding:50px 32px}
  .cta-band{padding:60px 32px;margin:80px 20px}
  .service-row{grid-template-columns:1fr;gap:8px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:40px}
  .page-hero{padding:120px 24px 60px}
  section{padding:80px 24px}
  .hero-image{margin:40px 20px 0}
  .timeline::before{left:0}
  .tl-item{grid-template-columns:1fr;gap:8px}
  .tl-item::before{display:none}
  .article{padding:0 24px 80px}

  .mega-cols{grid-template-columns:1fr}
}

/* Mobile menu overlay */
@media (max-width:1100px){
  .mobile-nav{
    position:fixed;inset:74px 0 0 0;background:var(--bg);z-index:90;
    padding:40px 24px;overflow-y:auto;

  }
  .mobile-nav.open{transform:translateX(0)}
  .mobile-nav .mob-section{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
  .mobile-nav .mob-section h5{
    font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--ice);
    text-transform:uppercase;margin-bottom:14px;
  }
  .mobile-nav a{display:block;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:22px;font-weight:300;padding:10px 0;letter-spacing:-.01em}
}
@media (min-width:1101px){.mobile-nav{display:none}}


/* ============================================================
   PERFORMANCE & ACCESSIBILITY OPTIMIZATIONS
   ============================================================ */

/* Reduced motion preference — kill the animated plumes/glows/spins */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .reveal { opacity: 1 !important; transform: none !important; }
  .ticker-track { animation: none !important; }
  .schem-stage .plume,
  .schem-stage .firing-chamber,
  .schem-stage .flow-active { animation: none !important; }
  body::before, body::after { display: none; }
}

/* Mobile: reduce expensive backdrop-filter usage */
@media (max-width: 1100px) {
  .topbar { backdrop-filter: blur(8px); }
  .mega-panel { backdrop-filter: none; background: rgba(10,12,16,.98); }
  .schem-callout { backdrop-filter: none; background: rgba(20,23,29,.98); }
  .schem-readout { backdrop-filter: none; background: rgba(10,12,16,.92); }
}

/* Content-visibility — let browser skip painting far-offscreen sections */
section, .stats, .partners-grid, .gallery, footer {
  content-visibility: auto;
  contain-intrinsic-size: 600px 800px;
}

/* Image rendering hints */
img { content-visibility: auto; }


/* ============================================================
   INDUSTRIAL CHROME — added for industrial-grade aesthetic
   ============================================================ */

/* Section spacing tightened */
section{padding:96px 40px;max-width:1280px;margin:0 auto}
.section-head{padding:0 0 48px 0;margin-bottom:32px}
@media (max-width:1100px){section{padding:60px 24px}}
@media (max-width:1100px){.industrial-hero-inner{padding:36px 24px}}

/* Hero — heavier presence */
.page-hero{padding:120px 40px 60px;max-width:1440px;margin:0 auto;position:relative}

/* Full-bleed industrial hero */
.industrial-hero{
  position:relative;width:100%;min-height:88vh;
  display:flex;align-items:center;
  overflow:hidden;background:var(--bg);
  border-bottom:1px solid var(--border);
  /* OVERRIDE section{max-width:1280px,padding:96px 40px,margin:0 auto} */
  max-width:none !important;
  padding:0 !important;
  margin:0 !important;
}
.industrial-hero::before{
  content:"";position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg, rgba(6,8,11,.45) 0%, rgba(6,8,11,.35) 40%, rgba(6,8,11,.92) 100%);
}
.industrial-hero .bg-image{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;
  filter:saturate(1.1) contrast(1) brightness(.85);
}
.industrial-hero .grid-overlay{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
  background-size:60px 60px;
}
.industrial-hero .scan-line{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:.5;z-index:2;pointer-events:none;
}
.industrial-hero .scan-line.top{top:80px}
.industrial-hero .scan-line.bot{bottom:80px}

.industrial-hero-inner{
  position:relative;z-index:3;width:100%;max-width:1280px;
  margin:0 auto;padding:48px 40px;
}
.industrial-hero-classification{
  display:flex;gap:0;border:1px solid var(--accent);
  margin-bottom:28px;width:fit-content;
}
.industrial-hero-classification > div{
  padding:6px 12px;
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--accent);border-right:1px solid var(--accent);
}
.industrial-hero-classification > div:last-child{border-right:none;background:var(--accent);color:var(--bg);font-weight:600}

.industrial-hero h1{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-weight:600;font-size:clamp(36px,5vw,72px);
  line-height:.94;letter-spacing:-.03em;color:var(--ink);
  margin-bottom:24px;text-wrap:balance;
}
.industrial-hero h1 em{font-style:italic;color:var(--accent);font-weight:600}

.industrial-hero-lede{
  font-size:15px;line-height:1.55;color:var(--ink-2);
  max-width:560px;margin-bottom:36px;font-weight:400;
}

/* Industrial specs strip */
.industrial-specs{
  display:grid;grid-template-columns:repeat(2,auto);gap:0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  margin-bottom:36px;width:fit-content;
}
.industrial-specs > div{
  padding:18px 20px;
  border-right:1px solid var(--border);
}
.industrial-specs > div:first-child{padding-left:0}
.industrial-specs{margin-bottom:36px}
.industrial-specs > div:last-child{border-right:none}
.industrial-specs .label{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:10px;letter-spacing:.2em;color:var(--muted);
  text-transform:uppercase;margin-bottom:8px;
}
.industrial-specs .value{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-weight:600;font-size:24px;letter-spacing:-.02em;color:var(--ink);
  line-height:1;display:flex;align-items:baseline;gap:0;
}
.industrial-specs .value em{font-style:italic;color:var(--accent);font-weight:600}
.industrial-specs .unit{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:11px;color:var(--muted);margin-left:6px;
  display:inline-block;letter-spacing:.05em;
}
@media (max-width:1100px){
  .industrial-specs{grid-template-columns:repeat(2,1fr)}
  .industrial-specs > div{border-bottom:1px solid var(--border)}
}

/* Industrial CTA pair */
.industrial-actions{display:inline-flex;gap:0;flex-wrap:wrap;border:1px solid var(--accent)}
.industrial-actions a{border:none !important}
.industrial-actions .btn-primary,
.industrial-actions .btn-ghost{
  border-radius:0;padding:22px 36px;font-size:13px;letter-spacing:.18em;
  font-weight:600;font-family:'Inter',system-ui,-apple-system,sans-serif;
}
.industrial-actions .btn-primary{
  background:var(--accent);color:#fff;border:1px solid var(--accent);
}
.industrial-actions .btn-primary:hover{background:var(--accent-deep);border-color:var(--accent-deep);transform:none}
.industrial-actions .btn-ghost{
  background:transparent;color:var(--ink);border:1px solid var(--border);
  border-left:none;
}
.industrial-actions .btn-ghost:hover{background:var(--surface);border-color:var(--accent)}

/* Corner brackets for industrial photographs */
.bracketed{position:relative}
.bracketed::before,.bracketed::after,
.bracketed > .br-tl, .bracketed > .br-tr, .bracketed > .br-bl, .bracketed > .br-br{
  content:"";position:absolute;width:18px;height:18px;
  border:1.5px solid var(--accent);z-index:2;pointer-events:none;
}
.bracketed::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.bracketed::after{top:-1px;right:-1px;border-left:none;border-bottom:none}
.bracketed > .br-bl{bottom:-1px;left:-1px;border-right:none;border-top:none}
.bracketed > .br-br{bottom:-1px;right:-1px;border-left:none;border-top:none}

/* Industrial bar / classification stamp */
.cls-stamp{
  display:inline-flex;align-items:center;gap:10px;
  padding:7px 14px;border:1.5px solid var(--accent);
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent);font-weight:600;background:rgba(59,130,246,.06);
}
.cls-stamp::before{content:"●";color:var(--accent-bright);font-size:8px}

/* Industrial section dividers */
.sect-divider{
  display:flex;align-items:center;gap:16px;
  padding:18px 40px;background:var(--surface);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:10px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;
}
.sect-divider .dot{width:6px;height:6px;background:var(--accent-bright);border-radius:50%}
.sect-divider .sep{color:var(--muted-2)}
.sect-divider b{color:var(--ink);font-weight:500}

/* Industrial section title — heavier presence handled in h2.section-title above */

/* Cap cards — sharper edges, more industrial */
.cap{
  border:1px solid var(--border);background:var(--surface);
  transition:border-color .15s,background .15s;
}
.cap:hover{border-color:var(--accent);background:var(--surface-2);transform:none}

/* Buttons sharper */
.btn-primary{border-radius:0;font-weight:600;letter-spacing:.06em;transition:background .15s,border-color .15s}
.btn-primary:hover{transform:none}
.btn-ghost{border-radius:0;font-weight:600;letter-spacing:.06em;transition:background .15s,border-color .15s}
.btn-ghost:hover{transform:none}
.cta{border-radius:0;font-weight:600;letter-spacing:.08em}

/* Eyebrow gets bolder */
.eyebrow{font-weight:600;font-size:11px}

/* Removing floaty hovers — make them snappier */
.news-card:hover{transform:none;border-color:var(--accent)}
.cap:hover{transform:none}
.product-card:hover{transform:none;border-color:var(--accent)}
.mission:hover{transform:none;border-color:var(--accent)}

/* Sharper section structures — denser look */
.cap-grid{gap:1px;background:var(--border);border:1px solid var(--border)}
.cap-grid .cap, .cap-grid .product-card, .cap-grid .facility-card{border:none}

/* News card with sharper edges */
.news-card{border-radius:0;border:1px solid var(--border)}
.news-card:hover .ph img{filter:saturate(1.2) brightness(1)}

/* Brand mark — slightly bolder */
.brand{font-weight:600;letter-spacing:.02em}
.brand-mark{border:1px solid var(--accent)}
.brand-mark::before{background:var(--accent-bright);box-shadow:0 0 14px var(--accent-bright)}

/* Top nav active state — sharper */
nav.primary > .nav-item.open > button::after{
  background:var(--accent);height:2px;
}
nav.primary > .nav-item > button{font-weight:500}

/* Industrial hero meta */
.hero-meta{font-weight:500}
.hero-meta b{color:var(--ink);font-weight:600}

/* Telemetry overlay — sharper */
.hero-image .telemetry{
  background:rgba(6,8,11,.9);
  border:1px solid var(--accent);
  font-weight:500;
}
.hero-image .telemetry b{color:var(--accent-bright);font-weight:600}



/* ============================================================
   EDITORIAL / ROLLS-ROYCE-INSPIRED SECTOR & STORY CARDS
   ============================================================ */

/* Master purpose statement (subtitle below hero) */
.purpose-strap{
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:48px 40px;background:var(--bg);
}

  grid-template-columns:200px 1fr;gap:60px;align-items:start;
}
.purpose-strap .label{
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  font-size:10px;letter-spacing:.22em;color:var(--accent);
  text-transform:uppercase;font-weight:600;
}
.purpose-strap p{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:clamp(20px,2.2vw,30px);line-height:1.35;
  letter-spacing:-.01em;font-weight:500;color:var(--ink);margin:0;
  text-wrap:balance;
}
.purpose-strap p em{font-style:italic;color:var(--accent);font-weight:500}
@media (max-width:1000px){
  .purpose-strap-inner{grid-template-columns:1fr;gap:24px}

/* Sector hero cards — large, photographic, editorial */
.sector-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:1px;
  background:var(--border);border:1px solid var(--border);
}
.sector-card{

}
.sector-card .sector-photo{

.sector-card::after{

    rgba(6,8,11,.55) 50%,

.sector-card:hover .sector-photo{transform:scale(1.04);filter:saturate(1.2) brightness(.7)}

.sector-card .sector-num{

.sector-card .sector-stat span{

.sector-card h3{
  font-family:'Inter',sans-serif;font-weight:600;

}
.sector-card h3 em{font-style:italic;color:var(--ice);font-weight:600}
.sector-card .sector-tagline{

.sector-card .sector-link{

.sector-card .sector-link::after{

.sector-card:hover .sector-link::after{transform:translateX(4px)}
@media (max-width:1000px){
  .sector-grid{grid-template-columns:1fr}

.story-grid{

}
.story-card{

.story-card:hover{background:var(--surface-2)}

.story-card .story-photo img{

.story-card:hover .story-photo img{transform:scale(1.03)}
.story-card .story-body{padding:24px;display:flex;flex-direction:column;gap:12px;flex:1}
.story-card .story-meta{
  display:flex;align-items:center;gap:16px;
  font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;
  font-size:10px;letter-spacing:.18em;color:var(--accent);
  text-transform:uppercase;font-weight:600;
}
.story-card .story-meta .sep{color:var(--muted-2)}
.story-card .story-meta .read{color:var(--muted)}
.story-card h3{
  font-family:'Inter',sans-serif;font-weight:600;
  font-size:18px;line-height:1.2;letter-spacing:-.01em;color:var(--ink);
  margin:0;
}
.story-card h3 em{font-style:italic;color:var(--accent);font-weight:600}
.story-card p{
  font-size:13px;line-height:1.55;color:var(--ink-2);margin:0;
  flex:1;
}
.story-card .story-footer{

.trust-logo{

.partnership-track{

}
.partnership-track .pt-num{

}
.partnership-track h3{

}

.partnership-track .pt-for{

/* Section rhythm — subtle separators */

/* ============================================================
   NEWS-IMG variant — for logo images on white background
   ============================================================ */
.news-img.is-logo{
  background:#fff;
  border:1px solid var(--border);
}
.news-img.is-logo img{
  object-fit:contain;
  padding:32px;
  filter:none;
  transition:transform .4s ease;
}
.news-card:hover .news-img.is-logo img{
  transform:scale(1.04);
}



/* ============================================================
   HERO BG SVG — animated Earth + maneuvering satellite
   ============================================================ */
.industrial-hero .bg-svg{
  position:absolute;inset:0;z-index:0;overflow:hidden;
  background:#020410;
}
.industrial-hero .bg-svg svg{
  width:100%;height:100%;display:block;
}
/* Subtle satellite glow */
.industrial-hero .satellite .sat-body{
  filter:drop-shadow(0 0 6px rgba(96,165,250,.3));
}



/* ============================================================
   HERO TELEMETRY HUD — mission ops console
   ============================================================ */
.hero-telemetry{
  position:absolute;z-index:4;
  top:50%;right:40px;transform:translateY(-50%);
  width:280px;
  background:rgba(10,16,28,.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(96,165,250,.25);
  font-family:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',monospace;
  color:var(--accent-bright);
  pointer-events:none;
}
.hero-telemetry::before{
  content:"";position:absolute;inset:-1px;
  border:1px solid rgba(34,211,238,.15);
  pointer-events:none;
}
.tlm-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  border-bottom:1px solid rgba(96,165,250,.18);
  background:rgba(34,211,238,.04);
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
}
.tlm-dot{
  width:6px;height:6px;border-radius:50%;
  background:#22d3ee;box-shadow:0 0 6px #22d3ee;
  animation:tlm-blink 1.5s ease-in-out infinite;
}
@keyframes tlm-blink{
  0%,100%{opacity:1}
  50%{opacity:.3}
}
.tlm-id{flex:1;color:#a5f3fc;font-weight:600}
.tlm-mode{color:#22d3ee;font-weight:600;font-size:9px;
  padding:2px 6px;border:1px solid rgba(34,211,238,.4);
}
.tlm-rows{padding:8px 0}
.tlm-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 14px;
  font-size:11px;letter-spacing:.08em;
}
.tlm-row + .tlm-row{border-top:1px solid rgba(96,165,250,.08)}
.tlm-label{
  color:rgba(165,243,252,.55);
  text-transform:uppercase;font-size:9.5px;letter-spacing:.14em;
}
.tlm-value{
  color:#fff;font-weight:600;
  font-size:12px;letter-spacing:.04em;
  font-variant-numeric:tabular-nums;
}
.tlm-value.burn{color:#22d3ee;text-shadow:0 0 8px rgba(34,211,238,.6)}
.tlm-value.observe{color:#a5f3fc}

@media (max-width:1100px){
  .hero-telemetry{display:none}
}



/* ============================================================

   ============================================================ */

  display:flex;flex-wrap:wrap;align-items:center;

}
@media (max-width:720px){
  .hero-capabilities{font-size:10.5px;letter-spacing:.14em;gap:10px}
}



/* ============================================================
   MISSION CAPABILITY MATRIX — high-level decision-maker view
   ============================================================ */
.mission-matrix{
  max-width:1280px;margin:0 auto;padding:0 40px;
  font-family:'Inter',system-ui,sans-serif;
}
.mission-matrix table{
  width:100%;border-collapse:collapse;
  background:var(--surface);
  border:1px solid var(--border);
}
.mission-matrix thead th{
  text-align:left;
  padding:18px 20px;

  background:var(--surface-2);

  font-size:10.5px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);
}
.mission-matrix tbody tr{
  border-top:1px solid var(--border);
  transition:background .15s ease;
}
.mission-matrix tbody tr:hover{
  background:rgba(34,211,238,.025);
}
.mission-matrix tbody td{
  padding:22px 20px;
  vertical-align:top;
  font-size:14px;color:var(--ink-2);
  line-height:1.55;
}
.mission-matrix tbody td:first-child{width:35%}
.mission-matrix tbody td b{color:var(--ink);font-weight:600;font-size:15px}
.mm-note{

  margin-top:6px;
  font-size:12.5px;color:var(--muted);

  font-weight:400;
}
.mm-num{
  font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;
  font-size:16px;font-weight:600;
  color:var(--accent-bright);

  white-space:nowrap;
}
.mm-num small{
  font-size:11px;color:var(--muted);
  font-weight:500;margin-left:3px;
}
.mm-tag{
  display:block;
  margin-top:4px;
  font-family:ui-monospace,monospace;
  font-size:10.5px;color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;
  font-weight:500;
}
.mm-pill{
  display:inline-block;
  padding:4px 10px;
  border-radius:0;
  font-family:ui-monospace,monospace;
  font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  border:1px solid;
  white-space:nowrap;
}
.mm-pill.ok{
  color:var(--accent-bright);
  border-color:rgba(34,211,238,.35);
  background:rgba(34,211,238,.06);
}
.mm-pill.dev{
  color:var(--muted);
  border-color:rgba(107,114,128,.35);
  background:rgba(107,114,128,.06);
}
.mm-foot{
  margin-top:20px;
  padding:14px 0;
  font-family:ui-monospace,monospace;
  font-size:11px;color:var(--muted);
  letter-spacing:.04em;
  line-height:1.8;
}
.mm-foot .mm-pill{margin-right:6px}
@media (max-width:900px){
  .mission-matrix{padding:0 16px}
  .mission-matrix table,
  .mission-matrix thead,
  .mission-matrix tbody,
  .mission-matrix tr,
  .mission-matrix td,
  .mission-matrix th{display:block}
  .mission-matrix thead{display:none}
  .mission-matrix tbody tr{padding:18px;border:1px solid var(--border);margin-bottom:12px}
  .mission-matrix tbody td{padding:6px 0;border:none}
  .mission-matrix tbody td:before{
    content:attr(data-label);
    display:block;font-size:10.5px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.12em;
    margin-bottom:4px;
  }
}



/* ============================================================
   AUDIENCE TAB SWITCHER — Mission / Engineering views
   ============================================================ */
.audience-tabs{
  max-width:1280px;margin:0 auto;padding:40px;
  border-bottom:1px solid var(--border);
}
.at-inner{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
}
.at-btn{
  display:flex;align-items:center;gap:20px;
  padding:24px 28px;
  background:var(--surface);
  border:1px solid var(--border);

  text-align:left;
  color:var(--ink-2);
  position:relative;
  transition:all .2s ease;
  font-family:inherit;
}
.at-btn:hover{
  border-color:var(--border);
  background:var(--surface-2);
}
.at-btn.active{
  background:var(--surface-2);
  border-color:var(--accent);
}
.at-btn .at-num{
  font-family:ui-monospace,'SF Mono',monospace;
  font-size:11px;font-weight:600;letter-spacing:.18em;
  color:var(--muted);
  padding:6px 10px;
  border:1px solid var(--border);
  flex-shrink:0;
}
.at-btn.active .at-num{
  color:var(--accent-bright);
  border-color:rgba(34,211,238,.4);
  background:rgba(34,211,238,.05);
}
.at-btn .at-content{display:flex;flex-direction:column;gap:4px;flex:1}
.at-btn .at-title{
  font-size:18px;font-weight:600;
  color:var(--ink);
  letter-spacing:-.01em;
}
.at-btn.active .at-title{color:#fff}
.at-btn .at-sub{
  font-family:ui-monospace,monospace;
  font-size:11px;color:var(--muted);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.at-btn .at-indicator{
  width:8px;height:8px;border-radius:50%;
  background:transparent;
  border:1px solid var(--border);
  flex-shrink:0;
  transition:all .2s ease;
}
.at-btn.active .at-indicator{
  background:var(--accent-bright);
  border-color:var(--accent-bright);

}
.at-pane{
  animation:at-fade-in .3s ease;
}
.at-pane.hidden{display:none}
@keyframes at-fade-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@media (max-width:720px){
  .at-inner{grid-template-columns:1fr}
  .at-btn{padding:18px 20px}
}

/* ============================================================
   INTERFACE SPECIFICATIONS — 4-card grid
   ============================================================ */

/* ============================================================

   ============================================================ */
.perf-plot{

}

.article-meta-strip .article-cat { color: var(--accent-bright); padding: 4px 10px; border: 1px solid var(--accent-bright); }

.article-body { font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.75; color: var(--ink-2); }
.article-body p { margin: 0 0 18px; }
.article-body h4 { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; color: var(--ink); margin: 32px 0 12px; letter-spacing: -.01em; }

.article-body ul { margin: 12px 0 22px; padding-left: 20px; }
.article-body li { margin-bottom: 8px; }
.article-body blockquote { margin: 28px 0; padding: 24px 28px; border-left: 3px solid var(--accent-bright); background: var(--bg-2); font-style: italic; font-size: 17px; line-height: 1.6; color: var(--ink); }
.article-body blockquote cite { display: block; font-style: normal; font-size: 12px; color: var(--muted); letter-spacing: .04em; margin-top: 12px; font-family: ui-monospace, monospace; text-transform: uppercase; font-weight: 700; }

.article-footer { margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border-soft); }
.back-to-news { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent-bright); text-decoration: none; font-weight: 700; }
.back-to-news:hover { color: var(--ink); }
.toc-wrap { padding: 60px 40px; max-width: 1200px; margin: 0 auto; }

.toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
.toc-item { display: flex; flex-direction: column; gap: 6px; padding: 18px 20px; background: var(--bg); text-decoration: none; transition: background .15s; }
.toc-item:hover { background: var(--bg-2); }

  .article-section { padding: 50px 24px 40px; }

}
