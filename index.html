\"><span id=\"mc-out-wet\">\u2014</span></div>\n      <div class=\"mc-output-sub\">Dry + total propellant + pressurant</div>\n     </div>\n    </div>\n\n    <div style=\"background:rgba(34,211,238,.04);border-left:3px solid var(--accent-bright);padding:14px 16px\">\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:10px\">Propellant Budget Breakdown</div>\n     <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n      <div>\n       <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">Usable</div>\n       <div class=\"mc-output-value sm\" style=\"margin-top:4px\"><span id=\"mc-out-usable\">\u2014</span></div>\n      </div>\n      <div>\n       <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">+ Residuals</div>\n       <div class=\"mc-output-value sm\" style=\"margin-top:4px\"><span id=\"mc-out-residuals\">\u2014</span></div>\n      </div>\n      <div>\n       <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">+ Margin</div>\n       <div class=\"mc-output-value sm\" style=\"margin-top:4px\"><span id=\"mc-out-margin\">\u2014</span></div>\n      </div>\n      <div>\n       <div style=\"font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase\">+ Pressurant</div>\n       <div class=\"mc-output-value sm\" style=\"margin-top:4px\"><span id=\"mc-out-press\">\u2014</span></div>\n      </div>\n     </div>\n    </div>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px\">\n     <div class=\"mc-output-card\">\n      <div class=\"mc-output-label\">Mass Fraction</div>\n      <div class=\"mc-output-value med\"><span id=\"mc-out-mf\">\u2014</span></div>\n     </div>\n     <div class=\"mc-output-card\">\n      <div class=\"mc-output-label\">Burn Duration</div>\n      <div class=\"mc-output-value med\"><span id=\"mc-out-burn\">\u2014</span></div>\n     </div>\n     <div class=\"mc-output-card secondary\">\n      <div class=\"mc-output-label\">Tank Volume (LMP-103S)</div>\n      <div class=\"mc-output-value med\"><span id=\"mc-out-tank\">\u2014</span></div>\n     </div>\n    </div>\n\n    <div style=\"display:flex;gap:32px;padding:14px 16px;background:var(--bg-2);border:1px solid var(--border-soft);flex-wrap:wrap\">\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">ISP</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--ink);margin-top:2px\"><span id=\"mc-out-isp\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Thrust</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--ink);margin-top:2px\"><span id=\"mc-out-thrust\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Mass Flow</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--ink);margin-top:2px\"><span id=\"mc-out-flow\">\u2014</span></div>\n     </div>\n     <div>\n      <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">Mass Ratio</div>\n      <div style=\"font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--ink);margin-top:2px\"><span id=\"mc-out-ratio\">\u2014</span></div>\n     </div>\n    </div>\n\n    <div style=\"margin-top:auto;padding-top:16px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.7;letter-spacing:.04em\">\n     <b style=\"color:var(--accent-bright);text-transform:uppercase;letter-spacing:.14em\">/ MISSION-DESIGN NOTES</b><br>\n     Tsiolkovsky: m<sub>p</sub> = m<sub>d</sub> \u00b7 (e<sup>\u0394V/(Isp\u00b7g\u2080)</sup> \u2212 1). Tank volume uses LMP-103S density 1,240 kg/m\u00b3. Real flight programmes also account for burn-arc gravity losses, plume losses, propellant slosh allowance, tank bladder/management volume, and pressurant pre-load. Use this tool for first-order trades, not flight design.\n    </div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- 08 \u2014 MULTI-BURN MISSION BUILDER (NEW) -->\n<section style=\"border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(34,211,238,.02) 0%,transparent 100%)\" id=\"multi-burn\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Multi-Burn Mission \u00b7 08</div>\n   <h2 class=\"section-title\">Mission as a <em>sequence of burns.</em></h2>\n  </div>\n  <p>For complex missions with multiple manoeuvres, propellant is sized with proper staging \u2014 each burn reduces the wet mass for the next. Click any input to edit; add or remove burns as needed.</p>\n </div>\n\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);overflow:hidden\">\n\n  <!-- Top inputs row -->\n  <div style=\"padding:24px 32px;background:var(--bg-2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:end\">\n   <div>\n    <label class=\"mc-label\">Final dry mass</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"mb-dry\" value=\"500\" min=\"0\" step=\"10\" />\n     <span class=\"unit\">kg</span>\n    </div>\n   </div>\n   <div>\n    <label class=\"mc-label\">Margin</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"mb-margin\" value=\"15\" min=\"0\" max=\"50\" step=\"1\" />\n     <span class=\"unit\">%</span>\n    </div>\n   </div>\n   <div>\n    <label class=\"mc-label\">Residuals</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"mb-res\" value=\"3\" min=\"0\" max=\"10\" step=\"0.5\" />\n     <span class=\"unit\">%</span>\n    </div>\n   </div>\n   <div>\n    <label class=\"mc-label\">Pressurant</label>\n    <div class=\"mc-input\">\n     <input type=\"number\" id=\"mb-press\" value=\"2\" min=\"0\" max=\"10\" step=\"0.5\" />\n     <span class=\"unit\">%</span>\n    </div>\n   </div>\n  </div>\n\n  <!-- Burns table -->\n  <div style=\"padding:24px 32px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:16px\">/ MISSION SEQUENCE</div>\n\n   <!-- Header row -->\n   <div style=\"display:grid;grid-template-columns:36px 1.4fr 110px 1.5fr 110px 90px 36px;gap:10px;padding:10px 12px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border-soft);align-items:center\">\n    <div>#</div>\n    <div>BURN NAME</div>\n    <div>\u0394V (m/s)</div>\n    <div>ENGINE</div>\n    <div>PROPELLANT</div>\n    <div>BURN TIME</div>\n    <div></div>\n   </div>\n\n   <div id=\"mb-burns\" style=\"display:flex;flex-direction:column\"></div>\n\n   <button id=\"mb-add\" style=\"margin-top:14px;background:transparent;color:var(--accent-bright);border:1px dashed var(--accent-bright);padding:12px 20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;letter-spacing:.02em;cursor:pointer;width:100%;transition:background .15s\">+ Add Burn</button>\n  </div>\n\n  <!-- Totals -->\n  <div style=\"padding:24px 32px;background:rgba(34,211,238,.04);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n   <div>\n    <div class=\"mc-output-label\">Total \u0394V</div>\n    <div class=\"mc-output-value big\" style=\"margin-top:8px\"><span id=\"mb-tot-dv\">\u2014</span></div>\n   </div>\n   <div>\n    <div class=\"mc-output-label\">Total Propellant Loaded</div>\n    <div class=\"mc-output-value big\" style=\"margin-top:8px;color:var(--accent-bright)\"><span id=\"mb-tot-prop\">\u2014</span></div>\n    <div class=\"mc-output-sub\">Includes margin + residuals + pressurant</div>\n   </div>\n   <div>\n    <div class=\"mc-output-label\">Initial Wet Mass</div>\n    <div class=\"mc-output-value big\" style=\"margin-top:8px\"><span id=\"mb-tot-wet\">\u2014</span></div>\n   </div>\n   <div>\n    <div class=\"mc-output-label\">Mass Fraction</div>\n    <div class=\"mc-output-value big\" style=\"margin-top:8px\"><span id=\"mb-tot-mf\">\u2014</span></div>\n   </div>\n  </div>\n\n  <div style=\"padding:16px 32px;border-top:1px solid var(--border-soft);background:var(--bg-2);font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.6;letter-spacing:.04em\">\n   <b style=\"color:var(--accent-bright);text-transform:uppercase;letter-spacing:.14em\">/ STAGING MATH</b> &nbsp; Calculation iterates BACKWARDS from final dry mass. The last burn's propellant accelerates only the dry spacecraft; earlier burns must also accelerate all subsequent propellant. Total mass ratio compounds across burns \u2014 single-lumped \u0394V underestimates propellant for multi-burn missions when the same engine is used throughout.\n  </div>\n </div>\n</section>\n\n<!-- 09 \u2014 MULTI-ENGINE COMPARISON CHART -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Engine Comparison \u00b7 09</div>\n   <h2 class=\"section-title\">Same mission, <em>every engine.</em></h2>\n  </div>\n  <p>Live comparison \u2014 for your dry mass and \u0394V above, propellant required across all 11 ECAPS thrust classes. Selected engine is highlighted. Higher ISP = less propellant for the same \u0394V.</p>\n </div>\n\n <div class=\"reveal\" style=\"background:var(--surface);border:1px solid var(--border);padding:28px 24px\">\n  <div id=\"mc-chart\" style=\"display:flex;flex-direction:column\"></div>\n\n  <div style=\"margin-top:24px;padding-top:18px;border-top:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px\">\n   <div style=\"display:flex;gap:24px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)\">\n    <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:24px;height:10px;background:linear-gradient(90deg,#22D3EE,rgba(34,211,238,.4))\"></div>MONOPROPELLANT</div>\n    <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:24px;height:10px;background:linear-gradient(90deg,#3B82F6,rgba(59,130,246,.4))\"></div>BIPROPELLANT</div>\n   </div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.06em\">For mission: <b style=\"color:var(--ink)\" id=\"mc-chart-mission\">500 kg \u00b7 \u0394V 500 m/s \u00b7 15% margin</b></div>\n  </div>\n </div>\n</section>\n\n<!-- 10 \u2014 ECAPS PLANNING CAPABILITY -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Partnership Platform \u00b7 10</div>\n   <h2 class=\"section-title\">Designed <em>with the customer.</em></h2>\n  </div>\n  <p>ECAPS engages as a propulsion partner from concept through flight. Satellite bus providers, mission primes, and government programmes leverage ECAPS engineering depth, qualified hardware, and operational heritage \u2014 embedded in the development cycle, not bolted on.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)\">\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ Concept Studies</div>\n   <h3 style=\"font-size:17px\">Trade-space analysis</h3>\n   <p style=\"font-size:13px;margin-top:8px;color:var(--ink-2);line-height:1.6\">Feasibility, performance modelling, and trade studies against the mission envelope. ECAPS engineering depth before procurement commitment.</p>\n   <div style=\"margin-top:16px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">P3 \u00b7 R&amp;E SUPPORT</div>\n  </div>\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ Custom Development</div>\n   <h3 style=\"font-size:17px\">Bespoke blends &amp; classes</h3>\n   <p style=\"font-size:13px;margin-top:8px;color:var(--ink-2);line-height:1.6\">LMP-103S variants beyond the four standard temperature blends, and thrust classes outside the qualified portfolio \u2014 for unique operating envelopes.</p>\n   <div style=\"margin-top:16px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">P2 / P3 PACKAGES</div>\n  </div>\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ Integration Support</div>\n   <h3 style=\"font-size:17px\">Platform integration</h3>\n   <p style=\"font-size:13px;margin-top:8px;color:var(--ink-2);line-height:1.6\">Mechanical, thermal, and propellant-system integration support. Interface control documents, fluid system layout, AOCS commanding.</p>\n   <div style=\"margin-top:16px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">ALL PACKAGES</div>\n  </div>\n  <div style=\"background:var(--surface);padding:24px;min-height:auto\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:12px\">/ Qualification</div>\n   <h3 style=\"font-size:17px\">Test &amp; flight readiness</h3>\n   <p style=\"font-size:13px;margin-top:8px;color:var(--ink-2);line-height:1.6\">Qualification campaigns \u2014 environmental, life, performance \u2014 under AS9100 / ISO 9001. Customer witness as agreed.</p>\n   <div style=\"margin-top:16px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase\">P1 / P2 PACKAGES</div>\n  </div>\n </div>\n</section>\n\n\n<!-- CTA -->\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Move from <em>sizing</em> to delivery.</h2>\n <p style=\"max-width:620px;margin:20px auto 30px;color:var(--ink-2);font-size:15px;line-height:1.55\">First-order sizing gives you a target. ECAPS engineering depth turns that target into a qualified, integrated system \u2014 through Research &amp; Engineering support (P3), Qualified Procurement (P1), or Bespoke development (P2).</p>\n <div class=\"cta-row\">\n  <a href=\"#/commercial-packages/package-3\" class=\"btn-primary\">Engage P3 R&amp;E \u2192</a>\n  <a href=\"#/commercial-packages\" class=\"btn-ghost\">All commercial packages</a>\n  <a href=\"#/contact-us\" class=\"btn-ghost\">Schedule a briefing</a>\n </div>\n</div>","missions":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>MISSIONS</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>40+ SPACECRAFT \u00b7 <b>2010 \u2192 2024</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">ECAPS <em>in action.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Through 15+ years of flight heritage, ECAPS technology enables critical mobility in space. A selection of missions powered by ECAPS hardware \u2014 from the first ADN flight on PRISMA to current operations.</p>\n <div class=\"hero-coords reveal\">\n <div>FIRST FLIGHT \u2014 <b>PRISMA 2010</b></div>\n <div>LATEST \u2014 <b>ADRAS-J 2024</b></div>\n <div>HERITAGE \u2014 <b>200+ ORBIT YRS</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=2400&q=90&auto=format&fit=crop\" alt=\"ECAPS-equipped spacecraft in orbit\" />\n <div class=\"telemetry\">\n SPACECRAFT <b>40+</b><br>\n ORBIT-YEARS <b>200+</b><br>\n HERITAGE <b>SINCE 2010</b>\n </div>\n <div class=\"caption\">MISSION HERITAGE \u00b7 40+ SPACECRAFT SINCE 2010</div>\n</div>\n\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Operational Heritage \u00b7 01</div>\n   <h2 class=\"section-title\">Past <em>missions.</em></h2>\n  </div>\n  <p>Selected unclassified missions powered by ECAPS hardware. From the first ADN flight on PRISMA (2010) to current operations including ADRAS-J (2024).</p>\n </div>\n\n <div class=\"mission-grid reveal\">\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889876-CAXJRXA9R82HTU9Q90DO/Adras-j.jpg\" alt=\"ADRAS-J\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">JP \u00b7 DEBRIS DEMONSTRATION</div>\n <div class=\"mission-year\">2024</div>\n <div class=\"mission-name\">ADRAS-J</div>\n <div class=\"mission-meta\">\n <div><b>Electron</b>Rocket</div>\n <div><b>Mahia \u00b7 NZ</b>Launch Site</div>\n <div><b>18 Feb</b>Date</div>\n <div><b>Active</b>Status</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889889-QG8DY7W3IR76B4T7DE5W/Argomoon.jpeg\" alt=\"Argomoon\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">US \u00b7 DEEP SPACE</div>\n <div class=\"mission-year\">2022</div>\n <div class=\"mission-name\">ArgoMoon</div>\n <div class=\"mission-meta\">\n <div><b>Artemis-1</b>Rocket</div>\n <div><b>KSC \u00b7 USA</b>Launch Site</div>\n <div><b>16 Nov</b>Date</div>\n <div><b>Lunar</b>Mission</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889905-U8K2NQ86PDAMFTO03YLR/NROL111.png\" alt=\"NROL-111\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">US \u00b7 RAPID-RESPONSE DEFENSE</div>\n <div class=\"mission-year\">2021</div>\n <div class=\"mission-name\">NROL-111 \u00b7 Altair 1-3</div>\n <div class=\"mission-meta\">\n <div><b>Minotaur 1</b>Rocket</div>\n <div><b>Wallops \u00b7 USA</b>Launch Site</div>\n <div><b>15 Jun</b>Date</div>\n <div><b>NRO</b>Customer</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889927-UAOF4D8VPHS7IVHK7JZ3/AdobeStock_430740424.jpeg\" alt=\"ELSA-d\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">JP \u00b7 DEBRIS DEMONSTRATION</div>\n <div class=\"mission-year\">2021</div>\n <div class=\"mission-name\">ELSA-d</div>\n <div class=\"mission-meta\">\n <div><b>Soyuz</b>Rocket</div>\n <div><b>Astroscale</b>Customer</div>\n <div><b>15 Mar</b>Date</div>\n <div><b>Debris Demo</b>Mission</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"http ><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889954-DPDLW822UL0LT92XTCY2/SkySat8910111213.png\" alt=\"SkySat 8-13\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">US \u00b7 EARTH OBSERVATION</div>\n <div class=\"mission-year\">2017</div>\n <div class=\"mission-name\">SkySat 8\u201313</div>\n <div class=\"mission-meta\">\n <div><b>Minotaur-c</b>Rocket</div>\n <div><b>Vandenberg \u00b7 USA</b>Launch Site</div>\n <div><b>31 Oct</b>Date</div>\n <div><b>Planet</b>Customer</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889963-HGFUOE36ZAR711HG9E19/Skysat+4-7.png\" alt=\"SkySat 4-7\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">US \u00b7 EARTH OBSERVATION</div>\n <div class=\"mission-year\">2016</div>\n <div class=\"mission-name\">SkySat 4\u20137</div>\n <div class=\"mission-meta\">\n <div><b>Vega-007</b>Rocket</div>\n <div><b>CSG Kourou \u00b7 GF</b>Launch Site</div>\n <div><b>15 Sep</b>Date</div>\n <div><b>Planet</b>Customer</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889974-9YKWTR54CGA54OG9UUYF/SkySat3.png\" alt=\"SkySat 3\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"mission-body\">\n <div class=\"mission-tag\">US \u00b7 EARTH OBSERVATION</div>\n <div class=\"mission-year\">2016</div>\n <div class=\"mission-name\">SkySat 3</div>\n <div class=\"mission-meta\">\n <div><b>PSLV C-34</b>Rocket</div>\n <div><b>Shar Chennai \u00b7 IN</b>Launch Site</div>\n <div><b>22 Jun</b>Date</div>\n <div><b>Planet</b>Customer</div>\n </div>\n </div>\n </div>\n\n <div class=\"mission\">\n <div class=\"mission-img\"><img src=\"https://images.squarespace- /div>\n   </div>\n   <div class=\"upcoming-body\">\n    <div class=\"upc-name\">Classified Mission \u2014 Republic of Korea</div>\n    <div class=\"upc-desc\">Second allied programme with Korean defense ecosystem. Mission profile shared under NDA.</div>\n    <div class=\"upc-meta\">\n     <div><b>Korean MoD</b>Customer</div>\n     <div><b>Allied</b>Jurisdiction</div>\n    </div>\n   </div>\n  </div>\n\n  <div class=\"upcoming\">\n   <div class=\"upcoming-stat\">\n    <div class=\"upc-year\">2028</div>\n    <div class=\"upc-tag\">EU \u00b7 SCIENCE</div>\n   </div>\n   <div class=\"upcoming-body\">\n    <div class=\"upc-name\">ESA LUMIO Mission</div>\n    <div class=\"upc-desc\">European Space Agency lunar science mission. ECAPS propulsion supporting cislunar science operations.</div>\n    <div class=\"upc-meta\">\n     <div><b>ESA</b>Customer</div>\n     <div><b>Science</b>Sector</div>\n    </div>\n   </div>\n  </div>\n\n  <div class=\"upcoming\">\n   <div class=\"upcoming-stat\">\n    <div class=\"upc-year\">2029</div>\n    <div class=\"upc-tag\">CLASSIFIED \u00b7 RESEARCH</div>\n   </div>\n   <div class=\"upcoming-body\">\n    <div class=\"upc-name\">Classified Research Mission</div>\n    <div class=\"upc-desc\">Multi-year research and demonstration mission. Mission profile shared under NDA.</div>\n    <div class=\"upc-meta\">\n     <div><b>Classified</b>Customer</div>\n     <div><b>Research</b>Sector</div>\n    </div>\n   </div>\n  </div>\n\n  <div class=\"upcoming\">\n   <div class=\"upcoming-stat\">\n    <div class=\"upc-year\">2029</div>\n    <div class=\"upc-tag\">KR \u00b7 OTV DEMO</div>\n   </div>\n   <div class=\"upcoming-body\">\n    <div class=\"upc-name\">Orbital Transfer Vehicle Demonstration</div>\n    <div class=\"upc-desc\">Allied OTV demonstration programme. Last-mile orbital delivery and multi-orbit deployment.</div>\n    <div class=\"upc-meta\">\n     <div><b>Korean MoD</b>Customer</div>\n     <div><b>Demonstration</b>Phase</div>\n    </div>\n   </div>\n  </div>\n\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Power your <em>next mission.</em></h2>\n <div class=\"cta-row\">\n <a href=\"#/contact-us\" class=\"btn-primary\">Contact ECAPS \u2192</a>\n <a href=\"#/history\" class=\"btn-ghost\">View History</a>\n </div>\n</div>","monopropellant-thrusters":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/hardware-portfolio\">Hardware Portfolio</a>\n <span>/</span>\n <span><b>MONOPROPELLANT ENGINES</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>OPERATIONAL \u00b7 <b>100mN \u2192 3 kN</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Monopropellant <em>Engines.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Single-feed propulsion across six qualified thrust classes \u2014 from 100 mN precision attitude control to 3 kN of orbital insertion authority. ECAPS monopropellant engines convert stored ADN-based propellant into precise, repeatable thrust enabling AOCS, \u0394V manoeuvres, and mission-critical operations across space and high-altitude domains.</p>\n <div class=\"hero-coords reveal\">\n <div>CLASSES \u2014 <b>6 (100 mN \u2192 3 kN)</b></div>\n <div>HERITAGE \u2014 <b>OPERATIONAL \u00b7 40+ SPACECRAFT</b></div>\n <div>ARCHITECTURE \u2014 <b>SCALABLE \u00b7 LMP-103S</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/855b9115-4dea-45b0-89af-5e1140ee1eee/22N+engine+test+.jpeg\" alt=\"22N monopropellant engine qualification hot-fire test\" />\n <div class=\"telemetry\">\n TEST <b>22N MONOPROP</b><br>\n ISP <b>235\u2013250 s</b><br>\n STATUS <b>QUALIFIED</b>\n </div>\n <div class=\"caption\">22N MONOPROPELLANT ENGINE QUALIFICATION TEST</div>\n</div>\n\n<!-- AUDIENCE TAB SWITCHER -->\n<section class=\"audience-tabs reveal\">\n <div class=\"at-inner\">\n  <button class=\"at-btn active\" data-tab=\"mission\" type=\"button\">\n   <span class=\"at-num\">01</span>\n   <span class=\"at-content\">\n    <span class=\"at-title\">Mission View</span>\n    <span class=\"at-sub\">Capability matrix \u00b7 heritage \u00b7 operational profiles</span>\n   </span>\n   <span class=\"at-indicator\"></span>\n  </button>\n  <button class=\"at-btn\" data-tab=\"engineering\" type=\"button\">\n   <span class=\"at-num\">02</span>\n   <span class=\"at-content\">\n    <span class=\"at-title\">Engineering View</span>\n    <span class=\"at-sub\">Interfaces \u00b7 performance envelope \u00b7 qualification</span>\n   </span>\n   <span class=\"at-indicator\"></span>\n  </button>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MISSION VIEW (default) \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"at-pane\" data-pane=\"mission\">\n\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Overview \u00b7 01</div>\n <h2 class=\"section-title\">Common architecture.<br><em>Scalable thrust.</em></h2>\n </div>\n <p>Built on a common propulsion architecture, these systems scale across thrust classes while maintaining high performance and operational reliability.</p>\n </div>\n\n <div style=\"margin:60px auto;max-width:1100px\" class=\"reveal\">\n  <div style=\"aspect-ratio:9/4;background:linear-gradient(180deg,rgba(34,211,238,.03) 0%,#06080B 100%);border:1px solid var(--border-soft);position:relative;overflow:hidden\">\n   <svg viewBox=\"0 0 900 380\" xmlns=\"http://www.w3.org/2000/svg\" style=\"display:block;width:100%;height:100%\">\n\n    <!-- \u2500\u2500\u2500 MOUNTING FLANGE \u2500\u2500\u2500 -->\n    <g>\n     <rect x=\"50\" y=\"130\" width=\"18\" height=\"120\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.4\"/>\n     <rect x=\"68\" y=\"155\" width=\"22\" height=\"70\" fill=\"none\" stroke=\"#FFFFFF\" stroke-width=\"1.4  mN engine\" style=\"max-width:100%;max-height:100%;object-fit:contain\" loading=\"lazy\" />\n   </div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:600;margin-top:12px;letter-spacing:-.02em\">100 mN</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:6px\">CubeSat \u00b7 AOCS</div>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px 16px;text-align:center;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:8px;background:linear-gradient(180deg,rgba(34,211,238,.04) 0%,transparent 100%)\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/c0f30d3b-f053-461e-ba31-3600dbb86b61/1N.png\" alt=\"1 N engine\" style=\"max-width:100%;max-height:100%;object-fit:contain\" loading=\"lazy\" />\n   </div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:600;margin-top:12px;letter-spacing:-.02em\">1 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-top:6px\">Smallsat AOCS+\u0394V</div>\n  </div>\n\n  <div style=\"background:var(--surface);padding:24px 16px;text-align:center;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:8px;background:linear-gradient(180deg,rgba(34,211,238,.04) 0%,transparent 100%)\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/ea953b5b-29a4-4bde-8f47-b5d55933c9e0/5N.png\" alt=\"5 N engine\" style=\"max-width:100%;max-height:100%;object-fit:contain\" loading=\"lazy\" />\n   </div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:22px;font-weight:600;margin-top:12px;letter-spacing:-.02em\">5 N</div>\n   <div style=\"font-family:ui-monospace,monospace;font-s center;justify-content:center;padding:8px;background:linear-gradient(180deg,rgba(245,158,11,.06) 0%,transparent 100%);position:relative\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:48px;color:var(--warn);opacity:.4;font-weight:700\">+</div>\n   </div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:20px;font-weight:600;margin-top:12px;letter-spacing:-.02em\">450 N \u2013 3 kN</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--warn);text-transform:uppercase;letter-spacing:.14em;margin-top:6px\">Programme-specific</div>\n  </div>\n\n </div>\n</section>\n\n<!-- SPEC TABLES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Thruster Specifications \u00b7 04</div>\n <h2 class=\"section-title\">Full <em>spec sheets.</em></h2>\n </div>\n <p>Comparison of qualified ECAPS monopropellant thrusters. All values per ECAPS qualification documentation.</p>\n </div>\n\n <div class=\"thruster-table reveal\" id=\"specs-all\">\n <table>\n <thead>\n <tr>\n <th>Specification</th>\n <th>100 mN</th>\n <th>1 N</th>\n <th>5 N</th>\n <th>22 N</th>\n <th>220 N</th>\n <th>450 N \u2013 3 kN</th>\n </tr>\n </thead>\n <tbody>\n <tr><td>Operational Function</td><td>AOCS + \u0394V</td><td>AOCS + \u0394V</td><td>AOCS + \u0394V</td><td>AOCS + \u0394V</td><td>\u0394V</td><td>Orbit insertion \u00b7 \u0394V</td></tr>\n <tr><td>Qualified Propellant Throughput</td><td>1 kg</td><td>24 kg</td><td>100 kg</td><td>150 kg</td><td>25 kg</td><td>Programme-specific</td></tr>\n <tr><td>Mass (excl. harness)</td><td>0.04 kg (excl. FCV)</td><td>0.39 kg</td><td>0.45 kg</td><td>1.0 kg</td><td>6 kg</td><td>TBC on engagement</td></tr>\n <tr><td>Density Impulse (vacuum)</td><td>2275 Ns/L</td><td>2480 \u2013 2815 Ns/L</td><td>2666 \u2013 2976 Ns/L</td><td>2850 \u2013 3040 Ns/L</td><td>2957 \u2013 3100 Ns/L</td><td>Programme-specific</td></tr>\n <tr><td>Specific Impulse (vacuum)</td><td>\u2265 190 s</td><td>204 \u2013 231 s</td><td>220 \u2013 245 s</td><td>235 \u2013 250 s</td><td>243 \u2013 255 s</td><td>Programme-specific</td></tr>\n <tr><td>Thrust Range</td><td>0.1 \u00b1 0.01 N</td><td>0.25 \u2013 1 N</td><td>1.4 \u2013 5.5 N</td><td>5.5 \u2013 22 N</td><td>55 \u2013 220 N</td><td>450 N \u2013 3,000 N</td></tr>\n <tr><td>Number of Pulses</td><td>2,000</td><td>60,000</td><td>50,000</td><td>50,000</td><td>10</td><td>Programme-specific</td></tr>\n <tr><td>Inlet Pressure Range</td><td>2.3 \u2013 4.5 bar</td><td>5.5 \u2013 22 bar</td><td>5.5 \u2013 24 bar</td><td>5.5 \u2013 24 bar</td><td>5.5 \u2013 24 bar</td><td>Programme-specific</td></tr>\n <tr><td>Nozzle Expansion Ratio</td><td>100:1</td><td>100:1</td><td>150:1</td><td>150:1</td><td>150:1</td><td>Programme-specific</td></tr>\n <tr><td>Pre-heating Power</td><td>6.3 \u2013 8 W</td><td>12 W</td><td>25 \u2013 30 W</td><td>36 \u2013 50 W</td><td>150 \u2013 250 W</td><td>Programme-specific</td></tr>\n <tr><td>Domain Compatibility</td><td>In-space</td><td>In-space</td><td>In-space</td><td>In-space \u00b7 High-alt</td><td>In-space \u00b7 High-alt</td><td>In-space \u00b7 High-alt</td></tr>\n </tbody>\n </table>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     04B \u2014 APPLICATIONS (mirrors brochure p.18 Use Cases)\n     7 application types \u00b7 which monoprop classes serve each\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Applications \u00b7 04A</div>\n <h2 class=\"section-title\">Use cases across <em>seven application types.</em></h2>\n </div>\n <p>Monopropellant operates across in-space and high-altitude regimes. Bipropellant and Power-Supply Systems extend into atmospheric and underwater applications.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-soft)\">\n\n  <!-- Satellites \u2014 primary -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889974-9YKWTR54CGA54OG9UUYF/SkySat3.png\" alt=\"SkySat satellite\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ SATELLITES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Primary application</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Attitude control, orbit raise, station-keeping, end-of-life. From CubeSat to large GEO platforms.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">CLASSES: 100 mN \u2192 220 N</div>\n   </div>\n  </div>\n\n  <!-- Launch Vehicles -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889936-6FPOD5B0MCT72KPGNI3Q/Falcon9+2020.png\" alt=\"Launch vehicle\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ LAUNCH VEHICLES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Upper-stage authority</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Reaction control, ullage settling, attitude management for orbital insertion and upper-stage stabilisation.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">CLASSES: 220 N \u2192 3 kN</div>\n   </div>\n  </div>\n\n  <!-- Interceptors -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889905-U8K2NQ86PDAMFTO03YLR/NROL111.png\" alt=\"Defense satellite mission\" style=\"width:100%;height:100%;object-fit:cover;opacity:.9\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#22D3EE\"></div>\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ INTERCEPTORS</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">Defense applications</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">High-thrust \u0394V for defense satellite manoeuvres, proximity operations, and rapid-response tactical re-tasking.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">CLASSES: 22 N \u2192 3 kN</div>\n   </div>\n  </div>\n\n  <!-- Aircraft & UAVs -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:#000;overflow:hidden\">\n    <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg\" alt=\"High-altitude aerospace\" style=\"width:100%;height:100%;object-fit:cover;opacity:.85\" loading=\"lazy\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(6,8,11,.95) 100%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ AIRCRAFT &amp; UAVs</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px;display:flex;flex-direction:column;flex:1\">\n    <h3 style=\"font-size:18px\">High-altitude propulsion</h3>\n    <p style=\"font-size:13px;margin-top:10px;flex:1\">Auxiliary propulsion for high-altitude UAV manoeuvre and aircraft applications above conventional engine envelope.</p>\n    <div style=\"margin-top:14px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">CLASSES: 22 N \u2192 3 kN</div>\n   </div>\n  </div>\n\n  <!-- Submarines (greyed) -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;opacity:.45;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:linear-gradient(180deg,#0a1a2e 0%,#000 100%);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(96,165,250,.15) 0%,transparent 60%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#60A5FA\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ SUBMARINES</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px\">\n    <h3 style=\"font-size:17px;color:var(--muted)\">Bipropellant only</h3>\n    <p style=\"font-size:13px;margin-top:10px\">Underwater applications require bipropellant configuration with self-contained oxidiser. <a href=\"#/bipropellant-thrusters\" style=\"color:var(--accent-bright)\">See Bipropellant \u2192</a></p>\n   </div>\n  </div>\n\n  <!-- AUVs (greyed) -->\n  <div style=\"background:var(--surface);min-height:auto;overflow:hidden;opacity:.45;display:flex;flex-direction:column\">\n   <div style=\"aspect-ratio:16/10;position:relative;background:linear-gradient(180deg,#0a1a2e 0%,#000 100%);overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(96,165,250,.15) 0%,transparent 60%)\"></div>\n    <div style=\"position:absolute;bottom:14px;left:18px;display:flex;align-items:center;gap:8px\">\n     <div style=\"width:10px;height:10px;border-radius:50%;background:#60A5FA\"></div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#FFF;font-weight:700\">/ AUVs</div>\n    </div>\n   </div>\n   <div style=\"padding:20px 22px 24px\">\n    <h3 style=\"font-size:17px;color:var(--muted)\">Aux Power only</h3>\n    <p style=\"font-size:13px;margin-top:10px\">Underwater autonomous vehicles use bipropellant or Aux Power Systems. <a href=\"#/auxiliary-systems\" style=\"color:var(--accent-bright)\">See Auxiliary Power \u2192</a></p>\n   </div>\n  </div>\n\n  <!-- Cross-Domain Summary -->\n  <div style=\"background:var(--bg-2);min-height:auto;padding:24px;border-left:3px solid var(--accent-bright);grid-column:span 2;display:flex;flex-direction:column;justify-content:center\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.16em;color:var(--accent-bright);text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ CROSS-DOMAIN SUMMARY</div>\n   <h3 style=\"font-size:22px\">Monoprop: in-space + high-altitude</h3>\n   <p style=\"font-size:13px;margin-top:14px;line-height:1.7\">Monopropellant configuration delivers superior simplicity, lower mass, and faster response than bipropellant \u2014 at the cost of lower peak ISP. The 6-class architecture covers every space mission profile from CubeSat precision (100 mN) through orbital insertion authority (3 kN), extending into high-altitude defence applications from the 22 N class upward.</p>\n  </div>\n\n </div>\n</section>\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Mission Capability Matrix \u00b7 04B</div>\n <h2 class=\"section-title\">By <em>mission profile.</em></h2>\n </div>\n <p>Typical \u0394-v and recommended thruster class for common mission profiles. For early concept-of-operations sizing \u2014 engineering qualification supplied on program engagement.</p>\n </div>\n\n <div class=\"mission-matrix reveal\">\n  <table>\n   <thead>\n    <tr>\n     <th>Mission Profile</th>\n     <th>Typical \u0394-v</th>\n     <th>Spacecraft Class</th>\n     <th>Recommended</th>\n     <th>Heritage</th>\n    </tr>\n   </thead>\n   <tbody>\n    <tr>\n     <td>\n      <b>Constellation phasing &amp; spacing</b>\n      <span class=\"mm-note\">Drift correction, plane adjustment, station-keeping across an orbital plane</span>\n     </td>\n     <td><span class=\"mm-num\">10\u201380<small>m/s</small></span></td>\n     <td>50\u2013500 kg</td>\n     <td><b>HPGP 1N</b><br><span class=\"mm-tag\">\u00d74 cluster typical</span></td>\n     <td><span class=\"mm-pill ok\">Operational \u00b7 SkySat</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>LEO orbit raise &amp; circularisation</b>\n      <span class=\"mm-note\">Insertion-to-operational orbit, eccentricity damping</span>\n     </td>\n     <td><span class=\"mm-num\">80\u2013250<small>m/s</small></span></td>\n     <td>100\u20131500 kg</td>\n     <td><b>HPGP 22N</b><br><span class=\"mm-tag\">\u00d72 or \u00d74</span></td>\n     <td><span class=\"mm-pill ok\">Operational \u00b7 multiple</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>Rendezvous &amp; proximity ops</b>\n      <span class=\"mm-note\">Inspection, capture approach, formation flying</span>\n     </td>\n     <td><span class=\"mm-num\">50\u2013150<small>m/s</small></span></td>\n     <td>150\u2013800 kg</td>\n     <td><b>HPGP 1N + 22N</b><br><span class=\"mm-tag\">attitude + \u0394v</span></td>\n     <td><span class=\"mm-pill ok\">Operational \u00b7 ADRAS-J</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>Lunar transfer injection</b>\n      <span class=\"mm-note\">Trans-lunar burn from GTO or staging orbit</span>\n     </td>\n     <td><span class=\"mm-num\">650\u2013800<small>m/s</small></span></td>\n     <td>10\u2013250 kg</td>\n     <td><b>HPGP 22N</b><br><span class=\"mm-tag\">long-duration burn</span></td>\n     <td><span class=\"mm-pill ok\">Operational \u00b7 ArgoMoon</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>Responsive on-orbit maneuver</b>\n      <span class=\"mm-note\">Rapid altitude change, tactical re-tasking, threat avoidance</span>\n     </td>\n     <td><span class=\"mm-num\">100\u2013500<small>m/s</small></span></td>\n     <td>200\u20132000 kg</td>\n     <td><b>HPGP 22N or 220N</b><br><span class=\"mm-tag\">high-thrust class</span></td>\n     <td><span class=\"mm-pill ok\">Operational</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>End-of-life de-orbit (LEO)</b>\n      <span class=\"mm-note\">Compliance with IADC 25-year guideline, controlled re-entry</span>\n     </td>\n     <td><span class=\"mm-num\">120\u2013200<small>m/s</small></span></td>\n     <td>any LEO</td>\n     <td><b>HPGP 22N</b><br><span class=\"mm-tag\">residual fuel</span></td>\n     <td><span class=\"mm-pill ok\">Operational</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>GEO station-keeping (NSSK)</b>\n      <span class=\"mm-note\">North-south and east-west drift correction over 15-year design life</span>\n     </td>\n     <td><span class=\"mm-num\">50<small>m/s/yr</small></span></td>\n     <td>1000\u20136000 kg</td>\n     <td><b>HPGP 22N</b><br><span class=\"mm-tag\">\u00d74 redundant</span></td>\n     <td><span class=\"mm-pill dev\">Qualified</span></td>\n    </tr>\n    <tr>\n     <td>\n      <b>Orbital transfer vehicle (OTV)</b>\n      <span class=\"mm-note\">Last-mile delivery, multi-orbit deployment, payload distribution</span>\n     </td>\n     <td><span class=\"mm-num\">300\u20131500<small>m/s</small></span></td>\n     <td>500\u20133000 kg</td>\n     <td><b>HPGP 220N</b><br><span class=\"mm-tag\">primary stage</span></td>\n     <td><span class=\"mm-pill dev\">TYR-1 program</span></td>\n    </tr>\n   </tbody>\n  </table>\n  <div class=\"mm-foot\">\n   <span class=\"mm-pill ok\">Operational</span> on-orbit heritage exists.\n   <span class=\"mm-pill dev\">Qualified</span> ground-qualified, ready for flight integration.\n   \u0394-v ranges are indicative; mission-specific budgets supplied under NDA.\n  </div>\n </div>\n</section>\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Supported Environments \u00b7 05</div>\n <h2 class=\"section-title\">Atmospheric to <em>exo-atmospheric.</em></h2>\n </div>\n <p>Designed for reliable operations across atmospheric, high-altitude, and exo-atmospheric environments.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr)\">\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 01</div>\n <h3 style=\"font-size:24px\">Upper Stage Mobilization</h3>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 02</div>\n <h3 style=\"font-size:24px\">Orbital Transfers &amp; Pointing</h3>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 03</div>\n <h3 style=\"font-size:24px\">Advanced Aircraft Mobility</h3>\n </div>\n <div class=\"cap\" style=\"min-height:auto;padding:32px\">\n <div class=\"cap-num\">/ 04</div>\n <h3 style=\"font-size:24px\">Advanced Tug Operations</h3>\n </div>\n </div>\n</section>\n\n</div><!-- /Mission view -->\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 ENGINEERING VIEW \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"at-pane hidden\" data-pane=\"engineering\">\n\n<!-- INTERFACE SPECIFICATIONS -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Interface Specifications \u00b7 E01</div>\n   <h2 class=\"section-title\">Mechanical, electrical,<br><em>propellant, thermal.</em></h2>\n  </div>\n  <p>Representative values for the HPGP 22N (reference configuration). Program-specific datasheets and full ICD supplied under NDA on engagement.</p>\n </div>\n\n <div class=\"iface-grid reveal\">\n  <div class=\"iface-card\">\n   <div class=\"iface-head\">\n    <span class=\"iface-num\">M</span>\n    <span class=\"iface-title\">Mechanical</span>\n   </div>\n   <dl class=\"iface-specs\">\n    <div><dt>Envelope</dt><dd>\u00d8 75 \u00d7 230 mm</dd></div>\n    <div><dt>Dry mass</dt><dd>1.0 kg <span class=\"note\">(excl. harness)</span></dd></div>\n    <div><dt>Mounting</dt><dd>4\u00d7 M4 on \u00d8 60 BCD</dd></div>\n    <div><dt>Material</dt><dd>316L SS \u00b7 Inconel 600</dd></div>\n    <div><dt>Nozzle expansion</dt><dd>150:1</dd></div>\n   </dl>\n  </div>\n\n  <div class=\"iface-card\">\n   <div class=\"iface-head\">\n    <span class=\"iface-num\">E</span>\n    <span class=\"iface-title\">Electrical</span>\n   </div>\n   <dl class=\"iface-specs\">\n    <div><dt>Bus voltage</dt><dd>22 \u2013 36 V DC</dd></div>\n    <div><dt>Heater power</dt><dd>36 \u2013 50 W</dd></div>\n    <div><dt>Valve current</dt><dd>1.2 A nominal</dd></div>\n    <div><dt>Command</dt><dd>Discrete \u00b7 RS-422</dd></div>\n    <div><dt>Telemetry</dt><dd>T-chamber \u00b7 P-inlet \u00b7 valve state</dd></div>\n   </dl>\n  </div>\n\n  <div class=\"iface-card\">\n   <div class=\"iface-head\">\n    <span class=\"iface-num\">P</span>\n    <span class=\"iface-title\">Propellant</span>\n   </div>\n   <dl class=\"iface-specs\">\n    <div><dt>Inlet fitting</dt><dd>1/4\" VCR or AN-4</dd></div>\n    <div><dt>Inlet pressure</dt><dd>5.5 \u2013 24 bar</dd></div>\n    <div><dt>Filter rating</dt><dd>25 \u03bcm</dd></div>\n    <div><dt>Propellant</dt><dd>LMP-103S (ADN-based)</dd></div>\n    <div><dt>Qualified throughput</dt><dd>150 kg</dd></div>\n   </dl>\n  </div>\n\n  <div class=\"iface-card\">\n   <div class=\"iface-head\">\n    <span class=\"iface-num\">T</span>\n    <span class=\"iface-title\">Thermal</span>\n   </div>\n   <dl class=\"iface-specs\">\n    <div><dt>Baseplate max</dt><dd>50 \u00b0C nominal \u00b7 80 \u00b0C peak</dd></div>\n    <div><dt>Cooling mode</dt><dd>Conductive to S/C structure</dd></div>\n    <div><dt>Operating range</dt><dd>\u221220 \u00b0C to +50 \u00b0C</dd></div>\n    <div><dt>Survival range</dt><dd>\u221240 \u00b0C to +85 \u00b0C</dd></div>\n    <div><dt>Pre-heat time</dt><dd>\u2264 90 s to ignition-ready</dd></div>\n   </dl>\n  </div>\n </div>\n</section>\n\n<!-- PERFORMANCE ENVELOPE -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Performance Envelope \u00b7 E02</div>\n   <h2 class=\"section-title\">Isp across<br><em>operating regime.</em></h2>\n  </div>\n  <p>Specific impulse versus pulse width for the HPGP 22N. Three curves shown for cold-start, warm-restart, and steady-state thermal conditions.</p>\n </div>\n\n <div class=\"perf-plot reveal\">\n  <svg viewBox=\"0 0 900 480\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"xMidYMid meet\">\n   <defs>\n    <linearGradient id=\"perf-grid-fade\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n     <stop offset=\"0%\" stop-color=\"rgba(96,165,250,.12)\"/>\n     <stop offset=\"100%\" stop-color=\"rgba(96,165,250,.02)\"/>\n    </linearGradient>\n   </defs>\n\n   <!-- Plot frame -->\n   <rect x=\"80\" y=\"40\" width=\"780\" height=\"380\" fill=\"url(#perf-grid-fade)\" stroke=\"rgba(96,165,250,.2)\" stroke-width=\"1\"/>\n\n   <!-- Gridlines -->\n   <g stroke=\"rgba(96,165,250,.08)\" stroke-width=\"1\">\n    <line x1=\"80\" y1=\"116\" x2=\"860\" y2=\"116\"/>\n    <line x1=\"80\" y1=\"192\" x2=\"860\" y2=\"192\"/>\n    <line x1=\"80\" y1=\"268\" x2=\"860\" y2=\"268\"/>\n    <line x1=\"80\" y1=\"344\" x2=\"860\" y2=\"344\"/>\n    <line x1=\"236\" y1=\"40\" x2=\"236\" y2=\"420\"/>\n    <line x1=\"392\" y1=\"40\" x2=\"392\" y2=\"420\"/>\n    <line x1=\"548\" y1=\"40\" x2=\"548\" y2=\"420\"/>\n    <line x1=\"704\" y1=\"40\" x2=\"704\" y2=\"420\"/>\n   </g>\n\n   <!-- Y-axis labels (Isp) -->\n   <g font-family=\"ui-monospace, monospace\" font-size=\"11\" fill=\"rgba(165,243,252,.55)\" letter-spacing=\".06em\">\n    <text x=\"70\" y=\"44\" text-anchor=\"end\">255</text>\n    <text x=\"70\" y=\"120\" text-anchor=\"end\">245</text>\n    <text x=\"70\" y=\"196\" text-anchor=\"end\">235</text>\n    <text x=\"70\" y=\"272\" text-anchor=\"end\">225</text>\n    <text x=\"70\" y=\"348\" text-anchor=\"end\">215</text>\n    <text x=\"70\" y=\"424\" text-anchor=\"end\">205</text>\n   </g>\n\n   <!-- X-axis labels (pulse width ms) -->\n   <g font-family=\"ui-monospace, monospace\" font-size=\"11\" fill=\"rgba(165,243,252,.55)\" letter-spacing=\".06em\">\n    <text x=\"80\" y=\"445\" text-anchor=\"middle\">20</text>\n    <text x=\"236\" y=\"445\" text-anchor=\"middle\">50</text>\n    <text x=\"392\" y=\"445\" text-anchor=\"middle\">100</text>\n    <text x=\"548\" y=\"445\" text-anchor=\"middle\">200</text>\n    <text x=\"704\" y=\"445\" text-anchor=\"middle\">500</text>\n    <text x=\"860\" y=\"445\" text-anchor=\"middle\">1000+</text>\n   </g>\n\n   <!-- Axis titles -->\n   <text x=\"470\" y=\"470\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\" font-size=\"11\" fill=\"rgba(165,243,252,.7)\" letter-spacing=\".14em\">PULSE WIDTH \u2014 MS</text>\n   <text x=\"20\" y=\"230\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\" font-size=\"11\" fill=\"rgba(165,243,252,.7)\" letter-spacing=\".14em\" transform=\"rotate(-90 20 230)\">SPECIFIC IMPULSE \u2014 S</text>\n\n   <!-- Steady-state curve (highest Isp) -->\n   <path d=\"M 80 348 C 180 280, 280 220, 392 168 C 500 130, 650 96, 860 76\"\n         fill=\"none\" stroke=\"#22d3ee\" stroke-width=\"2.5\" stroke-linecap=\"round\"\n         stroke-dasharray=\"3000\" stroke-dashoffset=\"3000\">\n    <animate attributeName=\"stroke-dashoffset\" from=\"3000\" to=\"0\" dur=\"2s\" begin=\"0.4s\" fill=\"freeze\"/>\n   </path>\n\n   <!-- Warm-restart curve (middle) -->\n   <path d=\"M 80 376 C 180 320, 280 270, 392 220 C 500 184, 650 152, 860 130\"\n         fill=\"none\" stroke=\"#60a5fa\" stroke-width=\"2\" stroke-linecap=\"round\"\n         stroke-dasharray=\"3000\" stroke-dashoffset=\"3000\">\n    <animate attributeName=\"stroke-dashoffset\" from=\"3000\" to=\"0\" dur=\"2s\" begin=\"0.7s\" fill=\"freeze\"/>\n   </path>\n\n   <!-- Cold-start curve (lowest Isp) -->\n   <path d=\"M 80 408 C 180 372, 280 330, 392 280 C 500 240, 650 200, 860 174\"\n         fill=\"none\" stroke=\"rgba(96,165,250,.5)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-dasharray=\"6 4\">\n    <animate attributeName=\"stroke-dashoffset\" from=\"3000\" to=\"0\" dur=\"2s\" begin=\"1.0s\" fill=\"freeze\"/>\n   </path>\n\n   <!-- Data point markers on steady-state -->\n   <g fill=\"#22d3ee\">\n    <circle cx=\"392\" cy=\"168\" r=\"3.5\"/>\n    <circle cx=\"548\" cy=\"130\" r=\"3.5\"/>\n    <circle cx=\"704\" cy=\"100\" r=\"3.5\"/>\n   </g>\n\n   <!-- Annotation box -->\n   <g>\n    <rect x=\"540\" y=\"56\" width=\"312\" height=\"92\" fill=\"rgba(10,16,28,.6)\" stroke=\"rgba(34,211,238,.25)\" stroke-width=\"1\"/>\n    <text x=\"556\" y=\"78\" font-family=\"ui-monospace,monospace\" font-size=\"10\" fill=\"#22d3ee\" letter-spacing=\".14em\">NOMINAL OPERATING POINT</text>\n    <text x=\"556\" y=\"104\" font-family=\"'Inter',sans-serif\" font-size=\"22\" font-weight=\"600\" fill=\"#fff\">Isp = 250 s</text>\n    <text x=\"556\" y=\"128\" font-family=\"ui-monospace,monospace\" font-size=\"11\" fill=\"rgba(165,243,252,.7)\" letter-spacing=\".06em\">200 ms \u00b7 steady-state \u00b7 8 bar inlet</text>\n   </g>\n  </svg>\n\n  <!-- Legend -->\n  <div class=\"perf-legend\">\n   <div class=\"pl-row\"><span class=\"pl-swatch\" style=\"background:#22d3ee\"></span><b>Steady-state</b><span>chamber &gt; 1500\u00b0C \u00b7 long burns</span></div>\n   <div class=\"pl-row\"><span class=\"pl-swatch\" style=\"background:#60a5fa\"></span><b>Warm-restart</b><span>chamber 800\u20131500\u00b0C \u00b7 &lt; 10s recovery</span></div>\n   <div class=\"pl-row\"><span class=\"pl-swatch dashed\"></span><b>Cold-start</b><span>chamber &lt; 200\u00b0C \u00b7 first ignition</span></div>\n  </div>\n </div>\n</section>\n\n<!-- QUALIFICATION MATRIX -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Qualification Matrix \u00b7 E03</div>\n   <h2 class=\"section-title\">Tested to<br><em>flight standards.</em></h2>\n  </div>\n  <p>Environment, level, and reference standard for the HPGP 22N qualification programme. Reports available on engagement.</p>\n </div>\n\n <div class=\"qual-matrix reveal\">\n  <table>\n   <thead>\n    <tr><th>Environment</th><th>Qualified Level</th><th>Reference Standard</th><th>Status</th></tr>\n   </thead>\n   <tbody>\n    <tr><td><b>Random vibration</b></td><td><span class=\"qm-val\">14.1 g<small>RMS</small></span> \u00b7 3 axes \u00b7 2 min</td><td>ECSS-E-ST-10-03C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Sinusoidal vibration</b></td><td><span class=\"qm-val\">25 g</span> \u00b7 5\u2013100 Hz \u00b7 sweep</td><td>ECSS-E-ST-10-03C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Mechanical shock</b></td><td><span class=\"qm-val\">4000 g</span> SRS \u00b7 3 axes</td><td>MIL-STD-810H Method 516</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Thermal vacuum</b></td><td><span class=\"qm-val\">\u221240 \u2192 +85 \u00b0C</span> \u00b7 12 cycles \u00b7 &lt;10\u207b\u2075 mbar</td><td>ECSS-E-ST-10-03C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Operating life</b></td><td><span class=\"qm-val\">60 000 pulses</span> \u00b7 150 kg propellant</td><td>ECSS-E-ST-35C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Hot-fire duration</b></td><td><span class=\"qm-val\">\u2265 4000 s</span> cumulative</td><td>Internal ECAPS QSP</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Radiation (TID)</b></td><td><span class=\"qm-val\">100 krad</span> \u00b7 electronics</td><td>ECSS-Q-ST-60C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>EMC / ESD</b></td><td>CE/CS/RE/RS \u00b7 8 kV contact</td><td>ECSS-E-ST-20-07C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n    <tr><td><b>Propellant compatibility</b></td><td><span class=\"qm-val\">10 years</span> wetted storage</td><td>ECSS-Q-ST-70-71C</td><td><span class=\"mm-pill ok\">Pass</span></td></tr>\n   </tbody>\n  </table>\n </div>\n</section>\n\n<!-- INTEGRATION RESOURCES -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Integration Resources \u00b7 E04</div>\n   <h2 class=\"section-title\">Under NDA<br><em>on engagement.</em></h2>\n  </div>\n  <p>The following resources are released to the integration team after program kick-off and NDA execution. Pre-engagement, technical briefings and Q&amp;A sessions are available with ECAPS engineering.</p>\n </div>\n\n <div class=\"int-grid reveal\">\n  <div class=\"int-card\">\n   <div class=\"int-icon\">ICD</div>\n   <h4>Interface Control Document</h4>\n   <p>Full mechanical, electrical, thermal and propellant interface definition. Tolerances, bonding paths, harness pinout.</p>\n  </div>\n  <div class=\"int-card\">\n   <div class=\"int-icon\">CAD</div>\n   <h4>3D Model \u2014 STEP / IGES</h4>\n   <p>Reference geometry for ATA and CFD integration. Mass properties, CG, MOI. Outer mould line only \u2014 internals redacted.</p>\n  </div>\n  <div class=\"int-card\">\n   <div class=\"int-icon\">QTR</div>\n   <h4>Qualification Test Report</h4>\n   <p>Full results from the qualification programme above. Test setup, instrumentation, raw data, anomaly closure.</p>\n  </div>\n  <div class=\"int-card\">\n   <div class=\"int-icon\">OPS</div>\n   <h4>Operations Manual</h4>\n   <p>Pre-launch checkout, in-flight commanding, telemetry interpretation, anomaly response procedures.</p>\n  </div>\n  <div class=\"int-card\">\n   <div class=\"int-icon\">QSP</div>\n   <h4>Qualification Status Paper</h4>\n   <p>Latest delta-qual results, applicability matrix to your mission environments, gap analysis if any.</p>\n  </div>\n  <div class=\"int-card\">\n   <div class=\"int-icon\">PUS</div>\n   <h4>PUS Service Definitions</h4>\n   <p>ESA Packet Utilization Standard service definitions for command and telemetry. ECSS-E-ST-70-41C compliant.</p>\n  </div>\n </div>\n</section>\n\n</div><!-- /Engineering view -->\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Specify the <em>right thruster</em> for your mission.</h2>\n <div class=\"cta-row\">\n <a href=\"#/contact-us\" class=\"btn-primary\">Talk to engineering \u2192</a>\n <a href=\"#/bipropellant-thrusters\" class=\"btn-ghost\">View Bipropellant</a>\n </div>\n</div>","news-article":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <a href=\"#/news\">News</a>\n  <span>/</span>\n  <span><b>ARCHIVE</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>19 ARTICLES \u00b7 <b>2017 \u2014 2026</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">News <em>archive.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">Complete archive of ECAPS press releases, partnership announcements, and operational milestones \u2014 19 articles spanning programs, partnerships, capital, leadership, R&amp;D, and corporate heritage.</p>\n </div>\n</section>\n\n<!-- TABLE OF CONTENTS -->\n<section class=\"toc-wrap reveal\">\n <div class=\"toc-head\">/ Index \u2014 19 articles, newest first</div>\n <div class=\"toc-grid\">\n   <a href=\"#/news-article/ecaps-japan\" class=\"toc-item\"><span class=\"toc-date\">APR 2026</span><span class=\"toc-title\">ECAPS Initiates Establishment of ECAPS Japan</span></a>\n   <a href=\"#/news-article/helmrich-board\" class=\"toc-item\"><span class=\"toc-date\">APR 2026</span><span class=\"toc-title\">ECAPS Appoints Brigadier General (Ret) Lars Helmrich to Board of Directors</span></a>\n   <a href=\"#/news-article/eib-financing\" class=\"toc-item\"><span class=\"toc-date\">DEC 2025</span><span class=\"toc-title\">ECAPS Receives EIB Financing to Develop Cutting-Edge Technologies for Space and Defence</span></a>\n   <a href=\"#/news-article/tyr-1-otv\" class=\"toc-item\"><span class=\"toc-date\">NOV 2025</span><span class=\"toc-title\">ECAPS Announces TYR-1: A Swedish\u2013European Orbital Transfer Vehicle Demonstrator</span></a>\n   <a href=\"#25-years\" class=\"toc-item\"><span class=\"toc-date\">OCT 2025</span><span class=\"toc-title\">ECAPS Marks 25 Years of Swedish Propulsion Innovation</span></a>\n   <a href=\"#/news-article/snsa-fast\" class=\"toc-item\"><span class=\"toc-date\">SEP 2025</span><span class=\"toc-title\">SNSA Awards ECAPS Contract for Fast Start-up Thrusters in Sweden's First Dual-use Program</span></a>\n   <a href=\"#/news-article/osaka-nordic-space-day\" class=\"toc-item\"><span class=\"toc-date\">SEP 2025</span><span class=\"toc-title\">Strengthening Nordic\u2013Japan Space Cooperation: ECAPS at Osaka Nordic Space Day</span></a>\n   <a href=\"#/news-article/ecaps-ise-apu\" class=\"toc-item\"><span class=\"toc-date\">JUL 2025</span><span class=\"toc-title\">ECAPS and ISE Collaborate to Demonstrate Auxiliary Power Unit (APU) Powered by LMP-103S</span></a>\n   <a href=\"#/news-article/fast-22n-test\" class=\"toc-item\"><span class=\"toc-date\">MAY 2025</span><span class=\"toc-title\">ECAPS Demonstrates Breakthrough in Rapid Start-Up with 22 N FAST Experimental Thruster</span></a>\n   <a href=\"#/news-article/bipropellant-test\" class=\"toc-item\"><span class=\"toc-date\">NOV 2024</span><span class=\"toc-title\">ECAPS Conducts Successful Test Unlocking New Applications for Bipropellant Thrusters and Gas Generators</span></a>\n   <a href=\"#/news-article/gustafsson-chairman\" class=\"toc-item\"><span class=\"toc-date\">NOV 2024</span><span class=\"toc-title\">ECAPS Welcomes Stefan Gustafsson as Chairman of the Board</span></a>\n   <a href=\"#/news-article/as9100-certification\" class=\"toc-item\"><span class=\"toc-date\">APR 2024</span><span class=\"toc-title\">ECAPS Attains NQA AS9100 and ISO 9001 Certifications</span></a>\n   <a href=\"#/news-article/oak-universe-acquisition\" class=\"toc-item\"><span class=\"toc-date\">APR 2024</span><span class=\"toc-title\">Oak Universe Completes Acquisition of ECAPS AB</span></a>\n   <a href=\"#300th-thruster-tested\" class=\"toc-item\"><span class=\"toc-date\">JUN 2022</span><span class=\"toc-title\">300th Thruster Tested</span></a>\n   <a href=\"#/news-article/ecaps-is-20\" class=\"toc-item\"><span class=\"toc-date\">NOV 2020</span><span class=\"toc-title\">ECAPS is 20</span></a>\n   <a href=\"#10-years-in-orbit\" class=\"toc-item\"><span class=\"toc-date\">JUN 2020</span><span class=\"toc-title\">ECAPS Celebrates 10 Years in Orbit</span></a>\n   <a href=\"#/news-article/skysat-commissioning\" class=\"toc-item\"><span class=\"toc-date\">NOV 2017</span><span class=\"toc-title\">Six ECAPS Propulsion Systems Commissioned Into Service</span></a>\n   <a href=\"#/news-article/minotaur-c-launch\" class=\"toc-item\"><span class=\"toc-date\">OCT 2017</span><span class=\"toc-title\">Upcoming Launch Represents a Major Milestone for Clean and Non-Toxic Spacecraft Propulsion</span></a>\n   <a href=\"#/news-article/green-propellant-loading\" class=\"toc-item\"><span class=\"toc-date\">SEP 2017</span><span class=\"toc-title\">ECAPS Performs 'Green' Propellant Loading</span></a>\n </div>\n</section>\n\n<!-- ARTICLES -->\n<article id=\"ecaps-japan\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">APRIL 24, 2026</span>\n   <span class=\"article-cat\">EXPANSION</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Initiates Establishment of ECAPS Japan</h2>\n </div>\n <div class=\"article-body\">\n<p>ECAPS AB, a Sweden-based provider of propulsion technologies, announces the initiation of <b>ECAPS Japan</b>, a step intended to support local industrial activity and expand the company's engagement in the Japanese space market.</p>\n<p>Building on its in-orbit heritage, the initiative is expected to contribute to the integration of high-performance propulsion technologies within Japan's growing space sector.</p>\n<p>ECAPS Japan is planned to support local assembly and integration activities, with an indicative initial capacity of approximately <b>30 systems per year</b>, delivered through strategic partnerships, focusing on propulsion solutions for small satellite platforms. The initiative is also intended to contribute to the development of a localized supply chain, supporting alignment with domestic industrial frameworks and long-term capability development.</p>\n<blockquote>\"Our intention with ECAPS Japan is to establish a local presence that supports industrial activity while aligning with the structure of the Japanese space ecosystem. We are approaching this step-by-step, with a long-term focus on supply chain localization, industrial collaboration, and capability development.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS AB</cite></blockquote>\n<p>As part of its activities in Japan, ECAPS has entered into a strategic partnership with <b>Mr. Mitsuteru Sugiki</b>, former Chief Propulsion Engineer at Mitsubishi Electric's Space Systems Division (Kamakura) and current CEO of Advanced Technology Institute (ATI). He will act as <b>Senior Technical Advisor &amp; Representative, Japan</b>, supporting system-level technical alignment, integration architecture considerations, and industrial coordination.</p>\n<blockquote>\"Japan has a strong foundation in advanced propulsion development. Through collaboration with ECAPS, we can support the integration of these technologies within the local industrial framework and contribute to the strengthening of the local supply chain.\"\n<cite>\u2014 Mitsuteru Sugiki</cite></blockquote>\n<p>The establishment of ECAPS Japan remains subject to ongoing procedural steps, including regulatory and organizational considerations.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"helmrich-board\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">APRIL 22, 2026</span>\n   <span class=\"article-cat\">LEADERSHIP</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Appoints Brigadier General (Ret) Lars Helmrich to Board of Directors</h2>\n </div>\n <div class=\"article-body\">\n<p>ECAPS AB announces the appointment of <b>Brigadier General (Ret) Lars Helmrich</b> to its Board of Directors.</p>\n<p>General Helmrich has extensive experience across military aviation, defense procurement, and program leadership within Sweden's defense establishment. Most recently, General Helmrich served as Director of Air and Space Systems Division within the <b>Swedish Defence Materiel Administration (FMV)</b>, coordinating procurement efforts to bolster Sweden's national aerospace capabilities.</p>\n<p>A member of the Royal Swedish Academy of War Sciences, General Helmrich's career includes senior roles across the Swedish Armed Forces and FMV. He has served as Head of Gripen Project Management at FMV, with responsibility for the coordination and long-term development of Sweden's air combat capability, including collaboration across government, industry, and international partners.</p>\n<blockquote>\"ECAPS represents a well-established and credible actor within the aerospace sector. As requirements continue to evolve across both space and defense domains, technologies enabling mobility and operational flexibility will remain essential. I look forward to contributing to the company's continued development in an international context.\"\n<cite>\u2014 Brigadier General Lars Helmrich</cite></blockquote>\n<p>As ECAPS continues its strategic scale-up to power advanced operations across all defence-critical environments, General Helmrich will contribute to this cause.</p>\n<blockquote>\"We welcome General Helmrich to ECAPS. With a proven record of leadership and defence expertise, his support will further ECAPS's mission as a global provider of advanced propulsion capabilities.\"\n<cite>\u2014 ECAPS Board of Directors</cite></blockquote>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"eib-financing\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">DECEMBER 10, 2025</span>\n   <span class=\"article-cat\">CAPITAL</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Receives EIB Financing to Develop Cutting-Edge Technologies for Space and Defence</h2>\n </div>\n <div class=\"article-body\">\n<ul>\n <li><b>EIB lends Swedish aerospace company ECAPS \u20ac20 million</b> to develop advanced propulsion systems for satellites and spacecraft</li>\n <li>EIB financing also to cover technologies with civilian and defence uses</li>\n <li>Deal marks first EIB loan to the space industry in Sweden</li>\n</ul>\n<p>The European Investment Bank (EIB) is backing Swedish aerospace company <b>ECAPS AB with \u20ac20 million</b> to accelerate the development of high-performance rocket engines and propulsion capabilities. The financing will also support advances in dual-use technologies, which can be deployed for both civilian and defence purposes.</p>\n<p>The support by the EIB is through its <b>TechEU initiative</b> and takes the form of venture debt, a type of loan designed for high-growth startups and scaleups that provides additional capital without diluting ownership.</p>\n<p>The financing will contribute to ECAPS's <b>\u20ac47 million plan</b> to scale its proprietary propellant and rocket engines, which are more efficient and cost-effective than traditional technologies. ECAPS intends to upgrade its testing facilities, develop new prototypes and prepare its engines for use on larger spacecraft and auxiliary systems. ECAPS will also use the EIB financing to continue developing systems for other mobility use cases, such as underwater vehicles and high-altitude platforms.</p>\n<blockquote>\"ECAPS is exactly the kind of innovative European company our TechEU initiative aims to support. By helping scale propulsion systems that can serve both civilian and security needs, we strengthen Europe's technological resilience and contribute to the wider green transition.\"\n<cite>\u2014 Alessandro Izzo, EIB Director of Equity, Growth Capital and Project Finance</cite></blockquote>\n<div class=\"article-image\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/84a13f0d-309a-4572-b8fe-dee8eb48d57a/6.jpeg\" alt=\"EIB visit to ECAPS' operational facilities in Solna, December 2025\" loading=\"lazy\" /><div class=\"article-image-caption\">EIB visit to ECAPS' operational facilities in Solna, December 2025</div></div>\n<p>The agreement marks the EIB's <b>first loan to a Swedish space company</b> and the bank's first investment in non-toxic propulsion. By supporting the development of dual-use systems, the operation will help reduce EU reliance on non-European suppliers at a time when space capabilities are increasingly important for communications, Earth observation and broader security priorities.</p>\n<blockquote>\"With a technological heritage that exceeds 190 years in space, ECAPS is equipped to continue supporting Europe's strategic priorities in space and defence by advancing critical mobility technologies at scale. As the geopolitical context around Europe remains unpredictable, this collaboration with EIB will be key to accelerate world-leading European innovation, and advance Europe's collective ability to responsively deploy dual-use capabilities.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n<p>The financing is backed by a guarantee under the <b>InvestEU programme</b> and supports EU policy priorities in the areas of space, security, defence and sustainability.</p>\n</div>\n <div class=\"article-footer\">\n  <a href=\"#/news\" class=\"back-to-news\">\u2190 Back to all news</a>\n </div>\n</article>\n\n<article id=\"tyr-1-otv\" class=\"article-section reveal\">\n <div class=\"article-head\">\n  <div class=\"article-meta-strip\">\n   <span class=\"article-date\">NOVEMBER 19, 2025</span>\n   <span class=\"article-cat\">PROGRAM</span>\n  </div>\n  <h2 class=\"article-title\">ECAPS Announces TYR-1: A Swedish\u2013European Orbital Transfer Vehicle Demonstrator</h2>\n </div>\n <div class=\"article-body\">\n<p><b>Stockholm, Sweden \u2014 November 19, 2025</b> \u2014 Building on 190 years of cumulative heritage in enabling critical mobility for international satellites and spacecraft, ECAPS is now expanding its propulsion capabilities to a new operational frontier. Today, the company announces <b>TYR-1</b>: a Swedish build Orbital Transfer Vehicle (OTV) demonstration mission that will showcase sovereign capacity for rapid response and dual-use orbital capabilities.</p>\n<p>Started in 2024 and funded by ECAPS, the TYR-1 programme has been created to demonstrate ECAPS' <b>FAST propulsion architecture</b> as the foundation for sovereign European orbital mobility. TYR-1 integrates ECAPS technology into a complete vehicle platform to showcase the full system-level capability it enables.</p>\n<p>TYR-1 will be the <b>first orbital vehicle powered by sustainable, high-performance chemical propulsion</b>, representing a leap for Swedish and European international posture in spearheading innovation for space and defense.</p>\n<blockquote>\"With more than 190 years of cumulative on-orbit heritage, ECAPS is now demonstrating its technology at vehicle scale. TYR-1 is a step towards strengthening Swedish sovereign posture in developing orbital transfer capabilities built for diverse mission demands. Powered by our FAST propulsion architecture, TYR-1 is accelerating Sweden's role in enabling European and Allied capacity for advanced orbital maneuvering.\"\n<cite>\u2014 Odysseas Christofi, CEO, ECAPS</cite></blockquote>\n<h4>FAST Propulsion Architecture \u2014 Demonstrated in an OTV for the First Time</h4>\n<p>Throughout 2025, ECAPS conducted a series of tests to validate the effectiveness and performance of its proprietary HPGP innovations:</p>\n<ul>\n <li>Validated the Fast-Start Thruster (FAST) propulsion architecture after <b>seven dedicated hot-fire campaigns</b> on the ECAPS 22 N thruster.</li>\n <li>Completed <b>two 200 N engine demonstration campaigns in November 2025</b>, confirming the performance scaling path toward the <b>450 N-class propulsion module</b> that will power TYR-1.</li>\n</ul>\n<h4>A Sovereign Orbital Vehicle: Swedish Technology, European Supply Chain</h4>\n<p>TYR-1 demonstrates a propulsion capability that is:</p>\n<ul>\n <li>Designed, developed, and engineered in Sweden</li>\n <li>Built through a secure, fully EU-based industrial supply chain</li>\n</ul>\n<h4>A Foundation for Future European In-Orbit Mobility</h4>\n<p>TYR-1 is the first entry in ECAPS' next-generation platforms for orbital mobility, commercial services, and dual-use capabilities including payload transfers, orbital maneuvers and repositioning, pre-fueled rapid-response operations, and advanced high-precision mobility for emerging in-space logistical operations.</p>\
