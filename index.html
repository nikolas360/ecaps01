yle=\"font-size:28px;margin-top:10px\">Orbital Transfer Vehicles</h3>\n    <p style=\"margin-top:12px\">TYR-1 OTV programme with dual-use defense applications. Rapid orbital repositioning, ISR support, and rendezvous operations for defense customers. Demonstrator scheduled 2027.</p>\n    <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Explore TYR-1 \u2192</span>\n   </div>\n  </a>\n\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     04 \u2014 ENGINES & COMPONENTS\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Engines &amp; Components \u00b7 04</div>\n   <h2 class=\"section-title\">Defense <em>thrust portfolio.</em></h2>\n  </div>\n  <p>The qualified thruster classes powering defense platforms across all three domains. Bipropellant for kinetic and rapid-response operations; monopropellant for fine-pulse satellite control.</p>\n </div>\n\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr\">\n\n  <a href=\"#/bipropellant-thrusters\" class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ E1 \u2014 BIPROPELLANT</div>\n   <h3 style=\"font-size:26px;margin-top:8px\">Bipropellant Engines</h3>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">220N \u00b7 445N \u00b7 890N \u00b7 4kN \u00b7 26.6kN</div>\n   <p style=\"margin-top:14px\">Five qualified thrust classes for high-energy defense operations \u2014 interceptors, kinetic operations, rapid orbital response. Configurable across space, high-altitude, and underwater applications.</p>\n   <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Engine details \u2192</span>\n  </a>\n\n  <a href=\"#/monopropellant-thrusters\" class=\"cap\" style=\"min-height:auto\">\n   <div class=\"cap-num\">/ E2 \u2014 MONOPROPELLANT</div>\n   <h3 style=\"font-size:26px;margin-top:8px\">Monopropellant Engines</h3>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;margin-top:8px\">100mN \u00b7 1N \u00b7 5N \u00b7 22N \u00b7 220N \u00b7 450N\u20133kN</div>\n   <p style=\"margin-top:14px\">Six qualified thrust classes for defense satellites and rapid-response platforms. Fine-pulse attitude control to high-thrust manoeuvring across STPSat, NROL, and classified programmes.</p>\n   <span class=\"cap-link\" style=\"display:inline-block;margin-top:16px\">Engine details \u2192</span>\n  </a>\n\n </div>\n</section>\n\n<!-- CTA -->\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Five packages to <em>build your defense program.</em></h2>\n <p style=\"max-width:620px;margin:18px auto 0;color:var(--muted);font-size:15px;line-height:1.6\">From operational off-the-shelf propulsion (P1) and tailored bipropellant systems (P2) to engineering studies (P3) and full licensing for sovereign capability (P4) \u2014 all underpinned by LMP-103S supply.</p>\n <div class=\"cta-row\">\n <a href=\"#/commercial-packages\" class=\"btn-primary\">Commercial Packages \u2192</a>\n <a href=\"#/contact-us\" class=\"btn-ghost\">Schedule a briefing</a>\n </div>\n</div>","fuelling-campaigns":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <span><b>FUELING CAMPAIGNS</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">Fueling <em>Campaigns.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Expert fueling solutions with LMP-103S propellant. International loading operations across mission architectures, supporting launch campaigns worldwide.</p>\n <div class=\"hero-coords reveal\">\n <div>COVERAGE \u2014 <b>WORLDWIDE</b></div>\n <div>PROPELLANT \u2014 <b>LMP-103S</b></div>\n <div>HERITAGE \u2014 <b>15+ YRS</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946687-7KU9XR4V12UM3FQL8OC1/DSC_4729.jpeg\" alt=\"Fueling operations\" />\n <div class=\"telemetry\">\n OPS <b>ON-SITE</b><br>\n PROPELLANT <b>LMP-103S</b><br>\n PROTOCOL <b>CERTIFIED</b>\n </div>\n <div class=\"caption\">ON-SITE FUELING OPERATIONS</div>\n</div>\n\n<!-- OUR SERVICES -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Our Services \u00b7 01</div>\n <h2 class=\"section-title\">Operations of <em>fueling campaigns.</em></h2>\n </div>\n <p>International loading operations across mission architectures \u2014 propellant loading, state-of-the-art equipment, and the highest standards of safety.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n <div class=\"cap\">\n <div class=\"cap-num\">/ 01 \u2014 LOADING</div>\n <h3>Propellant Loading</h3>\n <p>ECAPS's comprehensive propellant loading services ensure seamless integration of LMP-103S HPGP propellant into spacecraft and launch vehicles. We handle every step of the loading process with precision and efficiency.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 02 \u2014 EQUIPMENT</div>\n <h3>State-of-the-art Equipment</h3>\n <p>ECAPS operates loading equipment with advanced technology for propellant handling at payload process facilities worldwide. Our equipment meets the highest safety and regulatory standards, providing safe propellant handling.</p>\n </div>\n <div class=\"cap\">\n <div class=\"cap-num\">/ 03 \u2014 SAFETY</div>\n <h3>Professionalism &amp; Safety</h3>\n <p>Safety is paramount in our fueling operations. Our dedicated team follows stringent safety protocols and industry regulations to ensure the highest standards of safety and compliance throughout the process.</p>\n </div>\n </div>\n</section>\n\n<!-- OPERATIONS GALLERY -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Operations \u00b7 02</div>\n <h2 class=\"section-title\">In <em>the field.</em></h2>\n </div>\n <p>Real campaign operations across launch sites worldwide.</p>\n </div>\n\n <div class=\"gallery reveal\">\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946687-7KU9XR4V12UM3FQL8OC1/DSC_4729.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946696-LLHO4NE0R55RE5WKN66H/DSC_4737.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946705-0ZXV2TQ1COGJAHKU2RZ0/IMG_6225.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946713-Y4CS1V874O0CFZI0KLV7/DSC_2655.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946720-53MAI5UBDFXBORRJO9B6/IMG_5981.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"ph\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543946729-OXYVEA5T4MD52XJUINH2/DSC_2758.jpeg\" alt=\"Fueling operation\" loading=\"lazy\" decoding=\"async\" /></div>\n </div>\n</section>\n\n<!-- WORLDWIDE COVERAGE -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Global Coverage</div>\n <h2>Worldwide <em>coverage.</em></h2>\n <p class=\"lede\">With 15+ years of flight heritage, ECAPS powers critical mobility for missions around the globe. Fueling campaigns conducted at major launch sites across Europe, the Americas, Asia-Pacific, and beyond.</p>\n <a href=\"#/missions\" class=\"btn-primary\">View Mission Heritage \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--border);background:var(--bg-2);overflow:hidden;padding:40px\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/0f92ed34-678d-4f67-9944-85875e6d52a4/Map+3.png\" alt=\"Worldwide coverage map\" style=\"width:100%;height:100%;object-fit:contain;filter:brightness(.95)\" loading=\"lazy\" decoding=\"async\" />\n </div>\n</div>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Plan your <em>fueling campaign.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Contact ECAPS \u2192</a><a href=\"#/propellant-logistics\" class=\"btn-ghost\">View Logistics</a></div>\n</div>","government":"<!-- HERO \u2014 Single strong statement -->\n<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <span><b>GOVERNMENT</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>STRATEGIC FRAMEWORK \u00b7 <b>V1 \u00b7 JANUARY 2026</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">The new frontier of <em>state power.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">Air-independent energy is the foundation that makes sovereign presence possible in space, high-altitude, and underwater domains.</p>\n  <div class=\"hero-coords reveal\">\n   <div>ERA \u2014 <b>GENERATIONAL SHIFT</b></div>\n   <div>DOMAINS \u2014 <b>SPACE \u00b7 HIGH-ALT \u00b7 UNDERWATER</b></div>\n   <div>FOCUS \u2014 <b>SOVEREIGNTY</b></div>\n  </div>\n </div>\n</section>\n\n<!-- HERO IMAGE -->\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=2400&q=85&auto=format&fit=crop\" alt=\"Earth from orbit\" />\n <div class=\"caption\">STRATEGIC ENERGY FOR DEFENSE &amp; SPACE OPERATIONS</div>\n</div>\n\n<!-- STRATEGIC OUTLOOK \u2014 The big picture, mostly visual -->\n<section style=\"padding:0\">\n <div class=\"reveal\" style=\"position:relative;overflow:hidden;border-bottom:1px solid var(--border);min-height:520px;display:flex;align-items:center\">\n  <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765885268459-M3O1J4UZB95KUU4917CR/unsplash-image--p-KCm6xB9I.jpg?format=2500w\" alt=\"Strategic landscape\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45\" loading=\"lazy\" />\n  <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.85) 0%,rgba(6,8,11,.5) 35%,rgba(6,8,11,.95) 100%)\"></div>\n  <div style=\"position:relative;z-index:2;padding:88px 56px 64px;max-width:1280px;margin:0 auto;width:100%\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.20em;text-transform:uppercase;font-weight:700;margin-bottom:36px\">/ Strategic Outlook</div>\n   <h2 style=\"font-family:'Inter',sans-serif;font-size:56px;font-weight:300;color:#FFF;line-height:1.08;letter-spacing:-.028em;margin:0 0 56px;max-width:1020px\">An era of strategic competition.<br>A new <em style=\"font-style:italic;font-weight:500;color:var(--accent-bright)\">frontier of state power.</em></h2>\n\n   <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:40px;border-top:1px solid rgba(255,255,255,.18);padding-top:36px\">\n    <div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ The Era</div>\n     <div style=\"font-family:'Inter',sans-serif;font-size:34px;color:#FFF;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-bottom:10px\">GENERATIONAL</div>\n     <div style=\"font-size:13px;color:rgba(255,255,255,.6);line-height:1.55\">A defense and infrastructure shift not seen in decades</div>\n    </div>\n    <div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ The Theatre</div>\n     <div style=\"font-family:'Inter',sans-serif;font-size:34px;color:#FFF;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-bottom:10px\">3 DOMAINS</div>\n     <div style=\"font-size:13px;color:rgba(255,255,255,.6);line-height:1.55\">Space, high-altitude, and underwater \u2014 the contested strategic depth</div>\n    </div>\n    <div>\n     <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ The Foundation</div>\n     <div style=\"font-family:'Inter',sans-serif;font-size:34px;color:#FFF;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-bottom:10px\">AIR-INDEPENDENT</div>\n     <div style=\"font-size:13px;color:rgba(255,255,255,.6);line-height:1.55\">The non-substitutable energy class \u2014 no alternative exists</div>\n    </div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- THESIS \u2014 Pull quote sets the argument upfront -->\n<section style=\"padding:0\">\n <div class=\"reveal\" style=\"position:relative;overflow:hidden;border-bottom:1px solid var(--border);min-height:280px;display:flex;align-items:center\">\n  <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543889927-UAOF4D8VPHS7IVHK7JZ3/AdobeStock_430740424.jpeg\" alt=\"Allied operations\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.28\" loading=\"lazy\" />\n  <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,8,11,.96) 0%,rgba(6,8,11,.78) 50%,rgba(6,8,11,.55) 100%)\"></div>\n  <div style=\"position:relative;z-index:2;max-width:980px;padding:64px 56px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:24px\">The Thesis</div>\n   <p style=\"font-family:'Inter',sans-serif;font-size:30px;font-weight:300;color:#FFF;line-height:1.3;letter-spacing:-.015em;margin:0;font-style:italic\">\"Air-independent energy is the only class of energy capable of sustaining mobility in space, high-altitude, and underwater domains.\"</p>\n   <div style=\"margin-top:24px;font-family:ui-monospace,monospace;font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.14em;text-transform:uppercase\">\u2014 ECAPS Strategic Framework \u00b7 January 2026</div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a701 THE CONCEPT \u2014 What air-independent energy means -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">The Concept \u00b7 01</div>\n   <h2 class=\"section-title\">Energy that <em>carries its own air.</em></h2>\n  </div>\n  <p>Air-independent systems carry both fuel and oxidizer onboard \u2014 enabling combustion in environments where atmospheric air is absent.</p>\n </div>\n\n <!-- 2-column: editorial image + 3-step concept flow -->\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);min-height:480px\">\n\n  <!-- LEFT: Atmospheric \"air-deficient\" image -->\n  <div style=\"background:#0a1018;position:relative;overflow:hidden;min-height:480px\">\n   <img src=\"https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1600&q=85&auto=format&fit=crop\" alt=\"Air-deficient environment\" style=\"width:100%;height:100%;object-fit:cover;opacity:.75\" loading=\"lazy\" onerror=\"this.style.display='none';this.parentNode.style.background='radial-gradient(ellipse at 30% 40%,rgba(34,211,238,.18) 0%,#0a1018 50%,#06080B 100%)'\" />\n   <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.3) 0%,rgba(6,8,11,.1) 35%,rgba(6,8,11,.92) 100%)\"></div>\n   <div style=\"position:absolute;bottom:36px;left:36px;right:36px;z-index:2\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ Air-Deficient Environment</div>\n    <p style=\"font-family:'Inter',sans-serif;font-size:22px;color:#FFF;font-weight:300;letter-spacing:-.01em;line-height:1.35;margin:0\">Where atmospheric air is absent, insufficient, or operationally constraining \u2014 <em style=\"font-style:italic;font-weight:500;color:var(--accent-bright)\">conventional combustion cannot occur.</em></p>\n   </div>\n  </div>\n\n  <!-- RIGHT: 3-row conceptual flow -->\n  <div style=\"background:var(--bg);padding:42px 40px;display:flex;flex-direction:column;justify-content:center;gap:0\">\n\n   <!-- Row 1: Conventional (muted) -->\n   <div style=\"padding:18px 0;border-bottom:1px solid var(--border-soft)\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:#94A3B8;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px\">/ Conventional</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:14px;color:var(--ink-2);line-height:1.5;letter-spacing:.04em\">FUEL  +  AMBIENT AIR  \u2192  thrust</div>\n   </div>\n\n   <!-- Row 2: The constraint (muted) -->\n   <div style=\"padding:18px 0;border-bottom:1px solid var(--border-soft)\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:#94A3B8;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px\">/ In Air-Deficient Domains</div>\n    <div style=\"font-size:14px;color:var(--ink-2);line-height:1.5\">No ambient air \u2192 no combustion \u2192 <span style=\"color:#94A3B8;font-style:italic\">system inoperable.</span></div>\n   </div>\n\n   <!-- Row 3: Air-Independent (cyan accent \u2014 the answer) -->\n   <div style=\"padding:22px 20px;border:1px solid var(--accent-bright);background:rgba(34,211,238,0.06);margin-top:10px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:8px\">/ Air-Independent</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:14px;color:#FFF;line-height:1.5;font-weight:600;letter-spacing:.04em\">FUEL  +  ONBOARD OXIDIZER  \u2192  thrust</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.12em;margin-top:12px;text-transform:uppercase\">\u2192 Operates in any environment</div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a702 THE SHIFT \u2014 Four pressures, concise -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">The Shift \u00b7 02</div>\n   <h2 class=\"section-title\">Four pressures converging <em>now.</em></h2>\n  </div>\n  <p>Air-independent energy has crossed from niche capability to load-bearing infrastructure.</p>\n </div>\n\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n  <div style=\"padding:28px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright);min-height:200px;display:flex;flex-direction:column;gap:14px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 01</div>\n   <h3 style=\"font-size:20px;margin:0;font-weight:600;letter-spacing:-.01em\">Growing Demand</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.6;margin:0\">100k+ satellites projected by 2030. Underwater and high-altitude platforms scaling in parallel.</p>\n  </div>\n  <div style=\"padding:28px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright);min-height:200px;display:flex;flex-direction:column;gap:14px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 02</div>\n   <h3 style=\"font-size:20px;margin:0;font-weight:600;letter-spacing:-.01em\">Multi-Domain</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.6;margin:0\">Single-program tech now embedded across all critical domains \u2014 infrastructure scale outgrowing original design.</p>\n  </div>\n  <div style=\"padding:28px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright);min-height:200px;display:flex;flex-direction:column;gap:14px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 03</div>\n   <h3 style=\"font-size:20px;margin:0;font-weight:600;letter-spacing:-.01em\">Contestation</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.6;margin:0\">Sovereignty over mobility is now a prerequisite for strategic autonomy and deterrence credibility.</p>\n  </div>\n  <div style=\"padding:28px;background:var(--bg-2);border:1px solid var(--border-soft);border-top:2px solid var(--accent-bright);min-height:200px;display:flex;flex-direction:column;gap:14px\">\n   <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.16em;text-transform:uppercase;font-weight:700\">/ 04</div>\n   <h3 style=\"font-size:20px;margin:0;font-weight:600;letter-spacing:-.01em\">Supply Chain</h3>\n   <p style=\"font-size:13px;color:var(--ink-2);line-height:1.6;margin:0\">Legacy propellants tied to raw materials, processing, and expertise concentrated outside allied control.</p>\n  </div>\n </div>\n</section>\n\n<!-- \u00a702 WHERE IT OPERATES \u2014 3 domain image cards -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Domains \u00b7 03</div>\n   <h2 class=\"section-title\">Three air-deficient <em>environments.</em></h2>\n  </div>\n  <p>Where conventional energy systems are physically inoperable.</p>\n </div>\n\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);overflow:hidden\">\n   <div style=\"height:220px;overflow:hidden;background:#0a1018;position:relative\">\n    <img src=\"https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=1200&q=85&auto=format&fit=crop\" alt=\"Space domain \u2014 satellite in orbit\" style=\"width:100%;height:100%;object-fit:cover;opacity:.88\" loading=\"lazy\" onerror=\"this.style.display='none';this.parentNode.style.background='radial-gradient(ellipse at 50% 30%,rgba(59,130,246,.25) 0%,#0a1018 60%,#06080B 100%)'\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.1) 0%,rgba(6,8,11,.85) 100%)\"></div>\n    <div style=\"position:absolute;bottom:16px;left:18px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.18em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ 01 \u00b7 Space</div>\n   </div>\n   <div style=\"padding:22px 24px\">\n    <h3 style=\"font-size:22px;margin:0 0 12px;font-weight:600;letter-spacing:-.01em\">Space</h3>\n    <div style=\"font-size:13px;color:var(--ink-2);line-height:1.7\">Launch vehicles \u00b7 Satellites \u00b7 Orbital vehicles</div>\n   </div>\n  </div>\n\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);overflow:hidden\">\n   <div style=\"height:220px;overflow:hidden;background:#0a1018;position:relative\">\n    <img src=\"https://images.unsplash.com/photo-1517976547714-720226b864c1?w=1200&q=85&auto=format&fit=crop\" alt=\"High-altitude domain \u2014 atmosphere from above\" style=\"width:100%;height:100%;object-fit:cover;opacity:.82\" loading=\"lazy\" onerror=\"this.style.display='none';this.parentNode.style.background='radial-gradient(ellipse at 50% 30%,rgba(59,130,246,.20) 0%,#0a1018 60%,#06080B 100%)'\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.15) 0%,rgba(6,8,11,.88) 100%)\"></div>\n    <div style=\"position:absolute;bottom:16px;left:18px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.18em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ 02 \u00b7 High-Altitude</div>\n   </div>\n   <div style=\"padding:22px 24px\">\n    <h3 style=\"font-size:22px;margin:0 0 12px;font-weight:600;letter-spacing:-.01em\">High-Altitude</h3>\n    <div style=\"font-size:13px;color:var(--ink-2);line-height:1.7\">Missiles \u00b7 Hypersonic vehicles \u00b7 ISR platforms</div>\n   </div>\n  </div>\n\n  <div style=\"background:var(--bg-2);border:1px solid var(--border);overflow:hidden\">\n   <div style=\"height:220px;overflow:hidden;background:#0a1018;position:relative\">\n    <img src=\"https://images.unsplash.com/photo-1530053969600-caed2596d242?w=1200&q=85&auto=format&fit=crop\" alt=\"Underwater domain \u2014 submarine in deep water\" style=\"width:100%;height:100%;object-fit:cover;opacity:.82\" loading=\"lazy\" onerror=\"this.style.display='none';this.parentNode.style.background='radial-gradient(ellipse at 50% 100%,rgba(14,90,127,.45) 0%,#061722 50%,#06080B 100%)'\" />\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.15) 0%,rgba(6,8,11,.88) 100%)\"></div>\n    <div style=\"position:absolute;bottom:16px;left:18px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.18em;color:var(--accent-bright);text-transform:uppercase;font-weight:700\">/ 03 \u00b7 Underwater</div>\n   </div>\n   <div style=\"padding:22px 24px\">\n    <h3 style=\"font-size:22px;margin:0 0 12px;font-weight:600;letter-spacing:-.01em\">Underwater</h3>\n    <div style=\"font-size:13px;color:var(--ink-2);line-height:1.7\">Submarines \u00b7 Torpedoes \u00b7 Autonomous vehicles (AUV / UUV)</div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a703 THE FOUNDATION \u2014 Editorial: imagery + clean hierarchy -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">The Foundation \u00b7 04</div>\n   <h2 class=\"section-title\">Energy enables <em>everything above it.</em></h2>\n  </div>\n  <p>The energy layer determines whether platforms, sensors, and sovereign capabilities can function at all.</p>\n </div>\n\n <!-- 2-column: editorial image + clean hierarchy stack -->\n <div class=\"reveal\" style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);min-height:540px\">\n  <!-- LEFT: Atmospheric infrastructure image -->\n  <div style=\"background:#0a1018;position:relative;overflow:hidden;min-height:540px\">\n   <img src=\"https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?w=1600&q=85&auto=format&fit=crop\" alt=\"Strategic energy infrastructure\" style=\"width:100%;height:100%;object-fit:cover;opacity:.65\" loading=\"lazy\" onerror=\"this.style.display='none';this.parentNode.style.background='radial-gradient(circle at 30% 70%,rgba(34,211,238,.15) 0%,#0a1018 60%,#06080B 100%)'\" />\n   <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,11,.5) 0%,rgba(6,8,11,.1) 35%,rgba(6,8,11,.95) 100%)\"></div>\n   <div style=\"position:absolute;bottom:36px;left:36px;right:36px;z-index:2\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:14px\">/ The foundational layer</div>\n    <p style=\"font-family:'Inter',sans-serif;font-size:24px;color:#FFF;font-weight:300;letter-spacing:-.01em;line-height:1.32;margin:0\">Constraints at the energy layer <em style=\"font-style:italic;font-weight:500;color:var(--accent-bright)\">propagate upward</em> into strategic and political limitations.</p>\n   </div>\n  </div>\n\n  <!-- RIGHT: Clean vertical hierarchy (top \u2192 bottom, with Energy as accented foundation) -->\n  <div style=\"background:var(--bg);padding:44px 40px;display:flex;flex-direction:column;justify-content:center;gap:0\">\n   <!-- Tier 04 -->\n   <div style=\"padding:18px 0;text-align:right;border-bottom:1px solid var(--border-soft)\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ Tier 04</div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:20px;color:#FFF;font-weight:600;letter-spacing:-.01em\">Sovereign capability</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;margin-top:4px;text-transform:uppercase\">&amp; Influence</div>\n   </div>\n   <div style=\"text-align:right;padding:12px 0;font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.20em;opacity:.7\">\u25b2 ENABLES</div>\n\n   <!-- Tier 03 -->\n   <div style=\"padding:18px 0;text-align:right;border-bottom:1px solid var(--border-soft)\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ Tier 03</div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:20px;color:#FFF;font-weight:600;letter-spacing:-.01em\">Defense &amp; resilience</div>\n   </div>\n   <div style=\"text-align:right;padding:12px 0;font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.20em;opacity:.7\">\u25b2 ENABLES</div>\n\n   <!-- Tier 02 -->\n   <div style=\"padding:18px 0;text-align:right;border-bottom:1px solid var(--border-soft)\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ Tier 02</div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:20px;color:#FFF;font-weight:600;letter-spacing:-.01em\">Mobility</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;margin-top:4px;text-transform:uppercase\">Space \u00b7 High-Alt \u00b7 Underwater</div>\n   </div>\n   <div style=\"text-align:right;padding:12px 0;font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.20em;opacity:.7\">\u25b2 ENABLES</div>\n\n   <!-- Tier 01 \u2014 FOUNDATION (accented) -->\n   <div style=\"padding:22px 18px;text-align:right;border:1px solid var(--accent-bright);background:rgba(34,211,238,0.06);margin-top:4px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:6px\">/ Foundation</div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:28px;color:#FFF;font-weight:700;letter-spacing:-.015em\">Energy</div>\n    <div style=\"font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.12em;margin-top:6px;text-transform:uppercase\">Air-Independent \u00b7 Sovereign</div>\n   </div>\n  </div>\n </div>\n</section>\n\n<!-- \u00a704 THE PROBLEM \u2014 Sovereign Supply, editorial imagery + diplomatic compare -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">The Problem \u00b7 05</div>\n   <h2 class=\"section-title\">Legacy supply chains <em>are not allied.</em></h2>\n \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     CTA\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"background:var(--bg-2)\">\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:1fr 1fr;gap:24px;align-items:center\">\n  <div>\n   <div class=\"eyebrow\" style=\"color:var(--accent-bright)\">Engage with the Portfolio</div>\n   <h2 class=\"section-title\" style=\"margin-top:14px\">Pick your <em>commercial package.</em></h2>\n   <p style=\"margin-top:18px\">Five purpose-specific packages from off-the-shelf qualified systems (P1) to licensing partnerships (P4). All underpinned by Full-Mission Support \u2014 LMP-103S propellant supply across four blends.</p>\n  </div>\n  <div style=\"display:flex;flex-direction:column;gap:12px;align-items:flex-start\">\n   <a href=\"#/commercial-packages\" style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;color:var(--accent-bright);text-transform:uppercase;text-decoration:none;font-weight:700;padding:14px 24px;border:1px solid var(--accent-bright);display:inline-block\">Commercial Packages \u2192</a>\n   <a href=\"#/contact-us\" style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.14em;color:var(--ink);text-transform:uppercase;text-decoration:none;font-weight:700;padding:14px 24px;border:1px solid var(--border);display:inline-block\">Contact Us \u2192</a>\n  </div>\n </div>\n</section>","history":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>HISTORY</b></span>\n <span style=\"flex:1\"></span>\n <span class=\"dot\"></span>\n <span>25+ YEARS \u00b7 <b>1997 \u2192 TODAY</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">A history of <em>firsts.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Operational HPGP propulsion solutions since 1997. ECAPS made history with the first HPGP flight in 2010 \u2014 and has spent over two decades advancing the non-toxic propulsion category.</p>\n <div class=\"hero-coords reveal\">\n <div>FOUNDED \u2014 <b>2000</b></div>\n <div>FIRST FLIGHT \u2014 <b>2010</b></div>\n <div>ACQUISITION \u2014 <b>OAK UNIVERSE 2023</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.unsplash.com/photo-1517976487492-5750f3195933?w=2400&q=90&auto=format&fit=crop\" alt=\"ECAPS heritage\" />\n <div class=\"telemetry\">\n FIRST FLIGHT <b>PRISMA \u00b7 2010</b><br>\n SPACECRAFT <b>40+</b><br>\n ORBIT-YEARS <b>200+</b>\n </div>\n <div class=\"caption\">25 YEARS \u00b7 40+ SPACECRAFT \u00b7 200+ CUMULATIVE ORBIT-YEARS</div>\n</div>\n\n<section>\n <div class=\"timeline reveal\">\n <div class=\"tl-item\">\n <div class=\"tl-year\">2000</div>\n <div class=\"tl-body\">\n <h4>ECAPS is founded</h4>\n <p>The commercialization of LMP-103S and HPGP technologies begins.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2000\u20132010</div>\n <div class=\"tl-body\">\n <h4>Validation &amp; world-firsts</h4>\n <p>ECAPS validates the operational superiority of LMP-103S and develops the world's first high-performance, sustainable rocket engines and propulsion systems for space.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2010</div>\n <div class=\"tl-body\">\n <h4>PRISMA mission \u2014 first flight</h4>\n <p>ECAPS's propulsion technologies are launched aboard the PRISMA mission. The superiority of HPGP solutions for advanced, high-precision mobility in space is demonstrated.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2012</div>\n <div class=\"tl-body\">\n <h4>NASA collaborative R&amp;D</h4>\n <p>ECAPS engages in collaborative R&amp;D with NASA, laying the foundations for the expansion of HPGP technology applications.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2013</div>\n <div class=\"tl-body\">\n <h4>Planet imaging constellation</h4>\n <p>ECAPS's advanced propulsion technology starts supporting Planet's imaging constellation, solidifying the superior performance of HPGP solutions for critical in-space mobility.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2014\u20132023</div>\n <div class=\"tl-body\">\n <h4>Global provider status</h4>\n <p>ECAPS establishes its position as the global provider of high-performance, sustainable propulsion solutions for critical mobility in space, supporting commercial and government missions, including partners like ESA, NASA, NRO, SNSA and more.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2023</div>\n <div class=\"tl-body\">\n <h4>Oak Universe acquisition</h4>\n <p>Oak Universe acquires ECAPS. Research and development operations are customized to power rapid response and dual-use capabilities in demanding defense terrains.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2024</div>\n <div class=\"tl-body\">\n <h4>Multi-domain customization</h4>\n <p>ECAPS escalates customization of LMP-103S derivatives and propulsion hardware to empower critical mobility in space, underwater, and in the air.</p>\n </div>\n </div>\n <div class=\"tl-item\">\n <div class=\"tl-year\">2025</div>\n <div class=\"tl-body\">\n <h4>25 years &amp; 190+ years in orbit</h4>\n <p>ECAPS marks 25 years of operations, reaching more than 190 cumulative years of technological heritage in space.</p>\n </div>\n </div>\n </div>\n</section>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Continue</div>\n <h2>Explore the <em>missions</em> behind the heritage.</h2>\n <div class=\"cta-row\">\n <a href=\"#/missions\" class=\"btn-primary\">View Missions \u2192</a>\n <a href=\"#/about\" class=\"btn-ghost\">About ECAPS</a>\n </div>\n</div>","index":"<!-- INDUSTRIAL HERO \u2014 full-bleed engineering test photograph -->\n<section class=\"industrial-hero\" style=\"position:relative;overflow:hidden;min-height:88vh;background:#06080B\">\n\n <style>\n  @keyframes hero-orbital-drift {\n   0%   { transform: scale(1.02) translateX(0)   translateY(0); }\n   50%  { transform: scale(1.08) translateX(-18px) translateY(-8px); }\n   100% { transform: scale(1.02) translateX(0)   translateY(0); }\n  }\n  .hero-orbital-img {\n   animation: hero-orbital-drift 50s ease-in-out infinite;\n   transform-origin: center center;\n   will-change: transform;\n  }\n  @media (prefers-reduced-motion: reduce) {\n   .hero-orbital-img { animation: none; }\n  }\n </style>\n\n <!-- Full-bleed photographic background: NASA satellite over Earth -->\n <div style=\"position:absolute;inset:0;z-index:0;overflow:hidden\">\n  <img class=\"hero-orbital-img\" src=\"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=2400&amp;q=85&amp;auto=format&amp;fit=crop\" alt=\"Satellite in low Earth orbit \u2014 NASA photograph\" style=\"width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(1.05) contrast(1.05)\" />\n </div>\n\n <!-- Subtle left-side darkening for text-overlay legibility (in addition to ::before) -->\n <div style=\"position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(6,8,11,.6) 0%,rgba(6,8,11,.3) 45%,transparent 70%);pointer-events:none\"></div>\n\n <!-- Real mission caption \u2014 bottom-right, replaces the synthetic HUD -->\n <div style=\"position:absolute;bottom:32px;right:32px;z-index:3;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);text-align:right;line-height:1.7\">\n  <div style=\"display:flex;align-items:center;gap:10px;justify-content:flex-end\">\n   <span style=\"width:6px;height:6px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px rgba(34,211,238,.6)\"></span>\n   <b style=\"color:#FFF;letter-spacing:.16em\">LOW EARTH ORBIT</b>\n  </div>\n  <div style=\"margin-top:6px\">40+ SPACECRAFT \u00b7 200+ ORBIT YEARS</div>\n  <div style=\"margin-top:2px;color:rgba(255,255,255,.45)\">ECAPS HPGP HERITAGE \u00b7 OPERATIONAL SINCE 2010</div>\n </div>\n\n <!-- Main content overlay -->\n <div class=\"industrial-hero-inner\" style=\"position:relative;z-index:2\">\n  <div class=\"industrial-hero-classification reveal\">\n   <div>HPGP PROPULSION</div>\n   <div>EST. 2000</div>\n   <div>40+ SPACECRAFT</div>\n  </div>\n\n  <h1 class=\"reveal\">Critical Mobility for<br><em>Space &amp; Defense.</em></h1>\n\n  <div class=\"hero-capabilities reveal\">\n   <span>Rocket Engines</span>\n   <span class=\"cap-sep\">\u00b7</span>\n   <span>Satellite Systems</span>\n   <span class=\"cap-sep\">\u00b7</span>\n   <span>Power Systems</span>\n   <span class=\"cap-sep\">\u00b7</span>\n   <span>ADN Propellant</span>\n  </div>\n\n  <div class=\"industrial-specs reveal\">\n   <div>\n    <div class=\"label\">Heritage</div>\n    <div class=\"value\">25<em>+</em><span class=\"unit\">YEARS</span></div>\n   </div>\n   <div>\n    <div class=\"label\">In Orbit</div>\n    <div class=\"value\">200<em>+</em><span class=\"unit\">YEARS</span></div>\n   </div>\n  </div>\n\n  <div class=\"industrial-actions reveal\">\n   <a href=\"#/contact-us\" class=\"btn-primary\">Schedule a briefing \u2192</a>\n   <a href=\"#/missions\" class=\"btn-ghost\">Mission heritage</a>\n  </div>\n </div>\n</section>\n\n<!-- SECTION DIVIDER \u00b7 industrial -->\n<div class=\"sect-divider\">\n <span class=\"dot\"></span>\n <b>ECAPS / 25 YEARS</b>\n <span class=\"sep\">//</span>\n <span>GLOBAL DELIVERY</span>\n <span style=\"flex:1\"></span>\n <span>HPGP PROPULSION</span>\n</div>\n\n<!-- TICKER -->\n<section style=\"padding-top:0;padding-bottom:0\">\n <div class=\"ticker reveal\">\n <div class=\"ticker-track\">\n <span><i>\u25c6</i> <b>NON-TOXIC PROPULSION</b> \u2014 THE NEW STANDARD FOR ALLIED SPACE PROGRAMS</span>\n <span><i>\u25c6</i> <b>HYDRAZINE REPLACEMENT</b> \u2014 DELIVERED, NOT FUTURE</span>\n <span><i>\u25c6</i> <b>LMP-103S</b> \u2014 16 YEARS PROVEN ON ORBIT</span>\n <span><i>\u25c6</i> <b>SOVEREIGN SUPPLY</b> \u2014 STRATEGIC IMPERATIVE FOR DEFENSE PROGRAMS</span>\n <span><i>\u25c6</i> <b>TYR-1</b> \u2014 FIRST HPGP ORBITAL TRANSFER VEHICLE</span>\n <span><i>\u25c6</i> <b>ITAR-FREE</b> \u2014 ALLIED DUAL-USE EXPORT POSTURE</span>\n <span><i>\u25c6</i> <b>NON-TOXIC PROPULSION</b> \u2014 THE NEW STANDARD FOR ALLIED SPACE PROGRAMS</span>\n <span><i>\u25c6</i> <b>HYDRAZINE REPLACEMENT</b> \u2014 DELIVERED, NOT FUTURE</span>\n </div>\n </div>\n</section>\n\n<!-- SECTORS \u2014 4 cards mirroring the 4 main menu sections -->\n<section id=\"sectors\">\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Capabilities \u00b7 01</div>\n <h2 class=\"section-title\">Four <em>capabilities.</em></h2>\n </div>\n <p>From ADN-based propellant chemistry to integrated propulsion systems, sovereign defense capability and commercial packages \u2014 the full ECAPS stack.</p>\n </div>\n\n <div class=\"sector-grid reveal\">\n <a href=\"#/lmp-103s-propellant\" class=\"sector-card\">\n <div class=\"sector-photo\" style=\"background-image:url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg')\"></div>\n <div class=\"sector-num\">/ 01 \u2014 Technology</div>\n <div class=\"sector-stat\">\n <b>11 classes</b>\n <span>4 product families</span>\n </div>\n <div class=\"sector-inner\">\n <h3>Technology <em>core.</em></h3>\n <div class=\"sector-tagline\">LMP-103S propellant in 4 blends, paired with 6 monopropellant and 5 bipropellant engine classes. The chemistry and hardware that power everything else.</div>\n <div class=\"sector-link\">View Technology</div>\n </div>\n </a>\n\n <a href=\"#/space-capabilities\" class=\"sector-card\">\n <div class=\"sector-photo\" style=\"background-image:url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765885268459-M3O1J4UZB95KUU4917CR/unsplash-image--p-KCm6xB9I.jpg?format=1500w')\"></div>\n <div class=\"sector-num\">/ 02 \u2014 Space</div>\n <div class=\"sector-stat\">\n <b>40+ spacecraft</b>\n <span>200+ orbit-years</span>\n </div>\n <div class=\"sector-inner\">\n <h3>Space <em>capabilities.</em></h3>\n <div class=\"sector-tagline\">End-to-end propulsion for satellite deployment and operations \u2014 from CubeSat AOCS to GEO platforms and orbital transfer vehicles. Operational since 2010.</div>\n <div class=\"sector-link\">View Space</div>\n </div>\n </a>\n\n <a href=\"#/defense\" class=\"sector-card\">\n <div class=\"sector-photo\" style=\"background-image:url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765885686822-JUN7XC2QSNL9QN6E883Z/unsplash-image-t7EL2iG3jMc.jpg?format=1500w')\"></div>\n <div class=\"sector-num\">/ 03 \u2014 Defense</div>\n <div class=\"sector-stat\">\n <b>3 domains</b>\n <span>Space \u00b7 Air \u00b7 Sea</span>\n </div>\n <div class=\"sector-inner\">\n <h3>Defense <em>capabilities.</em></h3>\n <div class=\"sector-tagline\">Cross-domain propulsion and auxiliary power across oxygen-deprived domains \u2014 orbital, high-altitude and underwater. Sovereign supply, ITAR-free.</div>\n <div class=\"sector-link\">View Defense</div>\n </div>\n </a>\n\n <a href=\"#/commercial-packages\" class=\"sector-card\">\n <div class=\"sector-photo\" style=\"background-image:url('https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1763543898064-Q1HMEK6D4B2K6SGJNFYL/ECAPS+AC11')\"></div>\n <div class=\"sector-num\">/ 04 \u2014 Commercial</div>\n <div class=\"sector-stat\">\n <b>5 packages</b>\n <span>P1\u2013P4 + FMS</span>\n </div>\n <div class=\"sector-inner\">\n <h3>Commercial <em>packages.</em></h3>\n <div class=\"sector-tagline\">Five purpose-specific packages from qualified off-the-shelf propulsion to licensing partnerships. Backed by ECAPS manufacturing and AS9100 quality.</div>\n <div class=\"sector-link\">View Commercial</div>\n </div>\n </a>\n </div>\n</section>\n\n<!-- MISSION HERITAGE \u2014 featured numbers + named missions -->\n<section id=\"heritage\">\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Heritage \u00b7 02</div>\n <h2 class=\"section-title\">Flight <em>heritage.</em></h2>\n </div>\n <p>Proven on 40+ spacecraft since 2010. Cumulative orbital heritage exceeds 200 years.</p>\n </div>\n\n <div class=\"reveal\" style=\"border:1px solid var(--border);background:var(--bg-2);padding:60px 48px\">\n <div class=\"heritage-panel\">\n <div>\n <div class=\"heritage-stat\">200<sup>+</sup></div>\n <div class=\"heritage-stat-label\">Orbit-years across 40+ spacecraft</div>\n </div>\n <div>\n <p style=\"font-family:'Inter',sans-serif;font-size:clamp(16px,1.6vw,20px);line-height:1.5;letter-spacing:-.01em;color:var(--ink-2);font-weight:400;margin:0;text-wrap:balance\">In <em style=\"color:var(--accent);font-style:normal;font-weight:500\">2010</em> the PRISMA mission carried the world's first ADN propulsion into orbit. Since then, our propulsion has flown for <em style=\"color:var(--ink);font-weight:500;font-style:normal\">NASA, ESA, JAXA, Planet, Astroscale and Argotec.</em></p>\n </div>\n </div>\n\n <div class=\"mission-feat-grid reveal\">\n <a href=\"#/missions/prisma\" class=\"mission-feat\">\n <div class=\"mf-year\">2010 \u2014 FOUNDING</div>\n <h4>PRISMA</h4>\n <p>First flight of ADN propulsion. formation-flying mission.</p>\n <div class=\"mf-link\">Read brief</div>\n </a>\n <a href=\"#/missions/skysat\" class=\"mission-feat\">\n <div class=\"mf-year\">2013-2020 \u2014 CONSTELLATION</div>\n <h4>SkySat</h4>\n <p>19-satellite imaging constellation. Largest HPGP deployment.</p>\n <div class=\"mf-link\">Read brief</div>\n </a>\n <a href=\"#/missions/argomoon\" class=\"mission-feat\">\n <div class=\"mf-year\">2022 \u2014 DEEP SPACE</div>\n <h4>ArgoMoon</h4>\n <p>NASA Artemis I co-manifest. Lunar fly-by science mission.</p>\n <div class=\"mf-link\">Read brief</div>\n </a>\n <a href=\"#/missions/adras-j\" class=\"mission-feat\">\n <div class=\"mf-year\">2024 \u2014 DEBRIS REMOVAL</div>\n <h4>ADRAS-J</h4>\n <p>Astroscale debris removal demonstration.</p>\n <div class=\"mf-link\">Read brief</div>\n </a>\n </div>\n\n <div style=\"text-align:center;margin-top:40px\">\n <a href=\"#/missions\" class=\"btn-ghost\">View mission heritage \u2192</a>\n </div>\n </div>\n</section>\n\n<!-- NEWS -->\n<section id=\"news\">\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">News \u00b7 03</div>\n <h2 class=\"section-title\"><em>News.</em></h2>\n </div>\n <p>Program announcements, partnership news and operational milestones.</p>\n </div>\n\n <div class=\"news-grid reveal\">\n <a href=\"#/news-article\" class=\"news-card\">\n <div class=\"news-meta\">\n <div class=\"news-date\"><b>24</b><span>APR \u00b7 2025</span></div>\n <span>EXPANSION</span>\n </div>\n <div class=\"news-img is-logo\">\n <img src=\"data:image/png;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QBMRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAHgKADAAQAAAABAAAHgAAAAAD/7QA4UGhvdG9zaG9wIDMuMAA4QklNBAQAAAAAAAA4QklNBCUAAAAAABDUHYzZjwCyBOmACZjs+EJ+/8AAEQgHgAeAAwEiAAIRAQMRAf/EAB8AAAEFAQEBAQEBAAAAAAAAAAABAgMEBQYHCAkKC//EALUQAAIBAwMCBAMFBQQEAAABfQECAwAEEQUSITFBBhNRYQcicRQygZGhCCNCscEVUtHwJDNicoIJChYXGBkaJSYnKCkqNDU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6g4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2drh4uPk5ebn6Onq8fLz9PX29/j5+v/EAB8BAAMBAQEBAQEBAQEAAAAAAAABAgMEBQYHCAkKC//EALURAAIBAgQEAwQHBQQEAAECdwABAgMRBAUhMQYSQVEHYXETIjKBCBRCkaGxwQkjM1LwFWJy0QoWJDThJfEXGBkaJicoKSo1Njc4OTpDREVGR0hJSlNUVVZXWFlaY2RlZmdoaWpzdHV2d3h5eoKDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxM AooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKAP/Z\" alt=\"ECAPS Japan\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>ECAPS Establishes Japanese Subsidiary</h3>\n <p>ECAPS Japan AB established as a wholly-owned subsidiary, providing direct program support, propellant supply and engineering services to Japanese government and commercial space customers.</p>\n <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n </a>\n\n <a href=\"#/news-article\" class=\"news-card\">\n <div class=\"news-meta\">\n <div class=\"news-date\"><b>22</b><span>APR \u00b7 2025</span></div>\n <span>LEADERSHIP</span>\n </div>\n <div class=\"news-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/03babd8e-eda3-4683-bb23-18e5f8bf6a4e/Lars+Helmrich.jpg\" alt=\"Lars Helmrich\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>ECAPS Appoints Brig. Gen. (Ret) Lars Helmrich to Board</h3>\n <p>Brigadier General (Ret.) Helmrich joins the ECAPS board following a career across military aviation, defense procurement and senior program leadership within the defense establishment.</p>\n <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n </a>\n\n <a href=\"#/news-article\" class=\"news-card\">\n <div class=\"news-meta\">\n <div class=\"news-date\"><b>10</b><span>DEC \u00b7 2024</span></div>\n <span>CAPITAL</span>\n </div>\n <div class=\"news-img\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/01fca8e6-aa51-4e88-a330-83ac4460c700/1.jpeg\" alt=\"EIB financing\" loading=\"lazy\" decoding=\"async\" />\n </div>\n <h3>ECAPS Secures \u20ac20M European Investment Bank Financing</h3>\n <p>The European Investment Bank has agreed \u20ac20 million in financing to support continued development of high-performance rocket engines and expansion of propulsion manufacturing capacity.</p>\n <div class=\"news-footer\"><span>Read brief</span><span class=\"news-arrow\">\u2197</span></div>\n </a>\n </div>\n</section>\n\n<!-- TRUSTED BY \u2014 partner customers (moved up, more prominent) -->\n<div class=\"trust-band\">\n <div class=\"trust-band-inner\">\n <div class=\"trust-head reveal\">\n <h2><em>Trusted</em> by agencies and primes.</h2>\n <p>14+ partners across civil and defense.</p>\n </div>\n <div class=\"trust-logos-band reveal\">\n <div class=\"trust-logo\">NASA</div>\n <div class=\"trust-logo\">ESA</div>\n <div class=\"trust-logo\">DLR</div>\n <div class=\"trust-logo\">SNSA</div>\n <div class=\"trust-logo\">JAXA</div>\n <div class=\"trust-logo\">Boeing</div>\n <div class=\"trust-logo\">Planet</div>\n <div class=\"trust-logo\">Astroscale</div>\n <div class=\"trust-logo\">Moog</div>\n <div class=\"trust-logo\">VACCO</div>\n <div class=\"trust-logo\">NanoAvionics</div>\n <div class=\"trust-logo\">SNC</div>\n <div class=\"trust-logo\">Millennium</div>\n <div class=\"trust-logo\">Argotec</div>\n </div>\n <div style=\"text-align:center;margin-top:48px\">\n <a href=\"#/international-cooperation\" class=\"btn-ghost\">International Cooperation \u2192</a>\n </div>\n </div>\n</div>\n\n<!-- WORKING WITH ECAPS \u2014 three tracks mapping to the five packages -->\n<section id=\"working\">\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Engage \u00b7 04</div>\n <h2 class=\"section-title\">Working with <em>ECAPS.</em></h2>\n </div>\n <p>Five purpose-specific commercial packages \u2014 from off-the-shelf qualified hardware to sovereign capability transfer. Underpinned by Full-Mission Support.</p>\n </div>\n\n <div class=\"partnership-grid reveal\">\n <a href=\"#/commercial-packages/package-1\" class=\"partnership-track\" style=\"text-decoration:none;color:inherit;display:block\">\n <div class=\"pt-num\">/ P1 + P2 \u2014 PROCUREMENT</div>\n <h3>Qualified or <em>bespoke hardware.</em></h3>\n <p>P1 delivers off-the-shelf qualified propulsion in 6 months. P2 tailors performance to your platform \u2014 bespoke engines, custom power systems, mission-tuned thrust classes.</p>\n <div class=\"pt-for\">\n P1 \u2192 <b>COTS \u00b7 6 MONTHS</b><br>\n P2 \u2192 <b>BESPOKE \u00b7 PROJECT-SPECIFIC</b>\n </div>\n </a>\n\n <a href=\"#/commercial-packages/package-3\" class=\"partnership-track\" style=\"text-decoration:none;color:inherit;display:block\">\n <div class=\"pt-num\">/ P3 + FMS \u2014 SUPPORT</div>\n <h3>Research, engineering <em>&amp; fuelling.</em></h3>\n <p>P3 provides ECAPS technical depth before procurement \u2014 engineering studies, custom blends, simulation, collaborative R&amp;D. FMS handles LMP-103S supply and ECAPS-run fuelling campaigns for every package.</p>\n <div class=\"pt-for\">\n P3 \u2192 <b>5 SERVICES \u00b7 LAB TO LAUNCHPAD</b><br>\n FMS \u2192 <b>1 L \u2192 1,000 L \u00b7 ALL PACKAGES</b>\n </div>\n </a>\n\n <a href=\"#/commercial-packages/package-4\" class=\"partnership-track\" style=\"text-decoration:none;color:inherit;display:block\">\n <div class=\"pt-num\">/ P4 \u2014 SOVEREIGN CAPABILITY</div>\n <h3>Local industrialisation <em>partnerships.</em></h3>\n <p>Licensing of ADN-powered hardware for local manufacturing within allied jurisdictions. Continuous ECAPS engineering support and capacity building. Core IP retained, partner industrialises.</p>\n <div class=\"pt-for\">\n ELIGIBILITY \u2192 <b>ALLIED JURISDICTIONS</b><br>\n EXPORT \u2192 <b>ITAR-FREE \u00b7 DUAL-USE</b>\n </div>\n </a>\n </div>\n\n <div style=\"text-align:center;margin-top:32px\" class=\"reveal\">\n  <a href=\"#/commercial-packages\" class=\"btn-ghost\">View all five packages \u2192</a>\n </div>\n</section>\n\n<!-- CTA -->\n<div class=\"cta-band reveal\" id=\"contact\">\n <div class=\"eyebrow\">Contact \u00b7 05</div>\n <h2>Contact <em>ECAPS.</em></h2>\n <p style=\"max-width:620px;margin:20px auto 30px;color:var(--ink-2);font-size:15px;line-height:1.55\">Civil aerospace, defense and propellant teams available for confidential program scoping. Briefings at our facilities, virtually, or at your location. NDAs supported.</p>\n <div class=\"cta-row\">\n <a href=\"#/contact-us\" class=\"btn-primary\">Schedule a briefing \u2192</a>\n <a href=\"#/missions\" class=\"btn-ghost\">Mission heritage</a>\n <a href=\"#/about\" class=\"btn-ghost\">About ECAPS</a>\n </div>\n</div>","international-cooperation":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n <a href=\"#/index\">\u2190 ECAPS</a>\n <span>/</span>\n <a href=\"#/about\">Corporate</a>\n <span>/</span>\n <span><b>INTERNATIONAL COOPERATION</b></span>\n </div>\n\n <h1 class=\"hero-title reveal\">International <em>Cooperation.</em></h1>\n\n <div class=\"page-hero-body\">\n <p class=\"hero-lede reveal\">Enabling solutions for partners and allies. ECAPS facilitates programs for Sweden's international partners and allies to enable advanced technological developments of HPGP innovations \u2014 designed to enable the industrialization of ECAPS' propulsion capabilities for critical mobility.</p>\n <div class=\"hero-coords reveal\">\n <div>FOCUS \u2014 <b>SOVEREIGN CAPABILITY</b></div>\n <div>HERITAGE \u2014 <b>25+ YRS</b></div>\n <div>NETWORK \u2014 <b>13+ PARTNERS</b></div>\n </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765888358378-ABEPP44JDBNGBCATHY7G/unsplash-image-vhSz50AaFAs.jpg\" alt=\"International cooperation\" />\n <div class=\"telemetry\">\n SCOPE <b>SOVEREIGN</b><br>\n MODEL <b>INDIGENOUS</b><br>\n SUPPORT <b>CONTINUOUS</b>\n </div>\n <div class=\"caption\">SUPPORTING HPGP DEVELOPMENT WORLDWIDE</div>\n</div>\n\n<!-- PROGRAM CHARACTERISTICS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Program Characteristics \u00b7 01</div>\n <h2 class=\"section-title\">Supporting <em>industrialization.</em></h2>\n </div>\n <p>Supporting governments and companies in developing advanced propulsion capabilities.</p>\n </div>\n\n <dl class=\"spec-table reveal\">\n <div class=\"spec-row\"><dt>Localization</dt><dd>Reliance on <b>localized expertise and industrial capacity</b></dd></div>\n <div class=\"spec-row\"><dt>Indigenous Manufacturing</dt><dd><b>Indigenous manufacturing</b> based on technological partnership</dd></div>\n <div class=\"spec-row\"><dt>Engineering Support</dt><dd>Continuous <b>engineering support and training</b> services provided by ECAPS</dd></div>\n <div class=\"spec-row\"><dt>Fueling</dt><dd>Secure and reliable <b>fueling campaigns of LMP-103S</b></dd></div>\n </dl>\n</section>\n\n<!-- KEY PARTNERS -->\n<section>\n <div class=\"section-head reveal\">\n <div>\n <div class=\"eyebrow\">Key Customers &amp; Partners \u00b7 02</div>\n <h2 class=\"section-title\">A network of <em>partners &amp; allies.</em></h2>\n </div>\n <p>Empowering international partners and allies with critical mobility capabilities for 25+ years.</p>\n </div>\n\n <div class=\"partners-grid reveal\">\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/f1182256-8a23-4f4a-9805-30c8a7370c51/NASA_logo+1.png\" alt=\"NASA\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/d2d24ea4-88aa-48fe-a028-f9192360226e/ESA_logo+1.png\" alt=\"ESA\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/25386258-65f8-45e7-94c5-d36bb4c58838/DLR_Logo+1.png\" alt=\"DLR\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/7fc2d6ac-80a9-49be-a0ee-e054d5d281b5/Rymdstyrelsens_logotyp+1.png\" alt=\"SNSA\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/f5aeb3b6-316d-4839-b153-37c20a06f68b/Boeing_full_logo+1.png\" alt=\"Boeing\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/9166021e-cde8-4ddb-8c1b-05a1b301167e/Planet_Labs_logo+1.png\" alt=\"Planet\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/63ed886d-f0c9-47db-9503-716bc4e50f20/Astroscale_logo+1.png\" alt=\"Astroscale\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/d664df82-7859-40d8-b3ac-b4bc64bd97b2/Moog_logo+1.png\" alt=\"Moog\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/8940237e-407c-4aa0-9194-0add6f179fe6/vacco-01.png\" alt=\"VACCO\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/b74241f7-1020-4431-9b63-40ff7a083c92/nano+avionics-01.png\" alt=\"NanoAvionics\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/7a722ab3-03c2-4f5f-a755-3ee2d6422cbd/SNC_logo+1.png\" alt=\"SNC\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/698fcca5-bf90-4fe9-af63-43393ea2ff1f/millennium+space+systems-01.png\" alt=\"Millennium Space Systems\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/cf58b2ba-fe80-46d5-aa85-f55fbe41c1af/Space+Solutions+logo.png\" alt=\"Space Solutions\" loading=\"lazy\" decoding=\"async\" /></div>\n <div class=\"partner\"><img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/f9faac2e-dd45-45f1-a840-ed2ef4ae569b/agrotec.png\" alt=\"Agrotec\" loading=\"lazy\" decoding=\"async\" /></div>\n </div>\n</section>\n\n<!-- GLOBAL PROVIDER -->\n<div class=\"product reveal\">\n <div>\n <div class=\"product-tag\">\u25c7 Global Technology Provider</div>\n <h2>Supporting missions across <em>space &amp; defense.</em></h2>\n <p class=\"lede\">ECAPS supports international partners in developing high-performance propulsion solutions for space and defense. The innovations covered under these programs of international cooperation are designed to support critical mobility applications based on localized manufacturing and commercialization.</p>\n <a href=\"#/contact-us\" class=\"btn-primary\">Discuss cooperation \u2192</a>\n </div>\n <div style=\"aspect-ratio:1;overflow:hidden;border:1px solid var(--border)\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/1765912347350-RE5K0N5N9IUX2I91Z39B/unsplash-image-lDEMa5dPcNo.jpg\" alt=\"Global operations\" style=\"width:100%;height:100%;object-fit:cover;filter:brightness(.85)\" loading=\"lazy\" decoding=\"async\" />\n </div>\n</div>\n\n<div class=\"cta-band reveal\">\n <div class=\"eyebrow\">Engage</div>\n <h2>Partner with <em>ECAPS.</em></h2>\n <div class=\"cta-row\"><a href=\"#/contact-us\" class=\"btn-primary\">Contact ECAPS \u2192</a><a href=\"#/missions\" class=\"btn-ghost\">Mission Heritage</a></div>\n</div>","lmp-103s-propellant":"<section class=\"page-hero\">\n <div class=\"hero-meta reveal\">\n  <a href=\"#/index\">\u2190 ECAPS</a>\n  <span>/</span>\n  <span><b>LMP-103S\u2122 PROPELLANT</b></span>\n  <span style=\"flex:1\"></span>\n  <span class=\"dot\"></span>\n  <span>INVENTED <b>1997</b> \u00b7 4 BLENDS \u00b7 9 DOMAINS</span>\n </div>\n\n <h1 class=\"hero-title reveal\">LMP-103S\u2122 <em>Propellant.</em></h1>\n\n <div class=\"page-hero-body\">\n  <p class=\"hero-lede reveal\">ADN-based liquid ionic propellant blends for high-energy operations in space, in the air, and underwater. Superior performance, higher security, and simpler logistics compared to legacy propellants.</p>\n  <div class=\"hero-coords reveal\">\n   <div>BLENDS \u2014 <b>4 TIERS \u00b7 1100\u00b0C \u2192 &gt;1800\u00b0C</b></div>\n   <div>PERFORMANCE \u2014 <b>UP TO &gt;30% vs HYDRAZINE</b></div>\n   <div>DOMAINS \u2014 <b>SPACE \u00b7 AIR \u00b7 UNDERWATER</b></div>\n  </div>\n </div>\n</section>\n\n<div class=\"hero-image reveal\">\n <img src=\"https://images.squarespace-cdn.com/content/v1/691d8b5048af416970115447/2a3ea4f2-886f-431a-a642-684ce03b7e8e/AdobeStock_303865171.jpeg\" alt=\"LMP-103S propellant\" />\n <div class=\"telemetry\">\n ISP <b>+6%</b><br>\n DENSITY <b>+24%</b><br>\n DENSITY ISP <b>+30%</b>\n </div>\n <div class=\"caption\">TECHNOLOGY CORE \u00b7 ENABLING HIGH-ENERGY PERFORMANCE ACROSS OXYGEN-FREE DOMAINS</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     01 \u2014 WHY LMP-103S (chemistry + performance overview)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Technology Core \u00b7 01</div>\n   <h2 class=\"section-title\">An operational <em>chemistry.</em></h2>\n  </div>\n  <p>LMP-103S consists of ECAPS-produced high-purity ammonium-dinitramide (ADN), methanol, ammonia and water. The composition is configured to deliver bespoke blends with optimal combustion temperatures and performance focus to serve specific mission demands.</p>\n </div>\n</section>\n\n<!-- HIGHER PERFORMANCE \u2014 ADN chemistry + comparison stats -->\n<div class=\"product reveal\">\n <div>\n  <div class=\"product-tag\">\u25c7 Higher Performance Propulsion</div>\n  <h2>Superiority<br><em>over hydrazine.</em></h2>\n  <p class=\"lede\">LMP-103S delivers measurable, mission-defining advantages across every metric that matters \u2014 propulsive performance, density, and density impulse.</p>\n  <div class=\"spec-grid\">\n   <div class=\"spec\"><b>&gt;6%</b><span>ISP</span></div>\n   <div class=\"spec\"><b>&gt;24%</b><span>Density</span></div>\n   <div class=\"spec\"><b>&gt;30%</b><span>Density Impulse</span></div>\n   <div class=\"spec\"><b>1.4S</b><span>UN0481</span></div>\n  </div>\n  <a href=\"https://www.ecaps.se/s/Gren-proellant-A4-sheets-V4.pdf\" target=\"_blank\" class=\"btn-primary\">Download Report \u2192</a>\n </div>\n <div class=\"schematic\">\n  <svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n   <circle cx=\"200\" cy=\"200\" r=\"180\" fill=\"none\" stroke=\"rgba(245,242,236,.06)\" stroke-width=\"1\"/>\n   <circle cx=\"200\" cy=\"200\" r=\"120\" fill=\"none\" stroke=\"rgba(245,242,236,.1)\" stroke-width=\"1\" stroke-dasharray=\"2 5\"/>\n   <circle cx=\"200\" cy=\"200\" r=\"22\" fill=\"var(--bg)\" stroke=\"#4DA8FF\" stroke-width=\"1.2\"/>\n   <text x=\"200\" y=\"205\" text-anchor=\"middle\" font-family=\"Inter\" font-size=\"18\" fill=\"#4DA8FF\" font-style=\"italic\">N</text>\n   <line x1=\"200\" y1=\"178\" x2=\"200\" y2=\"120\" stroke=\"#F5F2EC\" stroke-width=\".8\"/>\n   <line x1=\"222\" y1=\"200\" x2=\"280\" y2=\"200\" stroke=\"#F5F2EC\" stroke-width=\".8\"/>\n   <line x1=\"200\" y1=\"222\" x2=\"200\" y2=\"280\" stroke=\"#F5F2EC\" stroke-width=\".8\"/>\n   <line x1=\"178\" y1=\"200\" x2=\"120\" y2=\"200\" stroke=\"#F5F2EC\" stroke-width=\".8\"/>\n   <g font-family=\"Inter\" font-style=\"italic\">\n    <circle cx=\"200\" cy=\"105\" r=\"20\" fill=\"var(--bg)\" stroke=\"#F5F2EC\" stroke-width=\"1\"/>\n    <text x=\"200\" y=\"111\" text-anchor=\"middle\" font-size=\"16\" fill=\"#F5F2EC\">O</text>\n    <circle cx=\"295\" cy=\"200\" r=\"20\" fill=\"var(--bg)\" stroke=\"#F5F2EC\" stroke-width=\"1\"/>\n    <text x=\"295\" y=\"206\" text-anchor=\"middle\" font-size=\"16\" fill=\"#F5F2EC\">N</text>\n    <circle cx=\"200\" cy=\"295\" r=\"20\" fill=\"var(--bg)\" stroke=\"#F5F2EC\" stroke-width=\"1\"/>\n    <text x=\"200\" y=\"301\" text-anchor=\"middle\" font-size=\"16\" fill=\"#F5F2EC\">O</text>\n    <circle cx=\"105\" cy=\"200\" r=\"20\" fill=\"var(--bg)\" stroke=\"#F5F2EC\" stroke-width=\"1\"/>\n    <text x=\"105\" y=\"206\" text-anchor=\"middle\" font-size=\"16\" fill=\"#F5F2EC\">N</text>\n   </g>\n   <text x=\"200\" y=\"370\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\" font-size=\"10\" fill=\"#8B8F99\" letter-spacing=\"3\">AMMONIUM DINITRAMIDE \u2014 ADN</text>\n   <text x=\"200\" y=\"385\" text-anchor=\"middle\" font-family=\"ui-monospace, monospace\" font-size=\"9\" fill=\"#5A5F69\" letter-spacing=\"2\">NH\u2084 \u00b7 N(NO\u2082)\u2082</text>\n  </svg>\n </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     02 \u2014 FOUR BLENDS (mirrors brochure p.17 main matrix)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section style=\"background:linear-gradient(180deg,rgba(59,130,246,.04) 0%,transparent 100%);border-top:1px solid var(--border)\">\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Blends &amp; Performance \u00b7 02</div>\n   <h2 class=\"section-title\">Four blends, <em>one chemistry.</em></h2>\n  </div>\n  <p>LMP-103S configured across a 700\u00b0C operating range, from thermally moderated atmospheric applications at 1100\u00b0C up to bipropellant operations above 1800\u00b0C. Each blend delivers a measurable performance increase compared to hydrazine.</p>\n </div>\n\n <!-- 4-blend matrix cards -->\n <div class=\"cap-grid reveal\" style=\"grid-template-columns:repeat(4,1fr)\">\n\n  <!-- TIER 1: BIPROP >1800\u00b0C -->\n  <div class=\"cap\" style=\"min-height:auto;position:relative;border-top:3px solid var(--warn)\">\n   <div class=\"cap-num\" style=\"color:var(--warn)\">/ T1 \u2014 BIPROP</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:42px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;margin-top:12px\">&gt;1800<span style=\"font-size:24px;color:var(--warn)\">\u00b0C</span></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--warn);letter-spacing:.14em;text-transform:uppercase;margin-top:6px;font-weight:700\">VARIABLE PERFORMANCE</div>\n   <h3 style=\"font-size:16px;margin-top:18px;color:var(--ink)\">High energy density</h3>\n   <p style=\"font-size:12px;line-height:1.5;margin-top:6px\">Extreme temperature handling. Highest performance tier for bipropellant high-energy operations.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">USE \u00b7 BIPROP HIGH-ENERGY</div>\n  </div>\n\n  <!-- TIER 2: 1600\u00b0C -->\n  <div class=\"cap\" style=\"min-height:auto;position:relative;border-top:3px solid var(--warn);opacity:.92\">\n   <div class=\"cap-num\" style=\"color:var(--warn)\">/ T2 \u2014 MONOPROP HIGH</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:42px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;margin-top:12px\">1600<span style=\"font-size:24px;color:var(--warn)\">\u00b0C</span></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--warn);letter-spacing:.14em;text-transform:uppercase;margin-top:6px;font-weight:700\">&gt; 30% vs HYDRAZINE</div>\n   <h3 style=\"font-size:16px;margin-top:18px;color:var(--ink)\">High energy density</h3>\n   <p style=\"font-size:12px;line-height:1.5;margin-top:6px\">Extreme temperature handling. Monopropellant configuration for high-performance space operations.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">USE \u00b7 HIGH-PERFORMANCE MONOPROP</div>\n  </div>\n\n  <!-- TIER 3: 1470\u00b0C -->\n  <div class=\"cap\" style=\"min-height:auto;position:relative;border-top:3px solid var(--accent-bright)\">\n   <div class=\"cap-num\" style=\"color:var(--accent-bright)\">/ T3 \u2014 MONOPROP STANDARD</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:42px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;margin-top:12px\">1470<span style=\"font-size:24px;color:var(--accent-bright)\">\u00b0C</span></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;margin-top:6px;font-weight:700\">&gt; 22.5% vs HYDRAZINE</div>\n   <h3 style=\"font-size:16px;margin-top:18px;color:var(--ink)\">Balanced performance</h3>\n   <p style=\"font-size:12px;line-height:1.5;margin-top:6px\">Responsive handling. General-purpose monopropellant blend for standard satellite operations.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">USE \u00b7 STANDARD MONOPROP</div>\n  </div>\n\n  <!-- TIER 4: 1100\u00b0C -->\n  <div class=\"cap\" style=\"min-height:auto;position:relative;border-top:3px solid var(--accent)\">\n   <div class=\"cap-num\" style=\"color:var(--accent)\">/ T4 \u2014 MONOPROP MODERATED</div>\n   <div style=\"font-family:'Inter',sans-serif;font-size:42px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1;margin-top:12px\">1100<span style=\"font-size:24px;color:var(--accent)\">\u00b0C</span></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-top:6px;font-weight:700\">&gt; 10% vs HYDRAZINE</div>\n   <h3 style=\"font-size:16px;margin-top:18px;color:var(--ink)\">Low thermal stress</h3>\n   <p style=\"font-size:12px;line-height:1.5;margin-top:6px\">Low-fuel consumption. Thermally moderated blend for atmospheric and underwater applications.</p>\n   <div style=\"margin-top:auto;padding-top:18px;border-top:1px solid var(--border-soft);font-family:ui-monospace,monospace;font-size:10px;color:var(--accent-bright);letter-spacing:.14em;text-transform:uppercase;font-weight:600\">USE \u00b7 ATMOSPHERIC \u00b7 UNDERWATER</div>\n  </div>\n\n </div>\n\n <p style=\"text-align:center;margin-top:32px;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;font-style:italic\">Performance increase compared to hydrazine \u00b7 \u2191 Temperature = \u2191 Energy density</p>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u255 );align-items:center\">\n   <div style=\"display:flex;align-items:center;gap:14px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:#60A5FA;letter-spacing:.14em;font-weight:600;width:60px\">SUBSEA</div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);font-weight:500\">Shallow Underwater</div>\n   </div>\n   <div style=\"display:flex;gap:6px\"><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent-bright)\"></div><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:.7\"></div></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-2)\">Hours</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-2)\">&lt; 1 month</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink)\">&gt; 10 years</div>\n  </div>\n\n  <div style=\"display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1fr;gap:0;padding:16px 24px;align-items:center;background:rgba(34,211,238,.02)\">\n   <div style=\"display:flex;align-items:center;gap:14px\">\n    <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:#60A5FA;letter-spacing:.14em;font-weight:600;width:60px\"></div>\n    <div style=\"font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);font-weight:500\">Deep Underwater</div>\n   </div>\n   <div style=\"display:flex;gap:6px\"><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent-bright)\"></div><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:.7\"></div></div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-2)\">Minutes</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink-2)\">&gt; 5 years</div>\n   <div style=\"font-family:ui-monospace,monospace;font-size:12px;color:var(--ink)\">&gt; 10 years</div>\n  </div>\n </div>\n\n <!-- Legend -->\n <div class=\"reveal\" style=\"margin-top:24px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)\">\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:var(--warn)\"></div>1600\u00b0C BLEND</div>\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent-bright)\"></div>1470\u00b0C BLEND</div>\n  <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:.6\"></div>1100\u00b0C BLEND</div>\n </div>\n</section>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     05 \u2014 OPERATIONAL ADVANTAGES (existing key benefits)\n     \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<section>\n <div class=\"section-head reveal\">\n  <div>\n   <div class=\"eyebrow\">Operational Advantages \u00b7 04</div>\n   <h2 class=\"section-title\">Why <em>switch.</em></h2>\n  </div>\n  <p>LMP-103S operational advantages compared to legacy propellants \u2014 across flexibility, safety, and cost.</p>\n </div>\n\n <div class=\"cap-grid reveal\">\n  <div class=\"cap\">\n   <div class=\"cap-num\">/ 01 \u2014 DUAL-USE FLEXIBILITY</div>\n   <h3>Configurable &amp; r
